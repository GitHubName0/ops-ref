<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Ref AI — 离线运维问答</title>
<meta name="description" content="基于 LiteRT.js 的离线运维 AI 问答助手">
<style>:root,[data-theme="dark"]{
--bg:#0d1117;--bg2:#161b22;--border:#21262d;--border2:#30363d;
--fg:#c9d1d9;--fg2:#8b949e;--accent:#58a6ff;--accent2:#0f3460;
--green:#3fb950;--orange:#e2b714;--red:#ff6b6b;
}
[data-theme="light"]{
--bg:#ffffff;--bg2:#f6f8fa;--border:#d0d7de;--border2:#d0d7de;
--fg:#24292f;--fg2:#57606a;--accent:#0969da;--accent2:#ddf4ff;
--green:#1a7f37;--orange:#bf8700;--red:#cf222e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--fg);height:100vh;display:flex;flex-direction:column}
.header{background:var(--accent2);color:#fff;padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:15px;font-weight:700}
.header .badge{font-size:10px;padding:1px 8px;background:rgba(255,255,255,.15);border-radius:10px}
.header .status{font-size:11px;margin-left:auto;opacity:.8}
.chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--accent2);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--bg2);border:1px solid var(--border2);border-bottom-left-radius:4px}
.msg.ai .src{display:block;margin-top:6px;font-size:10px;color:var(--fg2);border-top:1px solid var(--border);padding-top:4px}
.msg.ai code{background:var(--bg);color:var(--orange);padding:1px 4px;border-radius:3px;font-size:11px}
.input-bar{display:flex;gap:8px;padding:10px 20px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.input-bar input{flex:1;padding:8px 14px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--fg);font-size:13px;outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.input-bar button:hover{opacity:.9}
.loading{display:flex;align-items:center;gap:6px;color:var(--fg2);font-size:12px;padding:4px 0}
.loading .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite}
.loading .dot:nth-child(2){animation-delay:.2s}
.loading .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.feedback{display:flex;gap:8px;margin-top:6px;opacity:0;transition:opacity.15s}
.msg.ai:hover .feedback{opacity:1}
.fb-btn{cursor:pointer;font-size:12px;padding:2px;opacity:.4;transition:opacity.15s}
.fb-btn:hover,.fb-btn.active{opacity:1}
.msg.weak{opacity:.6;border-left:3px solid var(--orange)}
.empty{text-align:center;color:var(--fg2);padding:60px 20px;font-size:14px}
.empty p{margin:4px 0}
.theme-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:14px;cursor:pointer}
@media(max-width:600px){.header{padding:6px 12px}.chat{padding:10px}.msg{max-width:90%;font-size:12px}.input-bar{padding:8px 12px}}</style>
</head>
<body>
<div class="header">
<h1>🐧 Ops Ref AI</h1>
<span class="badge">v0.2.0</span>
<span class="status" id="modelStatus">模型未加载</span>
<button class="theme-btn" id="themeToggle" title="切换主题">☀</button>
</div>
<div class="chat" id="chat">
<div class="empty">
<p>🤖 离线运维 AI 问答助手</p>
<p style="font-size:12px">基于 255 个知识块 · 覆盖 13 个章节</p>
<p style="font-size:11px;margin-top:8px">试试问：<code>磁盘满了怎么办</code> <code>nginx 502怎么排查</code> <code>k8s pod pending</code></p>
</div>
</div>
<div class="input-bar">
<input type="text" id="userInput" placeholder="输入运维问题，例如：CPU 飙高怎么排查…" autocomplete="off">
<button id="sendBtn">发送</button>
</div>

tle":"文本处理三剑客","text":"**sed — 流编辑器（替换/修改）**\n**awk — 列处理/格式化输出**\n**sort / uniq — 排序去重**\n\n命令参考：\nsed 's/旧/新/g' file              # 替换所有（输出到屏幕）\nsed -i 's/旧/新/g' file           # 直接修改文件（慎重！）\nsed -i.bak 's/旧/新/g' file       # 备份原文件再替换\nsed '/pattern/d' file             # 删除匹配行\nsed -n '5,10p' file               # 打印第5-10行\nsed 's/^/HEAD: /' file            # 行首插入\nsed 's/$/ :TAIL/' file            # 行尾追加\nawk '{print $1, $NF}' file        # 打印第一列和最后一列\nawk -F ':' '{print $1}' /etc/passwd   # 指定分隔符\nawk '{sum+=$1} END{print sum}'    # 对第一列求和\nawk '$3 > 500 {print $1}' file    # 条件过滤\nawk 'NR==10' file                 # 打印第10行\nsort file.txt                     # 排序\nsort -n file.txt                  # 按数值排序\nsort -r file.txt                  # 倒序\nsort -k 2 file.txt                # 按第二列排序\nuniq -c                           # 去重并统计出现次数\nsort file.txt | uniq -c | sort -rn   # 计数排序（经典组合）\nsort -u file.txt                  # 排序+去重（等同于sort|uniq）","chapter":"Linux 基础命令","keywords":["file","sed","sort","awk","txt","uniq","print","sum","排序","10","500","流编辑器","替换","修改","列处理","格式化输出","排序去重","命令参考","替换所有","输出到屏幕"]},{"title":"其他文本工具","text":"命令参考：\nwc -l file                        # 行数\nwc -w file                        # 单词数\nwc -c file                        # 字节数\ncut -d: -f1,3 /etc/passwd         # 按分隔符取列\ntr 'a-z' 'A-Z' < file             # 小写转大写\ndiff file1 file2                  # 比较两个文件差异\ncomm -3 file1 file2               # 比较两个排序文件的差异","chapter":"Linux 基础命令","keywords":["file","wc","file1","file2","命令参考","行数","单词数","字节数","cut","f1","etc","passwd","按分隔符取列","tr","小写转大写","diff","比较两个文件差异","comm","比较两个排序文件的差异"]},{"title":"文件权限","text":"> 权限数字速算：r=4, w=2, x=1 → rwx=7, rw-=6, r-x=5, r--=4\n\n命令参考：\nchmod 755 file                    # rwxr-xr-x（常用）\nchmod 644 file                    # rw-r--r--（普通文件）\nchmod 600 file                    # rw-------（密钥文件）\nchmod 700 dir                     # rwx------（目录）\nchown user:group file             # 修改所属用户和组\nchown -R user:group dir ）\npkill process_name                # 按名称杀进程\npkill -f \"pattern\"                # 按完整命令匹配杀进程\nnohup command &                   # 后台运行（退出不中断）\njobs                              # 查看后台作业\nfg %1                             # 后台作业调到前台\nbg %1                             # 前台作业调到后台","chapter":"Linux 基础命令","keywords":["kill","ps","pid","aux","cpu","sort","mem","top","pkill","15","杀进程顺序","term","不行再","还不行重启机器","命令参考","查看所有进程","ef","另一格式查看所有进程","按内存使用排序","使用排序"]},{"title":"系统基本信息","text":"命令参考：\nuname -a                          # 内核版本/主机名/架构\nuname -r                          # 仅内核版本\ncat /etc/os-release               # 发行版信息（推荐）\ncat /etc/redhat-release           # CentOS/RHEL 版本\ncat /etc/lsb-release              # Ubuntu 版本\nhostname                          # 主机名\nhostname -I                       # 本机所有 IP 地址\ndate                              # 当前时间\ndate -s \"2024-01-01 12:00:00\"     # 手动设置时间\ntimedatectl                       # 时间和时区信息\ncal                               # 日历","chapter":"Linux 基础命令","keywords":["cat","etc","release","uname","主机名","版本","hostname","date","01","00","12","2024","命令参考","内核版本","架构","仅内核版本","os","发行版信息","推荐","redhat"]},{"title":"CPU 信息","text":"命令参考：\nlscpu                             # CPU 详细信息（型号/核心/线程）\ncat /proc/cpuinfo                 # 每个 CPU 核心信息\nnproc                             # 逻辑 CPU 核心数\ngrep -c processor /proc/cpuinfo   # 逻辑核心数（同上）","chapter":"Linux 基础命令","keywords":["cpu","proc","cpuinfo","命令参考","lscpu","详细信息","型号","核心","线程","cat","每个","核心信息","nproc","逻辑","核心数","grep","processor","逻辑核心数","同上"]},{"title":"内存信息","text":"命令参考：\nfree -h                           # 内存使用情况（人性化显示）\nfree -m                           # 以 MB 为单位\ncat /proc/meminfo                 # 详细内存信息\nvmstat 1 5                        # 内存/进程/IO 统计（每秒一次5次）","chapter":"Linux 基础命令","keywords":["free","命令参考","内存使用情况","人性化显示","mb","为单位","cat","proc","meminfo","详细内存信息","vmstat","内存","进程","io","统计","每秒一次5次"]},{"title":"硬件与设备","text":"命令参考：\nlspci                             # PCI 设备列表\nlspci | grep -i raid              # 查看 RAID 卡\nlsblk                             # 所有块设备（磁盘分区）\nlsusb                             # USB 设备\ndmidecode -t system               # 系统制造商/型号/序列号\ndmesg | tail -20                  # 内核日志（硬件报错排查用）\nlsmod                             # 已加载的内核模块\nmodinfo module_name               # 模块详细信息","chapter":"Linux 基础命令","keywords":["lspci","raid","20","命令参考","pci","设备列表","grep","查看","lsblk","所有块设备","磁盘分区","lsusb","usb","设备","dmidecode","system","系统制造商","型号","序列号","dmesg"]},{"title":"磁盘空间","text":"命令参考：\ndf -h                             # 各分区使用情况（推荐）\ndf -i                             # inode 使用情况（inode满时关键）\ndu -sh /path/                     # 目录总大小\ndu -sh /*                         # 根下各目录大小统计\ndu -h --max-depth=1 /var/         # 指定深度\ndu -ah /var/log/ | sort -rh | head -10  # 找出最大10个文件\nncdu /path/                       # 交互式磁盘分析（如有安装）","chapter":"Linux 基础命令","keywords":["du","df","sh","path","var","10","命令参考","各分区使用情况","推荐","inode","使用情况","inode满时关键","目录总大小","根下各目录大小统计","max","depth","指定深度","ah","log","sort"]},{"title":"分区与挂载","text":"命令参考：\nfdisk -l                          # 查看磁盘分区信息\nlsblk                             # 块设备树状结构\nblkid                             # 块设备 UUID\nmount                             # 查看当前挂载\nmount /dev/sdb1 /mnt/data         # 手动挂载\numount /mnt/data                  # 卸载\ndf -hT                            # 查看分区类型（xfs/ext4）\nmkfs.ext4 /dev/sdb1               # 格式化为 ext4\nmkfs.xfs /dev/sdb1                # 格式化为 xfs","chapter":"Linux 基础命令","keywords":["dev","sdb1","xfs","ext4","mount","mnt","data","mkfs","格式化为","命令参考","fdisk","查看磁盘分区信息","lsblk","块设备树状结构","blkid","块设备","uuid","查看当前挂载","手动挂载","umount"]},{"title":"LVM 管理","text":"命令参考：\npvdisplay                         # 查看物理卷\nvgdisplay                         # 查看卷组\nlvdisplay                         # 查看逻辑卷\nvgextend vgname /dev/sdb          # 扩展卷组\nlvextend -L +10G /dev/vg/lv       # 扩容逻辑卷\nlvextend -l +100%FREE /dev/vg/lv  # 使用所有剩余空间\nxfs_growfs /mount/point           # XFS 扩容后刷新\nresize2fs /dev/vg/lv              # ext4 扩容后刷新","chapter":"Linux 基础命令","keywords":["dev","vg","lv","lvextend","xfs","扩容后刷新","100","命令参考","pvdisplay","查看物理卷","vgdisplay","查看卷组","lvdisplay","查看逻辑卷","vgextend","vgname","sdb","扩展卷组","10g","扩容逻辑卷"]},{"title":"磁盘 IO 排查","text":"命令参考：\niostat -x 1                       # 详细 IO 统计（每秒一次）\niotop                             # 实时查看进程 IO\ndstat -d                          # 磁盘读写统计","chapter":"Linux 基础命令","keywords":["io","命令参考","iostat","详细","统计","每秒一次","iotop","实时查看进程","dstat","磁盘读写统计"]},{"title":"基础网络信息","text":"命令参考：\nip addr                           # 查看 IP 地址（新，推荐）\nip a                              # 简写\nifconfig                          # 旧版，需 net-tools 包\nip route                          # 查看路由表\nroute -n                          # 旧版路由\nip neigh                          # ARP 表（邻居发现）\narp -n                            # 旧版 ARP\nss -tuln                          # 查看监听端口（新，推荐）\nnetstat -tulpn                    # 查看监听端口（旧版）\nss -tuna                          # 所有 TCP/UDP 连接","chapter":"Linux 基础命令","keywords":["ip","旧版","arp","推荐","route","ss","查看监听端口","命令参考","addr","查看","地址","简写","ifconfig","net","tools","查看路由表","旧版路由","neigh","邻居发现","tuln"]},{"title":"网络连通性排查","text":"命令参考：\nping -c 4 8.8.8.8                 # 测试到外网连通性\nping -c 4 hostname                # 测试域名连通性\ntelnet IP PORT                    # 测试端口（需安装 telnet）\nnc -zv IP PORT                    # 端口测试（推荐）\nnc -vz IP 80                      # 测试 80 端口\ntraceroute IP                     # 路由追踪（需安装）\ntracert IP                        # CentOS 上命令名\nmtr IP                            # 结合 ping+traceroute（推荐）\nnslookup domain                   # DNS 解析查询\ndig domain                        # 详细的 DNS 查询（推荐）\ndig -x IP                         # 反向解析\nhost domain                       # 简单 DNS 查询\ncat /etc/resolv.conf              # 查看 DNS 配置\ncurl -v http://example.com        # 发送 HTTP 请求（调试用）\ncurl -I https://example.com       # 只返回 HTTP 头\ncurl -o /dev/null -w \"%{http_code}\" http://example.com  # 只输出状态码\nwget -q -O - http://example.com   # wget 版","chapter":"Linux 基础命令","keywords":["ip","http","dns","example","com","ping","推荐","domain","curl","80","telnet","port","需安装","nc","traceroute","dig","查询","wget","命令参考","测试到外网连通性"]},{"title":"网卡配置","text":"**CentOS / RHEL (nmcli — NetworkManager)**\n**Ubuntu (netplan)** — 配置文件在 `/etc/netplan/*.yaml`\n\n命令参考：\nnmcli dev status                  # 查看网卡状态\nnmcli con show                    # 查看连接配置\nnmcli con up \"ens33\"              # 启用连接\nnmcli con down \"ens33\"            # 停用连接\nnmcli con add con-name eth0 ifname eth0 type ethernet ip4 192.168.1.100/24 gw4 192.168.1.1\nnmcli con mod eth0 ipv4.dns \"8.8.8.8 8.8.4.4\"\nnetplan apply                     # 应用配置\nnetplan try                       # 尝试应用（超时回滚）","chapter":"Linux 基础命令","keywords":["nmcli","con","netplan","eth0","168","192","ens33","24","100","centos","rhel","networkmanager","ubuntu","配置文件在","etc","yaml","命令参考","dev","status","查看网卡状态"]},{"title":"抓包与流量","text":"命令参考：\ntcpdump -i eth0                   # 抓取 eth0 流量\ntcpdump -i any port 80            # 抓取所有网卡 80 端口流量\ntcpdump -i eth0 -c 100 -w dump.pcap  # 抓100个包存文件\ntcpdump -i eth0 host 10.0.0.1    # 抓取与某 IP 的通信\ntcpdump -i eth0 tcp and port 443  # 条件过滤\ntcpdump -i any and host 10.0.0.1 -nneevv -N -w capture.pcap\ntcpdump -i any host 10.0.0.1 -nne -X     # -X 以 hex+ASCII 打印包内容\ntcpdump -i any host 10.0.0.1 -nne -A     # -A 以纯 ASCII 打印（适合 HTTP）\ntcpdump -i any port 80 -n -S             # -S 显示绝对序列号（代替相对序列号）\ntcpdump -i any host 10.0.0.1 -c 1000 -w capture.pcap   # 抓1000个包退出\ntcpdump -i any -G 60 -w capture_%Y%m%d_%H%M%S.pcap      # 每60秒轮转一个新文件\ntcpdump -r capture.pcap -nne            # 读取已保存的包，不重新抓\ntcpdump -r capture.pcap -nne host 10.0.0.2  # 读取文件并筛选","chapter":"Linux 基础命令","keywords":["tcpdump","any","10","pcap","host","eth0","capture","nne","80","port","and","ascii","60","100","443","1000","命令参考","抓取","流量","抓取所有网卡"]},{"title":"CentOS / RHEL (yum / dnf)","text":"命令参考：\nyum list installed                 # 列出已安装所有包\nyum list installed | grep nginx   # 查询某包是否安装\nyum info nginx                    # 查看包信息\nyum search keyword                # 搜索包\nrpm -qa                           # 所有已安装的 RPM 包\nrpm -qi package                   # RPM 包信息\nrpm -ql package                   # 包所安装的文件列表\nrpm -qf /path/to/file             # 文件属于哪个包\nyum install -y nginx              # 安装\nyum remove nginx                  # 卸载\nyum update                        # 更新所有包\nyum update nginx                  # 更新单个包\nyum clean all                     # 清理缓存\nyum repolist                      # 查看启用的仓库\nyum-config-manager --add-repo URL # 添加第三方仓库","chapter":"Linux 基础命令","keywords":["yum","rpm","nginx","list","installed","package","update","命令参考","列出已安装所有包","grep","查询某包是否安装","info","查看包信息","search","keyword","搜索包","qa","所有已安装的","qi","包信息"]},{"title":"Ubuntu / Debian (apt)","text":"命令参考：\ndpkg -l                           # 列出已安装包\ndpkg -l | grep nginx              # 查询某包是否已装\napt show nginx                    # 包详细信息\napt search keyword                # 搜索包\ndpkg -L package                   # 包安装的文件列表\ndpkg -S /path/to/file             # 文件属于哪个包\napt install -y nginx              # 安装\napt remove nginx                  # 卸载（保留配置）\napt purge nginx                   # 卸载（删除配置）\napt update                        # 更新包列表\napt upgrade                       # 升级所有包\napt autoremove                    # 自动清理依赖\nadd-apt-repository ppa:name       # 添加 PPA\ncat /etc/apt/sources.list         # 查看源列表","chapter":"Linux 基础命令","keywords":["apt","nginx","dpkg","卸载","ppa","命令参考","列出已安装包","grep","查询某包是否已装","show","包详细信息","search","keyword","搜索包","package","包安装的文件列表","path","to","file","文件属于哪个包"]},{"title":"从源码编译（解压源码后通用步骤）","text":"命令参考：\n./configure --prefix=/usr/local/nginx\nmake\nmake install                      # ⚠️ 需要 root","chapter":"Linux 基础命令","keywords":["make","命令参考","configure","prefix","usr","local","nginx","install","需要","root"]},{"title":"systemd（CentOS 7+ / Ubuntu 16+）","text":"命令参考：\nsystemctl status nginx            # 查看服务状态（含最近日志）\nsystemctl start nginx             # 启动\nsystemctl stop nginx              # 停止\nsystemctl restart nginx           # 重启\nsystemctl reload nginx            # 重载配置（不中断服务）\nsystemctl enable nginx            # 开机自启\nsystemctl disable nginx           # 取消开机自启\nsystemctl is-active nginx         # 检查是否运行\nsystemctl is-enabled nginx        # 检查是否开机自启\nsystemctl list-units --type=service  # 列出所有服务\nsystemctl reboot                  # 重启系统\nsystemctl poweroff                # 关机\nsystemctl rescue                  # 进入救援模式\njournalctl -u nginx               # 查看 nginx 的服务日志\njournalctl -u nginx -f            # 实时跟踪服务日志\njournalctl -u sshd --since \"1 hour ago\"  # 查看最近1小时日志","chapter":"Linux 基础命令","keywords":["systemctl","nginx","journalctl","is","命令参考","status","查看服务状态","含最近日志","start","启动","stop","停止","restart","重启","reload","重载配置","不中断服务","enable","开机自启","disable"]},{"title":"旧版 init (CentOS 6 / service 命令)","text":"命令参考：\nservice nginx status\nservice nginx start/stop/restart\nchkconfig nginx on                # 开机自启\nchkconfig --list                  # 查看所有服务开机自启状态","chapter":"Linux 基础命令","keywords":["nginx","service","chkconfig","命令参考","status","start","stop","restart","on","开机自启","list","查看所有服务开机自启状态"]},{"title":"系统日志位置","text":"系统   主要日志   说明\n------ --------- ------\nCentOS 7+   `/var/log/messages`   通用系统日志\nUbuntu   `/var/log/syslog`   通用系统日志\n通用   `/var/log/dmesg`   内核启动日志\n通用   `/var/log/cron`   计划任务日志\n通用   `/var/log/secure` (CentOS) / `/var/log/auth.log` (Ubuntu)   认证/安全日志\n通用   `/var/log/maillog` / `/var/log/mail.log`   邮件日志\nNginx   `/var/log/nginx/access.log`, `/var/log/nginx/error.log`   Web 访问/错误日志\nMySQL   `/var/log/mysql/error.log`   数据库错误日志","chapter":"Linux 基础命令","keywords":["log","var","通用","nginx","centos","通用系统日志","ubuntu","error","mysql","系统","主要日志","说明","messages","syslog","dmesg","内核启动日志","cron","计划任务日志","secure","auth"]},{"title":"日志查看技巧","text":"命令参考：\ntail -f /var/log/messages\ntail -f /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn  # 实时看 IP 访问统计\ngrep -i \"error\\|fail\\|critical\" /var/log/messages | tail -50\ngrep \"Out of memory\" /var/log/messages\ngrep \"disk full\" /var/log/messages\ngrep -i \"authentication failure\" /var/log/secure\ndmesg | grep -i error\ndmesg | less\njournalctl -b                      # 本次启动所有日志\njournalctl -b -p err               # 本次启动的错误级别日志","chapter":"Linux 基础命令","keywords":["log","var","grep","messages","tail","sort","error","dmesg","journalctl","50","命令参考","nginx","access","awk","print","uniq","rn","实时看","ip","访问统计"]},{"title":"firewalld（CentOS 7+ 默认）","text":"命令参考：\nsystemctl status firewalld           # 防火墙状态\nfirewall-cmd --state                 # 简版状态\nfirewall-cmd --list-all              # 查看所有规则\nfirewall-cmd --zone=public --add-port=80/tcp --permanent    # 开放端口\nfirewall-cmd --zone=public --remove-port=80/tcp --permanent # 关闭端口\nfirewall-cmd --reload                # 重载规则\nfirewall-cmd --add-service=http --permanent                 # 开放服务\nfirewall-cmd --add-rich-rule='rule family=\"ipv4\" source address=\"10.0.0.0/24\" accept' --permanent","chapter":"Linux 基础命令","keywords":["firewall","cmd","permanent","add","80","zone","public","port","tcp","rule","10","24","命令参考","systemctl","status","firewalld","防火墙状态","state","简版状态","list"]},{"title":"iptables（通用）","text":"命令参考：\niptables -L -n -v                   # 查看规则\niptables -F                          # 清空所有规则（⚠️ 导致断连）\niptables -A INPUT -p tcp --dport 22 -j ACCEPT    # 允许 SSH\niptables -A INPUT -p tcp --dport 80 -j ACCEPT    # 允许 HTTP\niptables -A INPUT -p tcp --dport 443 -j ACCEPT   # 允许 HTTPS\niptables -A INPUT -s 10.0.0.0/24 -j ACCEPT       # 允许某网段\niptables -A INPUT -j DROP            # 默认拒绝入站（最后）\niptables -I INPUT 1 -p tcp --dport 22 -j ACCEPT   # 插入到第1条\niptables-save > /etc/sysconfig/iptables           # CentOS\niptables-save > /etc/iptables/rules.v4            # Ubuntu\niptables-restore < /etc/sysconfig/iptables","chapter":"Linux 基础命令","keywords":["iptables","input","accept","tcp","dport","允许","etc","22","save","sysconfig","10","24","80","443","命令参考","查看规则","清空所有规则","导致断连","ssh","http"]},{"title":"ufw（Ubuntu 默认）","text":"命令参考：\nufw enable                           # 启用\nufw disable                          # 禁用\nufw status                           # 状态\nufw status numbered                   # 带编号查看\nufw allow 22/tcp                     # 允许端口\nufw allow 80/tcp                     # 允许端口\nufw deny 23/tcp                      # 拒绝端口\nufw delete 3                         # 删除第3条规则\nufw allow from 10.0.0.0/24          # 允许网段","chapter":"Linux 基础命令","keywords":["ufw","allow","tcp","status","允许端口","10","22","23","24","80","命令参考","enable","启用","disable","禁用","状态","numbered","带编号查看","deny","拒绝端口"]},{"title":"cron","text":"命令参考：\ncrontab -l                           # 查看当前用户的计划任务\ncrontab -e                           # 编辑计划任务\ncrontab -r                           # 删除所有计划任务（小心！）\n*/5 * * * * /script/check.sh        # 每5分钟\n0 * * * * /script/hourly.sh         # 每小时（整点）\n0 2 * * * /script/backup.sh         # 每天凌晨2点\n0 0 * * 0 /script/weekly.sh         # 每周日凌晨\n0 0 1 * * /script/monthly.sh        # 每月1号凌晨\n30 9 * * 1-5 /script/workday.sh     # 工作日上午9:30\ntail -f /var/log/cron                # CentOS RHEL\ngrep CRON /var/log/syslog           # Ubuntu","chapter":"Linux 基础命令","keywords":["script","sh","crontab","30","var","log","cron","命令参考","查看当前用户的计划任务","编辑计划任务","删除所有计划任务","小心","check","每5分钟","hourly","每小时","整点","backup","每天凌晨2点","weekly"]},{"title":"13. 压缩与归档","text":"> 断网排查时 `zgrep` 是神器——日志被 rotate 压缩了也不用先解压\n\n命令参考：\ntar -czvf archive.tar.gz /path/     # 创建 tar.gz 压缩\ntar -xzvf archive.tar.gz            # 解压到当前目录\ntar -xzvf archive.tar.gz -C /tmp   # 解压到指定目录\ntar -tzvf archive.tar.gz            # 查看压缩包内容\ntar -czvf archive.tar.gz --exclude='*.log' /path/  # 排除某些文件\nzip -r archive.zip /path/\nunzip archive.zip\nunzip archive.zip -d /target/dir\nunzip -l archive.zip               # 查看内容\ngzip file                          # 压缩单个文件\ngunzip file.gz\nbzip2 file                         # 更高压缩比\nbunzip2 file.bz2\nzcat file.gz                       # 查看 gz 压缩文件内容（grep 等配合）\nzless file.gz\nzgrep \"error\" /var/log/syslog.*.gz  # 搜索压缩日志（超级实用！）","chapter":"Linux 基础命令","keywords":["tar","gz","archive","file","zip","path","unzip","zgrep","czvf","xzvf","log","断网排查时","是神器","日志被","rotate","压缩了也不用先解压","命令参考","创建","压缩","解压到当前目录"]},{"title":"14. SSH 远程管理","text":"命令参考：\nssh user@hostname\nssh -p 2222 user@hostname          # 指定端口\nssh -i ~/.ssh/id_rsa user@host     # 指定密钥文件\nssh-keygen -t ed25519              # 生成 ed25519 密钥（推荐）\nssh-keygen -t rsa -b 4096          # 或 RSA 4096 位\nssh-copy-id user@hostname           # 复制公钥到服务器\nscp file user@host:/path/          # 上传\nscp user@host:/path/file ./        # 下载\nscp -r dir/ user@host:/path/       # 递归传输目录\nrsync -avz /local/ user@host:/remote/   # 同步（增量更快，推荐）\nrsync -avz --delete user@host:/remote/ /local/  # 镜像同步（删除目标多余文件）\nssh -L 8080:localhost:80 user@host       # 本地端口转发\nssh -R 8080:localhost:80 user@host       # 远程端口转发\nssh -D 1080 user@host                    # SOCKS 代理","chapter":"Linux 基础命令","keywords":["user","ssh","host","hostname","rsa","scp","path","80","4096","8080","id","keygen","ed25519","推荐","file","rsync","avz","local","remote","localhost"]},{"title":"容器生命周期","text":"命令参考：\ndocker ps                            # 运行中的容器\ndocker ps -a                         # 所有容器（含已停止）\ndocker ps -a --format \"table {{.ID}}\\t{{.Names}}\\t{{.Status}}\"  # 格式化输出\ndocker logs -f container_name        # 查看容器日志（-f 跟踪）\ndocker logs --tail 100 container_name  # 最近100行\ndocker exec -it container_name bash  # 进入容器\ndocker exec container_name cat /etc/nginx/nginx.conf  # 查看容器内文件\ndocker inspect container_name        # 容器详细信息\ndocker stats                         # 容器资源占用（实时）\ndocker start/stop/restart name       # 启停容器\ndocker rm -f container_name          # 强制删除容器","chapter":"Linux 基础命令","keywords":["docker","name","container","ps","logs","exec","nginx","100","命令参考","运行中的容器","所有容器","含已停止","format","table","id","names","status","格式化输出","查看容器日志","跟踪"]},{"title":"镜像管理","text":"> 前往 **[02-linux-troubleshooting.md](02-linux-troubleshooting.md)** 查看故障排查与应急场景\n\n命令参考：\ndocker images                        # 查看本地镜像\ndocker pull nginx:latest             # 拉取镜像\ndocker rmi image_name                # 删除镜像\ndocker system df                     # 查看 Docker 磁盘占用\ndocker system prune                  # 清理未使用资源（镜像/容器/网络）\ndocker system prune -a               # 更激进的清理","chapter":"Linux 基础命令","keywords":["docker","system","02","linux","troubleshooting","md","prune","前往","查看故障排查与应急场景","命令参考","images","查看本地镜像","pull","nginx","latest","拉取镜像","rmi","image","name","删除镜像"]},{"title":"Linux 故障排查与应急场景","text":"> 适用场景：当机应急、性能瓶颈定位、断网排错\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"Linux 故障排查","keywords":["01","linux","basics","md","适用场景","当机应急","性能瓶颈定位","断网排错","前置阅读"]},{"title":"目录","text":"- [1. 性能排查总纲（1分钟定位问题）](#1-性能排查总纲1分钟定位问题)\n- [2. CPU 排查](#2-cpu-排查)\n- [3. 内存排查](#3-内存排查)\n- [4. 磁盘排查](#4-磁盘排查)\n- [5. 网络排查](#5-网络排查)\n- [6. 系统瓶颈一句话速判](#6-系统瓶颈一句话速判)\n- [7. 常用排查场景速查](#7-常用排查场景速查)\n- [附录：命令快速索引](#附录命令快速索引)","chapter":"Linux 故障排查","keywords":["cpu","排查","内存排查","磁盘排查","网络排查","系统瓶颈一句话速判","常用排查场景速查","性能排查总纲","1分钟定位问题","性能排查总纲1分钟定位问题","附录","命令快速索引","附录命令快速索引"]},{"title":"1. 性能排查总纲（1分钟定位问题）","text":"命令参考：\ntop\nhtop\ndf -h\nfree -h\niostat -x 1 5\nss -s\nnetstat -s","chapter":"Linux 故障排查","keywords":["命令参考","top","htop","df","free","iostat","ss","netstat"]},{"title":"2. CPU 排查","text":"命令参考：\ntop -o %CPU                         # 按 CPU 排序\nps -eo pid,ppid,cmd,%cpu --sort=-%cpu | head -10  # 前10个\ntop -Hp PID\nps -Lp PID -o pid,tid,pcpu,cmd | sort -k3 -rn | head\nvmstat 1 5                          # wa 列高 = IO 瓶颈","chapter":"Linux 故障排查","keywords":["cpu","pid","top","ps","cmd","sort","head","10","命令参考","排序","eo","ppid","前10个","hp","lp","tid","pcpu","k3","rn","vmstat"]},{"title":"3. 内存排查","text":"命令参考：\nps aux --sort=-%mem | head -10\npmap -x PID\ncat /proc/meminfo | grep -E \"^(Mem|Cached|Buffers)\"\ndmesg | grep -i \"out of memory\"\ngrep -i \"killed process\" /var/log/messages","chapter":"Linux 故障排查","keywords":["grep","mem","10","命令参考","ps","aux","sort","head","pmap","pid","cat","proc","meminfo","cached","buffers","dmesg","out","of","memory","killed"]},{"title":"4. 磁盘排查","text":"命令参考：\niotop -o                              # 只显示有 IO 的进程\nlsof +D /var/log/                     # 查看哪些进程在打开日志目录的文件\ndf -i\nfind /var/spool/postfix/maildrop -type f | wc -l  # 邮件队列常见\nfind /tmp -type f | wc -l\nfind / -xdev -type f 2>/dev/null | wc -l\ndu -ah / | sort -rh | head -20\nlsof | grep \"(deleted)\"","chapter":"Linux 故障排查","keywords":["find","type","wc","lsof","var","20","命令参考","iotop","只显示有","io","的进程","log","查看哪些进程在打开日志目录的文件","df","spool","postfix","maildrop","邮件队列常见","tmp","xdev"]},{"title":"5. 网络排查","text":"命令参考：\nss -s                                # 总连接数汇总\nss -tan | awk '{print $4}' | sort | uniq -c | sort -rn  # 各端口连接数\nss -tan state ESTABLISHED | wc -l   # 已建立连接数\nss -tan state TIME-WAIT | wc -l\necho \"net.ipv4.tcp_tw_reuse = 1\" >> /etc/sysctl.conf\necho \"net.ipv4.tcp_fin_timeout = 15\" >> /etc/sysctl.conf\nsysctl -p\niftop -i eth0                        # 实时带宽（需安装）\nnload                                # 流量监控（需安装）\nnetstat -i                           # 查看接口丢包\nip -s link                           # 接口统计（含错误/丢包）","chapter":"Linux 故障排查","keywords":["ss","tan","sysctl","sort","state","wc","echo","net","ipv4","tcp","etc","conf","需安装","15","命令参考","总连接数汇总","awk","print","uniq","rn"]},{"title":"6. 系统瓶颈一句话速判","text":"瓶颈   判断依据   解决方向\n------ --------- ---------\nCPU 瓶颈   `top` → %idle 接近 0, %wa < 5, %us+%sy 接近 100   优化代码、扩容、增加 worker 进程\n内存瓶颈   `free -h` → available 接近 0，或 swap 大量使用   加内存、优化内存泄漏、清理缓存\n磁盘 IO 瓶颈   `top` → %wa > 30；`iostat` → %util 接近 100   换 SSD、优化查询、加缓存\n网络瓶颈   带宽跑满，连接数异常高，丢包率上升   扩容带宽、限流、优化协议","chapter":"Linux 故障排查","keywords":["接近","瓶颈","100","top","wa","30","判断依据","解决方向","cpu","idle","us","sy","优化代码","扩容","增加","worker","进程","内存瓶颈","free","available"]},{"title":"场景 1：网站打不开怎么办？","text":"命令参考：\nsystemctl status nginx\nsystemctl status php-fpm\nsystemctl status httpd\nss -tulpn | grep -E \":(80|443) \"\nfirewall-cmd --list-all              # firewalld\niptables -L -n -v | grep 80         # iptables\ntail -100 /var/log/nginx/error.log\ndf -h\nfree -h","chapter":"Linux 故障排查","keywords":["systemctl","status","80","nginx","grep","iptables","log","100","443","命令参考","php","fpm","httpd","ss","tulpn","firewall","cmd","list","all","firewalld"]},{"title":"场景 2：服务器 SSH 连不上？","text":"命令参考：\nsystemctl status sshd\nss -tulnp | grep :22\nfirewall-cmd --list-all | grep ssh\niptables -L -n | grep 22\ncat /etc/hosts.deny\ncat /etc/hosts.allow\ngetenforce                            # Enforcing=开启","chapter":"Linux 故障排查","keywords":["grep","22","cat","etc","hosts","命令参考","systemctl","status","sshd","ss","tulnp","firewall","cmd","list","all","ssh","iptables","deny","allow","getenforce"]},{"title":"场景 3：磁盘满了怎么办？","text":"命令参考：\ndf -h\ndu -ah /var/ | sort -rh | head -10\ndu -sh /var/log/\ndu -sh /tmp/\ndu -sh /var/lib/docker/              # Docker 目录常是罪魁祸首\nfind / -type f -size +1G -exec ls -lh {} \\; 2>/dev/null\nlsof | grep \"(deleted)\"              # 找到后重启对应进程\ntruncate -s 0 /var/log/nginx/access.log  # 直接清空（紧急用）\nlogrotate -f /etc/logrotate.conf     # 强制执行日志轮转\nyum clean all                        # CentOS\napt clean                            # Ubuntu\ndocker system prune -f               # Docker 镜像清理","chapter":"Linux 故障排查","keywords":["du","var","docker","sh","log","logrotate","clean","10","命令参考","df","ah","sort","rh","head","tmp","lib","目录常是罪魁祸首","find","type","size"]},{"title":"场景 4：CPU 负载过高？","text":"命令参考：\ntop -o %CPU\ntop -Hp PID                          # 找到 CPU 高的线程 TID\nprintf \"%x\\n\" TID                    # 转为 16 进制\njstack PID | grep -A 30 \"nid=0xHEX\"  # 看线程堆栈\nsystemctl restart app_name\ntop -o %CPU                          # 看有无陌生进程\ncat /etc/crontab                     # 看有无异常计划任务\nps aux | grep -i mine\\|monero\\|xmr   # 挖矿特征\nnetstat -tuna | grep -E \":(3333|4444|5555|6666)\"  # 挖矿常用端口","chapter":"Linux 故障排查","keywords":["top","cpu","grep","pid","tid","16","30","3333","4444","5555","6666","命令参考","hp","找到","高的线程","printf","转为","进制","jstack","nid"]},{"title":"场景 5：内存不足 / OOM","text":"命令参考：\nfree -h\ncat /proc/meminfo | grep MemAvailable\nswapon --show\nfree -h\nps aux --sort=-%mem | head -10\ndmesg | grep -i \"killed process\"\ngrep -i \"out of memory\" /var/log/messages\necho 3 > /proc/sys/vm/drop_caches    # 清理缓存（不影响进程，推荐）\nsync; echo 1 > /proc/sys/vm/drop_caches    # 清理 page cache\nsystemctl restart service_name        # 重启占用大的服务\nfallocate -l 4G /swapfile\nchmod 600 /swapfile\nmkswap /swapfile\nswapon /swapfile","chapter":"Linux 故障排查","keywords":["swapfile","proc","grep","free","swapon","echo","sys","vm","drop","caches","10","600","命令参考","cat","meminfo","memavailable","show","ps","aux","sort"]},{"title":"场景 6：网络丢包 / 延迟高","text":"命令参考：\nip -s link show eth0                 # 看 errors/dropped 列\nnetstat -i\nnetstat -s | grep -i \"overflow\\|drop\"\nss -lnt | grep LISTEN                # 看 Send-Q/Recv-Q\nip route get 8.8.8.8                 # 看数据包从哪个接口出去\nping -M do -s 1472 8.8.8.8          # 测试 MTU（不带分段）\ntime nslookup google.com             # DNS 响应慢","chapter":"Linux 故障排查","keywords":["ip","netstat","grep","1472","命令参考","link","show","eth0","errors","dropped","overflow","drop","ss","lnt","listen","send","recv","route","get","看数据包从哪个接口出去"]},{"title":"场景 7：服务器时间不同步","text":"命令参考：\ndate\ntimedatectl\ntimedatectl set-timezone Asia/Shanghai\nntpdate -u ntp.aliyun.com            # 手动同步一次（CentOS 7）\nchronyc sources                      # chrony 版（CentOS 8+/RHEL 8+）\nsystemctl restart chronyd\ntimedatectl set-ntp yes              # 自动 NTP 同步","chapter":"Linux 故障排查","keywords":["timedatectl","ntp","set","centos","命令参考","date" gent list` —— 服务挂了第一时间发现\n> 2. 虚拟机出问题最先看 `openstack server show` 和 `openstack console log show`\n> 3. 网络不通先看安全组和浮动 IP，其次看 Neutron Agent 状态\n> 4. 学会用 Request ID 串联各服务日志——这是 OpenStack 排障的核心技能","chapter":"OpenStack","keywords":["openstack","list","认证","agent","show","subnet","网络","子网列表","token","issue","验证认证","user","用户列表","volume","存储","云硬盘列表","rabbitmqctl","cluster","status","消息"]},{"title":"Ansible 自动化运维手册","text":"> 适用场景：Ansible 批量运维、自动化配置管理、Playbook 编写与排障\n> 适用版本：Ansible Core ≥ 2.12 / ansible-base ≥ 2.10 / community.general\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"Ansible 自动化运维","keywords":["ansible","01","linux","basics","md","10","12","适用场景","批量运维","自动化配置管理","playbook","编写与排障","适用版本","core","base","community","general","前置阅读"]},{"title":"目录","text":"- [1. Ansible 架构速览](#1-ansible-架构速览)\n- [2. 安装与配置](#2-安装与配置)\n- [3. Inventory 主机清单](#3-inventory-主机清单)\n- [4. Ad-hoc 命令](#4-ad-hoc-命令)\n- [5. Playbook 基础](#5-playbook-基础)\n- [6. 核心模块速查](#6-核心模块速查)\n- [6.1 文件操作](#61-文件操作)\n- [6.2 命令执行](#62-命令执行)\n- [6.3 包管理](#63-包管理)\n- [6.4 服务管理](#64-服务管理)\n- [6.5 用户与权限](#65-用户与权限)\n- [6.6 网络检查](#66-网络检查)\n- [6.7 系统信息](#67-系统信息)\n- [6.8 容器管理](#68-容器管理)\n- [7. 变量与 Facts](#7-变量与-facts)\n- [8. 模板 (Jinja2)](#8-模板-jinja2)\n- [9. 条件与循环](#9-条件与循环)\n- [10. Roles 角色](#10-roles-角色)\n- [11. Ansible Vault 加密](#11-ansible-vault-加密)\n- [12. Tags 与 Limit](#12-tags-与-limit)\n- [13. 常用排查场景速查](#13-常用排查场景速查)\n- [附录：快速索引](#附录快速索引)","chapter":"Ansible 自动化运维","keywords":["ansible","10","11","12","13","架构速览","安装与配置","inventory","主机清单","ad","hoc","命令","playbook","基础","核心模块速查","文件操作","命令执行","包管理","服务管理","用户与权限"]},{"title":"核心概念","text":"概念   说明\n------ ------\n**Control Node**   安装 Ansible 的控制节点（可以是任意 Linux 机器）\n**Managed Node**   被管理的目标主机（通过 SSH 连接）\n**Inventory**   主机清单（INI 或 YAML 格式，定义哪些主机被管理）\n**Module**   执行特定任务的代码单元（如 `copy`、`yum`、`service`）\n**Playbook**   YAML 格式的任务编排文件（一组 plays 的有序集合）\n**Role**   Playbook 的组织单元（按功能拆分 tasks/handlers/vars/templates）\n**Task**   Playbook 中最小的执行单元（调用一个模块）\n**Handler**   由 notify 触发的特殊 task（如重启服务）\n**Fact**   目标主机的系统信息（由 Ansible 自动收集，以变量形式暴露）","chapter":"Ansible 自动化运维","keywords":["playbook","node","ansible","yaml","task","概念","说明","control","安装","的控制节点","可以是任意","linux","机器","managed","被管理的目标主机","通过","ssh","连接","inventory","主机清单"]},{"title":"执行模式","text":"Ansible 是无代理架构（Agentless），通过 SSH 把模块推送到目标主机执行，执行完即清理，不在目标主机上驻留进程。\n\n命令参考：\nControl Node                    Managed Nodes\n┌─────────────────┐            ┌──────────────┐\n│  Playbook.yml   │            │ 192.168.1.10 │\n│       ↓         │   SSH      ├──────────────┤\n│  Ansible Engine │ ─────────→ │ 192.168.1.11 │\n│  (Python)       │   (模块推  ├──────────────┤\n│       ↑         │    送+执  │ 192.168.1.12 │\n│  Inventory      │    行)    └──────────────┘\n└─────────────────┘","chapter":"Ansible 自动化运维","keywords":["168","192","ansible","ssh","10","11","12","是无代理架构","agentless","通过","把模块推送到目标主机执行","执行完即清理","不在目标主机上驻留进程","命令参考","control","node","managed","nodes","playbook","yml"]},{"title":"工作流程","text":"命令参考：\n1. 控制节点读取 Inventory（确定目标主机）\n2. 加载变量（group_vars / host_vars / play vars）\n3. 按 Playbook 顺序执行 plays\n4. 每个 Play 内按 tasks 顺序依次执行\n5. 每个 task 调用一个模块，模块推送到远端执行\n6. 模块执行完毕后返回 JSON 结果\n7. 结果中可以触发 handler（如配置变更后重启服务）","chapter":"Ansible 自动化运维","keywords":["vars","play","每个","命令参考","控制节点读取","inventory","确定目标主机","加载变量","group","host","playbook","顺序执行","plays","内按","tasks","顺序依次执行","task","调用一个模块","模块推送到远端执行","模块执行完毕后返回"]},{"title":"安装","text":"命令参考：\nyum install -y epel-release\nyum install -y ansible\napt update\napt install -y software-properties-common\nadd-apt-repository --yes --update ppa:ansible/ansible\napt install -y ansible\nansible --version\npip3 install ansible","chapter":"Ansible 自动化运维","keywords":["ansible","install","apt","yum","update","命令参考","epel","release","software","properties","common","add","repository","yes","ppa","version","pip3"]},{"title":"主配置文件","text":"命令参考：\nansible-config init --disabled > ansible.cfg\nansible-config list\nansible-config dump","chapter":"Ansible 自动化运维","keywords":["ansible","config","命令参考","init","disabled","cfg","list","dump"]},{"title":"最小配置示例","text":"命令参考：\n[defaults]\ninventory = hosts.ini              # 主机清单文件\nhost_key_checking = False          # 首次连接跳过 Host Key 检查（仅内网安全环境）\nremote_user = root                 # SSH 远程用户\ntimeout = 30                       # SSH 连接超时（秒）\n[ssh_connection]\npipelining = True                  # 开启管道加速，大幅提升执行效率\ncontrol_path = /tmp/%%h-%%r-%%p   # SSH Control Master 路径","chapter":"Ansible 自动化运维","keywords":["ssh","host","key","control","30","命令参考","defaults","inventory","hosts","ini","主机清单文件","checking","false","首次连接跳过","检查","仅内网安全环境","remote","user","root","远程用户"]},{"title":"SSH 免密配置（必须）","text":"命令参考：\nssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N \"\"\nssh-copy-id -i ~/.ssh/id_ed25519.pub root@192.168.1.10\nssh-copy-id -i ~/.ssh/id_ed25519.pub root@192.168.1.11\nssh root@192.168.1.10 \"hostname\"\ncat >> ~/.ssh/config << 'EOF'\nHost 192.168.1.*\nUser root\nIdentityFile ~/.ssh/id_ed25519\nStrictHostKeyChecking no\nUserKnownHostsFile /dev/null\nEOF","chapter":"Ansible 自动化运维","keywords":["ssh","id","ed25519","168","192","root","10","copy","pub","eof","11","命令参考","keygen","hostname","cat","config","host","user","identityfile","stricthostkeychecking"]},{"title":"INI 格式（传统用法）","text":"命令参考：\n[web]                          # 主机组\n192.168.1.10 ansible_host=web01.example.com\n192.168.1.11\n[db]\ndb1 ansible_host=192.168.1.20 ansible_user=admin\ndb2 ansible_host=192.168.1.21 ansible_port=2222\n[proxy]\n192.168.1.30\n[all:vars]                     # 全局变量\nntp_server = ntp.example.com\nproxy_server = proxy.example.com\n[web:vars]                     # 组变量\nhttp_port = 8080","chapter":"Ansible 自动化运维","keywords":["168","192","ansible","host","example","com","proxy","web","port","vars","ntp","server","10","11","20","21","30","2222","8080","命令参考"]},{"title":"YAML 格式（推荐，更适合复杂场景）","text":"命令参考：\nall:\nchildren:\nweb:\nhosts:\n192.168.1.10:\nansible_host: web01.example.com\n192.168.1.11:\ndb:\nhosts:\ndb1:\nansible_host: 192.168.1.20\nansible_user: admin\ndb2:\nansible_host: 192.168.1.21\nansible_port: 2222\nproxy:\nhosts:\n192.168.1.30:\nprod:                       # 生产环境分组\nchildren:\nweb:\ndb:\nvars:\nenv: production\nlog_level: warn","chapter":"Ansible 自动化运维","keywords":["168","192","ansible","hosts","host","children","web","db","10","11","20","21","30","2222","命令参考","all","web01","example","com","db1"]},{"title":"常用内置变量","text":"变量   默认值   说明\n------ -------- ------\n`ansible_host`   主机名   实际连接的 SSH 地址\n`ansible_port`   22   SSH 端口\n`ansible_user`   root   SSH 用户\n`ansible_ssh_pass`   —   SSH 密码（建议用 Vault 加密）\n`ansible_become`   false   是否提权执行\n`ansible_become_user`   root   提权到哪个用户\n`ansible_become_method`   sudo   提权方式（sudo/su/pbrun）\n`ansible_python_interpreter`   /usr/bin/python3   Python 解释器路径","chapter":"Ansible 自动化运维","keywords":["ansible","ssh","become","user","root","sudo","python","22","变量","默认值","说明","host","主机名","实际连接的","地址","port","端口","用户","pass","密码"]},{"title":"组嵌套与继承","text":"命令参考：\n[linux:children]\nweb\ndb\nproxy\n[linux:vars]\nansible_user = ops","chapter":"Ansible 自动化运维","keywords":["linux","命令参考","children","web","db","proxy","vars","ansible","user","ops"]},{"title":"正则匹配和范围","text":"命令参考：\n[app]\nnode-[01:10]    # → node-01, node-02, ..., node-10\n[web]\nwww-[a:f]       # → www-a, www-b, ..., www-f\n[prod-db]\ndb-[01:05].prod.example.com","chapter":"Ansible 自动化运维","keywords":["node","www","01","10","prod","db","命令参考","app","02","web","05","example","com"]},{"title":"4. Ad-hoc 命令","text":"Ad-hoc 模式适用于快速单次操作，无需写 Playbook。","chapter":"Ansible 自动化运维","keywords":["ad","hoc","模式适用于快速单次操作","无需写","playbook"]},{"title":"基础语法","text":"命令参考：\nansible <主机组> -m <模块名> -a \"<模块参数>\"\nansible <主机组> -m shell -a \"uptime\"          # 批量执行命令\nansible <主机组> -m ping                        # 连通性测试\nansible all --list-hosts                        # 列出所有受管主机","chapter":"Ansible 自动化运维","keywords":["ansible","主机组","命令参考","模块名","模块参数","shell","uptime","批量执行命令","ping","连通性测试","all","list","hosts","列出所有受管主机"]},{"title":"常见模块 Ad-hoc 示例","text":"命令参考：\nansible all -m ping\nansible web -m command -a \"uptime\"\nansible web -m shell -a \"free -h && df -h\"\nansible web -m raw -a \"ifconfig eth0\"           # raw 不依赖 Python（适用于网络设备）\nansible web -m file -a \"path=/data state=directory mode=0755\"\nansible web -m copy -a \"src=/etc/hosts dest=/tmp/hosts backup=yes\"\nansible web -m fetch -a \"src=/var/log/syslog dest=logs/ flat=yes\"\nansible web -m yum -a \"name=nginx state=latest\"\nansible web -m apt -a \"name=curl state=present update_cache=yes\"\nansible web -m service -a \"name=nginx state=started enabled=yes\"\nansible web -m systemd -a \"name=nginx state=reloaded\"\nansible web -m user -a \"name=deploy uid=2001 group=deploy state=present\"\nansible all -m setup -a \"filter=ansible_distribution*\"      # 筛选 fact\nansible all -m setup -a \"filter=ansible_*_mb\"               # 内存信息\nansible all -m setup | grep -i \"ansible_processor\"          # CPU 信息","chapter":"Ansible 自动化运维","keywords":["ansible","web","state","name","all","yes","nginx","setup","raw","src","hosts","dest","present","deploy","filter","2001","命令参考","ping","command","uptime"]},{"title":"Ad-hoc 常用选项","text":"命令参考：\nansible web -m shell -a \"df -h\" -i hosts.ini        # 指定 inventory\nansible web -m copy -a \"...\" -b                      # --become 提权\nansible web -m yum -a \"...\" --become-user=admin      # 提权到指定用户\nansible web -m command -a \"...\" -f 10                # 并发数（默认 5）\nansible web -m shell -a \"...\" -o                     # 单行输出（紧凑模式）\nansible web -m shell -a \"...\" --check                # 检查模式（dry-run）\nansible web -m shell -a \"sleep 5\" --forks=20         # 设置并发进程数\nansible all -m ping -vvv                             # 详细调试输出\nansible all -m ping --private-key ~/.ssh/new_key     # 指定密钥","chapter":"Ansible 自动化运维","keywords":["ansible","web","shell","become","all","ping","key","10","20","命令参考","df","hosts","ini","指定","inventory","copy","提权","yum","user","admin"]},{"title":"最小 Playbook","text":"命令参考：\n---\n- name: 部署 Nginx Web 服务\nhosts: web                        # 目标主机组\ngather_facts: true                # 收集事实信息\nbecome: yes                       # 提权执行\ntasks:\n- name: 安装 Nginx\nyum:\nname: nginx\nstate: present\n- name: 确保 Nginx 已启动并开机自启\nservice:\nname: nginx\nstate: started\nenabled: yes\n- name: 拷贝配置文件\ncopy:\nsrc: ./files/nginx.conf\ndest: /etc/nginx/nginx.conf\nowner: root\ngroup: root\nmode: '0644'\nnotify: restart nginx         # 触发 handler\nhandlers:\n- name: restart nginx           # handler 名字与 notify 对应\nservice:\nname: nginx\nstate: restarted","chapter":"Ansible 自动化运维","keywords":["nginx","name","state","web","yes","service","conf","root","notify","restart","handler","命令参考","部署","服务","hosts","目标主机组","gather","facts","true","收集事实信息"]},{"title":"执行 Playbook","text":"命令参考：\nansible-playbook deploy-nginx.yml\nansible-playbook deploy-nginx.yml -i hosts.ini          # 指定 inventory\nansible-playbook deploy-nginx.yml --check               # dry-run 模拟执行\nansible-playbook deploy-nginx.yml --diff                # 显示文件差异\nansible-playbook deploy-nginx.yml -v                    # 详细输出（-v / -vv / -vvv）\nansible-playbook deploy-nginx.yml -v --step            # 交互式逐步骤执行\nansible-playbook deploy-nginx.yml --syntax-check        # 仅检查语法\nansible-playbook deploy-nginx.yml --list-tasks          # 列出将要执行的任务\nansible-playbook deploy-nginx.yml --list-hosts          # 列出受管主机\nansible-playbook deploy-nginx.yml --list-tags           # 列出所有 tags\nansible-playbook deploy-nginx.yml --tags \"install,config\"  # 按 tag 执行\nansible-playbook deploy-nginx.yml --skip-tags \"debug\"     # 跳过指定 tag\nansible-playbook deploy-nginx.yml --limit web-01        # 只对单台执行\nansible-playbook deploy-nginx.yml --limit \"web-01,web-02\"  # 多台\nansible-playbook deploy-nginx.yml --start-at-task \"安装 Nginx\"\nansible-playbook deploy-nginx.yml --syntax-check || exit 1","chapter":"Ansible 自动化运维","keywords":["nginx","ansible","playbook","deploy","yml","tags","check","list","web","hosts","syntax","tag","limit","01","命令参考","ini","指定","inventory","dry","run"]},{"title":"Playbook 错误处理","text":"命令参考：\n- name: 错误处理示例\nhosts: all\ntasks:\n- name: 忽略错误继续执行\ncommand: /bin/false\nignore_errors: yes\n- name: 设置任务超时时间\ncommand: /bin/sleep 30\ntimeout: 10                   # 10 秒超时\n- name: 捕获失败并执行恢复\nblock:\n- name: 有可能失败的任务\ncommand: /bin/false\nrescue:\n- name: 失败后的恢复动作\ndebug:\nmsg: \"任务失败，执行恢复\"\nalways:\n- name: 无论如何都会执行\ndebug:\nmsg: \"清理工作\"\n- name: 注册变量并判断结果\ncommand: /usr/bin/uptime\nregister: result\nfailed_when:\n- '\"up\" not in result.stdout'\n- result.rc != 0\n- name: 条件式执行（仅当上次成功）\ndebug:\nmsg: \"上一步执行成功后的后续操作\"\nwhen: result.rc == 0\n- name: 幂等性检查 — changed_when\nshell: |\nif grep -q \"OPTIONS\" /etc/sysconfig/docker; then\necho \"already configured\"\nelse\necho \"OPTIONS=--log-level=warn\" >> /etc/sysconfig/docker\necho \"changed\"\nfi\nregister: docker_config\nchanged_when: \"'changed' in docker_config.stdout\"","chapter":"Ansible 自动化运维","keywords":["name","command","bin","result","when","changed","docker","debug","msg","echo","10","false","register","in","stdout","rc","options","etc","sysconfig","config"]},{"title":"6.1 文件操作","text":"命令参考：\n- name: 创建目录\nfile:\npath: /data/app\nstate: directory\nowner: app\ngroup: app\nmode: '0755'\n- name: 创建文件\nfile:\npath: /data/app/config.yml\nstate: touch\nowner: app\nmode: '0644'\n- name: 拷贝文件\ncopy:\nsrc: ./files/app.conf          # 相对路径，相对于 playbook 目录或 roles 目录\ndest: /etc/app/app.conf\nbackup: yes                    # 备份已有文件（文件名加时间戳）\nowner: root\ngroup: root\nmode: '0644'\nvalidate: /usr/sbin/nginx -t %s  # 文件校验（配置生效前检查语法）\n- name: 从远端拉取文件到控制节点\nfetch:\nsrc: /var/log/nginx/access.log\ndest: ./logs/{{ inventory_hostname }}/access.log\nflat: no\n- name: 创建软链接\nfile:\nsrc: /data/app/current\ndest: /data/app/releases/1.0.0\nstate: link\n- name: 删除文件/目录\nfile:\npath: /tmp/old_config\nstate: absent\n- name: 使用模板生成配置文件\ntemplate:\nsrc: nginx.conf.j2\ndest: /etc/nginx/nginx.conf\nowner: root\ngroup: root\nmode: '0644'\nnotify: restart nginx\n- name: 追加一行到文件（lineinfile）\nlineinfile:\npath: /etc/hosts\nline: \"192.168.1.100  monitoring.example.com\"\nregexp: '^192\\.168\\.1\\.100'    # 如果行已存在则替换\nstate: present\n- name: 替换文件中的某行\nlineinfile:\npath: /etc/ssh/sshd_config\nregexp: '^#PermitRootLogin'\nline: 'PermitRootLogin yes'\nbackup: yes\n- name: 替换多行文本块（blockinfile）\nblockinfile:\npath: /etc/hosts\nblock: |\n192.168.1.50  db-primary\n192.168.1.51  db-replica\nmarker: \"# {mark} ANSIBLE MANAGED BLOCK - DB HOSTS\"\nstate: present","chapter":"Ansible 自动化运维","keywords":["name","app","path","state","nginx","etc","168","192","file","data","owner","mode","src","conf","dest","root","group","config","0644","yes"]},{"title":"6.2 命令执行","text":"命令参考：\n- name: 执行 shell 命令（支持管道、重定向）\nshell: |\ndf -h | grep /data\necho \"Disk check completed\"\nargs:\nchdir: /tmp                    # 切换工作目录\nexecutable: /bin/bash          # 指定 shell\nregister: disk_result\n- name: 执行命令（不支持管道，更安全）\ncommand:\ncmd: /usr/bin/uptime\nchdir: /root\nregister: uptime_result\n- name: raw 模块（不依赖 Python，适用网络设备、最小系统）\nraw: |\nshow ip interface brief\nregister: raw_result","chapter":"Ansible 自动化运维","keywords":["name","shell","register","result","raw","disk","chdir","bin","uptime","命令参考","执行","命令","支持管道","重定向","df","grep","data","echo","check","completed"]},{"title":"6.3 包管理","text":"命令参考：\n- name: 安装多个包\nyum:\nname:\n- nginx\n- python3\n- git\nstate: present\n- name: 从本地 RPM 安装\nyum:\nname: /tmp/package.rpm\nstate: present\n- name: 升级所有包\nyum:\nname: '*'\nstate: latest\n- name: 更新缓存并安装\napt:\nname:\n- nginx\n- python3-pip\nstate: present\nupdate_cache: yes\n- name: 通用安装（自动适配 yum/apt/dnf）\npackage:\nname: htop\nstate: present\n- name: 安装 Python 包\npip:\nname:\n- flask\n- requests\n- gunicorn\nstate: present","chapter":"Ansible 自动化运维","keywords":["name","state","present","yum","nginx","python3","rpm","安装","package","apt","pip","命令参考","安装多个包","git","从本地","tmp","升级所有包","latest","更新缓存并安装","update"]},{"title":"6.4 服务管理","text":"命令参考：\n- name: 启动并启用服务\nservice:\nname: nginx\nstate: started\nenabled: yes\n- name: 重启服务\nsystemd:\nname: nginx\nstate: restarted\ndaemon_reload: yes             # 重载 systemd 配置\n- name: 停止服务\nservice:\nname: firewalld\nstate: stopped\nenabled: no\n- name: 检查服务状态\ncommand: systemctl is-active nginx\nregister: nginx_status\nchanged_when: false\nfailed_when: nginx_status.rc not in [0, 3]","chapter":"Ansible 自动化运维","keywords":["name","nginx","state","service","enabled","yes","systemd","status","when","命令参考","启动并启用服务","started","重启服务","restarted","daemon","reload","重载","配置","停止服务","firewalld"]},{"title":"6.5 用户与权限","text":"命令参考：\n- name: 创建用户组\ngroup:\nname: app\ngid: 2001\nstate: present\n- name: 创建用户\nuser:\nname: deploy\ncomment: \"Deploy User\"\nuid: 2001\ngroup: app\ngroups: wheel                  # 附加组\nshell: /bin/bash\ncreate_home: yes\nhome: /home/deploy\nstate: present\n- name: 设置 SSH 公钥认证\nauthorized_key:\nuser: deploy\nkey: \"{{ lookup('file', '~/.ssh/deploy_key.pub') }}\"\nstate: present\n- name: 设置 sudo 免密\ncopy:\ncontent: \"deploy ALL=(ALL) NOPASSWD: ALL\"\ndest: /etc/sudoers.d/deploy\nmode: '0440'\nvalidate: /usr/sbin/visudo -cf %s\n- name: 删除用户\nuser:\nname: olduser\nstate: absent\nremove: yes                   # 删除家目录和邮件池","chapter":"Ansible 自动化运维","keywords":["name","deploy","state","user","present","home","key","all","2001","group","app","yes","设置","ssh","命令参考","创建用户组","gid","创建用户","comment","uid"]},{"title":"6.6 网络检查","text":"命令参考：\n- name: 测试网络连通性\nping:\n- name: HTTP 请求测试\nuri:\nurl: http://{{ ansible_default_ipv4.address }}/health\nstatus_code: 200\ntimeout: 5\nregister: health_check\n- name: 获取 URL 内容\nuri:\nurl: https://api.example.com/status\nmethod: GET\nheaders:\nAuthorization: \"Bearer {{ api_token }}\"\nreturn_content: yes\nregister: api_response\n- name: 检查端口是否开放\nwait_for:\nhost: \"{{ ansible_default_ipv4.address }}\"\nport: 80\nstate: started\ntimeout: 30\nmsg: \"端口 80 未在 30 秒内开放\"\n- name: DNS 解析测试\nshell: \"nslookup {{ item }} | grep Address\"\nloop:\n- example.com\n- api.example.com","chapter":"Ansible 自动化运维","keywords":["name","api","url","address","example","com","30","80","http","uri","ansible","default","ipv4","health","status","timeout","register","200","命令参考","测试网络连通性"]},{"title":"6.7 系统信息","text":"命令参考：\n- name: 收集系统信息（默认在 play 中 gather_facts: yes 时自动执行）\nsetup:\nfilter: \"ansible_*\"\n- name: 设置系统时间\ntimezone:\nname: Asia/Shanghai\n- name: 设置主机名\nhostname:\nname: \"{{ inventory_hostname }}\"\n- name: 配置内核参数\nsysctl:\nname: net.ipv4.ip_forward\nvalue: '1'\nstate: present\nreload: yes\n- name: 挂载文件系统\nmount:\npath: /data\nsrc: /dev/sdb1\nfstype: xfs\nopts: defaults,noatime\nstate: mounted","chapter":"Ansible 自动化运维","keywords":["name","yes","hostname","state","命令参考","收集系统信息","默认在","play","gather","facts","时自动执行","setup","filter","ansible","设置系统时间","timezone","asia","shanghai","设置主机名","inventory"]},{"title":"6.8 容器管理","text":"> **注意**：Docker 相关模块位于 `community.docker` 集合，需先安装：\n> ```bash\n> ansible-galaxy collection install community.docker\n> ```\n\n命令参考：\n- name: Docker 容器管理\ncommunity.docker.docker_container:\nname: my-app\nimage: nginx:alpine\nstate: started\nrestart_policy: always\nports:\n- \"80:80\"\nenv:\nTZ: Asia/Shanghai\n- name: Docker Compose 部署\ncommunity.docker.docker_compose:\nproject_src: /opt/myapp\nstate: present\nrestarted: yes\n- name: 容器镜像拉取\ncommunity.docker.docker_image:\nname: \"{{ item }}\"\nsource: pull\nloop:\n- nginx:alpine\n- redis:alpine","chapter":"Ansible 自动化运维","keywords":["docker","community","name","alpine","80","image","nginx","state","compose","注意","相关模块位于","集合","需先安装","bash","ansible","galaxy","collection","install","命令参考","容器管理"]},{"title":"变量定义方式与优先级","text":"优先级从低到高（后定义的覆盖先定义的）：\n优先级   定义位置   示例\n-------- --------- ------\n1 (最低)   Inventory group_vars/all   `group_vars/all.yml`\n2   Inventory group_vars/组名   `group_vars/nginx.yml`\n3   Inventory host_vars/主机   `host_vars/web-01.yml`\n4   Playbook vars   `vars:` 块\n5   Playbook vars_files   `vars_files: [vars.yml]`\n6   Playbook vars_prompt   交互式输入\n7   Role defaults   `roles/xxx/defaults/main.yml`（最低优先级角色变量）\n8   Role vars   `roles/xxx/vars/main.yml`\n9   命令行 -e 参数   `ansible-playbook -e \"version=1.2\"`\n10 (最高)   `set_fact` / `register`   运行时动态赋值","chapter":"Ansible 自动化运维","keywords":["vars","yml","group","playbook","inventory","all","host","files","role","defaults","roles","xxx","main","10","优先级从低到高","后定义的覆盖先定义的","优先级","定义位置","示例","最低"]},{"title":"变量定义示例","text":"命令参考：\n---\nntp_server: cn.pool.ntp.org\ntimezone: Asia/Shanghai\nproxy_server: \"\"\n---\nhttp_port: 8080\nnginx_worker_processes: auto\napp_env: production\n---\nhttp_port: 8081                    # 单台主机的特殊配置\nansible_host: 10.0.0.101","chapter":"Ansible 自动化运维","keywords":["ntp","server","http","port","10","101","8080","8081","命令参考","cn","pool","org","timezone","asia","shanghai","proxy","nginx","worker","processes","auto"]},{"title":"变量引用方式","text":"命令参考：\n- name: 打印变量\ndebug:\nmsg: \"{{ nginx_worker_processes }}\"        # Jinja2 双花括号\n- name: 命令行传递变量\ndebug:\nmsg: \"Version: {{ version | default('unknown') }}\"\nansible-playbook deploy.yml -e \"version=v2.0 env=production\"\nansible-playbook deploy.yml -e \"@vars.json\"        # 从 JSON 文件加载\nansible-playbook deploy.yml -e \"@vars.yml\"         # 从 YAML 文件加载","chapter":"Ansible 自动化运维","keywords":["yml","version","ansible","playbook","deploy","name","debug","msg","vars","json","文件加载","命令参考","打印变量","nginx","worker","processes","jinja2","双花括号","命令行传递变量","default"]},{"title":"Facts 系统信息","text":"命令参考：\n- name: 打印所有 facts\ndebug:\nvar: ansible_facts\n- name: 不收集 facts\nhosts: web\ngather_facts: no\n- name: 手动收集\nsetup:\nfilter: \"ansible_distribution*\"","chapter":"Ansible 自动化运维","keywords":["facts","name","ansible","命令参考","打印所有","debug","var","不收集","hosts","web","gather","no","手动收集","setup","filter","distribution"]},{"title":"变量进阶用法","text":"命令参考：\n---\napp_config:\nport: 8080\nworkers: 4\ndatabase:\nhost: db-primary\nport: 3306\nname: myapp\ntasks:\n- debug:\nmsg: \"数据库主机: {{ app_config.database.host }}\"\ntasks:\n- name: 获取磁盘使用率\nshell: df -h / | tail -1 | awk '{print $5}'\nregister: disk_usage\n- name: 磁盘空间不足告警\ndebug:\nmsg: \"⚠ 磁盘使用率 {{ disk_usage.stdout }}\"\nwhen: disk_usage.stdout | int > 80\ntasks:\n- name: 动态计算并设置变量\nset_fact:\ndeploy_path: \"/data/app/{{ app_version }}\"\nfull_name: \"{{ first_name | upper }} {{ last_name | upper }}\"\nvars_prompt:\n- name: db_password\nprompt: \"请输入数据库密码\"\nprivate: yes\nconfirm: yes\n- name: deploy_env\nprompt: \"部署环境 (dev/staging/prod)\"\ndefault: dev\nprivate: no","chapter":"Ansible 自动化运维","keywords":["name","app","tasks","disk","usage","prompt","config","port","database","host","db","debug","msg","stdout","deploy","upper","private","yes","dev","80"]},{"title":"模板文件语法","text":"命令参考：\nupstream {{ app_name }} {\n{% for backend in backend_servers %}\nserver {{ backend }}:{{ app_port }};\n{% endfor %}\n}\nserver {\nlisten {{ http_port }};\nserver_name {{ server_name }};\nclient_max_body_size {{ upload_max_size | default('10m') }};\nlocation / {\nproxy_pass http://{{ app_name }};\nproxy_set_header Host $host;\nproxy_set_header X-Real-IP $remote_addr;\n}\nlocation /health {\nreturn 200 \"OK\\n\";\nadd_header Content-Type text/plain;\n}\n}","chapter":"Ansible 自动化运维","keywords":["name","server","app","backend","proxy","header","port","http","max","size","location","set","host","200","命令参考","upstream","for","in","servers","endfor"]},{"title":"常用 Jinja2 过滤器","text":"命令参考：\n{{ variable | default('fallback') }}    {# 默认值 #}\n{{ variable | mandatory }}              {# 变量必须存在 #}\n{{ name | upper }}                      {# 大写 #}\n{{ name | lower }}                      {# 小写 #}\n{{ name | title }}                      {# 首字母大写 #}\n{{ text | trim }}                       {# 去除首尾空白 #}\n{{ text | quote }}                      {# 加引号 #}\n{{ list | join(', ') }}                 {# 列表拼接 #}\n{{ path | basename }}                   {# 文件名 #}\n{{ path | dirname }}                    {# 目录路径 #}\n{{ ip | ipaddr('network') }}            {# IP 网络计算 #}\n{{ dict | to_json }}                    {# 转 JSON #}\n{{ dict | to_yaml }}                    {# 转 YAML #}\n{{ password | password_hash('sha512') }}{# 密码加密 #}\n{{ \"hello\" | regex_replace('ello', 'i') }}{# 正则替换 #}\n{{ list | unique }}                     {# 去重 #}\n{{ list | flatten }}                    {# 展开嵌套列表 #}\n{{ list | sort }}                       {# 排序 #}\n{{ list | rejectattr('state', 'eq', 'absent') | list }}  {# 过滤 #}","chapter":"Ansible 自动化运维","keywords":["list","name","variable","text","path","ip","dict","to","json","yaml","password","命令参考","default","fallback","默认值","mandatory","变量必须存在","upper","大写","lower"]},{"title":"模板使用示例","text":"**模板文件存放位置：**\n- Playbook 同级 `templates/` 目录\n- Role 中的 `roles/<rolename>/templates/` 目录\n\n命令参考：\n- name: 使用模板生成配置文件\ntemplate:\nsrc: nginx.conf.j2\ndest: /etc/nginx/nginx.conf\nowner: root\ngroup: root\nmode: '0644'\n- name: 使用模板生成多台主机各自的配置\ntemplate:\nsrc: app.properties.j2\ndest: \"/data/app/{{ inventory_hostname }}.properties\"","chapter":"Ansible 自动化运维","keywords":["nginx","templates","目录","name","template","src","conf","j2","dest","root","app","properties","模板文件存放位置","playbook","同级","role","中的","roles","rolename","命令参考"]},{"title":"条件判断","text":"命令参考：\ntasks:\n- name: CentOS 系统特定操作\nyum:\nname: httpd\nstate: present\nwhen: ansible_os_family == \"RedHat\"\n- name: Ubuntu 系统特定操作\napt:\nname: apache2\nstate: present\nwhen: ansible_os_family == \"Debian\"\n- name: 多条件组合\nservice:\nname: nginx\nstate: restarted\nwhen:\n- ansible_distribution == \"CentOS\"\n- ansible_distribution_major_version | int >= 7\n- nginx_installed is defined\n- not (skip_restart | default(false))\n- name: 条件判断变量存在与否\ndebug:\nmsg: \"自定义变量已定义\"\nwhen: custom_var is defined\n- name: 条件判断路径是否存在\ndebug:\nmsg: \"配置文件存在\"\nwhen: config_path is exists\n# 注意：exists / is_dir / is_file / is_link / is_abs 是 Jinja2 测试，\n# 可以用 stat 模块更精确地判断\n- name: 使用 stat 模块检查文件\nstat:\npath: /etc/nginx/nginx.conf\nregister: nginx_conf\n- name: 文件存在时执行操作\ndebug:\nmsg: \"文件大小: {{ nginx_conf.stat.size }} 字节\"\nwhen: nginx_conf.stat.exists","chapter":"Ansible 自动化运维","keywords":["name","nginx","is","when","stat","ansible","conf","state","debug","msg","exists","centos","系统特定操作","present","os","family","distribution","defined","path","命令参考"]},{"title":"循环","text":"命令参考：\ntasks:\n- name: 安装多个软件包\nyum:\nname: \"{{ item }}\"\nstate: present\nloop:\n- nginx\n- python3\n- git\n- htop\n- name: 创建多个用户\nuser:\nname: \"{{ item.name }}\"\ngroup: \"{{ item.group | default('users') }}\"\nshell: \"{{ item.shell | default('/bin/bash') }}\"\nloop:\n- { name: alice, group: wheel }\n- { name: bob, shell: /bin/zsh }\n- { name: charlie }\n- name: 遍历字典\ndebug:\nmsg: \"Key: {{ item.key }}, Value: {{ item.value }}\"\nloop: \"{{ { 'name': 'nginx', 'port': 80, 'enabled': true } | dict2items }}\"\n- name: 带索引的循环\ndebug:\nmsg: \"第 {{ ansible_loop.index }} 次: {{ item }}\"\nloop:\n- a\n- b\n- c\nloop_control:\nindex_var: ansible_loop.index\n- name: 循环 + 条件\ndebug:\nmsg: \"{{ item }} 已启用\"\nloop: \"{{ services }}\"\nwhen: item.enabled\n- name: 等待服务启动\nshell: \"curl -s http://localhost:8080/health | grep -c OK\"\nregister: result\nuntil: result.stdout == \"1\"\nretries: 12\ndelay: 5\n- name: 批量分发脚本\ncopy:\nsrc: \"{{ item }}\"\ndest: /usr/local/bin/\nmode: '0755'\nloop: \"{{ lookup('fileglob', 'scripts/*.sh').split(',') }}\"\n- name: 创建一系列目录\nfile:\npath: \"/data/{{ item }}\"\nstate: directory\nloop: \"{{ range(1, 6) | list }}\"         # → [1,2,3,4,5]","chapter":"Ansible 自动化运维","keywords":["name","item","loop","shell","group","bin","debug","msg","index","state","nginx","default","key","value","enabled","ansible","result","12","80","8080"]},{"title":"角色目录结构","text":"命令参考：\nroles/\n├── nginx/                         # 角色名\n│   ├── tasks/\n│   │   └── main.yml              # 主任务文件\n│   ├── handlers/\n│   │   └── main.yml              # handler 定义\n│   ├── templates/\n│   │   └── nginx.conf.j2         # Jinja2 模板\n│   ├── files/\n│   │   └── default.conf          # 静态文件\n│   ├── vars/\n│   │   └── main.yml              # 高优先级变量（不可被外部覆盖）\n│   ├── defaults/\n│   │   └── main.yml              # 默认变量（最低优先级）\n│   ├── meta/\n│   │   └── main.yml              # 角色依赖和元信息\n│   └── README.md                 # 角色说明\n├── mysql/\n│   └── tasks/\n│       └── main.yml\n└── monitor/\n└── tasks/\n└── main.yml","chapter":"Ansible 自动化运维","keywords":["main","yml","tasks","nginx","conf","命令参考","roles","角色名","主任务文件","handlers","handler","定义","templates","j2","jinja2","模板","files","default","静态文件","vars"]},{"title":"Task 示例","text":"命令参考：\n---\n- name: 确保 EPEL 源已安装\nyum:\nname: epel-release\nstate: present\nwhen: ansible_os_family == \"RedHat\"\n- name: 安装 Nginx\npackage:\nname: nginx\nstate: present\n- name: 创建站点目录\nfile:\npath: /var/www/{{ app_name | default('default') }}\nstate: directory\nowner: nginx\ngroup: nginx\nmode: '0755'\n- name: 分发 Nginx 配置\ntemplate:\nsrc: nginx.conf.j2\ndest: /etc/nginx/nginx.conf\nowner: root\ngroup: root\nmode: '0644'\nnotify: restart nginx\n- name: 启动并启用 Nginx\nservice:\nname: nginx\nstate: started\nenabled: yes","chapter":"Ansible 自动化运维","keywords":["nginx","name","state","epel","present","default","owner","group","mode","conf","root","命令参考","确保","源已安装","yum","release","when","ansible","os","family"]},{"title":"Handler 示例","text":"命令参考：\n---\n- name: restart nginx\nservice:\nname: nginx\nstate: restarted\n- name: reload nginx\nservice:\nname: nginx\nstate: reloaded","chapter":"Ansible 自动化运维","keywords":["name","nginx","service","state","命令参考","restart","restarted","reload","reloaded"]},{"title":"默认变量","text":"命令参考：\n---\nnginx_port: 80\nnginx_worker_processes: auto\nnginx_worker_connections: 1024\nnginx_keepalive_timeout: 65\napp_name: default","chapter":"Ansible 自动化运维","keywords":["nginx","worker","65","80","1024","命令参考","port","processes","auto","connec ,"yml","30","命令参考","台并发","forks","等价写法"]},{"title":"13.7 幂等性检查","text":"命令参考：\n- shell: chmod 755 /data/app\n- file:\npath: /data/app\nmode: '0755'\n- shell: echo \"hello\" >> /etc/motd\n- lineinfile:\npath: /etc/motd\nline: \"hello\"\ncreate: yes\nansible-playbook playbook.yml --check | grep \"changed=\"","chapter":"Ansible 自动化运维","keywords":["shell","data","app","path","hello","etc","motd","playbook","755","命令参考","chmod","file","mode","0755","echo","lineinfile","line","create","yes","ansible"]},{"title":"13.8 常见报错与解决","text":"报错信息   原因   解决方法\n--------- ------ ---------\n`Host key verification failed`   SSH Host Key 不匹配   `ssh-keygen -R 目标IP` 或关闭 Host Key 检查\n`ModuleNotFoundError`   目标主机缺少 Python 模块   `pip install <模块>` 或使用 raw 模块降级\n`ERROR! Timeout exceeded`   SSH 连接超时   检查网络/防火墙，增加 `timeout` 配置\n`ERROR! Syntax Error`   YAML 缩进错误   检查缩进（用空格，不要用 Tab）\n`ERROR! 'ansible.builtin.xxx' is not a valid attribute`   模块名拼写错误   核对模块文档中的正确名称\n`ERROR! 'dict object' has no attribute 'xxx'`   引用不存在的变量   检查变量名拼写，或使用 `default` 过滤器\n`ERROR! The field 'hosts' has an invalid value`   hosts 拼写错误   确认主机组名在 inventory 中存在\n`Connection refused`   SSH 端口不正确   指定 `ansible_port` 或检查 SSH 服务状态\n`Permission denied (publickey)`   SSH 密钥认证失败   重新分发公钥，确认密钥路径正确\n`ERROR! 'become' is not a valid attribute`   become 缩进层级错误   become 应在 play 层级，非 task 层级","chapter":"Ansible 自动化运维","keywords":["error","ssh","host","key","attribute","become","模块","或使用","timeout","ansible","xxx","is","not","valid","has","hosts","层级","报错信息","原因","解决方法"]},{"title":"常用模块速查表","text":"模块   用途   Ad-hoc 示例\n------ ------ ------------\n`ping`   连通性测试   `ansible all -m ping`\n`setup`   收集系统信息   `ansible all -m setup -a \"filter=ansible_distribution*\"`\n`command`   执行命令   `ansible web -m command -a \"uptime\"`\n`shell`   Shell 命令   `ansible web -m shell -a \"df -h \\  grep /data\"`\n`raw`   无 Python 依赖执行   `ansible web -m raw -a \"show version\"`\n`copy`   复制文件到远端   `ansible web -m copy -a \"src=./hosts dest=/tmp/\"`\n`fetch`   从远端拉取文件   `ansible web -m fetch -a \"src=/etc/hosts dest=./\"`\n`file`   文件/目录管理   `ansible web -m file -a \"path=/data state=directory\"`\n`template`   模板渲染并分发   见 Playbook\n`lineinfile`   单行文本管理   `ansible web -m lineinfile -a \"path=/etc/hosts line='...'\"`\n`blockinfile`   多行文本块管理   `ansible web -m blockinfile -a \"path=/etc/hosts block='...'\"`\n`yum`/`apt`   包管理   `ansible web -m yum -a \"name=nginx state=present\"`\n`service`/`systemd`   服务管理   `ansible web -m service -a \"name=nginx state=started\"`\n`user`   用户管理   `ansible web -m user -a \"name=deploy state=present\"`\n`group`   用户组管理   `ansible web -m group -a \"name=deploy state=present\"`","chapter":"Ansible 自动化运维","keywords":["ansible","web","state","hosts","name","shell","etc","path","present","ping","all","setup","command","data","raw","copy","src","dest","fetch","file"]},{"title":"常用模块速查表","text":"`uri`   HTTP 请求   `ansible web -m uri -a \"url=http://localhost/health\"`\n`wait_for`   端口等待   `ansible web -m wait_for -a \"port=80 state=started\"`\n`debug`   打印调式信息   `ansible web -m debug -a \"msg=Hello\"`\n`mount`   文件系统挂载   `ansible web -m mount -a \"path=/data src=/dev/sdb1 state=mounted\"`\n`sysctl`   内核参数   `ansible web -m sysctl -a \"name=net.ipv4.ip_forward value=1\"`\n`cron`   计划任务   `ansible web -m cron -a \"name=cleanup hour=2 job=/script.sh\"`\n`authorized_key`   SSH 密钥管理   见 Playbook\n`timezone`   时区设置   `ansible web -m timezone -a \"name=Asia/Shanghai\"`","chapter":"Ansible 自动化运维","keywords":["ansible","web","name","uri","http","wait","for","state","debug","mount","sysctl","cron","timezone","80","请求","url","localhost","health","端口等待","port"]},{"title":"常用命令速查表","text":"命令   用途\n------ ------\n`ansible all -m ping`   连通性测试\n`ansible all --list-hosts`   列出所有受管主机\n`ansible-playbook play.yml --syntax-check`   检查 Playbook 语法\n`ansible-playbook play.yml --check`   Dry-run 模拟执行\n`ansible-playbook play.yml --diff`   显示文件变更差异\n`ansible-playbook play.yml -v`   详细输出模式\n`ansible-playbook play.yml --list-tasks`   列出所有任务\n`ansible-playbook play.yml --limit host1`   限制执行范围\n`ansible-vault create file.yml`   创建加密文件\n`ansible-vault encrypt file.yml`   加密已有文件\n`ansible-galaxy init roles/xxx`   创建角色骨架\n`ansible-galaxy install geerlingguy.nginx`   安装社区角色\n`ansible-config dump`   查看当前配置","chapter":"Ansible 自动化运维","keywords":["ansible","yml","playbook","play","all","list","check","vault","file","galaxy","命令","用途","ping","连通性测试","hosts","列出所有受管主机","syntax","检查","语法","dry"]},{"title":"Playbook 文件结构建议","text":"命令参考：\nops-ansible/\n├── ansible.cfg                    # Ansible 配置\n├── hosts.ini                      # 主机清单\n├── site.yml                       # 主入口 Playbook\n├── requirements.yml               # Galaxy 依赖\n├── secrets.yml                    # 加密变量（Vault）\n├── files/                         # 静态文件\n│   └── sshd_config\n├── templates/                     # Jinja2 模板\n│   └── nginx.conf.j2\n├── vars/                          # 变量文件\n│   ├── main.yml\n│   └── versions.yml\n├── group_vars/                    # 组变量\n│   ├── all.yml\n│   ├── web.yml\n│   └── db.yml\n├── host_vars/                     # 主机变量\n│   └── web-01.yml\n└── roles/                         # 角色目录\n├── common/\n├── nginx/\n├── mysql/\n└── monitor/","chapter":"Ansible 自动化运维","keywords":["yml","ansible","vars","nginx","web","命令参考","ops","cfg","配置","hosts","ini","主机清单","site","主入口","playbook","requirements","galaxy","依赖","secrets","加密变量"]},{"title":"Docker 容器运维","text":"> 适用场景：容器化应用部署、镜像构建、编排管理、故障排查\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"Docker 容器运维","keywords":["01","linux","basics","md","适用场景","容器化应用部署","镜像构建","编排管理","故障排查","前置阅读"]},{"title":"1. 容器生命周期","text":"命令参考：\ndocker run -d --name nginx -p 80:80 nginx:alpine          # 后台运行，端口映射\ndocker run -it --rm ubuntu bash                             # 交互式，退出自动删除\ndocker run -d --restart=always --name app myapp:latest      # 自动重启\ndocker run -d -v /data:/app/data -e ENV=prod myapp         # 挂载卷 + 环境变量\ndocker ps                                                   # 运行中的容器\ndocker ps -a                                                # 所有容器（含已停止）\ndocker ps -a --format \"table {{.ID}}\\t{{.Names}}\\t{{.Status}}\\t{{.Ports}}\"\ndocker ps -q                                                # 只输出容器 ID\ndocker start nginx            # 启动已停止的容器\ndocker stop nginx             # 优雅停止（SIGTERM → 10s → SIGKILL）\ndocker stop -t 30 nginx       # 等待 30 秒再强杀\ndocker restart nginx          # 重启\ndocker pause/unpause nginx    # 暂停/恢复进程（不释放内存）\ndocker kill nginx             # 立即强杀（SIGKILL）\ndocker rm nginx                                  # 删除已停止的容器\ndocker rm -f nginx                               # 强制删除运行中的\ndocker container prune -f                        # 删除所有已停止容器\ndocker rm $(docker ps -aq)                       # 删除所有容器（⚠️）\ndocker stop $(docker ps -q) && docker rm $(docker ps -aq)  # 先停后删\ndocker exec -it nginx bash                       # 进入 bash\ndocker exec -it nginx sh                         # Alpine 用 sh\ndocker exec nginx cat /etc/nginx/nginx.conf      # 执行单条命令\ndocker exec -u root nginx whoami                 # 以 root 身份执行\ndocker attach nginx                              # 附着到容器主进程（不推荐）\ndocker logs nginx                                # 查看日志\ndocker logs -f nginx                             # 实时跟踪\ndocker logs --tail 100 nginx                     # 最后 100 行\ndocker logs --since 30m nginx                    # 最近 30 分钟\ndocker logs --until \"2024-01-01T12:00:00\" nginx  # 截止到某时间\ndocker logs -f --tail 50 nginx 2>&1 | grep ERROR # 过滤错误日志","chapter":"Docker 容器运维","keywords":["docker","nginx","ps","logs","rm","run","exec","30","it","bash","stop","80","100","name","alpine","restart","app","myapp","data","id"]},{"title":"2. 镜像管理","text":"命令参考：\ndocker images                                      # 本地镜像列表\ndocker images --format \"table {{.Repository}}\\t{{.Tag}}\\t{{.Size}}\"\ndocker search nginx --limit 10                    # 搜索 Docker Hub\ndocker history nginx:alpine                        # 镜像构建历史（层）\ndocker pull nginx:alpine                           # 拉取指定标签\ndocker pull nginx                                  # 默认拉取 latest\ndocker tag nginx:alpine myrepo/nginx:v1.0          # 打标签\ndocker push myrepo/nginx:v1.0                      # 推送到仓库\ndocker pull registry.example.com:5000/myapp:v1     # 从私有仓库拉取\ndocker build -t myapp:v1.0 .                       # 从 Dockerfile 构建\ndocker build --no-cache -t myapp:v2 .              # 不使用缓存\ndocker build --build-arg VERSION=2.0 -t app:v2 .   # 传递构建参数\ndocker build -f Dockerfile.prod -t app:prod .      # 指定 Dockerfile\ndocker rmi nginx:alpine                            # 删除镜像\ndocker rmi $(docker images -q)                     # 删除所有镜像（⚠️）\ndocker image prune -a                              # 删除未使用的镜像\ndocker system prune -a --volumes                   # 彻底清理所有未使用资源\ndocker save -o nginx.tar nginx:alpine              # 导出镜像为 tar\ndocker load -i nginx.tar                           # 从 tar 导入\ndocker export nginx > nginx.tar                    # 导出容器文件系统\ndocker import nginx.tar mynginx:latest             # 从 tar 导入为镜像\ndocker inspect nginx:alpine                        # 镜像 JSON 详情\ndocker inspect -f '{{.Config.Env}}' nginx          # 格式化提取环境变量\ndocker inspect -f '{{range .RootFS.Layers}}{{println .}}{{end}}' nginx  # 列出所有层","chapter":"Docker 容器运维","keywords":["docker","nginx","tar","alpine","build","v1","images","pull","myapp","dockerfile","inspect","tag","latest","myrepo","v2","app","prod","rmi","prune","10"]},{"title":"3. Dockerfile 编写","text":"**CMD vs ENTRYPOINT 组合**\n模式   Dockerfile   docker run 传参   实际执行\n------ ----------- ---------------- ---------\nCMD 仅   `CMD [\"echo\", \"hello\"]`   `world`   `echo world`\nENTRYPOINT 仅   `ENTRYPOINT [\"echo\"]`   `hello`   `echo hello`\n组合   `ENTRYPOINT [\"echo\"]` + `CMD [\"hello\"]`   `world`   `echo world`\n脚本入口   `ENTRYPOINT [\"/entrypoint.sh\"]` + `CMD [\"nginx\", \"-g\", \"daemon off;\"]`   不传则用 CMD   `/entrypoint.sh nginx -g daemon off;`\n**多阶段构建（减小镜像体积）**\n**构建优化技巧**\n技巧   说明\n------ ------\n`.dockerignore`   排除 node_modules、.git、测试文件\n合并 RUN 层   `RUN apt update && apt install -y pkg && rm -rf /var/lib/apt/lists/*`\n先 COPY 依赖文件   COPY package.json → RUN npm install → COPY .\n使用特定标签   `FROM node:18.17-alpine` 而非 `node:latest`\n多阶段构建   编译环境和运行环境分离\n\n命令参考：\nFROM node:18-alpine AS builder                     # 多阶段构建，命名为 builder\nLABEL maintainer=\"ops@example.com\"\nLABEL version=\"1.0\"\nWORKDIR /app\nCOPY package*.json ./\nCOPY --chown=node:node . .\nRUN npm ci --only=production && npm cache clean --force\nARG BUILD_DATE\nARG VCS_REF\nENV NODE_ENV=production\nENV PORT=3000\nEXPOSE 3000\nRUN addgroup -g 1001 appgroup && adduser -u 1001 -G appgroup -s /bin/sh -D appuser\nUSER appuser\nHEALTHCHECK --interval=30s --timeout=3s --retries=3 \\\nCMD curl -f http://localhost:3000/health || exit 1\nVOLUME [\"/app/data\", \"/app/logs\"]\nENTRYPOINT [\"node\", \"server.js\"]\nCMD [\"--port\", \"3000\"]\nFROM golang:1.21-alpine AS builder\nWORKDIR /src\nCOPY . .\nRUN go build -o /app .\nFROM alpine:3.19\nCOPY --from=builder /app /usr/local/bin/app\nENTRYPOINT [\"app\"]","chapter":"Docker 容器运维","keywords":["entrypoint","cmd","node","run","copy","app","echo","from","3000","hello","world","alpine","builder","sh","多阶段构建","apt","npm","env","18","1001"]},{"title":"4. 网络管理","text":"**网络模式对比**\n模式   说明   适用场景\n------ ------ ---------\n`bridge`（默认）   独立网络命名空间，通过 NAT 访问外网   一般容器\n`host`   共享宿主机网络栈，性能最好   高性能网络服务\n`none`   无网络   纯计算任务\n`container:NAME`   共享指定容器的网络栈   代理/日志收集器\n`overlay`   跨主机通信（Swarm）   集群部署\n\n命令参考：\ndocker network ls                              # 列出所有网络\ndocker network inspect bridge                  # 查看桥接网络详情\ndocker network inspect -f '{{range .Containers}}{{.Name}} {{.IPv4Address}}{{\"\\n\"}}{{end}}' bridge\ndocker network create mynet                    # 创建桥接网络\ndocker network create --subnet=10.10.0.0/16 --gateway=10.10.0.1 mynet\ndocker network create --driver overlay myover  # Swarm overlay 网络\ndocker network connect mynet nginx             # 容器加入网络\ndocker network disconnect mynet nginx          # 容器离开网络\ndocker run --network mynet --ip 10.10.0.10 nginx  # 指定 IP 运行\ndocker run -p 8080:80 nginx                    # 映射 8080→80\ndocker run -p 127.0.0.1:8080:80 nginx          # 仅本地监听\ndocker run -P nginx                            # 随机映射所有 EXPOSE 端口\ndocker port nginx                              # 查看容器端口映射\ndocker run --rm --net container:nginx alpine ping -c 2 google.com  # 借用 nginx 网络\ndocker run --rm --net host alpine ip a                                # 使用宿主机网络\ndocker run --rm alpine nslookup redis                                 # DNS 测试","chapter":"Docker 容器运维","keywords":["docker","network","nginx","10","run","mynet","80","8080","bridge","overlay","create","ip","rm","alpine","host","container","name","swarm","inspect","网络"]},{"title":"5. 存储管理","text":"命令参考：\ndocker volume create app_data                             # 创建卷\ndocker volume ls                                          # 列出卷\ndocker volume inspect app_data                            # 查看卷详情（Mountpoint）\ndocker volume rm app_data                                 # 删除卷\ndocker volume prune                                       # 清理未使用的卷\ndocker run -v app_data:/app/data nginx                    # 挂载卷\ndocker run --mount source=app_data,target=/app/data nginx # 推荐写法\ndocker run -v /host/path:/container/path nginx\ndocker run -v /host/path:/container/path:ro nginx         # 只读挂载\ndocker run --mount type=bind,source=/host/path,target=/app,readonly nginx\ndocker run --tmpfs /app/tmp:rw,size=128M nginx\ndocker run --mount type=tmpfs,destination=/app/tmp,tmpfs-size=128M nginx\ndocker run -d --name app1 -v shared:/data nginx\ndocker run -d --name app2 --volumes-from app1 alpine\ndocker run --rm -v app_data:/data -v $(pwd):/backup alpine tar czf /backup/app_backup.tar.gz -C /data .","chapter":"Docker 容器运维","keywords":["docker","app","data","run","nginx","volume","path","mount","host","tmpfs","backup","rm","source","target","container","type","tmp","size","128m","name"]},{"title":"6. Docker Compose","text":"命令参考：\nversion: '3.8'\nservices:\nweb:\nbuild:\ncontext: .\ndockerfile: Dockerfile\nimage: myapp:${TAG:-latest}\ncontainer_name: myapp-web\nports:\n- \"8080:3000\"\nenvironment:\n- NODE_ENV=production\n- DB_HOST=db\nenv_file:\n- .env.production\nvolumes:\n- app_data:/app/data\n- ./nginx.conf:/etc/nginx/conf.d/default.conf:ro\nnetworks:\n- frontend\n- backend\ndepends_on:\ndb:\ncondition: service_healthy\nrestart: unless-stopped\nhealthcheck:\ntest: [\"CMD\", \"curl\", \"-f\", \"http://localhost:3000/health\"]\ninterval: 30s\ntimeout: 5s\nretries: 3\nstart_period: 10s\nlogging:\ndriver: \"json-file\"\noptions:\nmax-size: \"10m\"\nmax-file: \"3\"\ndeploy:\nresources:\nlimits:\ncpus: '0.5'\nmemory: 256M\nreservations:\ncpus: '0.25'\nmemory: 128M\ndb:\nimage: postgres:16-alpine\nenvironment:\nPOSTGRES_DB: myapp\nPOSTGRES_USER: app\nPOSTGRES_PASSWORD_FILE: /run/secrets/db_password\nsecrets:\n- db_password\nvolumes:\n- db_data:/var/lib/postgresql/data\nnetworks:\n- backend\nrestart: unless-stopped\nnginx:\nimage: nginx:alpine\nports:\n- \"80:80\"\n- \"443:443\"\nvolumes:\n- ./nginx.conf:/etc/nginx/nginx.conf:ro\n- ./certs:/etc/nginx/certs:ro\ndepends_on:\n- web\nnetworks:\n- frontend\nnetworks:\nfrontend:\nbackend:\ninternal: true                  # 内部网络，不暴露到宿主机\nvolumes:\napp_data:\ndb_data:\nsecrets:\ndb_password:\nfile: ./secrets/db_password.txt\ndocker compose up -d                                   # 后台启动所有服务\ndocker compose up -d --build                           # 重新构建并启动\ndocker compose up -d web                               # 只启动某服务\ndocker compose down                                    # 停止并删除（保留卷）\ndocker compose down -v                                 # 同时删除卷\ndocker compose restart web                             # 重启某服务\ndocker compose logs -f web                             # 实时日志\ndocker compose logs -f --tail=50 web                   # 最后 50 行\ndocker compose exec web bash
