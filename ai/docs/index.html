                   # 进入容器\ndocker compose exec -u root web bash                   # root 进入\ndocker compose ps                                      # 查看服务状态\ndocker compose config                                  # 验证并打印合并后的配置\ndocker compose config --services                       # 只列服务名\ndocker compose pull                                    # 拉取最新镜像\ndocker compose build --no-cache                        # 强制重建","chapter":"Docker 容器运维","keywords":["docker","compose","db","web","nginx","data","file","conf","password","volumes","app","networks","postgres","secrets","build","image","myapp","env","etc","ro"]},{"title":"7. 资源限制","text":"命令参考：\ndocker run --cpus=\"1.5\" nginx                          # 最多使用 1.5 个 CPU\ndocker run --cpuset-cpus=\"0,2\" nginx                   # 绑定到 CPU 0 和 2\ndocker run --cpu-shares=512 nginx                      # CPU 权重（默认 1024）\ndocker run --memory=\"512m\" --memory-swap=\"1g\" nginx    # 内存 512M，swap 1G\ndocker run --memory=\"256m\" --memory-swap=\"256m\" nginx  # 禁用 swap（相等）\ndocker run --memory-reservation=\"128m\" nginx           # 软限制（竞争时生效）\ndocker run --blkio-weight=500 nginx                    # IO 权重（10-1000）\ndocker run --device-read-bps=/dev/sda:1mb nginx        # 读速率限制\ndocker run --device-write-iops=/dev/sda:50 nginx       # 写 IOPS 限制\ndocker run --restart=on-failure:3 nginx                # 失败最多重启 3 次\ndocker run --ulimit nofile=65536:65536 nginx           # 文件描述符限制\ndocker run --pids-limit=100 nginx                      # 进程数限制\ndocker run --shm-size=256m nginx                       # /dev/shm 大小\ndocker run --read-only nginx                           # 只读根文件系统\ndocker update --memory=\"1g\" --cpus=\"2\" nginx           # 更新运行中容器的限制\ndocker stats                                            # 查看所有容器资源占用\ndocker stats --no-stream nginx                          # 一次性输出","chapter":"Docker 容器运维","keywords":["docker","nginx","run","memory","cpu","swap","cpus","1g","256m","dev","65536","权重","512m","device","read","sda","iops","shm","stats","10"]},{"title":"8. 排障命令","text":"命令参考：\ndocker inspect nginx                                   # 完整 JSON 配置\ndocker inspect -f '{{.State.Status}}' nginx            # 格式化提取状态\ndocker inspect -f '{{.State.StartedAt}}' nginx         # 启动时间\ndocker inspect -f '{{.NetworkSettings.IPAddress}}' nginx # 容器 IP\ndocker top nginx                                       # 容器内进程列表\ndocker stats --no-stream                               # 一次性资源快照\ndocker diff nginx                                      # 容器文件系统变化（A 新增/C 修改/D 删除）\ndocker cp nginx:/etc/nginx/nginx.conf ./               # 从容器复制文件到宿主机\ndocker cp ./nginx.conf nginx:/etc/nginx/nginx.conf     # 复制文件到容器\ndocker logs --tail 20 nginx                            # 容器退出前最后日志\ndocker inspect -f '{{.State.ExitCode}}' nginx          # 退出码\ndocker inspect -f '{{.State.Error}}' nginx             # 错误信息\ndocker inspect -f '{{json .State.Health}}' nginx | python3 -m json.tool  # 健康检查状态\ndocker events --since 10m --filter container=nginx     # 最近 10 分钟事件\ndocker system df                                        # Docker 磁盘使用概览\ndocker system df -v                                     # 详细空间分析\ndocker system prune -a -f --volumes                     # 彻底清理\ndu -sh /var/lib/docker                                  # Docker 数据目录大小\ndocker kill -s HUP nginx                                # 发送重载信号\ndocker kill -s USR1 nginx                               # 发送自定义信号\ndocker pause nginx && docker unpause nginx              # 暂停/恢复\ndocker commit nginx mydebug:latest                      # 将容器保存为新镜像（调试用，不用于生产）","chapter":"Docker 容器运维","keywords":["docker","nginx","inspect","state","json","conf","system","cp","etc","df","kill","10","20","命令参考","完整","配置","status","格式化提取状态","startedat","启动时间"]},{"title":"9. 安全实践","text":"命令参考：\ndocker scan nginx:alpine                                # Docker 内置扫描（需登录）\ndocker scout quickview nginx:alpine                     # Docker Scout\ndocker run -u 1001:1001 nginx                           # 指定 UID:GID\ndocker run --user \"$(id -u):$(id -g)\" nginx            # 使用当前用户\ndocker run --read-only nginx                            # 只读根文件系统\ndocker run --security-opt no-new-privileges nginx       # 禁止提权\ndocker run --cap-drop=ALL --cap-add=NET_BIND_SERVICE nginx  # 最小权限\ndocker run --tmpfs /tmp:rw,noexec,nosuid,size=64M nginx # 安全 tmpfs\nexport DOCKER_CONTENT_TRUST=1                           # 启用镜像签名验证\ndocker pull nginx:alpine                                # 只拉取已签名的镜像\necho \"mypassword\" | docker secret create db_password -   # Swarm secret\ndocker run --secret db_password nginx                   # 挂载 secret\ndocker system info                                      # Docker 守护进程信息\ndocker info -f '{{.ServerVersion}}'                    # 版本号\ndocker system events --since 1h                          # 最近 1 小时事件审计","chapter":"Docker 容器运维","keywords":["docker","nginx","run","secret","alpine","1001","scout","id","cap","tmpfs","db","password","system","info","命令参考","scan","内置扫描","需登录","quickview","指定"]},{"title":"10. 常用场景速查","text":"**部署一个 Web 应用（完整流程）**\n**更新镜像（滚动更新）**\n**容器化遗留应用（最小侵入）**\n**清理磁盘空间应急**\n\n命令参考：\ndocker network create webnet\ndocker run -d --name db --network webnet \\\n-v db_data:/var/lib/postgresql/data \\\n-e POSTGRES_PASSWORD=secret \\\npostgres:16-alpine\ndocker build -t myapp:v1 .\ndocker run -d --name app --network webnet \\\n-p 8080:3000 \\\n-e DB_HOST=db \\\n-v app_uploads:/app/uploads \\\n--restart=unless-stopped \\\nmyapp:v1\ndocker logs -f app\ncurl http://localhost:8080/health\ndocker build -t myapp:v2 .\ndocker stop app && docker rm app\ndocker run -d --name app --network webnet \\\n-p 8080:3000 \\\n-e DB_HOST=db \\\n-v app_uploads:/app/uploads \\\n--restart=unless-stopped \\\nmyapp:v2\ndocker run --rm --net host -v /etc:/host-etc:ro alpine cp -r /host-etc /backup-etc\ndocker run -d --net host --restart=always legacy-app:latest\ndocker system df\ndocker stop $(docker ps -q --filter \"name=test\")\ndocker container prune -f\ndocker image prune -a -f\ndocker volume prune -f\ndocker network prune -f\ndocker builder prune -a -f     # 清理构建缓存\ndocker system prune -a -f --volumes","chapter":"Docker 容器运维","keywords":["docker","app","db","host","prune","network","run","webnet","name","myapp","uploads","etc","8080","restart","3000","data","postgres","alpine","build","v1"]},{"title":"监控告警","text":"> 适用场景：Prometheus + Grafana + Alertmanager 搭建、指标查询、告警配置、故障定位\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"监控告警","keywords":["01","linux","basics","md","适用场景","prometheus","grafana","alertmanager","搭建","指标查询","告警配置","故障定位","前置阅读"]},{"title":"1. Prometheus 基础","text":"**prometheus.yml 核心配置**\n\n命令参考：\ndocker run -d --name prometheus --restart=always \\\n-p 9090:9090 \\\n-v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml \\\n-v prometheus_data:/prometheus \\\nprom/prometheus\n./prometheus --config.file=prometheus.yml --storage.tsdb.path=/data/prometheus \\\n--storage.tsdb.retention.time=15d --web.listen-address=:9090 &\ncurl -X POST http://localhost:9090/-/reload\nkill -HUP $(pgrep prometheus)\npromtool check config prometheus.yml                    # 语法检查\npromtool check rules rules/*.yml                        # 规则检查\ncurl http://localhost:9090/api/v1/status/config          # 当前配置\ncurl http://localhost:9090/api/v1/targets                # 抓取目标状态\ncurl http://localhost:9090/api/v1/rules                  # 告警/记录规则\ncurl http://localhost:9090/api/v1/status/tsdb            # 存储统计\ncurl http://localhost:9090/metrics                       # Prometheus 自身指标\npromtool tsdb list /data/prometheus                      # 列出数据块\npromtool tsdb dump /data/prometheus                      # 导出数据（调试用）\nglobal:\nscrape_interval: 15s              # 抓取间隔\nevaluation_interval: 15s          # 规则评估间隔\nexternal_labels:\ncluster: prod\nregion: cn-east\nalerting:\nalertmanagers:\n- static_configs:\n- targets: ['alertmanager:9093']\nrule_files:\n- 'rules/*.yml'\nscrape_configs:\n- job_name: 'prometheus'\nstatic_configs:\n- targets: ['localhost:9090']\n- job_name: 'node'\nstatic_configs:\n- targets: ['node1:9100', 'node2:9100', 'node3:9100']\nlabels:\nenv: production\nrole: app\n- job_name: 'kubernetes-pods'\nkubernetes_sd_configs:\n- role: pod\nrelabel_configs:\n- source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]\naction: keep\nregex: true\n- source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]\naction: replace\ntarget_label: __metrics_path__\nregex: (.+)\n- job_name: 'docker'\nstatic_configs:\n- targets: ['localhost:9323']   # Docker 内置 metrics","chapter":"监控告警","keywords":["prometheus","9090","localhost","yml","configs","curl","http","name","tsdb","targets","data","promtool","rules","api","v1","labels","static","job","kubernetes","9100"]},{"title":"2. PromQL 常用查询","text":"命令参考：\nnode_cpu_seconds_total{mode=\"idle\"}\nnode_cpu_seconds_total{mode=\"idle\"}[5m]\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m])\nirate(node_cpu_seconds_total{mode=\"idle\"}[5m])       # 更灵敏的瞬时速率\nincrease(node_network_receive_bytes_total[1h])        # 1小时增长量\n100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\n100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\nsum by(mode)(rate(node_cpu_seconds_total[5m]))\n(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100\n(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 1024^3\n(node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100\n(node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 80\npredict_linear(node_filesystem_free_bytes[1h], 3600 * 24) < 0\nrate(node_disk_io_time_seconds_total[5m]) * 100\nrate(node_network_receive_bytes_total[5m]) / 1024 / 1024\nrate(node_network_receive_errors_total[5m])\nnode_netstat_Tcp_CurrEstab\nup{job=\"node\"}                                           # 1=UP, 0=DOWN\ncount by(job)(up == 0)                                  # 各 job 的 DOWN 数量\nrate(prometheus_target_interval_length_seconds_count[5m])\ntopk(5, 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100))\navg by(env)(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100)\navg_over_time(node_load1[1h])\nmax_over_time(node_load1[1h])\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m]) /\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m] offset 1w)\nhistogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))\n(sum(rate(http_request_duration_seconds_bucket{le=\"0.1\"}[5m])) +\nsum(rate(http_request_duration_seconds_bucket{le=\"1.0\"}[5m]))) / 2 /\nsum(rate(http_request_duration_seconds_count[5m]))","chapter":"监控告警","keywords":["node","5m","seconds","rate","bytes","total","100","cpu","mode","idle","filesystem","memory","avg","by","1h","sum","size","http","request","duration"]},{"title":"3. Node Exporter（系统指标采集）","text":"**常用 Node Exporter 指标速查**\n指标前缀   含义   关键标签\n--------- ------ ---------\n`node_cpu_seconds_total`   CPU 时间   `mode`: idle/iowait/system/user\n`node_memory_MemTotal_bytes`   总内存   —\n`node_memory_MemAvailable_bytes`   可用内存   —\n`node_filesystem_size_bytes`   文件系统大小   `mountpoint`, `fstype`\n`node_filesystem_free_bytes`   文件系统剩余   `mountpoint`\n`node_disk_read_bytes_total`   磁盘读取量   `device`\n`node_network_receive_bytes_total`   网络接收量   `device`\n`node_load1` / `load5` / `load15`   系统负载   —\n`node_netstat_Tcp_CurrEstab`   TCP 连接数   —\n`node_time_seconds`   系统时间   —\n\n命令参考：\nwget https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz\ntar xzf node_exporter-*.tar.gz\n./node_exporter --web.listen-address=:9100 &\ndocker run -d --name node-exporter --restart=always --net host \\\n-v /proc:/host/proc:ro -v /sys:/host/sys:ro -v /:/rootfs:ro \\\nprom/node-exporter \\\n--path.procfs=/host/proc --path.sysfs=/host/sys --path.rootfs=/rootfs\ncurl http://localhost:9100/metrics | head -30\n./node_exporter --collector.disable-defaults \\\n--collector.cpu --collector.meminfo --collector.diskstats \\\n--collector.netdev --collector.filesystem --collector.loadavg\n--collector.systemd                          # systemd 服务状态\n--collector.textfile.directory=/var/lib/node_exporter  # 自定义指标目录\n--collector.processes                        # 进程统计","chapter":"监控告警","keywords":["node","collector","exporter","bytes","host","cpu","total","filesystem","tar","proc","ro","sys","rootfs","path","9100","seconds","memory","mountpoint","device","tcp"]},{"title":"4. 告警规则","text":"命令参考：\ngroups:\n- name: node_alerts\nrules:\n# 实例宕机\n- alert: InstanceDown\nexpr: up == 0\nfor: 2m\nlabels:\nseverity: critical\nannotations:\nsummary: \"实例 {{ $labels.instance }} 宕机\"\ndescription: \"{{ $labels.instance }} 已超过 2 分钟无响应\"\n# CPU 使用率 > 80%\n- alert: HighCPUUsage\nexpr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100) > 80\nfor: 5m\nlabels:\nseverity: warning\nannotations:\nsummary: \"CPU 使用率 > 80% ({{ $labels.instance }})\"\ndescription: \"当前值: {{ $value | humanize }}%\"\n# 内存 > 90%\n- alert: HighMemoryUsage\nexpr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90\nfor: 5m\nlabels:\nseverity: warning\nannotations:\nsummary: \"内存使用率 > 90% ({{ $labels.instance }})\"\n# 磁盘 > 85%（排除 tmpfs）\n- alert: HighDiskUsage\nexpr: (node_filesystem_size_bytes{fstype!=\"tmpfs\"} - node_filesystem_free_bytes{fstype!=\"tmpfs\"})\n/ node_filesystem_size_bytes{fstype!=\"tmpfs\"} * 100 > 85\nfor: 5m\nlabels:\nseverity: warning\nannotations:\nsummary: \"磁盘使用率 > 85% ({{ $labels.instance }}:{{ $labels.mountpoint }})\"\n# 磁盘预测 4 小时内满\n- alert: DiskWillFillIn4Hours\nexpr: predict_linear(node_filesystem_free_bytes{fstype!=\"tmpfs\"}[1h], 4*3600) < 0\nfor: 10m\nlabels:\nseverity: critical\nannotations:\nsummary: \"磁盘预计 4 小时内满 ({{ $labels.instance }}:{{ $labels.mountpoint }})\"\n# Load 过高\n- alert: HighLoad\nexpr: node_load1 / count without(cpu,mode)(node_cpu_seconds_total{mode=\"idle\"}) > 2\nfor: 10m\nlabels:\nseverity: warning\nannotations:\nsummary: \"系统 Load 过高 ({{ $labels.instance }})\"\n# 重启检测\n- alert: HostRebooted\nexpr: node_time_seconds - node_boot_time_seconds < 300\nlabels:\nseverity: info\nannotations:\nsummary: \"{{ $labels.instance }} 最近重启过\"\n# 证书过期（需要 blackbox_exporter）\n- alert: SSLCertExpiring\nexpr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7\nfor: 1h\nlabels:\nseverity: warning\nannotations:\nsummary: \"SSL 证书将在 7 天内过期\"","chapter":"监控告警","keywords":["labels","node","instance","alert","expr","severity","annotations","summary","for","bytes","cpu","warning","tmpfs","100","seconds","5m","filesystem","fstype","80","85"]},{"title":"5. Alertmanager","text":"**alertmanager.yml**\n**接收器类型**\n类型   用途   关键配置\n------ ------ ---------\n`email_configs`   邮件   `to`, `headers`\n`webhook_configs`   HTTP 回调（钉钉/飞书/企微）   `url`, `send_resolved`\n`slack_configs`   Slack   `api_url`, `channel`\n`pagerduty_configs`   PagerDuty   `routing_key`\n`opsgenie_configs`   OpsGenie   `api_key`\n`wechat_configs`   企业微信   `corp_id`, `to_party`\n\n命令参考：\ndocker run -d --name alertmanager -p 9093:9093 \\\n-v $(pwd)/alertmanager.yml:/etc/alertmanager/alertmanager.yml \\\nprom/alertmanager\namtool silence list                       # 列出静默\namtool silence add alertname=HighCPUUsage --duration=2h --comment=\"维护窗口\"\namtool silence expire <silence-id>        # 过期静默\ncurl http://localhost:9093/api/v2/alerts | python3 -m json.tool\nglobal:\nresolve_timeout: 5m\nsmtp_smarthost: 'smtp.example.com:587'\nsmtp_from: 'alertmanager@example.com'\nsmtp_auth_username: 'alertmanager@example.com'\nsmtp_auth_password: 'password'\nroute:\ngroup_by: ['alertname', 'severity']     # 分组字段\ngroup_wait: 10s                          # 首次等待（收集同组告警）\ngroup_interval: 5m                       # 同组后续告警间隔\nrepeat_interval: 4h                      # 重复发送间隔\nreceiver: 'default'\nroutes:\n- match:\nseverity: critical\nreceiver: 'critical-pager'\ncontinue: true                       # 继续匹配下级路由\n- match_re:\njob: '.*'\nreceiver: 'default'\nreceivers:\n- name: 'default'\nemail_configs:\n- to: 'ops-team@example.com'\nheaders:\nSubject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'\nwebhook_configs:\n- url: 'https://hooks.example.com/alert'\nsend_resolved: true\n- name: 'critical-pager'\nwebhook_configs:\n- url: 'https://pager.example.com/api/alert'\nmax_alerts: 1                      # 每次只发一条","chapter":"监控告警","keywords":["configs","alertmanager","example","com","smtp","url","api","silence","9093","yml","to","webhook","name","amtool","alertname","group","receiver","default","critical","pager"]},{"title":"6. Grafana","text":"**Grafana 常用操作**\n操作   路径/方法\n------ ----------\n添加 Prometheus 数据源   Configuration → Data Sources → Prometheus → URL: `http://prometheus:9090`\n创建 Dashboard   Dashboards → New → Add panel → 输入 PromQL\n变量查询   Dashboard Settings → Variables → Query: `label_values(up, instance)`\n导入社区面板   Dashboards → Import → 输入 ID（如 Node Exporter: `1860`）\n告警通道   Alerting → Contact points → New（Email/Webhook）\n通知模板   Alerting → Notification templates\n**Panel 常用 PromQL 模板**\n\n命令参考：\ndocker run -d --name grafana -p 3000:3000 \\\n-v grafana_data:/var/lib/grafana \\\ngrafana/grafana\ncurl -s -u admin:password http://localhost:3000/api/dashboards/uid/<uid> | python3 -m json.tool\ncurl -X POST http://localhost:3000/api/dashboards/db \\\n-u admin:password -H 'Content-Type: application/json' \\\n-d '{\"dashboard\": {...}, \"overwrite\": true}'\ncurl -s -u admin:password http://localhost:3000/api/search | python3 -m json.tool\nnode_memory_MemAvailable_bytes / 1024^3\nrate(node_network_receive_bytes_total{device=\"eth0\"}[5m])\navg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100\n100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\nsum by(le)(rate(http_request_duration_seconds_bucket[5m]))","chapter":"监控告警","keywords":["grafana","3000","http","node","dashboards","rate","5m","100","prometheus","dashboard","curl","admin","password","localhost","api","json","total","seconds","data","new"]},{"title":"7. Blackbox Exporter（外部探测）","text":"**Prometheus 抓取配置**\n**常用探测指标**\n指标   含义\n------ ------\n`probe_success`   探测是否成功 (1/0)\n`probe_duration_seconds`   探测耗时\n`probe_http_status_code`   HTTP 状态码\n`probe_ssl_earliest_cert_expiry`   SSL 证书最早过期时间\n`probe_dns_lookup_time_seconds`   DNS 解析耗时\n`probe_tcp_connect_time_seconds`   TCP 连接耗时\n\n命令参考：\ndocker run -d --name blackbox -p 9115:9115 prom/blackbox-exporter\ncurl \"http://localhost:9115/probe?target=https://example.com&module=http_2xx\"\ncurl \"http://localhost:9115/probe?target=example.com:443&module=tcp_connect\"\ncurl \"http://localhost:9115/probe?target=8.8.8.8&module=icmp\"\nscrape_configs:\n- job_name: 'blackbox'\nmetrics_path: /probe\nparams:\nmodule: [http_2xx]\nstatic_configs:\n- targets:\n- https://example.com\n- https://api.example.com/health\n- https://admin.example.com\nrelabel_configs:\n- source_labels: [__address__]\ntarget_label: __param_target\n- source_labels: [__param_target]\ntarget_label: instance\n- target_label: __address__\nreplacement: blackbox:9115","chapter":"监控告警","keywords":["probe","target","http","9115","example","com","blackbox","https","module","seconds","tcp","curl","localhost","configs","label","ssl","dns","time","connect","name"]},{"title":"8. 常用监控场景速查","text":"**场景1：排查 CPU 飙高**\n**场景2：排查内存泄漏**\n**场景3：磁盘空间告警处理**\n**场景4：服务可用性监控**\n**场景5：SSL 证书监控**\n\n命令参考：\n100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\nsum by(mode)(rate(node_cpu_seconds_total{instance=\"problem-host\"}[5m]))\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m]) /\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m] offset 1h)\nssh problem-host\ntop -o %CPU\nnode_memory_MemAvailable_bytes{instance=\"problem-host\"}\nnode_memory_MemAvailable_bytes{instance=\"problem-host\"} /\nnode_memory_MemAvailable_bytes{instance=\"problem-host\"} offset 24h\nincrease(node_vmstat_oom_kill[1h]) > 0\ndf -h | grep -E \"8[5-9]%|9[0-9]%|100%\"\ndu -ah / | sort -rh | head -20\ndocker system prune -a -f       # Docker\njournalctl --vacuum-size=500M   # systemd 日志\nfind /var/log -name \"*.gz\" -delete  # 旧日志\navg_over_time(up{job=\"myapp\"}[24h]) * 100\nchanges(up{job=\"myapp\"}[24h]) > 0\ntimestamp(up{job=\"myapp\"} == 0)\n(probe_ssl_earliest_cert_expiry - time()) / 86400\n(probe_ssl_earliest_cert_expiry - time()) / 86400 < 30","chapter":"监控告警","keywords":["node","cpu","instance","problem","host","100","rate","seconds","total","mode","5m","ssl","idle","memory","memavailable","bytes","24h","time","up","job"]},{"title":"9. 排障命令","text":"命令参考：\ncurl http://localhost:9090/api/v1/targets | python3 -m json.tool | grep -E \"health|lastError\"\npromtool check config prometheus.yml\ntail -f /var/log/prometheus.log\ncurl http://localhost:9090/-/healthy\ncurl http://localhost:9090/-/ready\namtool alert query --alertmanager.url=http://localhost:9093\ncurl http://localhost:9093/-/healthy\ncurl http://localhost:9093/api/v2/status\ndocker logs grafana --tail 50\ncurl http://localhost:3000/api/health\ndocker exec -it grafana grafana-cli admin reset-admin-password newpassword\ncurl http://localhost:9100/metrics | grep node_cpu\ncurl \"http://localhost:9090/api/v1/query?query=up\"\ntimedatectl status","chapter":"监控告警","keywords":["http","localhost","curl","9090","api","9093","query","grafana","v1","grep","health","prometheus","tail","log","healthy","status","docker","admin","50","3000"]},{"title":"数据库速查","text":"> 适用场景：MySQL/PostgreSQL/Redis 日常运维、备份恢复、性能排查、应急处理\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"数据库速查","keywords":["01","linux","basics","md","适用场景","mysql","postgresql","redis","日常运维","备份恢复","性能排查","应急处理","前置阅读"]},{"title":"1.6 排障命令","text":"命令参考：\nmysql -u root -p                                     # 交互式\nmysql -u root -p -h 10.0.0.1 -P 3306 mydb           # 远程连接指定库\nmysql -u root -p -e \"SHOW DATABASES;\"                # 执行单条 SQL\nmysql -u root -p < backup.sql                        # 导入 SQL 文件\nsystemctl status mysql                               # MySQL\nsystemctl status mariadb                             # MariaDB\nsystemctl restart mysql\nmysql -u root -p -e \"SELECT VERSION();\"\nmysqladmin -u root -p status                         # 运行时间/线程数/查询数\nmysqladmin -u root -p extended-status                # 详细状态\nmysqladmin -u root -p processlist                    # 当前连接列表\n/etc/my.cnf                    # 主配置\n/etc/mysql/my.cnf              # Debian/Ubuntu\n/etc/my.cnf.d/                 # 配置片段目录\n-- 创建用户\nCREATE USER 'app'@'localhost' IDENTIFIED BY 'password';\nCREATE USER 'app'@'10.0.%.%' IDENTIFIED BY 'password';     -- 允许某网段\nCREATE USER 'app'@'%' IDENTIFIED BY 'password';             -- 允许所有 IP\n-- 授权\nGRANT ALL ON mydb.* TO 'app'@'localhost';\nGRANT SELECT, INSERT, UPDATE ON mydb.* TO 'app'@'%';        -- 只读+写\nGRANT SELECT ON mydb.* TO 'readonly'@'%';                   -- 只读\nGRANT ALL ON *.* TO 'root'@'%' WITH GRANT OPTION;           -- 超级权限（⚠️）\nFLUSH PRIVILEGES;\n-- 查看权限\nSHOW GRANTS FOR 'app'@'localhost';\nSELECT user, host FROM mysql.user;\n-- 修改密码\nALTER USER 'app'@'localhost' IDENTIFIED BY 'newpassword';   -- MySQL 5.7+\nSET PASSWORD FOR 'app'@'localhost' = PASSWORD('newpass');   -- 旧版\n-- 删除用户\nDROP USER 'app'@'localhost';\n-- 锁定/解锁用户（MySQL 5.7+）\nALTER USER 'app'@'localhost' ACCOUNT LOCK;\nALTER USER 'app'@'localhost' ACCOUNT UNLOCK;\nmysqldump -u root -p --all-databases > full_backup.sql\nmysqldump -u root -p --all-databases --single-transaction --routines --triggers > full_backup.sql\nmysqldump -u root -p mydb > mydb.sql\nmysqldump -u root -p mydb --no-data > mydb_schema.sql       # 只导出表结构\nmysqldump -u root -p mydb --no-create-info > mydb_data.sql  # 只导出数据\nmysqldump -u root -p mydb users > users.sql\nmysqldump -u root -p mydb users --where=\"created_at > '2024-01-01'\" > users_recent.sql\nmysql -u root -p mydb < mydb.sql\nmysql -u root -p < full_backup.sql\nmysqldump -u root -p mydb | gzip > mydb.sql.gz\ngunzip < mydb.sql.gz | mysql -u root -p mydb\nmysqldump -h 10.0.0.1 -u root -p mydb > remote_backup.sql\nxtrabackup --backup --target-dir=/backup/mysql --user=root --password=xxx\nxtrabackup --prepare --target-dir=/backup/mysql               # 准备恢复\nxtrabackup --copy-back --target-dir=/backup/mysql             # 恢复\nmysqlpump -u root -p --all-databases --default-parallelism=4 > backup.sql\n-- 查看数据库/表大小\nSELECT table_schema AS db,\nROUND(SUM(data_length + index_length) / 1024 / 1024, 2) AS size_mb\nFROM information_schema.tables GROUP BY table_schema;\n-- 查看某库最大的表\nSELECT table_name,\nROUND((data_length + index_length) / 1024 / 1024, 2) AS size_mb\nFROM information_schema.tables\nWHERE table_schema = 'mydb' ORDER BY size_mb DESC LIMIT 10;\n-- 查看当前连接\nSHOW PROCESSLIST;\nSHOW FULL PROCESSLIST;                                      -- 显示完整 SQL\nSELECT * FROM information_schema.processlist WHERE command != 'Sleep';\n-- 杀掉连接\nKILL 123;                                                   -- 杀单个连接\nSELECT CONCAT('KILL ', id, ';') FROM information_schema.processlist\nWHERE user = 'app' AND time > 300;                          -- 批量生成杀连接 SQL\n-- 查看锁等待\nSELECT * FROM information_schema.innodb_lock_waits;         -- MySQL 5.x\nSELECT * FROM performance_schema.data_lock_waits;           -- MySQL 8.0\n-- 查看慢查询\nSHOW VARIABLES LIKE 'slow_query%';\nSHOW VARIABLES LIKE 'long_query_time';\nSELECT * FROM mysql.slow_log ORDER BY start_time DESC LIMIT 10;\n-- 查看/设置变量\nSHOW VARIABLES LIKE 'max_connections';\nSET GLOBAL max_connections = 500;\n-- 优化表\nOPTIMIZE TABLE users;                                       -- 整理碎片\nANALYZE TABLE users;                                        -- 更新索引统计\nCHECK TABLE users;                                          -- 检查表错误\nREPAIR TABLE users;                                         -- 修复表\n-- 查看表状态\nSHOW TABLE STATUS LIKE 'users';\nSHOW INDEX FROM users;                                      -- 查看索引\n-- 查看正在执行的事务\nSELECT * FROM information_schema.innodb_trx;\n-- 主库：创建复制用户\nCREATE USER 'repl'@'%' IDENTIFIED BY 'password';\nGRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';\n-- 主库：查看 binlog 位置\nSHOW MASTER STATUS;\n-- 记录 File 和 Position\n-- 从库：配置复制\nCHANGE MASTER TO\nMASTER_HOST='10.0.0.1',\nMASTER_USER='repl',\nMASTER_PASSWORD='password',\nMASTER_LOG_FILE='mysql-bin.000001',\nMASTER_LOG_POS=1234;\nSTART SLAVE;\nSHOW SLAVE STATUS\\G\n-- 关键字段检查\n-- Slave_IO_Running: Yes   — IO 线程正常\n-- Slave_SQL_Running: Yes  — SQL 线程正常\n-- Seconds_Behind_Master: 0 — 同步延迟\n-- 跳过错误（谨慎使用）\nSTOP SLAVE;\nSET GLOBAL SQL_SLAVE_SKIP_COUNTER = 1;\nSTART SLAVE;\n-- 重置复制\nSTOP SLAVE;\nRESET SLAVE ALL;\ntail -100 /var/log/mysql/error.log\ntail -100 /var/log/mariadb/mariadb.log\nmysql -u root -p -e \"SHOW STATUS LIKE 'Threads_connected';\"\nmysql -u root -p -e \"SHOW VARIABLES LIKE 'max_connections';\"\nmysql -u root -p -e \"SELECT * FROM information_schema.innodb_lock_waits;\"\nmysql -u root -p -e \"SHOW ENGINE INNODB STATUS\\G\" | grep -A 20 \"LATEST DETECTED DEADLOCK\"\ndf -h /var/lib/mysql\nsystemctl restart mysql\nsystemctl stop mysql\nmysqld_safe --skip-grant-tables &\nmysql -u root\nsystemctl restart mysql","chapter":"数据库速查","keywords":["mysql","root","sql","mydb","show","select","user","app","schema","from","backup","users","slave","status","password","mysqldump","table","localhost","by","master"]},{"title":"2.6 排障命令","text":"命令参考：\npsql -U postgres -d mydb                            # 指定用户和数据库\npsql -h 10.0.0.1 -U postgres -d mydb                # 远程连接\npsql -U postgres -c \"SELECT version();\"              # 执行单条 SQL\npsql -U postgres -f script.sql                       # 执行 SQL 文件\nsystemctl status postgresql\nsystemctl restart postgresql\n/etc/postgresql/*/main/postgresql.conf    # 主配置\n/etc/postgresql/*/main/pg_hba.conf        # 访问控制\n-- 创建角色/用户\nCREATE ROLE app WITH LOGIN PASSWORD 'password';\nCREATE USER app WITH PASSWORD 'password';              -- 等价写法\n-- 授权\nGRANT ALL ON DATABASE mydb TO app;\nGRANT ALL ON ALL TABLES IN SCHEMA public TO app;\nGRANT SELECT ON ALL TABLES IN SCHEMA public TO readonly;\nGRANT SELECT, INSERT, UPDATE, DELETE ON users TO app;\n-- 修改默认权限（新建表自动授权）\nALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO readonly;\n-- 查看权限\n\\du                                                   -- psql 内\nSELECT * FROM pg_roles;\nSELECT grantee, table_schema, table_name, privilege_type\nFROM information_schema.table_privileges WHERE grantee = 'app';\n-- 修改密码\nALTER USER app WITH PASSWORD 'newpassword';\n-- 删除用户\nDROP USER app;\npg_dump -U postgres mydb > mydb.sql\npg_dump -U postgres -s mydb > mydb_schema.sql          # 只导出结构\npg_dump -U postgres -a mydb > mydb_data.sql            # 只导出数据\npg_dump -U postgres -t users mydb > users.sql          # 单表\npg_dump -U postgres -Fc mydb > mydb.dump               # 自定义格式（可并行恢复）\npsql -U postgres mydb < mydb.sql\npg_restore -U postgres -d mydb mydb.dump               # 恢复自定义格式\npg_restore -U postgres -d mydb -j 4 mydb.dump          # 4 并行恢复\npg_dumpall -U postgres > full_backup.sql\npg_basebackup -U postgres -D /backup/pg -Ft -z -P      # tar.gz 格式，显示进度\npg_dump -U postgres mydb | gzip > mydb.sql.gz\ngunzip < mydb.sql.gz | psql -U postgres mydb\npg_dump -h 10.0.0.1 -U postgres mydb > remote.sql\npg_dump -U postgres mydb | aws s3 cp - s3://bucket/mydb.sql\n-- 查看数据库大小\nSELECT pg_database.datname,\npg_size_pretty(pg_database_size(pg_database.datname)) AS size\nFROM pg_database ORDER BY pg_database_size(pg_database.datname) DESC;\n-- 查看表大小（含索引）\nSELECT relname AS table_name,\npg_size_pretty(pg_total_relation_size(relid)) AS total_size,\npg_size_pretty(pg_relation_size(relid)) AS table_size,\npg_size_pretty(pg_total_relation_size(relid) - pg_relation_size(relid)) AS index_size\nFROM pg_catalog.pg_statio_user_tables\nORDER BY pg_total_relation_size(relid) DESC;\n-- 查看当前连接\nSELECT pid, usename, application_name, client_addr, state, query\nFROM pg_stat_activity WHERE state != 'idle';\n-- 杀掉连接\nSELECT pg_terminate_backend(1234);                      -- 杀单个\nSELECT pg_terminate_backend(pid) FROM pg_stat_activity\nWHERE usename = 'app' AND state = 'idle in transaction';-- 批量杀\n-- 取消正在运行的查询（不杀连接）\nSELECT pg_cancel_backend(1234);\n-- 查看锁等待\nSELECT blocked.pid AS blocked_pid, blocked.query AS blocked_query,\nblocking.pid AS blocking_pid, blocking.query AS blocking_query\nFROM pg_stat_activity blocked\nJOIN pg_locks bl ON blocked.pid = bl.pid\nJOIN pg_locks bk ON bl.lock_type = bk.lock_type AND bl.database = bk.database\nAND bl.relation = bk.relation AND bl.pid != bk.pid\nJOIN pg_stat_activity blocking ON bk.pid = blocking.pid\nWHERE NOT bl.granted;\n-- 慢查询（需先启用扩展）\nCREATE EXTENSION pg_stat_statements;\nSELECT query, calls, mean_time, total_time\nFROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;\n-- 查看/设置参数\nSHOW max_connections;\nALTER SYSTEM SET max_connections = 200;\nSELECT pg_reload_conf();                                -- 重载配置\n-- VACUUM（清理死元组，PG 特有，非常重要）\nVACUUM users;                                           -- 标记空间可重用\nVACUUM FULL users;                                      -- 紧缩表（锁表，生产慎用）\nVACUUM ANALYZE users;                                   -- 清理 + 更新统计\n-- 重建索引\nREINDEX INDEX idx_users_email;\nREINDEX TABLE users;\n-- 表分析\nANALYZE users;                                          -- 更新统计信息\n-- 主库：创建复制用户\nCREATE ROLE repl WITH LOGIN REPLICATION PASSWORD 'password';\n-- 主库配置 postgresql.conf\n-- wal_level = replica\n-- max_wal_senders = 5\n-- 主库配置 pg_hba.conf\n-- host replication repl 10.0.0.0/24 md5\n-- 从库：基础备份\npg_basebackup -h 10.0.0.1 -U repl -D /var/lib/postgresql/data -P -R\n-- -R 会自动创建 standby.signal 和配置 primary_conninfo\n-- 从库查看状态\nSELECT * FROM pg_stat_wal_receiver;                     -- 从库接收状态\nSELECT pg_is_in_recovery();                             -- 是否在恢复模式（true=从库）\n-- 主库查看状态\nSELECT * FROM pg_stat_replication;                      -- 复制状态\nSELECT client_addr, state, sync_state,\npg_wal_lsn_diff(pg_current_wal_lsn(), sent_lsn) AS sent_lag,\npg_wal_lsn_diff(pg_current_wal_lsn(), write_lsn) AS write_lag\nFROM pg_stat_replication;\ntail -100 /var/log/postgresql/postgresql-*.log\npsql -U postgres -c \"SELECT count(*) FROM pg_stat_activity;\"\npsql -U postgres -c \"SHOW max_connections;\"\npsql -U postgres -c \"SELECT * FROM pg_locks WHERE NOT granted;\"\npsql -U postgres -c \"SELECT pid, now()-xact_start AS duration, query\nFROM pg_stat_activity WHERE state != 'idle'\nAND xact_start < now() - interval '5 minutes' ORDER BY duration DESC;\"\ndf -h /var/lib/postgresql\npsql -U postgres -c \"SELECT relname, n_dead_tup, last_vacuum\nFROM pg_stat_user_tables WHERE n_dead_tup > 10000 ORDER BY n_dead_tup DESC;\"\nsystemctl restart postgresql","chapter":"数据库速查","keywords":["pg","mydb","postgres","select","from","size","sql","pid","psql","as","stat","postgresql","dump","app","database","users","on","password","where","relation"]},{"title":"3.7 排障命令","text":"命令参考：\nredis-cli                                           # 本地连接\nredis-cli -h 10.0.0.1 -p 6379                      # 远程连接\nredis-cli -a password                               # 带密码\nredis-cli -h 10.0.0.1 -p 6379 -a password PING      # 测试连通\nsystemctl status redis\nsystemctl restart redis\nredis-server /etc/redis/redis.conf                   # 直接启动\nredis-cli INFO                                       # 全部信息\nredis-cli INFO server                                # 服务器信息\nredis-cli INFO memory                                # 内存信息\nredis-cli INFO stats                                 # 统计信息\nredis-cli INFO clients                               # 客户端连接\nredis-cli INFO replication                           # 复制状态\nredis-cli INFO keyspace                              # 数据库键统计\nredis-cli MONITOR                                    # 实时监控所有命令（生产慎用）\nredis-cli --stat                                     # 持续统计\nredis-cli --latency                                  # 延迟分析\nredis-cli --bigkeys                                  # 找出大 key\nredis-cli --memkeys                                  # 找出大内存 key（Redis 7+）\nredis-cli SET mykey \"hello\"                          # 设置\nredis-cli GET mykey                                  # 获取\nredis-cli DEL mykey                                  # 删除\nredis-cli EXISTS mykey                               # 是否存在\nredis-cli EXPIRE mykey 3600                          # 设置过期（秒）\nredis-cli TTL mykey                                  # 查看剩余时间\nredis-cli TYPE mykey                                 # 查看类型\nredis-cli KEYS \"user:*\"                              # 按模式查找（生产慎用）\nredis-cli SCAN 0 MATCH \"user:*\" COUNT 100            # 游标遍历（推荐）\nredis-cli --pipe < commands.txt                      # txt 内每行一个命令\necho \"SET k1 v1\\nSET k2 v2\" | redis-cli --pipe\nredis-cli KEYS \"cache:*\" | xargs redis-cli DEL       # 生产慎用\nredis-cli --scan --pattern \"cache:*\" | xargs redis-cli DEL  # 推荐\nredis-cli DEBUG OBJECT mykey                         # 键的详细信息\nredis-cli MEMORY USAGE mykey                         # 键的内存占用（Redis 4+）\nredis-cli RENAME oldkey newkey\nredis-cli CLIENT LIST\nredis-cli CLIENT KILL 127.0.0.1:12345\nredis-cli CLIENT KILL TYPE normal                   # 杀掉所有普通客户端\nredis-cli\nSET user:1:name \"Alice\"\nGET user:1:name\nSET counter 100 INCR counter                         # 原子递增\nINCRBY counter 50                                    # 加 50\nDECR counter\nHSET user:1 name \"Alice\" age 30\nHGET user:1 name\nHGETALL user:1\nHDEL user:1 age\nHEXISTS user:1 email\nLPUSH queue \"task1\" \"task2\"                          # 左进\nRPOP queue                                           # 右出（FIFO 队列）\nBRPOP queue 5                                        # 阻塞弹出（5秒超时）\nLLEN queue                                           # 长度\nLRANGE queue 0 -1                                    # 查看全部\nSADD tags:article1 \"redis\" \"database\"\nSMEMBERS tags:article1\nSISMEMBER tags:article1 \"redis\"                      # 是否存在\nSINTER tags:article1 tags:article2                   # 交集\nZADD leaderboard 100 \"Alice\" 200 \"Bob\"\nZRANGE leaderboard 0 -1 WITHSCORES                   # 按分数升序\nZREVRANGE leaderboard 0 9 WITHSCORES                 # Top 10\nZSCORE leaderboard \"Alice\"                           # 查分数\nZRANK leaderboard \"Alice\"                            # 排名（从0开始）\nredis-cli SAVE                                       # 同步保存（阻塞）\nredis-cli BGSAVE                                     # 后台保存（推荐）\nredis-cli LASTSAVE                                   # 上次保存时间戳\nredis-cli BGREWRITEAOF                               # 后台重写 AOF\ncp /var/lib/redis/dump.rdb /backup/dump_$(date +%Y%m%d).rdb\ncp /var/lib/redis/appendonly.aof /backup/\nsystemctl stop redis\ncp /backup/dump.rdb /var/lib/redis/dump.rdb\nsystemctl start redis\nredis-cli --rdb /tmp/dump.rdb                        # 远程导出 RDB\nredis-cli INFO replication\nredis-cli -p 26379 SENTINEL masters                  # 列出所有主节点\nredis-cli -p 26379 SENTINEL slaves mymaster          # 列出某主节点的从\nredis-cli -p 26379 SENTINEL get-master-addr-by-name mymaster  # 获取主节点地址\nredis-cli -p 26379 SENTINEL failover mymaster        # 手动故障转移\nredis-cli CLUSTER INFO\nredis-cli CLUSTER NODES\nredis-cli --cluster check 10.0.0.1:6379             # 检查集群状态\nredis-cli INFO memory | grep used_memory_human\nredis-cli INFO memory | grep maxmemory_human\nredis-cli INFO memory | grep mem_fragmentation_ratio  # >1.5 建议重启\nredis-cli CONFIG GET maxmemory-policy\nredis-cli CONFIG SET maxmemory-policy allkeys-lru\nredis-cli CONFIG SET maxmemory 2gb\nredis-cli INFO clients | grep connected_clients\nredis-cli SLOWLOG GET 10                             # 最近 10 条\nredis-cli SLOWLOG LEN                                # 慢查询数量\nredis-cli SLOWLOG RESET\nredis-cli --latency-history                         # 持续记录延迟\nredis-cli --intrinsic-latency 5                     # 系统固有延迟测试\nredis-cli INFO commandstats | sort -t: -k2 -rn | head -10\nredis-cli --bigkeys\nredis-cli MEMORY DOCTOR                              # 内存诊断（Redis 4+）\nredis-cli INFO persistence\nsystemctl restart redis\ntail -100 /var/log/redis/redis-server.log","chapter":"数据库速查","keywords":["redis","cli","info","mykey","user","10","memory","rdb","set","systemctl","get","name","alice","queue","tags","leaderboard","dump","100","26379","counter"]},{"title":"场景4：主从延迟","text":"命令参考：\nsystemctl status mysql       # 或 postgresql / redis\nss -tlnp | grep 3306        # MySQL\nss -tlnp | grep 5432        # PostgreSQL\nss -tlnp | grep 6379        # Redis\nfirewall-cmd --list-ports\nmysql -u app -p -h 10.0.0.1 -e \"SELECT 1;\"\npsql -h 10.0.0.1 -U app -d mydb -c \"SELECT 1;\"\nredis-cli -h 10.0.0.1 PING\ntail -100 /var/log/mysql/error.log\nmysql -u root -p -e \"SHOW PROCESSLIST;\" | grep -v Sleep\nmysql -u root -p -e \"SELECT * FROM information_schema.processlist WHERE time > 5;\"\npsql -U postgres -c \"SELECT pid, now()-query_start AS duration, query\nFROM pg_stat_activity WHERE state='active' AND query_start < now()-interval'5s';\"\nredis-cli SLOWLOG GET 10\ndf -h /var/lib/mysql /var/lib/postgresql /var/lib/redis\nmysql -u root -p -e \"PURGE BINARY LOGS BEFORE DATE_SUB(NOW(), INTERVAL 7 DAY);\"\npg_archivecleanup /var/lib/postgresql/*/pg_wal 0000000100000000000000A0\nredis-cli BGREWRITEAOF\n> /var/log/mysql/slow-query.log\nmysql -u root -p -e \"SHOW SLAVE STATUS\\G\" | grep Seconds_Behind_Master\npsql -U postgres -c \"SELECT pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn)\nAS lag_bytes FROM pg_stat_replication;\"\nredis-cli INFO replication | grep master_last_io_seconds_ago","chapter":"数据库速查","keywords":["mysql","redis","grep","var","pg","select","10","postgresql","cli","log","root","query","lib","ss","tlnp","psql","from","now","wal","lsn"]},{"title":"安全加固","text":"> 适用场景：生产环境 Linux 服务器安全配置、合规审计、入侵排查\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md) [11-防火墙](#)","chapter":"安全加固","keywords":["linux","01","basics","md","11","适用场景","生产环境","服务器安全配置","合规审计","入侵排查","前置阅读","防火墙"]},{"title":"1. SSH 加固","text":"**SSH 密钥管理**\n\n命令参考：\ncp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak.$(date +%Y%m%d)\nPermitRootLogin no\nPasswordAuthentication no\nPubkeyAuthentication yes\nPort 2222\nAllowUsers alice bob\nAllowGroups ssh-users\nPermitEmptyPasswords no\nMaxAuthTries 3\nClientAliveInterval 300\nClientAliveCountMax 2\nProtocol 2\nHostKeyAlgorithms ssh-ed25519,ssh-rsa\nKexAlgorithms curve25519-sha256,diffie-hellman-group-exchange-sha256\nCiphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com\nMACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com\nsshd -t                          # 检查语法\nsystemctl reload sshd            # 重载（不中断现有连接）\nssh-keygen -t ed25519 -C \"user@host\" -f ~/.ssh/id_ed25519\nssh-copy-id -i ~/.ssh/id_ed25519.pub user@host\nssh-copy-id -p 2222 user@host   # 非标准端口\ncat ~/.ssh/authorized_keys\nsed -i '3d' ~/.ssh/authorized_keys\nchmod 600 ~/.ssh/authorized_keys\nchattr +i ~/.ssh/authorized_keys       # 不可变（root 也不例外）\nchattr -i ~/.ssh/authorized_keys       # 解锁","chapter":"安全加固","keywords":["ssh","authorized","keys","sshd","ed25519","openssh","com","id","no","user","host","2222","etc","config","sha256","hmac","sha2","etm","copy","chattr"]},{"title":"2. Fail2ban（防暴力破解）","text":"命令参考：\nyum install fail2ban              # CentOS\napt install fail2ban              # Ubuntu\ncat > /etc/fail2ban/jail.local << 'EOF'\n[DEFAULT]\nbantime = 3600                    # 封禁时长（秒）\nfindtime = 600                    # 统计窗口\nmaxretry = 5                      # 最大尝试次数\nignoreip = 127.0.0.1/8 10.0.0.0/8 # 白名单\ndestemail = admin@example.com\naction = %(action_mwl)s           # 封禁 + 发邮件通知\n[sshd]\nenabled = true\nport = ssh,2222\nmaxretry = 3\n[nginx-http-auth]\nenabled = true\nlogpath = /var/log/nginx/error.log\nEOF\nsystemctl enable --now fail2ban\nfail2ban-client status\nfail2ban-client status sshd        # 查看 sshd jail 详情\nfail2ban-client set sshd unbanip 10.0.0.55\nfail2ban-client get sshd banned\niptables -L -n | grep f2b          # fail2ban 通过 iptables 封禁","chapter":"安全加固","keywords":["fail2ban","sshd","client","10","install","jail","eof","maxretry","action","封禁","enabled","true","nginx","log","status","iptables","55","127","600","2222"]},{"title":"3.3 核心 dump 限制","text":"命令参考：\ncat > /etc/sysctl.d/99-security.conf << 'EOF'\nnet.ipv4.conf.all.rp_filter = 1\nnet.ipv4.conf.default.rp_filter = 1\nnet.ipv4.icmp_echo_ignore_broadcasts = 1\nnet.ipv4.tcp_syncookies = 1\nnet.ipv4.tcp_tw_reuse = 1\nnet.ipv4.conf.all.log_martians = 1\nnet.ipv6.conf.all.disable_ipv6 = 1\nnet.ipv4.ip_forward = 0\nkernel.kptr_restrict = 2\nkernel.dmesg_restrict = 1\nkernel.modules_disabled = 0\nEOF\nsysctl -p /etc/sysctl.d/99-security.conf\nfind / -perm -4000 -type f 2>/dev/null       # SUID\nfind / -perm -2000 -type f 2>/dev/null       # SGID\nfind / -perm -6000 -type f 2>/dev/null       # 两者\nfind / -perm -2 -type f ! -type l 2>/dev/null\nfind / -nouser -o -nogroup 2>/dev/null\nchattr +i /etc/passwd /etc/shadow /etc/group /etc/gshadow\nchattr +i /etc/sudoers\nawk -F: '($3 == 0) {print $1}' /etc/passwd   # 应该只有 root\nawk -F: '($2 == \"\" || $2 == \"!\") {print $1}' /etc/shadow\necho \"root\" > /etc/cron.allow\necho \"root\" > /etc/at.allow\ncat >> /etc/security/limits.conf << 'EOF'\n* hard core 0                     # 禁止 core dump\n* soft nproc 4096                 # 限制进程数\n* hard nproc 8192\nEOF\necho \"* hard core 0\" >> /etc/security/limits.conf\necho \"fs.suid_dumpable = 0\" >> /etc/sysctl.d/99-security.conf\nsysctl -p /etc/sysctl.d/99-security.conf","chapter":"安全加固","keywords":["etc","conf","net","ipv4","sysctl","security","echo","find","type","dev","null","99","eof","perm","all","kernel","root","hard","core","cat"]},{"title":"4. SELinux","text":"命令参考：\ngetenforce                         # Enforcing / Permissive / Disabled\nsestatus                           # 详细信息\nsetenforce 0                       # Permissive（只记录不阻止）\nsetenforce 1                       # Enforcing（强制）\nausearch -m avc -ts recent | tail -20\ngrep \"denied\" /var/log/audit/audit.log | tail -20\naudit2allow -a                     # 查看所有拒绝\naudit2why -a                       # 解释拒绝原因\ngrep \"denied\" /var/log/audit/audit.log | audit2allow -M mymodule\nsemodule -i mymodule.pp            # 安装策略\nls -Z /var/www/html                # 查看文件安全上下文\nrestorecon -Rv /var/www/html       # 恢复默认上下文\nchcon -R -t httpd_sys_content_t /var/www/html  # 手动设置\ngetsebool -a | grep http           # 查看\nsetsebool -P httpd_can_network_connect on  # 设置（-P 永久）\nsemanage port -l | grep http       # 查看端口标签\nsemanage port -a -t http_port_t -p tcp 8080  # 允许 httpd 监听 8080","chapter":"安全加固","keywords":["var","grep","log","audit","www","html","httpd","http","port","20","8080","enforcing","permissive","setenforce","tail","denied","audit2allow","mymodule","semanage","命令参考"]},{"title":"AppArmor（Ubuntu/Debian 默认）","text":"命令参考：\naa-status                          # 概况\naa-status --complaining            # 列出 complain 模式的 profile\naa-enforce /etc/apparmor.d/usr.bin.nginx   # 强制模式\naa-complain /etc/apparmor.d/usr.bin.nginx  # 学习模式（只记录）\naa-disable /etc/apparmor.d/usr.bin.nginx   # 禁用\ngrep \"apparmor=.*DENIED\" /var/log/syslog | tail -20\ndmesg | grep apparmor","chapter":"安全加固","keywords":["aa","apparmor","etc","usr","bin","nginx","status","complain","grep","20","命令参考","概况","complaining","列出","模式的","profile","enforce","强制模式","学习模式","只记录"]},{"title":"5. Auditd（审计）","text":"命令参考：\nyum install audit                 # CentOS\napt install auditd                # Ubuntu\nsystemctl enable --now auditd\ncat > /etc/audit/rules.d/my.rules << 'EOF'\n-w /etc/passwd -p wa -k identity\n-w /etc/shadow -p wa -k identity\n-w /etc/sudoers -p wa -k sudoers\n-w /etc/ssh/sshd_config -p wa -k sshd_config\n-w /usr/bin/chmod -p x -k permission_change\n-w /usr/bin/chown -p x -k permission_change\n-w /usr/bin/useradd -p x -k user_manage\n-w /usr/bin/usermod -p x -k user_manage\n-w /usr/bin/passwd -p x -k user_manage\n-w /usr/sbin/iptables -p x -k firewall_change\n-a always,exit -F arch=b64 -S chmod -F a1=+4000 -k suid_set\n-a always,exit -F arch=b64 -S chmod -F a1=+2000 -k sgid_set\nEOF\nauditctl -R /etc/audit/rules.d/my.rules\nsystemctl restart auditd\nauditctl -l\nausearch -k identity --start today\nausearch -m avc -ts recent                         # SELinux 拒绝\nausearch -f /etc/passwd                            # 指定文件\nausearch -ui 1000                                  # 指定 UID\nausearch -m SYSCALL --success no                   # 失败的系统调用\naureport --summary                                 # 概览\naureport -k --summary                              # 按 key 汇总\naureport -f --summary                              # 文件访问汇总\naureport --login --summary -i                      # 登录汇总（-i 解析 IP）\nausearch -f /etc/passwd -i --just-one | aureport -f -i","chapter":"安全加固","keywords":["etc","usr","ausearch","bin","aureport","rules","passwd","wa","summary","audit","auditd","identity","chmod","change","user","manage","install","systemctl","my","eof"]},{"title":"6. 密码策略（PAM）","text":"命令参考：\ncat > /etc/security/pwquality.conf << 'EOF'\nminlen = 12                        # 最小长度\ndcredit = -1                       # 至少 1 个数字\nucredit = -1                       # 至少 1 个大写字母\nlcredit = -1                       # 至少 1 个小写字母\nocredit = -1                       # 至少 1 个特殊字符\nminclass = 3                       # 至少 3 类字符\nmaxrepeat = 3                      # 最多连续重复字符\nEOF\nchage -M 90 -m 7 -W 14 alice      # 最大90天/最小7天/提前14天警告\nchage -l alice                     # 查看用户密码策略\npam_tally2 --user alice\npam_tally2 --user alice --reset\necho \"umask 027\" >> /etc/profile   # 默认权限 750（组读，其他无）","chapter":"安全加固","keywords":["至少","alice","etc","eof","chage","pam","tally2","user","12","14","90","750","命令参考","cat","security","pwquality","conf","minlen","最小长度","dcredit"]},{"title":"7. 文件完整性检查（AIDE）","text":"命令参考：\nyum install aide                  # CentOS\napt install aide                  # Ubuntu\naide --init\ncp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz\naide --check\naide --update\ncp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz","chapter":"安全加固","keywords":["aide","var","lib","db","gz","install","cp","new","命令参考","yum","centos","apt","ubuntu","init","check","update"]},{"title":"8. 安全扫描","text":"命令参考：\nyum install lynis                  # EPEL\napt install lynis\nlynis audit system                 # 全系统审计\nlynis audit system --quick         # 快速检查\nlynis show suggestions             # 查看建议（需先审计）\nyum install clamav clamav-update   # EPEL\napt install clamav\nfreshclam                          # 更新病毒库\nclamscan -r /var/www               # 扫描目录\nclamscan -r --bell /home           # 发现病毒时响铃\nyum install rkhunter               # EPEL\nrkhunter --check\nrkhunter --propupd                 # 更新文件属性库\nrkhunter --check --skip-keypress   # 免交互\nchkrootkit | grep INFECTED","chapter":"安全加固","keywords":["install","lynis","rkhunter","yum","epel","clamav","apt","audit","system","clamscan","check","命令参考","全系统审计","quick","快速检查","show","suggestions","查看建议","需先审计","update"]},{"title":"9. 入侵排查","text":"命令参考：\nlast -20                           # 最近登录\nlastb -20                          # 最近失败尝试\nlastlog                            # 所有用户最后登录\ngrep \"Failed password\" /var/log/secure | tail -20    # CentOS\ngrep \"Failed password\" /var/log/auth.log | tail -20  # Ubuntu\nawk -F: '($3 == 0) {print $1}' /etc/passwd    # uid=0\ngrep -v '^#' /etc/passwd | awk -F: '($3 >= 1000) {print $1}' # 所有普通用户\nps auxf                            # 树状进程树\nps aux --sort=-%cpu | head -10     # CPU 最高\nps aux --sort=-%mem | head -10     # 内存最高\nlsof -i -P -n | grep LISTEN        # 监听端口及对应进程\nnetstat -tulnp | grep -v '127.0.0.1\\|::1'  # 非本地监听\ncrontab -l -u root\ncrontab -l -u alice\nfor user in $(awk -F: '{print $1}' /etc/passwd); do\necho \"=== $user ===\"; crontab -l -u $user 2>/dev/null\ndone\nls -la /etc/cron.* /var/spool/cron/\nss -tunap | grep ESTAB\nss -tunap | grep -v '127.0.0.1\\|::1'\nsystemctl list-units --type=service | grep -v 'loaded.*active'\nchkconfig --list 2>/dev/null       # 旧版 SysV\nfind /tmp -type f -perm -4000 2>/dev/null\nfind /tmp -type f -name \".*\" 2>/dev/null\ncat ~/.bash_history | tail -50\nfind /home -name \".bash_history\" -exec tail -5 {} \\;\nfind / -name \".*\" -type d ! -path \"/proc/*\" ! -path \"/sys/*\" 2>/dev/null\nfind /etc -type f -mtime -1        # 最近 1 天修改的配置\nfind / -type f -mmin -60 ! -path '/proc/*' ! -path '/sys/*' 2>/dev/null  # 最近 60 分钟","chapter":"安全加固","keywords":["grep","dev","null","type","find","etc","20","tail","path","var","log","awk","print","passwd","ps","crontab","user","name","10","60"]},{"title":"10. 应急响应检查清单","text":"命令参考：\n□ 隔离：断网或限制网络访问\nifdown eth0  或  iptables -P INPUT DROP\n□ 取证：保存当前状态\nps auxf > /tmp/ps_$(date +%s).txt\nnetstat -tulnp > /tmp/netstat_$(date +%s).txt\nss -tunap > /tmp/ss_$(date +%s).txt\nlast -50 > /tmp/last_$(date +%s).txt\nw > /tmp/w_$(date +%s).txt\n□ 检查：按上述\"入侵排查\"逐项检查\n□ 清除：删除后门账户/计划任务/恶意进程\nuserdel -r suspicious_user\ncrontab -r -u suspicious_user\nkill -9 PID\n□ 修复：打补丁、改密码、加固配置\n□ 恢复：从已知干净的备份恢复（如不确定，重装更安全）","chapter":"安全加固","keywords":["tmp","date","txt","ps","netstat","ss","last","suspicious","user","50","命令参考","隔离","断网或限制网络访问","ifdown","eth0","iptables","input","drop","取证","保存当前状态"]},{"title":"Nginx / Web 服务器","text":"> 适用场景：Nginx 安装部署、反向代理、负载均衡、SSL 配置、性能调优、故障排查\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"Nginx/Web 服务器","keywords":["01","linux","basics","md","适用场景","nginx","安装部署","反向代理","负载均衡","ssl","配置","性能调优","故障排查","前置阅读"]},{"title":"1. 安装与基础","text":"**配置文件结构**\n\n命令参考：\nyum install nginx\nyum install yum-utils\ncat > /etc/yum.repos.d/nginx.repo << 'EOF'\n[nginx-stable]\nname=nginx stable repo\nbaseurl=http://nginx.org/packages/centos/$releasever/$basearch/\ngpgcheck=1\nenabled=1\ngpgkey=https://nginx.org/keys/nginx_signing.key\nEOF\nyum install nginx\napt update && apt install nginx\nsystemctl enable --now nginx\nsystemctl status nginx\nsystemctl reload nginx                              # 热重载配置\nsystemctl restart nginx\nnginx -t                                            # 语法检查\nnginx -T                                            # 语法检查 + 打印全部配置\nnginx -s reload                                     # 信号热重载\nnginx -s stop                                       # 快速停止\nnginx -s quit                                       # 优雅停止\nnginx -v\nnginx -V\n/etc/nginx/\n├── nginx.conf                  # 主配置\n├── conf.d/                     # server 配置片段\n│   └── default.conf\n├── sites-enabled/              # Debian/Ubuntu 站点配置\n│   └── default -> ../sites-available/default\n├── sites-available/            # 可用站点模板\n├── fastcgi_params              # FastCGI 参数\n├── mime.types                  # MIME 类型映射\n└── ssl/                        # SSL 证书目录","chapter":"Nginx/Web 服务器","keywords":["nginx","yum","install","systemctl","conf","default","sites","etc","repo","eof","stable","org","enabled","apt","reload","语法检查","available","fastcgi","mime","ssl"]},{"title":"2. 核心配置","text":"命令参考：\nuser nginx;\nworker_processes auto;                             # 自动匹配 CPU 核心数\nworker_rlimit_nofile 65535;\nerror_log /var/log/nginx/error.log warn;\npid /run/nginx.pid;\nevents {\nworker_connections 4096;                       # 每 worker 最大连接数\nuse epoll;                                     # Linux 推荐 epoll\nmulti_accept on;                               # 一次接受所有新连接\n}\nhttp {\ninclude /etc/nginx/mime.types;\ndefault_type application/octet-stream;\n# 日志格式\nlog_format main '$remote_addr - $remote_user [$time_local] '\n'\"$request\" $status $body_bytes_sent '\n'\"$http_referer\" \"$http_user_agent\"';\naccess_log /var/log/nginx/access.log main;\n# 性能\nsendfile on;\ntcp_nopush on;\ntcp_nodelay on;\nkeepalive_timeout 65;\ntypes_hash_max_size 2048;\n# Gzip 压缩\ngzip on;\ngzip_types text/plain text/css application/json application/javascript text/xml;\n# 隐藏 Nginx 版本号\nserver_tokens off;\ninclude /etc/nginx/conf.d/*.conf;\n}","chapter":"Nginx/Web 服务器","keywords":["nginx","log","on","worker","user","http","types","application","gzip","text","error","var","pid","epoll","include","etc","main","remote","access","tcp"]},{"title":"3. Server 块（虚拟主机）","text":"命令参考：\nserver {\nlisten 80;\nserver_name example.com www.example.com;\nroot /var/www/example;\nindex index.html index.htm index.php;\n# 日志\naccess_log /var/log/nginx/example_access.log main;\nerror_log /var/log/nginx/example_error.log;\n# 限制请求方法\nif ($request_method !~ ^(GET|HEAD|POST)$) {\nreturn 405;\n}\n# 静态文件\nlocation / {\ntry_files $uri $uri/ =404;\n}\n# 静态资源缓存\nlocation ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {\nexpires 30d;\nadd_header Cache-Control \"public, immutable\";\n}\n# 禁止访问隐藏文件\nlocation ~ /\\. {\ndeny all;\naccess_log off;\nlog_not_found off;\n}\n# 自定义 404\nerror_page 404 /404.html;\nerror_page 500 502 503 504 /50x.html;\n}","chapter":"Nginx/Web 服务器","keywords":["log","example","404","index","error","var","html","access","location","server","com","www","nginx","uri","off","page","80","405","500","502"]},{"title":"4. 反向代理","text":"命令参考：\nlocation /api/ {\nproxy_pass http://backend:8080/;\nproxy_set_header Host $host;\nproxy_set_header X-Real-IP $remote_addr;\nproxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\nproxy_set_header X-Forwarded-Proto $scheme;\n}\nlocation /ws/ {\nproxy_pass http://backend:8080/;\nproxy_http_version 1.1;\nproxy_set_header Upgrade $http_upgrade;\nproxy_set_header Connection \"upgrade\";\nproxy_set_header Host $host;\nproxy_read_timeout 86400;                      # WebSocket 长连接\n}\nlocation /app/ {\nproxy_pass http://backend:8080/;\nproxy_connect_timeout 60s;\nproxy_send_timeout 60s;\nproxy_read_timeout 60s;\nproxy_buffering off;                            # 实时响应不缓冲\nclient_max_body_size 100m;                      # 上传限制\n}\nupstream backend {\nserver 10.0.0.1:8080 max_fails=3 fail_timeout=30s;\nserver 10.0.0.2:8080 max_fails=3 fail_timeout=30s;\nserver 10.0.0.3:8080 backup;                    # 备用服务器\n}","chapter":"Nginx/Web 服务器","keywords":["proxy","set","header","8080","timeout","http","backend","host","10","location","pass","forwarded","upgrade","60s","max","server","for","read","fails","fail"]},{"title":"5. 负载均衡","text":"命令参考：\nupstream app_cluster {\n# 轮询（默认）\n# server 10.0.0.1:8080;\n# server 10.0.0.2:8080;\n# 加权轮询\nserver 10.0.0.1:8080 weight=3;\nserver 10.0.0.2:8080 weight=1;\n# IP Hash（会话保持）\n# ip_hash;\n# 最少连接\n# least_conn;\n# 健康检查\n# Nginx Plus 支持主动健康检查（开源版仅有被动检查）\nkeepalive 32;                                    # 保持到后端的空闲连接数\n}\nserver {\nlisten 80;\nlocation / {\nproxy_pass http://app_cluster;\nproxy_set_header Host $host;\nproxy_set_header X-Real-IP $remote_addr;\n}\n}","chapter":"Nginx/Web 服务器","keywords":["server","10","8080","ip","proxy","app","cluster","weight","hash","set","header","host","32","80","命令参考","upstream","轮询","默认","加权轮询","会话保持"]},{"title":"6. SSL / HTTPS","text":"命令参考：\nopenssl req -x509 -nodes -days 365 -newkey rsa:2048 \\\n-keyout /etc/nginx/ssl/server.key \\\n-out /etc/nginx/ssl/server.crt \\\n-subj \"/CN=example.com\"\nyum install certbot python3-certbot-nginx\napt install certbot python3-certbot-nginx\ncertbot --nginx -d example.com -d www.example.com\ncertbot renew --dry-run                              # 测试自动续期\nserver {\nlisten 443 ssl http2;\nserver_name example.com;\nssl_certificate /etc/nginx/ssl/server.crt;\nssl_certificate_key /etc/nginx/ssl/server.key;\n# 现代 SSL 配置（Mozilla Intermediate）\nssl_protocols TLSv1.2 TLSv1.3;\nssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;\nssl_prefer_server_ciphers off;\n# HSTS（强制 HTTPS，谨慎启用）\nadd_header Strict-Transport-Security \"max-age=63072000\" always;\n# OCSP Stapling\nssl_stapling on;\nssl_stapling_verify on;\nroot /var/www/example;\n}\nserver {\nlisten 80;\nserver_name example.com;\nreturn 301 https://$server_name$request_uri;\n}","chapter":"Nginx/Web 服务器","keywords":["ssl","server","nginx","example","certbot","com","etc","key","name","stapling","rsa","crt","install","python3","www","listen","certificate","tlsv1","ciphers","ecdhe"]},{"title":"7. 常用 Rewrite 与重定向","text":"命令参考：\nrewrite ^/old-page$ /new-page permanent;\nreturn 301 /new-url;\nrewrite ^/maintenance$ /maintenance.html redirect;\nserver {\nlisten 80;\nserver_name old-domain.com;\nreturn 301 https://new-domain.com$request_uri;\n}\nserver {\nlisten 80;\nserver_name www.example.com;\nreturn 301 $scheme://example.com$request_uri;\n}\nlocation /app/ {\nrewrite ^/app/(.*)$ /$1 break;\nproxy_pass http://backend:8080;\n}\nif ($http_user_agent ~* \"bot|crawler\") {\nreturn 403;\n}\nlocation /health { return 200 \"ok\"; }\nlocation /api/v1/ { return 410; }                  # 废弃的 API","chapter":"Nginx/Web 服务器","keywords":["return","server","com","301","rewrite","new","location","80","old","page","maintenance","listen","name","domain","request","uri","example","app","http","api"]},{"title":"8. 访问控制","text":"命令参考：\nlocation /admin/ {\nallow 10.0.0.0/8;\nallow 192.168.0.0/16;\ndeny all;\n}\nlocation /private/ {\nauth_basic \"Restricted\";\nauth_basic_user_file /etc/nginx/.htpasswd;\n}\nhtpasswd -c /etc/nginx/.htpasswd admin\nhtpasswd /etc/nginx/.htpasswd alice                 # 追加用户\nlimit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;\nlimit_req zone=mylimit burst=20 nodelay;             # 放入 location 内\nlimit_conn_zone $binary_remote_addr zone=perip:10m;\nlimit_conn perip 10;","chapter":"Nginx/Web 服务器","keywords":["htpasswd","zone","limit","location","etc","nginx","10","admin","allow","auth","basic","req","binary","remote","addr","mylimit","10m","conn","perip","16"]},{"title":"9. 日志与排障","text":"**常见错误速查**\n错误   含义   排查方向\n------ ------ ---------\n`502 Bad Gateway`   后端无响应   后端服务是否运行、端口是否正确、超时\n`504 Gateway Timeout`   后端超时   延长 `proxy_read_timeout`、检查后端性能\n`403 Forbidden`   权限不足   文件权限/目录索引/IP 限制\n`404 Not Found`   资源不存在   `root`/`try_files` 路径是否正确\n`413 Request Entity Too Large`   上传超限   增大 `client_max_body_size`\n`connection refused`   端口未监听   `ss -tlnp` 检查端口、SELinux\n`13: Permission denied`   文件权限   nginx 用户对文件/目录无读权限、SELinux\n\n命令参考：\ntail -f /var/log/nginx/access.log\nawk '{print $1}' /var/log/nginx/access.log | sort | uniq -c | sort -rn | head -10\nawk '{print $9}' /var/log/nginx/access.log | sort | uniq -c | sort -rn\nawk '{print $NF,$0}' /var/log/nginx/access.log | sort -rn | head -10\ngrep \" 5[0-9][0-9] \" /var/log/nginx/access.log | tail -20\ngrep \"13/Jul/2026:1[4-5]\" /var/log/nginx/access.log\nawk '{print $7,$NF}' /var/log/nginx/access.log | sort -k2 -rn | head -10","chapter":"Nginx/Web 服务器","keywords":["log","nginx","var","access","sort","awk","print","rn","10","head","13","gateway","timeout","文件权限","selinux","tail","uniq","nf","grep","20"]},{"title":"10. 性能调优","text":"**性能检查命令**\n\n命令参考：\nworker_processes auto;                             # CPU 核心数\nworker_connections 4096;                           # max_clients = worker_processes × worker_connections\nclient_body_buffer_size 128k;\nclient_header_buffer_size 1k;\nlarge_client_header_buffers 4 8k;\nsendfile on;\ntcp_nopush on;                                     # 与 sendfile 配合\nopen_file_cache max=10000 inactive=60s;            # 缓存文件句柄\nopen_file_cache_valid 30s;\nopen_file_cache_min_uses 2;\ngzip on;\ngzip_min_length 1000;\ngzip_comp_level 5;                                 # 1-9，推荐 5-6\ngzip_vary on;\nss -ant | grep :80 | wc -l\ncurl http://localhost/nginx_status","chapter":"Nginx/Web 服务器","keywords":["worker","on","gzip","client","open","file","cache","processes","connections","max","buffer","size","header","sendfile","min","80","1000","4096","10000","性能检查命令"]},{"title":"Git 版本控制","text":"> 适用场景：代码版本管理、分支协作、回滚修复、排障追溯\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)","chapter":"Git 版本控制","keywords":["01","linux","basics","md","适用场景","代码版本管理","分支协作","回滚修复","排障追溯","前置阅读"]},{"title":"1. 基础配置","text":"命令参考：\ngit config --global user.name \"Your Name\"\ngit config --global user.email \"you@example.com\"\ngit config --global alias.co checkout\ngit config --global alias.br branch\ngit config --global alias.ci commit\ngit config --global alias.st status\ngit config --global alias.lg \"log --oneline --graph --all --decorate\"\ngit config --global alias.unstage \"reset HEAD --\"\ngit config --global alias.last \"log -1 HEAD\"\ngit config --global core.autocrlf input              # Linux/Mac\ngit config --global core.autocrlf true               # Windows\ngit config --global credential.helper cache --timeout=3600\ngit config --list\ngit config --global --list","chapter":"Git 版本控制","keywords":["git","config","global","alias","user","name","log","head","core","autocrlf","list","3600","命令参考","your","email","you","example","com","co","checkout"]},{"title":"2. 基本操作","text":"命令参考：\ngit init                                              # 当前目录初始化\ngit clone https://github.com/user/repo.git            # HTTPS\ngit clone git@github.com:user/repo.git                # SSH\ngit clone -b develop https://github.com/user/repo.git # 指定分支\ngit clone --depth 1 https://github.com/user/repo.git  # 浅克隆（省空间）\ngit status                                            # 工作区状态\ngit status -s                                         # 简版\ngit diff                                              # 工作区 vs 暂存区\ngit diff --staged                                     # 暂存区 vs HEAD\ngit diff HEAD                                         # 工作区 vs HEAD\ngit diff branch1..branch2                             # 分支间差异\ngit diff --name-only HEAD~1                           # 只看文件名\ngit add file.txt                                      # 暂存单个文件\ngit add -A                                            # 暂存所有变更\ngit add -p                                            # 交互式分段暂存\ngit commit -m \"message\"                               # 提交\ngit commit -am \"message\"                              # 暂存所有已跟踪文件并提交\ngit commit --amend -m \"new message\"                   # 修改最后一次提交\ngit commit --amend --no-edit                          # 追加到上次提交（不改 message）\ngit push origin main                                  # 推送\ngit push -u origin main                               # 首次推送并设置上游\ngit push --force-with-lease                            # 安全强制推送\ngit pull                                              # 拉取 = fetch + merge\ngit pull --rebase                                     # 拉取 + rebase\ngit fetch origin                                      # 只拉取不合并\ngit fetch --prune                                     # 清理远程已删除的分支","chapter":"Git 版本控制","keywords":["git","diff","clone","https","github","com","user","repo","head","commit","message","vs","add","push","origin","fetch","status","工作区","暂存区","amend"]},{"title":"3. 分支管理","text":"命令参考：\ngit branch                                            # 本地分支\ngit branch -a                                         # 所有分支（含远程）\ngit branch -v                                         # 分支 + 最后一次提交\ngit branch --merged                                   # 已合并的分支\ngit branch --no-merged                                # 未合并的分支\ngit branch feature-x                                  # 创建分支\ngit checkout feature-x                                # 切换分支\ngit checkout -b feature-x                             # 创建并切换\ngit switch feature-x                                  # 切换（Git 2.23+，推荐）\ngit switch -c feature-x                               # 创建并切换\ngit merge feature-x                                   # 合并到当前分支\ngit merge --no-ff feature-x                           # 禁止快进合并（保留分支记录）\ngit merge --squash feature-x                          # 压缩合并（所有提交合成一个）\ngit merge feature-x                                   # 出现冲突\ngit diff --name-only --diff-filter=U                  # 查看冲突文件\ngit add resolved_file.txt\ngit commit                                            # 完成合并\ngit merge --abort                                     # 取消合并\ngit branch -d feature-x                               # 删除已合并分支\ngit branch -D feature-x                               # 强制删除\ngit push origin --delete feature-x                    # 删除远程分支\ngit branch -m old-name new-name                       # 重命名本地\ngit push origin -u new-name\ngit push origin --delete old-name","chapter":"Git 版本控制","keywords":["git","feature","branch","merge","name","push","origin","merged","no","checkout","创建并切换","switch","diff","delete","old","new","23","命令参考","本地分支","所有分支"]},{"title":"4. 撤销与回滚","text":"**reset 三模式对比**\n模式   HEAD   暂存区   工作区   用途\n------ ------ -------- -------- ------\n`--soft`   移动   保留   保留   重新组织提交\n`--mixed`（默认）   移动   重置   保留   取消暂存\n`--hard`   移动   重置   重置   彻底丢弃（⚠️）\n\n命令参考：\ngit restore file.txt                                  # 撤销工作区修改（回到暂存区状态）\ngit restore .                                         # 撤销所有工作区修改\ngit restore --source HEAD~1 file.txt                  # 恢复到某个历史版本\ngit restore --staged file.txt                         # 取消暂存（回到工作区）\ngit reset HEAD file.txt                               # 同上（旧写法）\ngit reset --soft HEAD~1                               # 撤销提交，改动回到暂存区\ngit reset --mixed HEAD~1                              # 撤销提交，改动回到工作区（默认）\ngit reset --hard HEAD~1                               # 撤销提交，丢弃所有改动\ngit revert HEAD                                       # 反转最后一次提交（创建新提交）\ngit revert HEAD~3..HEAD                               # 反转最近 3 个提交\ngit revert -m 1 <merge-commit>                        # 反转合并提交（指定保留哪个父分支）\ngit reflog                                            # 查看所有 HEAD 变更历史\ngit checkout HEAD@{2}                                 # 回到 2 步前的状态\ngit reset --hard HEAD@{3}                             # 硬重置到 reflog 中的某个位置","chapter":"Git 版本控制","keywords":["git","head","reset","restore","file","txt","移动","保留","重置","hard","撤销提交","revert","soft","mixed","默认","取消暂存","reflog","三模式对比","模式","暂存区"]},{"title":"5. 历史查看","text":"命令参考：\ngit log                                               # 完整日志\ngit log --oneline                                     # 单行摘要\ngit log --oneline --graph --all --decorate            # 图形化分支历史\ngit log -5                                            # 最近 5 条\ngit log --since=\"2024-01-01\" --until=\"2024-01-31\"     # 时间段\ngit log --author=\"name\"                               # 按作者\ngit log --grep=\"keyword\"                              # 按提交信息搜索\ngit log -p                                            # 显示每个提交的 patch\ngit log --stat }
var keywordIndex = buildIndex();
statusEl.textContent = '283 知识块就绪';
statusEl.style.color = 'var(--green)';

// 搜索（三级回退）
function search(query) {
  var qWords = query.toLowerCase().replace(/[^\u4e00-\u9fffa-z0-9]/g, ' ').split(/\s+/).filter(function(w) { return w.length > 1; });
  if (qWords.length === 0) return [];

  var scores = {};

  // L1: 精确关键词
  for (var w = 0; w < qWords.length; w++) {
    var matches = keywordIndex[qWords[w]] || [];
    for (var m = 0; m < matches.length; m++) scores[matches[m]] = (scores[matches[m]] || 0) + 1;
  }

  // L2: 模糊子串
  if (Object.keys(scores).length === 0) {
    for (var kw in keywordIndex) {
      for (var w = 0; w < qWords.length; w++) {
        if (kw.indexOf(qWords[w]) >= 0 || qWords[w].indexOf(kw) >= 0) {
          var list = keywordIndex[kw];
          for (var m = 0; m < list.length; m++) scores[list[m]] = (scores[list[m]] || 0) + 1;
        }
      }
    }
  }

  // L3: 全文扫描
  if (Object.keys(scores).length === 0) {
    for (var i = 0; i < EMBEDDINGS.chunks.length; i++) {
      var c = EMBEDDINGS.chunks[i];
      var txt = (c.title + ' ' + c.text + ' ' + c.chapter).toLowerCase();
      for (var w = 0; w < qWords.length; w++) {
        if (txt.indexOf(qWords[w]) >= 0) { scores[i] = 0.5; break; }
      }
    }
  }

  // 排序取前 5，过滤分数 > 0 的
  return Object.entries(scores)
    .sort(function(a, b) { return b[1] - a[1]; })
    .filter(function(e) { return e[1] > 0; })
    .slice(0, 5)
    .map(function(e) { return { chunk: EMBEDDINGS.chunks[parseInt(e[0])], score: e[1] }; });
}

// 收集并排序命令
function collectCommands(results, query) {
  var qWords = query.toLowerCase().replace(/[^\u4e00-\u9fffa-z0-9]/g, ' ').split(/\s+/).filter(function(w) { return w.length > 1; });
  var all = [];

  // DNS 相关命令映射（命令文本不含 "dns" 但功能是 DNS）
  var TOPIC_MAP = {
    dns: ['nslookup', 'dig ', 'host ', 'resolv.conf', 'resolvectl'],
    disk: ['df ', 'du ', 'fdisk', 'lsblk', 'mount', 'iostat', 'ncdu'],
    memory: ['free ', 'vmstat', 'oom', '/proc/meminfo'],
    cpu: ['top', 'htop', 'mpstat', 'lscpu', '/proc/cpuinfo'],
    network: ['ping', 'traceroute', 'mtr', 'ss -', 'netstat', 'curl', 'wget'],
  };

  for (var r = 0; r < results.length; r++) {
    var text = results[r].chunk.text;
    var title = results[r].chunk.title.toLowerCase();
    var ci = text.indexOf('命令参考：');
    var cmdText = ci >= 0 ? text.substring(ci) : text;

    var lines = cmdText.split('\n').filter(function(l) {
      l = l.trim();
      return l && /^[a-z]/.test(l) && l.length > 5 && l.length < 400 && !/^[a-z]+$/.test(l);
    });

    for (var c = 0; c < Math.min(lines.length, 8); c++) {
      var cmd = lines[c].trim().toLowerCase();
      var score = results[r].score;

      // 基础：命令含查询词
      for (var w = 0; w < qWords.length; w++) {
        if (cmd.indexOf(qWords[w]) >= 0) score += 3;
      }

      // 主题映射：查询词属于某个主题，且命令在该主题列表中
      for (var w = 0; w < qWords.length; w++) {
        var qw = qWords[w];
        if (TOPIC_MAP[qw]) {
          for (var t = 0; t < TOPIC_MAP[qw].length; t++) {
            if (cmd.indexOf(TOPIC_MAP[qw][t]) >= 0) score += 2;
          }
        }
      }

      // 块标题匹配查询词
      for (var w = 0; w < qWords.length; w++) {
        if (title.indexOf(qWords[w]) >= 0) score += 2;
      }

      all.push({ cmd: lines[c].trim(), score: score, source: results[r].chunk });
    }
  }

  // 去重排序
  var seen = {};
  var unique = [];
  for (var i = 0; i < all.length; i++) {
    if (!seen[all[i].cmd.substring(0, 60)]) { seen[all[i].cmd.substring(0, 60)] = true; unique.push(all[i]); }
  }
  unique.sort(function(a, b) { return b.score - a.score; });
  return unique.slice(0, 5);
}

// 生成回答（结构化模板）
function generateAnswer(query, results) {
  // 分数阈值：最佳匹配分数 < 1 则视为弱匹配
  if (results.length === 0 || results[0].score < 1) {
    return {
      text: '抱歉，未找到与「' + query + '」相关的明确内容。\n\n💡 建议：\n• 使用具体关键词（如 "df -h 磁盘" 而非 "空间不够"）\n• 用命令名提问（如 "tcpdump 抓包"）\n• 查看完整手册获得更多信息',
      sources: [],
      weak: true
    };
  }

  var cmds = collectCommands(results, query);
  var best = results[0].chunk;
  var lines = [];

  // === 结构化回答模板 ===

  // 标题
  lines.push('📌 ' + best.title);

  // 摘要（100 字以内）
  var summary = best.text.replace(/命令参考：[\s\S]*$/, '').replace(/\n+/g, ' ').trim();
  if (summary.length > 120) summary = summary.substring(0, 120) + '…';
  if (summary) lines.push(summary);

  // 命令
  if (cmds.length > 0) {
    lines.push('');
    lines.push('🔧 相关命令：');
    for (var i = 0; i < cmds.length; i++) {
      lines.push('  ' + cmds[i].cmd);
    }
  }

  // 来源
  lines.push('');
  lines.push('📖 ' + best.chapter);

  // 其他参考
  if (results.length > 1) {
    var refs = results.slice(1, 4).map(function(r) { return r.chunk.title; });
    lines.push('🔗 ' + refs.join(' · '));
  }

  return {
    text: lines.join('\n'),
    sources: results.slice(0, 3).map(function(r) { return r.chunk.chapter + ' > ' + r.chunk.title; }),
    weak: false
  };
}

// 渲染消息
function addMessage(role, text, sources, weak) {
  var div = document.createElement('div');
  div.className = 'msg ' + role + (weak ? ' weak' : '');
  div.textContent = text;

  if (role === 'ai') {
    // 反馈按钮
    var fb = document.createElement('div');
    fb.className = 'feedback';
    fb.innerHTML = '<span class="fb-btn" data-action="up" title="有帮助">👍</span><span class="fb-btn" data-action="down" title="无帮助">👎</span>';
    fb.addEventListener('click', function(e) {
      var btn = e.target.closest('.fb-btn');
      if (!btn) return;
      var action = btn.dataset.action;
      fb.querySelectorAll('.fb-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      // 记录反馈
      try {
        var fbLog = JSON.parse(localStorage.getItem('ops-ai-fb') || '[]');
        fbLog.push({ query: input._lastQuery || '', action: action, time: Date.now() });
        localStorage.setItem('ops-ai-fb', JSON.stringify(fbLog.slice(-50)));
      } catch(e) {}
    });
    div.appendChild(fb);
  }

  if (sources && sources.length) {
    var src = document.createElement('span');
    src.className = 'src';
    src.textContent = '📖 ' + sources.join(' ｜ ');
    div.appendChild(src);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  var empty = chat.querySelector('.empty');
  if (empty) empty.remove();
}

// 发送（无延迟，即时响应）
function send() {
  var query = input.value.trim();
  if (!query) return;

  addMessage('user', query);
  input._lastQuery = query;
  input.value = '';
  input.focus();

  // 即时搜索和回答（无延迟）
  var results = search(query);
  var answer = generateAnswer(query, results);
  addMessage('ai', answer.text, answer.sources, answer.weak);
}

// 事件
sendBtn.addEventListener('click', send);
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); send(); }
});

// 暗亮切换
var themeBtn = document.getElementById('themeToggle');
function updateTheme() {
  document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '🌙';
  themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '🌙';
}
updateTheme();
themeBtn.addEventListener('click', function() {
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ops-ref-ai-theme', next);
  updateTheme();
});
var saved = localStorage.getItem('ops-ref-ai-theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);
updateTheme();
</script>
