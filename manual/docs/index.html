<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Ops Ref 运维命令速查手册 — Linux/K8s/OpenStack/Ansible 离线命令参考">
<title>Ops Ref — 运维命令速查手册</title>
<style>:root,[data-theme="dark"]{
--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--border:#21262d;--border2:#30363d;
--fg:#c9d1d9;--fg2:#8b949e;--fg3:#484f58;
--accent:#58a6ff;--accent2:#1f3a5f;--accent3:#0f3460;
--red:#ff6b6b;--red2:#f85149;--green:#3fb950;--yellow:#f0c674;--orange:#e2b714;
--syn-cmt:#8b949e;--syn-str:#a5d6ff;--syn-opt:#7ee787;--syn-kw:#ff7b72;--syn-num:#79c0ff;--syn-op:#d2a8ff;
}
[data-theme="light"]{
--bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;--border:#d0d7de;--border2:#d0d7de;
--fg:#24292f;--fg2:#57606a;--fg3:#8c959f;
--accent:#0969da;--accent2:#ddf4ff;--accent3:#0969da;
--red:#cf222e;--red2:#cf222e;--green:#1a7f37;--yellow:#9a6700;--orange:#bf8700;
--syn-cmt:#6e7781;--syn-str:#0a3069;--syn-opt:#116329;--syn-kw:#cf222e;--syn-num:#0550ae;--syn-op:#8250df;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI","Noto Sans SC",system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.7}
.header{position:sticky;top:0;z-index:200;background:var(--accent3);color:#fff;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.header h1{font-size:16px;font-weight:700;margin:0;white-space:nowrap}
.header input{flex:1;min-width:160px;max-width:360px;padding:7px 12px;border:none;border-radius:6px;font-size:13px;background:rgba(255,255,255,.15);color:#fff;outline:none}
.header input:focus{background:rgba(255,255,255,.25)}
.header input::placeholder{color:rgba(255,255,255,.6)}
.header .match-count{font-size:12px;opacity:.8;white-space:nowrap}
.header .search-hint{font-size:10px;opacity:.5;white-space:nowrap}
.theme-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:14px;cursor:pointer;line-height:1}
.cmd-count{font-size:11px;opacity:.7;white-space:nowrap}
.suggest-list{display:none;position:absolute;top:100%;left:0;right:0;max-width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:0 0 8px 8px;list-style:none;padding:4px 0;margin:0;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.4);max-height:320px;overflow-y:auto}
.suggest-list li{padding:6px 14px;font-size:13px;color:var(--fg);cursor:pointer;display:flex;align-items:center;gap:8px;line-height:1.4}
.suggest-list li:hover,.suggest-list li.active{background:var(--accent2)}
.suggest-icon{font-size:11px;color:var(--fg2);flex-shrink:0;width:14px;text-align:center}
.suggest-sec{font-size:10px;color:var(--fg2);margin-left:auto;padding-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:260px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:8px 0}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#sidebarToc a{display:block;padding:4px 16px;font-size:12.5px;color:var(--fg2);text-decoration:none;border-left:3px solid transparent;transition:all.15s;line-height:1.4}
#sidebarToc a:hover{color:var(--accent);background:var(--bg2)}
#sidebarToc a.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg2);font-weight:500}
#sidebarToc .toc-l2{padding-left:28px;font-size:12px}
.toc-group-header{display:flex;align-items:center;gap:4px;padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--fg);cursor:pointer;border-left:3px solid transparent;transition:all.15s;user-select:none}
.toc-group-header:hover{color:var(--accent);background:var(--bg2)}
.toc-group-header.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg2)}
.toc-arrow{font-size:10px;width:14px;flex-shrink:0;color:var(--fg2);transition:transform.15s}
.toc-group-body{overflow:hidden;transition:max-height.2s ease;max-height:9999px}
.toc-group-body.collapsed{max-height:0}
.main{flex:1;min-width:0;max-width:900px;padding:20px 32px 80px}
h2{margin:28px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--accent);font-size:20px;color:var(--accent);scroll-margin-top:60px;position:relative}
h3{margin:18px 0 8px;font-size:16px;color:var(--red);scroll-margin-top:60px;position:relative}
h4{font-size:14px;scroll-margin-top:60px}
.anchor-link{position:absolute;left:-20px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--fg3);text-decoration:none;opacity:0;transition:opacity.15s;padding:0 4px}
h2:hover .anchor-link,h3:hover .anchor-link{opacity:1}
.anchor-link:hover{color:var(--accent)}
.anchor-link.copied{color:var(--green)}
p,li{font-size:14px}
table{width:100%;border-collapse:collapse;margin:10px 0 18px;font-size:13px}
th,td{padding:6px 10px;text-align:left;border:1px solid var(--border2)}
th{background:var(--accent2);color:var(--fg);font-weight:600}
tr:nth-child(even){background:var(--bg3)}
pre{background:var(--bg2);color:var(--fg);padding:14px 18px;overflow-x:auto;font-size:12.5px;line-height:1.6;border:1px solid var(--border2);border-radius:0 0 8px 8px;margin:0}
code{font-family:"Cascadia Code","Fira Code",Consolas,monospace}
p>code,li>code{background:var(--bg3);color:var(--yellow);padding:1px 6px;border-radius:4px;border:1px solid var(--border2)}
blockquote{border-left:4px solid var(--red);padding:8px 16px;margin:10px 0;background:var(--bg2);border-radius:0 6px 6px 0;font-size:13px;color:var(--fg2)}
blockquote code{background:var(--bg)}
ul,ol{padding-left:22px;margin:6px 0 10px}
li{margin:3px 0}
hr{border:none;border-top:1px solid var(--border2);margin:20px 0}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.syn-cmt{color:var(--syn-cmt);font-style:italic}
.syn-str{color:var(--syn-str)}
.syn-opt{color:var(--syn-opt)}
.syn-kw{color:var(--syn-kw);font-weight:500}
.syn-num{color:var(--syn-num)}
.syn-op{color:var(--syn-op)}
.code-block{position:relative;margin:8px 0 14px}
.code-lang{position:absolute;top:0;left:12px;font-size:10px;color:var(--fg2);background:var(--border);padding:2px 8px;border-radius:0 0 4px 4px;text-transform:uppercase;letter-spacing:.5px}
.copy-btn{position:absolute;top:6px;right:8px;background:var(--border);color:var(--fg2);border:1px solid var(--border2);border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;opacity:0;transition:opacity.15s,color.15s;z-index:1}
.code-block:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}
.search-hl{background:var(--orange);color:var(--bg);border-radius:2px;padding:0 1px}
.search-hl.search-active{background:var(--red);color:#fff;box-shadow:0 0 6px rgba(255,107,107,.5)}
.filter-chips{display:flex;gap:6px;padding:6px 24px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-chip{padding:3px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--fg2);cursor:pointer;transition:all.15s;white-space:nowrap}
.filter-chip:hover{color:var(--accent);border-color:var(--accent)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.disclaimer{text-align:center;padding:5px 16px;font-size:11px;color:var(--orange);background:var(--bg2);border-bottom:1px solid var(--border)}
.warn-notice{color:var(--red);background:var(--bg2);border:1px solid var(--red);border-radius:6px;padding:10px 16px;margin-bottom:16px;font-size:13px;font-weight:500;text-align:center}
.back-to-top{position:fixed;bottom:32px;right:32px;width:44px;height:44px;border-radius:50%;background:var(--accent2);color:var(--fg);border:1px solid var(--border2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(12px);transition:all.25s;pointer-events:none;z-index:50}
.back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.back-to-top:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.version-badge{display:inline-block;font-size:11px;padding:1px 8px;background:rgba(255,255,255,.15);border-radius:10px;color:#fff;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.version-badge:hover{background:rgba(255,255,255,.25)}
kbd{display:inline-block;padding:1px 5px;font-size:10px;font-family:inherit;color:var(--fg);background:var(--bg3);border:1px solid var(--border2);border-radius:3px;box-shadow:0 1px 0 var(--border2)}
.star-btn{display:inline-block;cursor:pointer;font-size:14px;color:var(--fg3);padding:0 4px;vertical-align:middle;transition:color.15s;user-select:none}
.star-btn:hover{color:var(--orange)}
.star-btn.starred{color:var(--orange)}
.star-btn-cmd{position:absolute;top:6px;right:38px;font-size:13px;z-index:1;opacity:0;transition:opacity.15s}
.code-block:hover .star-btn-cmd{opacity:1}
#favoritesList{border-bottom:1px solid var(--border);padding:6px 0;margin-bottom:4px}
#favoritesList .fav-empty{font-size:11px;color:var(--fg3);padding:4px 16px}
#favoritesList a{display:block;padding:3px 16px;font-size:11.5px;color:var(--fg2);text-decoration:none;border-left:2px solid transparent;transition:all.15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#favoritesList a:hover{color:var(--orange);background:var(--bg2)}
.footer{text-align:center;padding:20px 32px;font-size:11px;color:var(--fg3);border-top:1px solid var(--border)}
.footer .ver{color:var(--fg2)}
.hamburger{display:none;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:6px 8px;font-size:16px;cursor:pointer;line-height:1}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250}
.sidebar-overlay.show{display:block}
@media(max-width:768px){
.hamburger{display:block}
.sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:260;transform:translateX(-100%);transition:transform.25s ease;width:280px;height:auto}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay.show{display:block}
.main{padding:16px}
.anchor-link{left:-16px}
.header .search-hint{display:none}
.header .cmd-count{display:none}
.copy-btn{opacity:.6 !important}
.back-to-top{opacity:.7;transform:none;pointer-events:auto;bottom:16px;right:16px}
table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
pre{font-size:11.5px;padding:10px 12px}
p,li{font-size:13.5px}
h2{font-size:18px}h3{font-size:15px}
.filter-chips{overflow-x:auto;flex-wrap:nowrap;padding:6px 12px;-webkit-overflow-scrolling:touch}
.filter-chips::-webkit-scrollbar{height:0}
.filter-chip{flex-shrink:0;font-size:12px;padding:4px 12px}
.code-lang{font-size:9px}
}
@media(max-width:480px){
.header{gap:6px;padding:8px 12px}
.header h1{font-size:14px}
.header input{padding:6px 10px;font-size:12px}
.main{padding:10px}
.version-badge{font-size:10px;padding:1px 6px}
.suggest-list{max-width:100%;max-height:240px}
pre{font-size:11px;padding:8px 10px}
.search-hint{display:none !important}
}</style>
</head>
<body>
<div class="header">
<button class="hamburger" id="hamburgerBtn" title="目录">☰</button>
<h1>🐧 Ops Ref</h1>
<span class="version-badge">v1.5.2 · 2026-07-13</span>
<span class="cmd-count" id="cmdCount">—</span>
<input type="text" id="searchInput" placeholder="搜索命令、关键词…" autocomplete="off">
<span class="search-hint"><kbd>/</kbd> 搜索 &nbsp;<kbd>Enter</kbd> 高亮 &nbsp;<kbd>↑↓</kbd> 选择 &nbsp;空格=AND</span>
<span class="match-count" id="matchCount"></span>
<button class="theme-btn" id="themeToggle" title="切换主题">☀</button>
</div>
<div class="filter-chips">
<span class="filter-chip active" data-domain="" onclick="setDomainFilter('',this)">全部</span>
<span class="filter-chip" data-domain="linux" onclick="setDomainFilter('linux',this)">Linux</span>
<span class="filter-chip" data-domain="kubernetes" onclick="setDomainFilter('kubernetes',this)">K8s</span>
<span class="filter-chip" data-domain="openstack" onclick="setDomainFilter('openstack',this)">OpenStack</span>
<span class="filter-chip" data-domain="ansible" onclick="setDomainFilter('ansible',this)">Ansible</span>
<span class="filter-chip" data-domain="docker" onclick="setDomainFilter('docker',this)">Docker</span>
</div>
<div class="disclaimer">⚠ 命令仅供参考，生产环境请先在测试环境验证后小心使用</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="layout">
<div class="sidebar"><div id="favoritesList"></div><div id="sidebarToc"></div></div>
<div class="main" id="mainContent"><div class="warn-notice">⚠ 注意：其中案例仅为演示，与实际生产环境无关，请勿直接操作。如按操作，后果概不负责</div></div>
</div>
<div class="footer">Ops Ref · 离线可用 · 风吟 &amp; LP</div>
<button class="back-to-top" id="backToTop" title="回到顶部">↑</button>
<script>var MD = "# Ops Ref — 运维命令速查手册（完整版）\n\n> 版本：v1.5.2 | 构建日期：2026-07-13\n> 包含：Linux 基础 / Linux 排障 / Kubernetes / OpenStack / Ansible\n>\n> 断网环境下的运维排查与日常管理\n> 适用系统：CentOS/RHEL + Ubuntu/Debian\n\n---\n\n\n---\n\n# Linux 基础运维命令\n\n> 适用系统：CentOS / RHEL / Rocky / Alma (yum/dnf) + Ubuntu / Debian (apt)\n> 场景：日常运维操作与系统管理\n\n---\n\n## 目录\n\n- [1. 基础命令与文件操作](#1-基础命令与文件操作)\n- [2. 文本处理与搜索](#2-文本处理与搜索)\n- [3. 权限与用户管理](#3-权限与用户管理)\n- [4. 进程管理](#4-进程管理)\n- [5. 系统信息与硬件](#5-系统信息与硬件)\n- [6. 磁盘与存储](#6-磁盘与存储)\n- [7. 网络诊断与配置](#7-网络诊断与配置)\n- [8. 软件包管理](#8-软件包管理)\n- [9. 服务与 systemd 管理](#9-服务与-systemd-管理)\n- [10. 日志查看与排查](#10-日志查看与排查)\n- [11. 防火墙](#11-防火墙)\n- [12. 计划任务与定时作业](#12-计划任务与定时作业)\n- [13. 压缩与归档](#13-压缩与归档)\n- [14. SSH 远程管理](#14-ssh-远程管理)\n- [15. Docker 基础操作](#15-docker-基础操作)\n\n---\n\n## 1. 基础命令与文件操作\n\n### 文件浏览\n\n| 命令 | 说明 | 实例 |\n|------|------|------|\n| `ls -lh` | 列出文件（人性化大小） | `ls -lh /var/log/` |\n| `ls -lt` | 按时间排序 | `ls -lt /etc/` |\n| `ls -la` | 列出所有文件（含隐藏） | `ls -la ~/` |\n| `pwd` | 显示当前路径 | `pwd` |\n| `cd -` | 回到上一个目录 | `cd -` |\n\n### 文件查看\n\n| 命令 | 说明 | 实例 |\n|------|------|------|\n| `tail -f file` | 实时跟踪文件末尾（看日志） | `tail -f /var/log/syslog` |\n| `tail -n 100 file` | 看最后 100 行 | `tail -n 200 /var/log/messages` |\n| `head -n 20 file` | 看前 20 行 | `head -n 10 /etc/passwd` |\n| `less file` | 分页查看（/搜索,n下一页） | `less /var/log/syslog` |\n| `cat file` | 一次性输出全文 | `cat /etc/os-release` |\n| `tac file` | 倒序输出（最后一行在前） | `tac log.txt` |\n| `nl file` | 带行号输出 | `nl /etc/passwd` |\n\n> 小技巧：`less` 查看时按 `Shift+G` 到最后，按 `g` 到开头，按 `/关键词` 搜索，按 `n` 跳下一个\n\n### 文件创建/编辑/删除\n\n| 命令 | 说明 | 实例 |\n|------|------|------|\n| `touch file` | 创建空文件或更新时间戳 | `touch /tmp/test.txt` |\n| `cp -r src dst` | 递归复制目录 | `cp -r /data /backup/data` |\n| `cp -a src dst` | 归档复制（保留权限/属性） | `cp -a /etc /etc_bak` |\n| `mv src dst` | 移动或重命名 | `mv old.conf new.conf` |\n| `rm -rf dir` | 强制删除目录（⚠️ 小心！） | `rm -rf /tmp/cache/` |\n| `mkdir -p a/b/c` | 递归创建目录 | `mkdir -p /app/logs/2024/` |\n| `rm -i file` | 删除前确认 | `rm -i important.txt` |\n\n### 查找文件\n\n| 命令 | 说明 | 实例 |\n|------|------|------|\n| `find /path -name \"*.log\"` | 按文件名查找 | `find /var -name \"*.log\" -type f` |\n| `find /path -mtime -7` | 7天内修改过的文件 | `find /etc -mtime -1`（1天内） |\n| `find /path -size +100M` | 查找大于100MB的文件 | `find / -size +500M -exec ls -lh {} \\;` |\n| `find /path -type d` | 只查找目录 | `find /var -type d -name \"nginx*\"` |\n| `which command` | 查看命令路径 | `which python3` |\n| `whereis command` | 查看命令及 man 路径 | `whereis nginx` |\n\n---\n\n## 2. 文本处理与搜索\n\n### grep 搜索（最常用）\n\n```bash\n# 基本用法\ngrep \"关键词\" file.txt\ngrep -i \"keyword\" file.log        # 忽略大小写\ngrep -r \"pattern\" /path/          # 递归搜索目录\ngrep -v \"exclude\" file.log        # 反向匹配（排除）\ngrep -n \"error\" app.log           # 显示行号\ngrep -c \"error\" app.log           # 只计数\ngrep -A 5 \"ERROR\" log.txt         # 匹配行 + 后5行\ngrep -B 5 \"ERROR\" log.txt         # 匹配行 + 前5行\ngrep -C 3 \"ERROR\" log.txt         # 匹配行 + 前后各3行\ngrep -E \"error|fail|warn\" log     # 正则多关键词匹配\ngrep -l \"config\" /etc/*.conf      # 只显示包含匹配的文件名\n```\n\n### 文本处理三剑客\n\n**sed — 流编辑器（替换/修改）**\n```bash\nsed 's/旧/新/g' file              # 替换所有（输出到屏幕）\nsed -i 's/旧/新/g' file           # 直接修改文件（慎重！）\nsed -i.bak 's/旧/新/g' file       # 备份原文件再替换\nsed '/pattern/d' file             # 删除匹配行\nsed -n '5,10p' file               # 打印第5-10行\nsed 's/^/HEAD: /' file            # 行首插入\nsed 's/$/ :TAIL/' file            # 行尾追加\n```\n\n**awk — 列处理/格式化输出**\n```bash\nawk '{print $1, $NF}' file        # 打印第一列和最后一列\nawk -F ':' '{print $1}' /etc/passwd   # 指定分隔符\nawk '{sum+=$1} END{print sum}'    # 对第一列求和\nawk '$3 > 500 {print $1}' file    # 条件过滤\nawk 'NR==10' file                 # 打印第10行\n```\n\n**sort / uniq — 排序去重**\n```bash\nsort file.txt                     # 排序\nsort -n file.txt                  # 按数值排序\nsort -r file.txt                  # 倒序\nsort -k 2 file.txt                # 按第二列排序\nuniq -c                           # 去重并统计出现次数\nsort file.txt | uniq -c | sort -rn   # 计数排序（经典组合）\nsort -u file.txt                  # 排序+去重（等同于sort|uniq）\n```\n\n### 其他文本工具\n\n```bash\nwc -l file                        # 行数\nwc -w file                        # 单词数\nwc -c file                        # 字节数\ncut -d: -f1,3 /etc/passwd         # 按分隔符取列\ntr 'a-z' 'A-Z' < file             # 小写转大写\ndiff file1 file2                  # 比较两个文件差异\ncomm -3 file1 file2               # 比较两个排序文件的差异\n```\n\n---\n\n## 3. 权限与用户管理\n\n### 文件权限\n\n```bash\nchmod 755 file                    # rwxr-xr-x（常用）\nchmod 644 file                    # rw-r--r--（普通文件）\nchmod 600 file                    # rw-------（密钥文件）\nchmod 700 dir                     # rwx------（目录）\nchown user:group file             # 修改所属用户和组\nchown -R user:group dir/          # 递归修改目录\nchmod +x script.sh                # 添加执行权限\nchmod -R g+w dir/                 # 递归给组添加写权限\nls -l                             # 查看权限\ngetfacl file                      # 查看 ACL 权限\nsetfacl -m u:user:rwx file        # 设置 ACL 权限\n```\n\n> 权限数字速算：r=4, w=2, x=1 → rwx=7, rw-=6, r-x=5, r--=4\n\n### 用户管理\n\n```bash\nuseradd username                  # 创建用户\nuseradd -m -s /bin/bash user      # 创建用户并指定 shell\npasswd username                   # 设置/修改密码\nuserdel -r username               # 删除用户及其家目录\nusermod -aG group user            # 将用户添加到附加组\nwhoami                            # 显示当前用户\nid                                # 显示当前用户信息\nid username                       # 显示指定用户信息\ngroups                            # 显示当前用户所在组\nlast                              # 查看最近登录记录\nlastlog                           # 查看所有用户最后登录\n```\n\n### sudo 配置\n\n```bash\nvisudo                            # 编辑 sudo 配置（安全方式，别直接改文件）\n# 常用配置行：\n# username ALL=(ALL) ALL          # 用户有完整 sudo 权限\n# %group ALL=(ALL) ALL            # 组有完整 sudo 权限\n# username ALL=(ALL) NOPASSWD:ALL # 免密码 sudo（谨慎）\n```\n\n---\n\n## 4. 进程管理\n\n```bash\nps aux                            # 查看所有进程\nps -ef                            # 另一格式查看所有进程\nps aux --sort=-%mem               # 按内存使用排序\nps aux --sort=-%cpu               # 按 CPU 使用排序\nps -eo pid,ppid,cmd,%mem,%cpu     # 自定义输出列\ntop                               # 实时进程监控（按 q 退出）\nhtop                              # 增强版 top（更友好）\nuptime                            # 系统运行时间和负载\npgrep -a nginx                    # 查找进程 PID\nkill PID                          # 终止进程\nkill -9 PID                       # 强制杀死（SIGKILL）\nkill -15 PID                      # 优雅停止（SIGTERM，默认）\npkill process_name                # 按名称杀进程\npkill -f \"pattern\"                # 按完整命令匹配杀进程\nnohup command &                   # 后台运行（退出不中断）\njobs                              # 查看后台作业\nfg %1                             # 后台作业调到前台\nbg %1                             # 前台作业调到后台\n```\n\n> 杀进程顺序：先 `kill` (TERM) → 不行再 `kill -9` (KILL) → 还不行重启机器\n\n---\n\n## 5. 系统信息与硬件\n\n### 系统基本信息\n\n```bash\nuname -a                          # 内核版本/主机名/架构\nuname -r                          # 仅内核版本\ncat /etc/os-release               # 发行版信息（推荐）\ncat /etc/redhat-release           # CentOS/RHEL 版本\ncat /etc/lsb-release              # Ubuntu 版本\nhostname                          # 主机名\nhostname -I                       # 本机所有 IP 地址\ndate                              # 当前时间\ndate -s \"2024-01-01 12:00:00\"     # 手动设置时间\ntimedatectl                       # 时间和时区信息\ncal                               # 日历\n```\n\n### CPU 信息\n\n```bash\nlscpu                             # CPU 详细信息（型号/核心/线程）\ncat /proc/cpuinfo                 # 每个 CPU 核心信息\nnproc                             # 逻辑 CPU 核心数\ngrep -c processor /proc/cpuinfo   # 逻辑核心数（同上）\n```\n\n### 内存信息\n\n```bash\nfree -h                           # 内存使用情况（人性化显示）\nfree -m                           # 以 MB 为单位\ncat /proc/meminfo                 # 详细内存信息\nvmstat 1 5                        # 内存/进程/IO 统计（每秒一次5次）\n```\n\n### 硬件与设备\n\n```bash\nlspci                             # PCI 设备列表\nlspci | grep -i raid              # 查看 RAID 卡\nlsblk                             # 所有块设备（磁盘分区）\nlsusb                             # USB 设备\ndmidecode -t system               # 系统制造商/型号/序列号\ndmesg | tail -20                  # 内核日志（硬件报错排查用）\nlsmod                             # 已加载的内核模块\nmodinfo module_name               # 模块详细信息\n```\n\n---\n\n## 6. 磁盘与存储\n\n### 磁盘空间\n\n```bash\ndf -h                             # 各分区使用情况（推荐）\ndf -i                             # inode 使用情况（inode满时关键）\ndu -sh /path/                     # 目录总大小\ndu -sh /*                         # 根下各目录大小统计\ndu -h --max-depth=1 /var/         # 指定深度\ndu -ah /var/log/ | sort -rh | head -10  # 找出最大10个文件\nncdu /path/                       # 交互式磁盘分析（如有安装）\n```\n\n### 分区与挂载\n\n```bash\nfdisk -l                          # 查看磁盘分区信息\nlsblk                             # 块设备树状结构\nblkid                             # 块设备 UUID\nmount                             # 查看当前挂载\nmount /dev/sdb1 /mnt/data         # 手动挂载\numount /mnt/data                  # 卸载\ndf -hT                            # 查看分区类型（xfs/ext4）\nmkfs.ext4 /dev/sdb1               # 格式化为 ext4\nmkfs.xfs /dev/sdb1                # 格式化为 xfs\n```\n\n### LVM 管理\n\n```bash\npvdisplay                         # 查看物理卷\nvgdisplay                         # 查看卷组\nlvdisplay                         # 查看逻辑卷\nvgextend vgname /dev/sdb          # 扩展卷组\nlvextend -L +10G /dev/vg/lv       # 扩容逻辑卷\nlvextend -l +100%FREE /dev/vg/lv  # 使用所有剩余空间\nxfs_growfs /mount/point           # XFS 扩容后刷新\nresize2fs /dev/vg/lv              # ext4 扩容后刷新\n```\n\n### 磁盘 IO 排查\n\n```bash\niostat -x 1                       # 详细 IO 统计（每秒一次）\niotop                             # 实时查看进程 IO\ndstat -d                          # 磁盘读写统计\n```\n\n---\n\n## 7. 网络诊断与配置\n\n### 基础网络信息\n\n```bash\nip addr                           # 查看 IP 地址（新，推荐）\nip a                              # 简写\nifconfig                          # 旧版，需 net-tools 包\n\nip route                          # 查看路由表\nroute -n                          # 旧版路由\n\nip neigh                          # ARP 表（邻居发现）\narp -n                            # 旧版 ARP\n\nss -tuln                          # 查看监听端口（新，推荐）\nnetstat -tulpn                    # 查看监听端口（旧版）\nss -tuna                          # 所有 TCP/UDP 连接\n```\n\n### 网络连通性排查\n\n```bash\n# 先确认网络通不通\nping -c 4 8.8.8.8                 # 测试到外网连通性\nping -c 4 hostname                # 测试域名连通性\n\n# 再确认端口通不通\ntelnet IP PORT                    # 测试端口（需安装 telnet）\nnc -zv IP PORT                    # 端口测试（推荐）\nnc -vz IP 80                      # 测试 80 端口\n\n# 路由追踪\ntraceroute IP                     # 路由追踪（需安装）\ntracert IP                        # CentOS 上命令名\nmtr IP                            # 结合 ping+traceroute（推荐）\n\n# DNS 查询\nnslookup domain                   # DNS 解析查询\ndig domain                        # 详细的 DNS 查询（推荐）\ndig -x IP                         # 反向解析\nhost domain                       # 简单 DNS 查询\ncat /etc/resolv.conf              # 查看 DNS 配置\n\n# HTTP 请求测试\ncurl -v http://example.com        # 发送 HTTP 请求（调试用）\ncurl -I https://example.com       # 只返回 HTTP 头\ncurl -o /dev/null -w \"%{http_code}\" http://example.com  # 只输出状态码\nwget -q -O - http://example.com   # wget 版\n```\n\n### 网卡配置\n\n**CentOS / RHEL (nmcli — NetworkManager)**\n```bash\nnmcli dev status                  # 查看网卡状态\nnmcli con show                    # 查看连接配置\nnmcli con up \"ens33\"              # 启用连接\nnmcli con down \"ens33\"            # 停用连接\nnmcli con add con-name eth0 ifname eth0 type ethernet ip4 192.168.1.100/24 gw4 192.168.1.1\nnmcli con mod eth0 ipv4.dns \"8.8.8.8 8.8.4.4\"\n```\n\n**Ubuntu (netplan)** — 配置文件在 `/etc/netplan/*.yaml`\n```bash\nnetplan apply                     # 应用配置\nnetplan try                       # 尝试应用（超时回滚）\n```\n\n### 抓包与流量\n\n```bash\n# 基础抓包\ntcpdump -i eth0                   # 抓取 eth0 流量\ntcpdump -i any port 80            # 抓取所有网卡 80 端口流量\ntcpdump -i eth0 -c 100 -w dump.pcap  # 抓100个包存文件\ntcpdump -i eth0 host 10.0.0.1    # 抓取与某 IP 的通信\ntcpdump -i eth0 tcp and port 443  # 条件过滤\n\n# 高阶组合（离线抓包分析用）\ntcpdump -i any and host 10.0.0.1 -nneevv -N -w capture.pcap\n#              ↑过滤指定IP  ↑↑↓↓↓↓        ↑           ↑\n#   -n  不解析IP为域名    -nn  同时不解析端口为服务名\n#   -e  显示MAC地址       -vv  详细输出（-v/-vv/-vvv）\n#   -N  不解析主机域名     -w  写入pcap文件（可用 -r 读取）\n\n# 抓包时打印包内容（在线排查用，不存文件）\ntcpdump -i any host 10.0.0.1 -nne -X     # -X 以 hex+ASCII 打印包内容\ntcpdump -i any host 10.0.0.1 -nne -A     # -A 以纯 ASCII 打印（适合 HTTP）\ntcpdump -i any port 80 -n -S             # -S 显示绝对序列号（代替相对序列号）\n\n# 抓取指定数量包后自动停止\ntcpdump -i any host 10.0.0.1 -c 1000 -w capture.pcap   # 抓1000个包退出\ntcpdump -i any -G 60 -w capture_%Y%m%d_%H%M%S.pcap      # 每60秒轮转一个新文件\n\n# 读取 pcap 文件分析（不用 -i 网卡）\ntcpdump -r capture.pcap -nne            # 读取已保存的包，不重新抓\ntcpdump -r capture.pcap -nne host 10.0.0.2  # 读取文件并筛选\n```\n\n---\n\n## 8. 软件包管理\n\n### CentOS / RHEL (yum / dnf)\n\n```bash\n# 查询\nyum list installed                 # 列出已安装所有包\nyum list installed | grep nginx   # 查询某包是否安装\nyum info nginx                    # 查看包信息\nyum search keyword                # 搜索包\nrpm -qa                           # 所有已安装的 RPM 包\nrpm -qi package                   # RPM 包信息\nrpm -ql package                   # 包所安装的文件列表\nrpm -qf /path/to/file             # 文件属于哪个包\n\n# 安装和移除\nyum install -y nginx              # 安装\nyum remove nginx                  # 卸载\nyum update                        # 更新所有包\nyum update nginx                  # 更新单个包\nyum clean all                     # 清理缓存\n\n# 仓库\nyum repolist                      # 查看启用的仓库\nyum-config-manager --add-repo URL # 添加第三方仓库\n\n# dnf 命令与 yum 完全兼容，CentOS 8+ 默认用 dnf\n```\n\n### Ubuntu / Debian (apt)\n\n```bash\n# 查询\ndpkg -l                           # 列出已安装包\ndpkg -l | grep nginx              # 查询某包是否已装\napt show nginx                    # 包详细信息\napt search keyword                # 搜索包\ndpkg -L package                   # 包安装的文件列表\ndpkg -S /path/to/file             # 文件属于哪个包\n\n# 安装和移除\napt install -y nginx              # 安装\napt remove nginx                  # 卸载（保留配置）\napt purge nginx                   # 卸载（删除配置）\napt update                        # 更新包列表\napt upgrade                       # 升级所有包\napt autoremove                    # 自动清理依赖\n\n# 仓库\nadd-apt-repository ppa:name       # 添加 PPA\ncat /etc/apt/sources.list         # 查看源列表\n```\n\n### 从源码编译（解压源码后通用步骤）\n```bash\n./configure --prefix=/usr/local/nginx\nmake\nmake install                      # ⚠️ 需要 root\n```\n\n---\n\n## 9. 服务与 systemd 管理\n\n### systemd（CentOS 7+ / Ubuntu 16+）\n\n```bash\n# 核心管理\nsystemctl status nginx            # 查看服务状态（含最近日志）\nsystemctl start nginx             # 启动\nsystemctl stop nginx              # 停止\nsystemctl restart nginx           # 重启\nsystemctl reload nginx            # 重载配置（不中断服务）\nsystemctl enable nginx            # 开机自启\nsystemctl disable nginx           # 取消开机自启\nsystemctl is-active nginx         # 检查是否运行\nsystemctl is-enabled nginx        # 检查是否开机自启\nsystemctl list-units --type=service  # 列出所有服务\n\n# 系统管理\nsystemctl reboot                  # 重启系统\nsystemctl poweroff                # 关机\nsystemctl rescue                  # 进入救援模式\njournalctl -u nginx               # 查看 nginx 的服务日志\njournalctl -u nginx -f            # 实时跟踪服务日志\njournalctl -u sshd --since \"1 hour ago\"  # 查看最近1小时日志\n```\n\n### 旧版 init (CentOS 6 / service 命令)\n\n```bash\nservice nginx status\nservice nginx start/stop/restart\nchkconfig nginx on                # 开机自启\nchkconfig --list                  # 查看所有服务开机自启状态\n```\n\n---\n\n## 10. 日志查看与排查\n\n### 系统日志位置\n\n| 系统 | 主要日志 | 说明 |\n|------|---------|------|\n| CentOS 7+ | `/var/log/messages` | 通用系统日志 |\n| Ubuntu | `/var/log/syslog` | 通用系统日志 |\n| 通用 | `/var/log/dmesg` | 内核启动日志 |\n| 通用 | `/var/log/cron` | 计划任务日志 |\n| 通用 | `/var/log/secure` (CentOS) / `/var/log/auth.log` (Ubuntu) | 认证/安全日志 |\n| 通用 | `/var/log/maillog` / `/var/log/mail.log` | 邮件日志 |\n| Nginx | `/var/log/nginx/access.log`, `/var/log/nginx/error.log` | Web 访问/错误日志 |\n| MySQL | `/var/log/mysql/error.log` | 数据库错误日志 |\n\n### 日志查看技巧\n\n```bash\n# 实时跟踪\ntail -f /var/log/messages\ntail -f /var/log/nginx/access.log | awk '{print $1}' | sort | uniq -c | sort -rn  # 实时看 IP 访问统计\n\n# 查找关键日志\ngrep -i \"error\\|fail\\|critical\" /var/log/messages | tail -50\ngrep \"Out of memory\" /var/log/messages\ngrep \"disk full\" /var/log/messages\ngrep -i \"authentication failure\" /var/log/secure\n\n# 查看启动日志\ndmesg | grep -i error\ndmesg | less\njournalctl -b                      # 本次启动所有日志\njournalctl -b -p err               # 本次启动的错误级别日志\n```\n\n---\n\n## 11. 防火墙\n\n### firewalld（CentOS 7+ 默认）\n\n```bash\nsystemctl status firewalld           # 防火墙状态\nfirewall-cmd --state                 # 简版状态\n\nfirewall-cmd --list-all              # 查看所有规则\nfirewall-cmd --zone=public --add-port=80/tcp --permanent    # 开放端口\nfirewall-cmd --zone=public --remove-port=80/tcp --permanent # 关闭端口\nfirewall-cmd --reload                # 重载规则\n\nfirewall-cmd --add-service=http --permanent                 # 开放服务\nfirewall-cmd --add-rich-rule='rule family=\"ipv4\" source address=\"10.0.0.0/24\" accept' --permanent\n```\n\n### iptables（通用）\n\n```bash\niptables -L -n -v                   # 查看规则\niptables -F                          # 清空所有规则（⚠️ 导致断连）\niptables -A INPUT -p tcp --dport 22 -j ACCEPT    # 允许 SSH\niptables -A INPUT -p tcp --dport 80 -j ACCEPT    # 允许 HTTP\niptables -A INPUT -p tcp --dport 443 -j ACCEPT   # 允许 HTTPS\niptables -A INPUT -s 10.0.0.0/24 -j ACCEPT       # 允许某网段\niptables -A INPUT -j DROP            # 默认拒绝入站（最后）\niptables -I INPUT 1 -p tcp --dport 22 -j ACCEPT   # 插入到第1条\n\n# 保存规则\niptables-save > /etc/sysconfig/iptables           # CentOS\niptables-save > /etc/iptables/rules.v4            # Ubuntu\n# 恢复规则\niptables-restore < /etc/sysconfig/iptables\n```\n\n### ufw（Ubuntu 默认）\n\n```bash\nufw enable                           # 启用\nufw disable                          # 禁用\nufw status                           # 状态\nufw status numbered                   # 带编号查看\nufw allow 22/tcp                     # 允许端口\nufw allow 80/tcp                     # 允许端口\nufw deny 23/tcp                      # 拒绝端口\nufw delete 3                         # 删除第3条规则\nufw allow from 10.0.0.0/24          # 允许网段\n```\n\n---\n\n## 12. 计划任务与定时作业\n\n### cron\n\n```bash\ncrontab -l                           # 查看当前用户的计划任务\ncrontab -e                           # 编辑计划任务\ncrontab -r                           # 删除所有计划任务（小心！）\n\n# 格式：分 时 日 月 周  命令\n# 实例：\n*/5 * * * * /script/check.sh        # 每5分钟\n0 * * * * /script/hourly.sh         # 每小时（整点）\n0 2 * * * /script/backup.sh         # 每天凌晨2点\n0 0 * * 0 /script/weekly.sh         # 每周日凌晨\n0 0 1 * * /script/monthly.sh        # 每月1号凌晨\n30 9 * * 1-5 /script/workday.sh     # 工作日上午9:30\n\n# 日志查看\ntail -f /var/log/cron                # CentOS RHEL\ngrep CRON /var/log/syslog           # Ubuntu\n```\n\n---\n\n## 13. 压缩与归档\n\n```bash\n# tar（最常用）\ntar -czvf archive.tar.gz /path/     # 创建 tar.gz 压缩\ntar -xzvf archive.tar.gz            # 解压到当前目录\ntar -xzvf archive.tar.gz -C /tmp   # 解压到指定目录\ntar -tzvf archive.tar.gz            # 查看压缩包内容\ntar -czvf archive.tar.gz --exclude='*.log' /path/  # 排除某些文件\n\n# zip（跨平台好用）\nzip -r archive.zip /path/\nunzip archive.zip\nunzip archive.zip -d /target/dir\nunzip -l archive.zip               # 查看内容\n\n# 其他\ngzip file                          # 压缩单个文件\ngunzip file.gz\nbzip2 file                         # 更高压缩比\nbunzip2 file.bz2\n\n# 查看压缩文件内容\nzcat file.gz                       # 查看 gz 压缩文件内容（grep 等配合）\nzless file.gz\nzgrep \"error\" /var/log/syslog.*.gz  # 搜索压缩日志（超级实用！）\n```\n\n> 断网排查时 `zgrep` 是神器——日志被 rotate 压缩了也不用先解压\n\n---\n\n## 14. SSH 远程管理\n\n```bash\n# 基本连接\nssh user@hostname\nssh -p 2222 user@hostname          # 指定端口\nssh -i ~/.ssh/id_rsa user@host     # 指定密钥文件\n\n# 安全配置（/etc/ssh/sshd_config）\n# Port 2222                        # 改默认端口（防扫描）\n# PermitRootLogin no               # 禁止 root 直接登录\n# PasswordAuthentication no        # 禁用密码登录（只用密钥）\n# AllowUsers alice bob             # 只允许某些用户 SSH 登录\n\n# 生成密钥\nssh-keygen -t ed25519              # 生成 ed25519 密钥（推荐）\nssh-keygen -t rsa -b 4096          # 或 RSA 4096 位\nssh-copy-id user@hostname           # 复制公钥到服务器\n\n# 文件传输\nscp file user@host:/path/          # 上传\nscp user@host:/path/file ./        # 下载\nscp -r dir/ user@host:/path/       # 递归传输目录\nrsync -avz /local/ user@host:/remote/   # 同步（增量更快，推荐）\nrsync -avz --delete user@host:/remote/ /local/  # 镜像同步（删除目标多余文件）\n\n# SSH 隧道（端口转发）\nssh -L 8080:localhost:80 user@host       # 本地端口转发\nssh -R 8080:localhost:80 user@host       # 远程端口转发\nssh -D 1080 user@host                    # SOCKS 代理\n\n# SSH 会话保持（~/.ssh/config 配置）\n# Host myserver\n#     HostName 192.168.1.100\n#     Port 2222\n#     User admin\n#     IdentityFile ~/.ssh/id_ed25519\n#     ServerAliveInterval 60\n```\n\n---\n\n## 15. Docker 基础操作\n\n### 容器生命周期\n\n```bash\ndocker ps                            # 运行中的容器\ndocker ps -a                         # 所有容器（含已停止）\ndocker ps -a --format \"table {{.ID}}\\t{{.Names}}\\t{{.Status}}\"  # 格式化输出\ndocker logs -f container_name        # 查看容器日志（-f 跟踪）\ndocker logs --tail 100 container_name  # 最近100行\ndocker exec -it container_name bash  # 进入容器\ndocker exec container_name cat /etc/nginx/nginx.conf  # 查看容器内文件\ndocker inspect container_name        # 容器详细信息\ndocker stats                         # 容器资源占用（实时）\ndocker start/stop/restart name       # 启停容器\ndocker rm -f container_name          # 强制删除容器\n```\n\n### 镜像管理\n\n```bash\ndocker images                        # 查看本地镜像\ndocker pull nginx:latest             # 拉取镜像\ndocker rmi image_name                # 删除镜像\ndocker system df                     # 查看 Docker 磁盘占用\ndocker system prune                  # 清理未使用资源（镜像/容器/网络）\ndocker system prune -a               # 更激进的清理\n```\n\n---\n\n> 前往 **[02-linux-troubleshooting.md](02-linux-troubleshooting.md)** 查看故障排查与应急场景\n\n---\n\n# Linux 故障排查与应急场景\n\n> 适用场景：当机应急、性能瓶颈定位、断网排错\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n## 目录\n\n- [1. 性能排查总纲（1分钟定位问题）](#1-性能排查总纲1分钟定位问题)\n- [2. CPU 排查](#2-cpu-排查)\n- [3. 内存排查](#3-内存排查)\n- [4. 磁盘排查](#4-磁盘排查)\n- [5. 网络排查](#5-网络排查)\n- [6. 系统瓶颈一句话速判](#6-系统瓶颈一句话速判)\n- [7. 常用排查场景速查](#7-常用排查场景速查)\n- [附录：命令快速索引](#附录命令快速索引)\n\n---\n\n## 1. 性能排查总纲（1分钟定位问题）\n\n```bash\n# 第一步：看负载 + CPU + 内存综合情况\ntop\n# 或\nhtop\n\n# 第二步：看磁盘空间\ndf -h\n\n# 第三步：看内存详细\nfree -h\n\n# 第四步：看磁盘 IO 是否饱和\niostat -x 1 5\n\n# 第五步：看网络连接数\nss -s\nnetstat -s\n```\n\n---\n\n## 2. CPU 排查\n\n```bash\n# 找到 CPU 最高的进程\ntop -o %CPU                         # 按 CPU 排序\nps -eo pid,ppid,cmd,%cpu --sort=-%cpu | head -10  # 前10个\n\n# 查看进程的线程\ntop -Hp PID\nps -Lp PID -o pid,tid,pcpu,cmd | sort -k3 -rn | head\n\n# 负载高但 CPU 不高 → 可能是 IO 等待\nvmstat 1 5                          # wa 列高 = IO 瓶颈\n```\n\n---\n\n## 3. 内存排查\n\n```bash\n# 到底谁在吃内存\nps aux --sort=-%mem | head -10\n\n# 查看某个进程内存详情\npmap -x PID\n\n# 查看缓存/缓冲\ncat /proc/meminfo | grep -E \"^(Mem|Cached|Buffers)\"\n\n# OOM Killer 检查\ndmesg | grep -i \"out of memory\"\ngrep -i \"killed process\" /var/log/messages\n```\n\n---\n\n## 4. 磁盘排查\n\n```bash\n# 检查是否有进程在疯狂写盘\niotop -o                              # 只显示有 IO 的进程\nlsof +D /var/log/                     # 查看哪些进程在打开日志目录的文件\n\n# inode 满了\ndf -i\n# inode 满了怎么办：找大量小文件\nfind /var/spool/postfix/maildrop -type f | wc -l  # 邮件队列常见\nfind /tmp -type f | wc -l\nfind / -xdev -type f 2>/dev/null | wc -l\n\n# 大文件定位\ndu -ah / | sort -rh | head -20\n\n# 查看进程占用已删除文件（df 满但 du 不大）\nlsof | grep \"(deleted)\"\n```\n\n---\n\n## 5. 网络排查\n\n```bash\n# 连接数统计\nss -s                                # 总连接数汇总\nss -tan | awk '{print $4}' | sort | uniq -c | sort -rn  # 各端口连接数\nss -tan state ESTABLISHED | wc -l   # 已建立连接数\n\n# 查看大量 TIME_WAIT\nss -tan state TIME-WAIT | wc -l\n# TIME_WAIT 多：内核参数调整\necho \"net.ipv4.tcp_tw_reuse = 1\" >> /etc/sysctl.conf\necho \"net.ipv4.tcp_fin_timeout = 15\" >> /etc/sysctl.conf\nsysctl -p\n\n# 带宽占用\niftop -i eth0                        # 实时带宽（需安装）\nnload                                # 流量监控（需安装）\n\n# 丢包检查\nnetstat -i                           # 查看接口丢包\nip -s link                           # 接口统计（含错误/丢包）\n```\n\n---\n\n## 6. 系统瓶颈一句话速判\n\n| 瓶颈 | 判断依据 | 解决方向 |\n|------|---------|---------|\n| CPU 瓶颈 | `top` → %idle 接近 0, %wa < 5, %us+%sy 接近 100 | 优化代码、扩容、增加 worker 进程 |\n| 内存瓶颈 | `free -h` → available 接近 0，或 swap 大量使用 | 加内存、优化内存泄漏、清理缓存 |\n| 磁盘 IO 瓶颈 | `top` → %wa > 30；`iostat` → %util 接近 100 | 换 SSD、优化查询、加缓存 |\n| 网络瓶颈 | 带宽跑满，连接数异常高，丢包率上升 | 扩容带宽、限流、优化协议 |\n\n---\n\n## 7. 常用排查场景速查\n\n### 场景 1：网站打不开怎么办？\n\n```bash\n# 1. 看服务是否在运行\nsystemctl status nginx\nsystemctl status php-fpm\nsystemctl status httpd\n\n# 2. 看端口是否在监听\nss -tulpn | grep -E \":(80|443) \"\n\n# 3. 看防火墙是否拦截\nfirewall-cmd --list-all              # firewalld\niptables -L -n -v | grep 80         # iptables\n\n# 4. 看应用日志\ntail -100 /var/log/nginx/error.log\n\n# 5. 看系统资源是否不足（OOM / 磁盘满 / 连接数满）\ndf -h\nfree -h\n```\n\n### 场景 2：服务器 SSH 连不上？\n\n```bash\n# 1. SSH 服务是否运行\nsystemctl status sshd\n\n# 2. 22 端口是否在监听\nss -tulnp | grep :22\n\n# 3. 防火墙是否放行了 SSH\nfirewall-cmd --list-all | grep ssh\niptables -L -n | grep 22\n\n# 4. hosts.deny 是否被拉黑了\ncat /etc/hosts.deny\ncat /etc/hosts.allow\n\n# 5. SELinux 是否拦截了\ngetenforce                            # Enforcing=开启\n# 临时关闭：setenforce 0\n# 查看审计日志：grep sshd /var/log/audit/audit.log | tail\n```\n\n### 场景 3：磁盘满了怎么办？\n\n```bash\n# 1. 确认哪个分区满了\ndf -h\n\n# 2. 找大文件\ndu -ah /var/ | sort -rh | head -10\n\n# 3. 找大目录\ndu -sh /var/log/\ndu -sh /tmp/\ndu -sh /var/lib/docker/              # Docker 目录常是罪魁祸首\n\n# 4. 用 find 找大于 1GB 的文件\nfind / -type f -size +1G -exec ls -lh {} \\; 2>/dev/null\n\n# 5. 如果 df 显示满但 du 对不上 → 有进程占用了已删除的文件\nlsof | grep \"(deleted)\"              # 找到后重启对应进程\n\n# 6. 日志切割/清理\ntruncate -s 0 /var/log/nginx/access.log  # 直接清空（紧急用）\nlogrotate -f /etc/logrotate.conf     # 强制执行日志轮转\n\n# 7. 清理包缓存\nyum clean all                        # CentOS\napt clean                            # Ubuntu\ndocker system prune -f               # Docker 镜像清理\n```\n\n### 场景 4：CPU 负载过高？\n\n```bash\n# 1. 看哪个进程在吃 CPU\ntop -o %CPU\n\n# 2. 如果是 Java 应用，看线程栈\ntop -Hp PID                          # 找到 CPU 高的线程 TID\nprintf \"%x\\n\" TID                    # 转为 16 进制\njstack PID | grep -A 30 \"nid=0xHEX\"  # 看线程堆栈\n\n# 3. 如果是业务进程，先重启再排查\nsystemctl restart app_name\n\n# 4. 检查是否被挖矿\ntop -o %CPU                          # 看有无陌生进程\ncat /etc/crontab                     # 看有无异常计划任务\nps aux | grep -i mine\\|monero\\|xmr   # 挖矿特征\nnetstat -tuna | grep -E \":(3333|4444|5555|6666)\"  # 挖矿常用端口\n```\n\n### 场景 5：内存不足 / OOM\n\n```bash\n# 1. 确认内存使用\nfree -h\ncat /proc/meminfo | grep MemAvailable\n\n# 2. 查 swap 使用情况\nswapon --show\nfree -h\n\n# 3. 看哪个进程吃的多\nps aux --sort=-%mem | head -10\n\n# 4. 是否有 OOM 被 kill\ndmesg | grep -i \"killed process\"\ngrep -i \"out of memory\" /var/log/messages\n\n# 5. 紧急释放内存（小心！）\necho 3 > /proc/sys/vm/drop_caches    # 清理缓存（不影响进程，推荐）\nsync; echo 1 > /proc/sys/vm/drop_caches    # 清理 page cache\nsystemctl restart service_name        # 重启占用大的服务\n\n# 6. 配置交换空间\nfallocate -l 4G /swapfile\nchmod 600 /swapfile\nmkswap /swapfile\nswapon /swapfile\n# 永久生效：echo \"/swapfile none swap sw 0 0\" >> /etc/fstab\n```\n\n### 场景 6：网络丢包 / 延迟高\n\n```bash\n# 1. 检查网卡错误\nip -s link show eth0                 # 看 errors/dropped 列\nnetstat -i\n\n# 2. 检查连接队列溢出\nnetstat -s | grep -i \"overflow\\|drop\"\nss -lnt | grep LISTEN                # 看 Send-Q/Recv-Q\n\n# 3. 检查路由\nip route get 8.8.8.8                 # 看数据包从哪个接口出去\n\n# 4. MTU 问题\nping -M do -s 1472 8.8.8.8          # 测试 MTU（不带分段）\n# 如果不通：减小 MTU 值重试，找到最大 MTU\n\n# 5. DNS 问题\ntime nslookup google.com             # DNS 响应慢\n# /etc/resolv.conf 改本地 DNS 或换 114.114.114.114\n```\n\n### 场景 7：服务器时间不同步\n\n```bash\n# 1. 查看当前时间与时区\ndate\ntimedatectl\n\n# 2. 更新时区\ntimedatectl set-timezone Asia/Shanghai\n\n# 3. NTP 同步\nntpdate -u ntp.aliyun.com            # 手动同步一次（CentOS 7）\nchronyc sources                      # chrony 版（CentOS 8+/RHEL 8+）\nsystemctl restart chronyd\ntimedatectl set-ntp yes              # 自动 NTP 同步\n```\n\n### 场景 8：无法安装软件包\n\n```bash\n# CentOS — 缓存了就用本地\nyum clean all && yum makecache\nyum list installed | grep nginx       # 确认是否已装\nrpm -ivh nginx.rpm                   # 离线安装（需先下载 rpm 包）\n\n# Ubuntu\napt --fix-broken install             # 修复依赖\ndpkg -i package.deb                  # 离线安装\n\n# 通用：有包文件就可以离线装\n# 有网络时预下载：\n# yum install --downloadonly --downloaddir=./ nginx\n# apt download nginx\n```\n\n### 场景 9：SELinux 导致权限问题\n\n```bash\ngetenforce                            # 查看 SELinux 模式\nsetenforce 0                         # 临时关闭（排查看是否是 SELinux 问题）\n# 如果是 SELinux 问题，正确做法保留 SELinux\nausearch -m avc -ts recent           # 查看拒绝日志\ngrep denied /var/log/audit/audit.log # 检查被拒绝的操作\n# 生成 SELinux 策略\naudit2allow -a -M mypolicy\nsemodule -i mypolicy.pp\n```\n\n---\n\n## 附录：命令快速索引（按字母）\n\n| 命令 | 分类 | 用途 |\n|------|------|------|\n| `df` | 磁盘 | 磁盘空间 |\n| `dmesg` | 日志 | 内核日志/OOM检查 |\n| `du` | 磁盘 | 目录大小 |\n| `echo 3 > /proc/sys/vm/drop_caches` | 内存 | 清理缓存 |\n| `find` | 文件 | 查找大文件/小文件 |\n| `free` | 内存 | 内存使用 |\n| `getenforce` | 安全 | SELinux 状态 |\n| `iostat` | 性能 | 磁盘 IO |\n| `iotop` | 性能 | 进程 IO 监控 |\n| `ip -s link` | 网络 | 网卡丢包 |\n| `jstack` | Java | 线程堆栈 |\n| `journalctl` | 日志 | systemd 日志 |\n| `logrotate` | 日志 | 日志轮转 |\n| `lsof` | 进程 | 查找已删文件 |\n| `netstat` | 网络 | 丢包/连接统计 |\n| `ntpdate` | 时间 | 手动同步时间 |\n| `ps` | 进程 | 按 CPU/内存排序 |\n| `setenforce` | 安全 | SELinux 开关 |\n| `ss` | 网络 | 连接数统计 |\n| `swapon` | 内存 | 交换空间 |\n| `systemctl` | 服务 | 服务管理 |\n| `top` | 性能 | 进程监控 |\n| `truncate` | 日志 | 清空日志 |\n| `vmstat` | 性能 | 系统统计 |\n\n---\n\n> **服务器部署建议：** \n> ```bash\n> # 把排查手册放到服务器上\n> scp 02-linux-troubleshooting.md user@server:/usr/local/share/\n> # 配合基础篇一起使用\n> less /usr/local/share/01-linux-basics.md\n> less /usr/local/share/02-linux-troubleshooting.md\n> ```\n\n---\n\n# Kubernetes 运维命令手册\n\n> 适用场景：K8s 集群日常管理、Pod/Service 排障、集群问题应急\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n## 目录\n\n- [1. 基础概念速览](#1-基础概念速览)\n- [2. kubectl 核心命令](#2-kubectl-核心命令)\n- [3. Pod 管理](#3-pod-管理)\n- [4. Deployment 管理](#4-deployment-管理)\n- [5. Service 与网络](#5-service-与网络)\n- [6. ConfigMap 与 Secret](#6-configmap-与-secret)\n- [7. Namespace 与 RBAC](#7-namespace-与-rbac)\n- [8. Node 与集群管理](#8-node-与集群管理)\n- [9. 日志与监控](#9-日志与监控)\n- [10. 持久化存储 (PV/PVC)](#10-持久化存储-pvpvc)\n- [11. 常用排查场景速查](#11-常用排查场景速查)\n- [附录：kubectl 速查表](#附录kubectl-速查表)\n\n---\n\n## 1. 基础概念速览\n\n| 资源 | 缩写 | 说明 |\n|------|------|------|\n| Pod | `po` | 最小调度单元，包含一个或多个容器 |\n| Deployment | `deploy` | 声明式更新 Pod，管理 ReplicaSet |\n| Service | `svc` | 网络抽象层，Pod 间的服务发现 |\n| ConfigMap | `cm` | 配置管理（非敏感） |\n| Secret | 无 | 敏感信息存储（密码/密钥） |\n| Namespace | `ns` | 资源隔离逻辑单元 |\n| Node | `no` | 集群中的物理/虚拟机节点 |\n| PersistentVolume | `pv` | 存储资源 |\n| PersistentVolumeClaim | `pvc` | 存储资源申请 |\n| Ingress | `ing` | HTTP/HTTPS 路由规则 |\n| StatefulSet | `sts` | 有状态应用管理 |\n\n### 集群架构速览\n\n```\nControl Plane (Master)\n├── kube-apiserver      # 所有请求入口\n├── kube-controller-manager  # 资源控制器\n├── kube-scheduler      # Pod 调度\n└── etcd                # 集群数据存储\n\nWorker Node\n├── kubelet             # 节点代理\n├── kube-proxy          # 网络代理\n└── container-runtime  # 容器运行时（containerd/docker）\n```\n\n---\n\n## 2. kubectl 核心命令\n\n```bash\n# 基础语法\nkubectl <动词> <资源类型> [资源名] [选项]\n\n# 常用动词\nget    # 查看资源\ndescribe  # 查看资源详细信息\nlogs   # 查看 Pod 日志\nexec   # 进入 Pod 执行命令\napply  # 声明式创建/更新（推荐）\ndelete # 删除资源\nedit   # 在线编辑资源\n```\n\n### 常用选项\n\n```bash\nkubectl get pods -n kube-system              # 指定 Namespace\nkubectl get pods --all-namespaces            # 所有 Namespace\nkubectl get pods -o wide                     # 显示更多信息（IP/Node）\nkubectl get pods -o yaml                     # 以 YAML 格式输出\nkubectl get pods --show-labels               # 显示标签\nkubectl get pods -l app=nginx                # 按标签过滤\nkubectl get pods -w                          # 实时监听（watch）\nkubectl api-resources                        # 查看所有资源类型\nkubectl explain pod                          # 查看资源字段说明\n```\n\n---\n\n## 3. Pod 管理\n\n```bash\n# 查看 Pod\nkubectl get pods\nkubectl get pods -o wide\nkubectl describe pod <pod-name>               # 详细状态（排障第一步！）\n\n# 创建 Pod\nkubectl run nginx --image=nginx:latest --replicas=3    # 快速创建（测试用）\nkubectl apply -f pod.yaml                                # 通过 YAML 创建（生产）\n\n# 删除 Pod\nkubectl delete pod <pod-name>\nkubectl delete pod --all                    # 删光所有 Pod（⚠️ Deployment 会重建）\n\n# 进入 Pod\nkubectl exec -it <pod-name> -- /bin/bash\nkubectl exec -it <pod-name> -c container-name -- /bin/sh  # 多容器 Pod 指定容器\n\n# 查看 Pod 日志\nkubectl logs <pod-name>\nkubectl logs -f <pod-name>                  # 实时跟踪\nkubectl logs --tail=100 <pod-name>          # 最后 100 行\nkubectl logs -f --since=1h <pod-name>       # 最近 1 小时\nkubectl logs -l app=nginx                   # 按标签查日志（多 Pod）\n\n# 复制文件到/从 Pod\nkubectl cp /local/file <pod-name>:/remote/path\nkubectl cp <pod-name>:/remote/path /local/file\n\n# 端口转发（调试用，不经过 Service）\nkubectl port-forward pod/<pod-name> 8080:80\n```\n\n### Pod 状态解读\n\n| 状态 | 含义 | 常见原因 |\n|------|------|---------|\n| `Pending` | 等待调度 | 资源不足、PVC 未绑定、镜像拉取失败 |\n| `Running` | 正常运行 | - |\n| `CrashLoopBackOff` | 反复崩溃 | 应用启动失败、配置错误、OOM |\n| `ImagePullBackOff` | 镜像拉取失败 | 镜像名错误、仓库鉴权失败 |\n| `Error` / `OOMKilled` | 运行错误 | 内存超限、代码异常 |\n| `Terminating` | 正在终止 | 卡住可能由 finalizer 导致 |\n| `Evicted` | 被驱逐 | 节点资源压力 |\n\n---\n\n## 4. Deployment 管理\n\n```bash\n# 基础操作\nkubectl get deployments\nkubectl describe deployment <name>\nkubectl apply -f deployment.yaml\n\n# 扩缩容\nkubectl scale deployment <name> --replicas=5\nkubectl autoscale deployment <name> --min=3 --max=10 --cpu-percent=80  # HPA\n\n# 滚动更新\nkubectl set image deployment/nginx nginx=nginx:1.25   # 更新镜像\nkubectl rollout status deployment/nginx               # 查看更新状态\nkubectl rollout history deployment/nginx               # 查看更新历史\n\n# 回滚\nkubectl rollout undo deployment/nginx                  # 回滚到上一个版本\nkubectl rollout undo deployment/nginx --to-revision=2  # 回滚到指定版本\n\n# 暂停/恢复（金丝雀发布用）\nkubectl rollout pause deployment/nginx\nkubectl rollout resume deployment/nginx\n\n# 重启 Pod（不修改配置）\nkubectl rollout restart deployment/nginx\n```\n\n### 常见更新策略\n\n```yaml\n# 滚动更新（默认）\nstrategy:\n  type: RollingUpdate\n  rollingUpdate:\n    maxSurge: 25%        # 允许超出期望 Pod 数\n    maxUnavailable: 25%  # 允许不可用 Pod 数\n\n# 重建（先删后建，适合 Dev）\nstrategy:\n  type: Recreate\n```\n\n---\n\n## 5. Service 与网络\n\n```bash\n# 查看 Service\nkubectl get svc\nkubectl describe svc <name>\nkubectl get endpoints                     # 查看后端 Pod 列表\n\n# 创建 Service（暴露 Deployment）\nkubectl expose deployment nginx --port=80 --type=ClusterIP\nkubectl expose deployment nginx --port=80 --type=NodePort\nkubectl expose deployment nginx --port=80 --type=LoadBalancer\n\n# Service 类型\n# ClusterIP: 集群内部访问（默认）\n# NodePort:  节点端口访问（外部可通过节点 IP:端口访问）\n# LoadBalancer: 云厂商负载均衡器\n\n# Ingress 管理\nkubectl get ingress\nkubectl describe ingress <name>\n```\n\n### 网络排查常用命令\n\n```bash\n# 查看集群 DNS 是否正常\nkubectl run -it --rm debug --image=busybox -- /bin/sh\nnslookup <service-name>                   # DNS 解析是否正常\n# exit\n\n# 查看网络策略\nkubectl get networkpolicies\n\n# 查看 Service 后端是否正常\nkubectl get endpoints <service-name>\nkubectl describe svc <service-name>       # 看 Selector 是否匹配 Pod 标签\n```\n\n---\n\n## 6. ConfigMap 与 Secret\n\n```bash\n# ConfigMap\nkubectl create configmap app-config --from-file=config.yaml\nkubectl create configmap app-config --from-literal=key=value\nkubectl get configmap\nkubectl get configmap app-config -o yaml\nkubectl delete configmap app-config\n\n# Secret（base64 编码存储，不是加密！）\nkubectl create secret generic db-secret --from-literal=password=xxxx\nkubectl create secret tls tls-secret --cert=tls.crt --key=tls.key\nkubectl get secrets\nkubectl get secret db-secret -o yaml\nkubectl get secret db-secret -o jsonpath='{.data.password}' | base64 -d  # 解码\n```\n\n---\n\n## 7. Namespace 与 RBAC\n\n```bash\n# Namespace\nkubectl get namespaces\nkubectl create namespace myapp\nkubectl delete namespace myapp            # 会删除该 ns 下所有资源！⚠️\n\n# 切换默认 Namespace（避免每次都写 -n）\nkubectl config set-context --current --namespace=myapp\n\n# RBAC 常用操作\nkubectl get serviceaccounts\nkubectl get roles --all-namespaces\nkubectl get rolebindings --all-namespaces\nkubectl get clusterroles\nkubectl get clusterrolebindings\n```\n\n---\n\n## 8. Node 与集群管理\n\n```bash\n# 查看节点\nkubectl get nodes\nkubectl get nodes -o wide\nkubectl describe node <node-name>          # 查看节点资源使用/问题\n\n# 节点维护\nkubectl cordon <node-name>                # 标记为不可调度（已有 Pod 不受影响）\nkubectl drain <node-name> --ignore-daemonsets --delete-emptydir-data  # 排空节点\nkubectl uncordon <node-name>              # 恢复调度\n\n# 节点标签\nkubectl label node <node-name> disktype=ssd\nkubectl label node <node-name> node-role.kubernetes.io/worker-\n\n# 集群信息\nkubectl cluster-info                       # 查看集群信息\nkubectl cluster-info dump                  # 集群诊断 dump\nkubectl config view                        # 查看 kubeconfig\nkubectl config get-contexts                # 查看所有上下文\nkubectl config use-context <context>       # 切换集群上下文\nkubectl top node                           # 节点资源使用\nkubectl top pod                            # Pod 资源使用（需 metrics-server）\n```\n\n---\n\n## 9. 日志与监控\n\n```bash\n# 核心组件日志（通过 journalctl）\njournalctl -u kubelet -f                   # kubelet 实时日志\njournalctl -u kubelet --since \"1 hour ago\"\n\n# 控制平面组件（静态 Pod 用 kubectl）\nkubectl logs -n kube-system kube-apiserver-<node>\nkubectl logs -n kube-system kube-controller-manager-<node>\nkubectl logs -n kube-system kube-scheduler-<node>\nkubectl logs -n kube-system etcd-<node>\n\n# coredns 日志\nkubectl logs -n kube-system -l k8s-app=kube-dns\n\n# 容器日志清理\n# journalctl 限制（防止日志爆盘）\njournalctl --vacuum-size=500M             # 限制日志大小\njournalctl --vacuum-time=7d               # 限制日志保留天数\n```\n\n---\n\n## 10. 持久化存储 (PV/PVC)\n\n```bash\n# 查看存储资源\nkubectl get pv                            # 查看持久卷\nkubectl get pvc                           # 查看存储申请\nkubectl get storageclass                  # 查看存储类\n\n# 常见排查\nkubectl describe pvc <name>               # PVC 为何 Pending\n# PVC Pending 常见原因：\n#   1. 没有匹配的 PV\n#   2. StorageClass 不存在或 Provisioner 异常\nkubectl describe pv <name>                # 查看 PV 状态\n```\n\n### 存储简表\n\n| 场景 | StorageClass | 说明 |\n|------|-------------|------|\n| 本地测试 | `manual` | 手动创建 PV |\n| 云平台 | `standard` (GKE) / `gp2` (EKS) / `managed-csi` (AKS) | 自动 Provision |\n| 生产建议 | 使用 CSI 驱动 | 推荐，功能最全 |\n\n---\n\n## 11. 常用排查场景速查\n\n### 场景 1：Pod 一直 Pending\n\n```bash\n# 第一步：看为什么 Pending\nkubectl describe pod <pod-name>\n# 关注 Events 部分的提示\n\n# 常见原因：\n#   0/1 nodes are available: 1 Insufficient cpu  → 资源不足，加节点或调小 request\n#   0/1 nodes are available: 1 node(s) had taint → 节点有污点，加 tolerations\n#   0/1 nodes are available: 1 node(s) didn't match node selector → 标签不匹配\n#   waiting for a volume to be created → PVC 未绑定\n\n# 检查节点资源\nkubectl top node\nkubectl describe node <node-name> | grep -A 5 \"Allocated resources\"\n```\n\n### 场景 2：Pod CrashLoopBackOff\n\n```bash\n# 第一步：看日志\nkubectl logs <pod-name> --previous          # 看上次启动的日志（关键！）\n\n# 第二步：看 Events\nkubectl describe pod <pod-name> | grep -A 10 Events\n\n# 第三步：如果是 OOM\nkubectl describe pod <pod-name> | grep -i \"OOM\\|memory\"\n# 解决：加大 resources.limits.memory\n\n# 第四步：如果是启动失败\nkubectl exec -it <pod-name> -- /bin/sh      # 如果还能进入\n# 检查配置、环境变量、依赖服务是否就绪\n```\n\n### 场景 3：Service 访问不通\n\n```bash\n# 1. 检查 Service 本身\nkubectl get svc <name>\nkubectl describe svc <name>                 # 看 Selector 和 Endpoints\n\n# 2. 检查 Endpoints 是否有地址\nkubectl get endpoints <name>\n# Endpoints 为空 → Selector 没匹配到 Pod\n\n# 3. 检查 Pod 标签是否匹配\nkubectl get pods --show-labels\n# 对照 Service 的 Selector\n\n# 4. 检查 Pod 端口是否和应用一致\nkubectl describe pod <pod-name> | grep -i port\n\n# 5. 直接通过 Pod IP 测试\nkubectl get pods -o wide                    # 获取 Pod IP\n# 在集群内节点或另一个 Pod 中 curl Pod_IP:Port\n```\n\n### 场景 4：Node NotReady\n\n```bash\n# 1. 查看节点状态\nkubectl describe node <node-name> | grep -i \"condition\\|Ready\"\n\n# 2. SSH 到节点上检查\nssh user@node-ip\nsystemctl status kubelet                    # kubelet 是否运行\njournalctl -u kubelet --since \"10 min ago\"  # kubelet 日志\nsystemctl status containerd                 # 容器运行时\ndf -h                                       # 磁盘是否满\nfree -h                                     # 内存是否够\ntop                                         # 负载是否过高\n\n# 3. 检查证书是否过期\nopenssl x509 -in /var/lib/kubelet/pki/kubelet-client-current.pem -text -noout | grep -A2 Validity\n```\n\n### 场景 5：磁盘空间被容器日志撑爆\n\n```bash\n# 1. 查看各节点磁盘使用\ndf -h\n\n# 2. 查看容器日志占空间\n# 日志默认在 /var/log/pods/ 或 docker 的容器目录\ndu -sh /var/log/pods/\ndocker info | grep \"Docker Root Dir\"         # docker 数据目录\ndu -sh /var/lib/docker/containers/\n\n# 3. 清理方案\n# 方案 A：配置日志轮转（推荐）\n# 创建 /etc/docker/daemon.json\n# {\n#   \"log-driver\": \"json-file\",\n#   \"log-opts\": {\n#     \"max-size\": \"10m\",\n#     \"max-file\": \"3\"\n#   }\n# }\n# systemctl restart docker\n\n# 方案 B：紧急清理（脚本）\n# echo \"\" > $(docker inspect --format='{{.LogPath}}' <container-id>)\n\n# 方案 C：k8s 层面限制（推荐）\n# 在 Pod Spec 中设置：\n# spec.containers[].resources.limits.ephemeral-storage\n```\n\n### 场景 6：ETCD 备份与恢复\n\n```bash\n# 备份（Master 节点执行）\nETCDCTL_API=3 etcdctl snapshot save /backup/etcd-snapshot.db \\\n  --endpoints=https://127.0.0.1:2379 \\\n  --cacert=/etc/kubernetes/pki/etcd/ca.crt \\\n  --cert=/etc/kubernetes/pki/etcd/healthcheck-client.crt \\\n  --key=/etc/kubernetes/pki/etcd/healthcheck-client.key\n\n# 恢复\nETCDCTL_API=3 etcdctl snapshot restore /backup/etcd-snapshot.db \\\n  --data-dir=/var/lib/etcd-backup\n```\n\n### 场景 7：kubeadm 重置（最暴力但也最有用）\n\n```bash\n# 在问题节点执行\nkubeadm reset\n# 清理 CNI 配置\nrm -rf /etc/cni/net.d\n# 重新加入集群\nkubeadm join <控制平面IP>:6443 --token <token> --discovery-token-ca-cert-hash <hash>\n```\n\n---\n\n## 附录：kubectl 速查表\n\n### 命令自动补全（建议配置好）\n\n```bash\nsource <(kubectl completion bash)\necho \"source <(kubectl completion bash)\" >> ~/.bashrc\n\n# 设置别名（省时利器）\nalias k=kubectl\nalias kg='kubectl get'\nalias kgp='kubectl get pods'\nalias kgd='kubectl get deployments'\nalias kgs='kubectl get svc'\nalias kd='kubectl describe'\nalias kl='kubectl logs'\nalias kaf='kubectl apply -f'\ncomplete -F __start_kubectl k\n```\n\n### 常用组合命令\n\n```bash\n# 输出到文件（离线分析）\nkubectl get pods -o wide > pods.txt\nkubectl describe pods > pods-detail.txt\nkubectl get all --all-namespaces > cluster-all.txt\n\n# 删除所有 CrashLoopBackOff 的 Pod\nkubectl delete pods --field-selector=status.phase=Failed\n\n# 查看资源使用排序\nkubectl top pod -A --sort-by=cpu\nkubectl top pod -A --sort-by=memory\n\n# 查看某节点上运行的 Pod\nkubectl get pods --all-namespaces --field-selector=spec.nodeName=<node-name>\n\n# 实时追踪 API Server 请求（调试用）\nkubectl logs -n kube-system -l component=kube-apiserver -f\n```\n\n---\n\n# OpenStack 运维命令手册\n\n> 适用场景：OpenStack 云平台日常管理、虚拟机/网络/存储排障\n> 适用版本：OpenStack Train+/Wallaby+/Xena+（涵盖核心服务）\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n## 目录\n\n- [1. OpenStack 架构速览](#1-openstack-架构速览)\n- [2. 通用 openstack CLI](#2-通用-openstack-cli)\n- [3. 认证与项目管理](#3-认证与项目管理)\n- [4. 计算 (Nova)](#4-计算-nova)\n- [5. 镜像 (Glance)](#5-镜像-glance)\n- [6. 网络 (Neutron)](#6-网络-neutron)\n- [7. 存储 (Cinder) — 块存储](#7-存储-cinder--块存储)\n- [8. 存储 (Manila) — 文件存储](#8-存储-manila--文件存储)\n- [9. 对象存储 (Swift)](#9-对象存储-swift)\n- [10. 编排 (Heat)](#10-编排-heat)\n- [11. 监控与计量 (Ceilometer/Gnocchi)](#11-监控与计量-ceilometergnocchi)\n- [12. 日志排查与定位](#12-日志排查与定位)\n- [13. 常用排查场景速查](#13-常用排查场景速查)\n- [附录：命令快速索引](#附录命令快速索引)\n\n---\n\n## 1. OpenStack 架构速览\n\n### 核心服务\n\n| 服务 | 项目名 | 端口 | 功能 |\n|------|--------|------|------|\n| 认证 | Keystone | 5000 | 身份认证与权限 |\n| 计算 | Nova | 8774 | 虚拟机生命周期管理 |\n| 镜像 | Glance | 9292 | 虚拟机镜像管理 |\n| 网络 | Neutron | 9696 | 虚拟网络/子网/路由 |\n| 块存储 | Cinder | 8776 | 云硬盘管理 |\n| 对象存储 | Swift | 8080 | 对象存储 |\n| 文件存储 | Manila | 8786 | 共享文件系统 |\n| 编排 | Heat | 8004 | 资源编排 |\n| 监控 | Ceilometer | 8777 | 计量与监控 |\n| 面板 | Horizon | 80/443 | Web 管理界面 |\n\n### 认证方式（在控制节点执行前需先 source）\n\n```bash\n# 加载管理员凭证\nsource /root/admin-openrc      # 或 /etc/kolla/admin-openrc.sh\nsource /root/keystonerc_admin   # 或\n\n# 加载普通用户凭证\nsource /root/demo-openrc\n\n# 验证是否生效\nopenstack token issue\n```\n\n---\n\n## 2. 通用 openstack CLI\n\n```bash\n# 查看版本\nopenstack --version\n\n# 通用选项\nopenstack <资源> list                               # 列出资源\nopenstack <资源> show <id/name>                     # 查看详情\nopenstack <资源> create [选项]                       # 创建\nopenstack <资源> set <id/name> --属性 值             # 修改属性\nopenstack <资源> unset <id/name> --属性              # 取消属性\nopenstack <资源> delete <id/name>                    # 删除\n\n# 常用资源类型\n# server       —— 虚拟机（Nova）\n# image        —— 镜像（Glance）\n# flavor       —— 规格（CPU/内存）\n# network      —— 网络（Neutron）\n# subnet       —— 子网\n# router       —— 路由器\n# volume       —— 云硬盘（Cinder）\n# project      —— 项目/租户（Keystone）\n# user         —— 用户\n# role         —— 角色\n```\n\n---\n\n## 3. 认证与项目管理\n\n### 项目（Project / Tenant）\n\n```bash\n# 查看项目\nopenstack project list\nopenstack project show <project-name>\n\n# 创建项目\nopenstack project create --description \"生产环境\" production\n\n# 禁用/启用项目\nopenstack project set <project> --disable\nopenstack project set <project> --enable\n```\n\n### 用户管理\n\n```bash\nopenstack user list\nopenstack user show <username>\nopenstack user create --project production --password xxxx <username>\nopenstack user set <username> --password xxxx\nopenstack user delete <username>\n```\n\n### 角色与权限\n\n```bash\nopenstack role list\nopenstack role create admin\nopenstack role add --user <user> --project <project> admin\nopenstack role remove --user <user> --project <project> admin\nopenstack role assignment list --user <user> --project <project>\n```\n\n---\n\n## 4. 计算 (Nova)\n\n### 虚拟机生命周期\n\n```bash\n# 列出虚拟机\nopenstack server list                                  # 当前项目\nopenstack server list --all-projects                   # 所有项目（admin）\nopenstack server list --host <compute-node>             # 指定计算节点\nopenstack server list --status ERROR                   # 只看异常\n\n# 创建虚拟机\nopenstack server create \\\n  --flavor m1.medium \\\n  --image centos-7 \\\n  --network internal-net \\\n  --key-name mykey \\\n  --security-group default \\\n  my-vm-name\n\n# 使用具体参数（指定可用域/主机）\nopenstack server create \\\n  --flavor m1.large \\\n  --image ubuntu-22.04 \\\n  --nic net-id=<network-uuid> \\\n  --availability-zone nova:compute-01 \\\n  --block-device source=image,id=<image-uuid>,dest=volume,size=50,shutdown=remove \\\n  my-instance\n\n# 查看详情（排障核心）\nopenstack server show <server-id>\nnova show <server-id>                                  # 旧版命令\nopenstack console log show <server>                    # 查看控制台日志\n\n# 操作虚拟机\nopenstack server start <server>\nopenstack server stop <server>\nopenstack server reboot <server>                        # 软重启\nopenstack server reboot --hard <server>                 # 硬重启\nopenstack server suspend <server>                       # 挂起\nopenstack server resume <server>                        # 恢复\nopenstack server rescue <server>                        # 救援模式\nopenstack server unrescue <server>\n\n# 删除\nopenstack server delete <server>\n```\n\n### 修改虚拟机\n\n```bash\n# 变更规格（热迁移 resize）\nopenstack server resize --flavor m1.large <server>\nopenstack server resize confirm <server>                 # 确认变更\nopenstack server resize revert <server>                  # 回滚变更\n\n# 重建（更换镜像启动）\nopenstack server rebuild --image <new-image> <server>\n\n# 挂载/卸载云硬盘\nopenstack server add volume <server> <volume>\nopenstack server remove volume <server> <volume>\n\n# 浮动 IP 管理\nopenstack floating ip create public-net\nopenstack server add floating ip <server> <floating-ip>\nopenstack server remove floating ip <server> <floating-ip>\n```\n\n### 虚拟机排障常用命令\n\n```bash\n# 查看虚拟机所在物理机（排障第一步）\nopenstack server show <server> | grep OS-EXT-SRV-ATTR:host\n\n# 检查虚拟机状态\nopenstack server show <server> -c status -c task_state -c power_state\n\n# 查看控制台输出（类似物理机的 VGA 输出）\nopenstack console log show <server>                     # 启动日志\nopenstack console url show <server>                     # VNC 控制台 URL\n\n# 查看迁移历史\nopenstack server show <server> | grep OS-EXT-SRV-ATTR:host\n\n# 查看虚拟机在计算节点的进程（在计算节点上）\nps aux | grep qemu\nvirsh list                                               # libvirt 查看\nvirsh dumpxml <instance-uuid>                            # 查看 XML 定义\n```\n\n### 计算节点管理\n\n```bash\n# 查看计算节点列表\nopenstack host list\nopenstack compute service list\nnova service-list                                        # 旧版\n\n# 启用/禁用计算节点\nopenstack compute service set <host> nova-compute --enable/--disable\n\n# 查看计算节点资源\nopenstack host show <compute-node>\nopenstack hypervisor list\nopenstack hypervisor show <compute-node>\nopenstack hypervisor stats show\n\n# 迁移虚拟机（ evacuate— 宿主机宕机时用）\nnova host-evacuate --target_host <target> <source-host>  # 旧版\nopenstack server migrate <server>                         # 在线迁移（需配置共享存储）\n```\n\n---\n\n## 5. 镜像 (Glance)\n\n```bash\n# 镜像操作\nopenstack image list\nglance image-list                                         # 旧版\n\nopenstack image show <image-id>\nopenstack image create \"CentOS 7\" --file centos7.qcow2 --disk-format qcow2 --container-format bare --public\nopenstack image delete <image-id>\n\n# 常用选项\n# --public      所有项目可见\n# --private     仅本项目可见\n# --protected   禁止删除\n# --disk-format qcow2 / raw / vmdk\n# --min-disk 20    最低系统盘要求\n# --min-ram 2048   最低内存要求\n\n# 导出镜像\nopenstack image save --file ./backup.qcow2 <image-id>\n\n# 更新镜像属性\nopenstack image set <image-id> --name \"new-name\" --property os_version=7.9\n```\n\n---\n\n## 6. 网络 (Neutron)\n\n### 基础网络查看\n\n```bash\n# 网络列表\nopenstack network list\nopenstack network show <network>\nneutron net-list                                           # 旧版\n\n# 子网\nopenstack subnet list\nopenstack subnet show <subnet>\nneutron subnet-list\n\n# 端口\nopenstack port list\nopenstack port list --server <server-id>                  # 查看虚拟机关联端口\nopenstack port show <port-id>\nopenstack port list --device-id <server-id>\n```\n\n### 网络创建\n\n```bash\n# 创建网络（Provider — 直接连接物理网络）\nopenstack network create --provider-physical-network physnet1 \\\n  --provider-network-type flat \\\n  --external \\\n  public-net\n\n# 创建网络（Self-Service — overlay 网络）\nopenstack network create private-net\n\n# 创建子网\nopenstack subnet create --network private-net \\\n  --subnet-range 10.0.1.0/24 \\\n  --dhcp \\\n  --dns-nameserver 8.8.8.8 \\\n  private-subnet\n\n# 创建路由器\nopenstack router create router1\nopenstack router add subnet router1 private-subnet         # 连接私有子网\nopenstack router set router1 --external-gateway public-net  # 设置外网网关\n```\n\n### 安全组\n\n```bash\nopenstack security group list\nopenstack security group show <group>\n\n# 创建规则\nopenstack security group rule create --protocol tcp --dst-port 22:22 --remote-ip 0.0.0.0/0 <group>\nopenstack security group rule create --protocol icmp --remote-ip 0.0.0.0/0 <group>\n\n# 允许所有内部通信\nopenstack security group rule create --protocol tcp --dst-port 1:65535 --remote-group <group-id> <group>\n```\n\n### 网络排查常用命令\n\n```bash\n# 查看 DHCP 租约\nneutron dhcp-agent-list-hosting-net <network>\n\n# 查看路由器命名空间（网络节点上执行）\nip netns\n# qrouter-xxx  → 路由器命名空间\n# qdhcp-xxx    → DHCP 命名空间\n\n# 进入路由器命名空间排查\nip netns exec qrouter-<uuid> ping 10.0.1.1\nip netns exec qrouter-<uuid> ip addr\nip netns exec qrouter-<uuid> iptables -t nat -L\n\n# 查看端口绑定状态（排障关键）\nopenstack port show <port-id> -c binding_host_id -c binding_vnic_type -c binding_vif_type\n\n# 端口未绑定的常见原因：\n#   1. Nova 和 Neutron 通信异常\n#   2. 计算节点上的 OVS/linuxbridge agent 挂了\n#   3. 配额限制\n```\n\n### 网络 Agent 管理\n\n```bash\n# 查看网络 Agent 状态\nopenstack network agent list\nopenstack network agent list --agent-type dhcp\nopenstack network agent list --agent-type l3\nopenstack network agent list --agent-type open-vswitch\nopenstack network agent list --agent-type linux-bridge\n\n# 查看 Agent 详情\nopenstack network agent show <agent-id>\n\n# 查看 Agent 是否存活（在对应节点上）\nsystemctl status neutron-dhcp-agent\nsystemctl status neutron-l3-agent\nsystemctl status neutron-openvswitch-agent\nsystemctl status neutron-linuxbridge-agent\nsystemctl status neutron-metadata-agent\n```\n\n---\n\n## 7. 存储 (Cinder) — 块存储\n\n```bash\n# 查看云硬盘\nopenstack volume list\nopenstack volume list --all-projects                      # 所有项目（admin）\nopenstack volume show <volume-id>\ncinder list                                                # 旧版\n\n# 创建云硬盘\nopenstack volume create --size 50 --image centos-7 --bootable boot-volume\nopenstack volume create --size 100 --volume-type SSD --name data-disk\n\n# 删除\nopenstack volume delete <volume-id>\n\n# 快照\nopenstack volume snapshot list\nopenstack volume snapshot create --volume <volume-id> snapshot1\nopenstack volume snapshot delete <snapshot-id>\n\n# 从快照创建云硬盘\nopenstack volume create --snapshot <snapshot-id> --size 100 restored-volume\n\n# 扩容\nopenstack volume set <volume-id> --size 200                 # 扩容到 200G\n# 注意：扩容后须在系统内扩展分区（guest 内部操作）\n\n# 查看存储后端\ncinder service-list\nopenstack volume service list\n```\n\n### Cinder 排障\n\n```bash\n# 查看云硬盘所在存储节点\nopenstack volume show <volume-id> | grep \"os-vol-host-attr:host\"\n\n# 查看后端状态\ncinder service-list | grep cinder-volume\n\n# 云硬盘状态为 error 时\nopenstack volume delete <volume-id>        # 先删\n# 或\nopenstack volume reset state --state available <volume-id>  # 强制修正状态\n\n# 查看存储后端详细信息\ncat /etc/cinder/cinder.conf | grep enabled_backends\nlsblk                                              # 查看后端存储设备\n```\n\n---\n\n## 8. 存储 (Manila) — 文件存储\n\n```bash\n# 查看共享文件系统\nmanila list\n\n# 创建共享\nmanila create --share-type default --name myshare CEPHFS 10    # 10GB 的 CephFS 共享\nmanila access-allow myshare ip 10.0.0.0/24                     # 授权网段访问\n\n# 挂载到客户端（需要 nfs-utils / ceph-common）\nmount -t nfs <manila-ip>:/shares/myshare /mnt/share\n```\n\n---\n\n## 9. 对象存储 (Swift)\n\n```bash\n# Container 操作\nswift list\nswift post my-container                         # 创建 container\nswift delete my-container\n\n# Object 操作\nswift upload my-container /path/to/file\nswift download my-container file\nswift list my-container\nswift delete my-container file\nswift stat my-container                         # 查看状态\n\n# 临时 URL（临时访问权限）\nswift tempurl GET 3600 /v1/AUTH_xxx/container/object key\n```\n\n---\n\n## 10. 编排 (Heat)\n\n```bash\n# 栈管理\nopenstack stack list\nopenstack stack show <stack-name>\nopenstack stack create --template server.yaml --parameters \"key=value\" my-stack\nopenstack stack update --template server.yaml my-stack\nopenstack stack delete my-stack\n\n# 查看事件（排障关键）\nopenstack stack event list my-stack\nopenstack stack event show my-stack <event-id>\n\n# 查看输出\nopenstack stack output list my-stack\nopenstack stack output show my-stack <output-key>\n\n# 查看资源状态\nopenstack stack resource list my-stack\nopenstack stack resource show my-stack <resource-name>\n```\n\n---\n\n## 11. 监控与计量 (Ceilometer/Gnocchi)\n\n```bash\n# 查看资源使用（在控制节点上）\nopenstack metric list                                     # 查看指标列表\nopenstack metric show <metric-id>\n\n# 旧版 Ceilometer\nceilometer meter-list\nceilometer sample-list --meter cpu_util --query \"resource_id=<server-id>\"\n\n# 查看实例使用情况（原始方式，无需监控组件）\nopenstack server show <server> -c OS-SRV-USG:launched_at -c OS-SRV-USG:terminated_at\n\n# 在计算节点查看虚拟机 CPU/内存实际使用\nvirsh dominfo <instance-uuid>\nvirsh domstats <instance-uuid>\n```\n\n---\n\n## 12. 日志排查与定位\n\n### 各服务日志位置\n\n| 服务 | 日志路径 |\n|------|---------|\n| Nova | `/var/log/nova/nova-{api,scheduler,conductor,compute}.log` |\n| Neutron | `/var/log/neutron/neutron-{server,dhcp,l3,ovs-agent}.log` |\n| Cinder | `/var/log/cinder/cinder-{api,scheduler,volume}.log` |\n| Glance | `/var/log/glance/glance-{api,registry}.log` |\n| Keystone | `/var/log/keystone/keystone.log` |\n| Heat | `/var/log/heat/heat-{api,engine}.log` |\n| RabbitMQ | `/var/log/rabbitmq/` |\n| MySQL | `/var/log/mysql/` |\n\n> 如使用 Kolla 容器化部署，日志在 `/var/log/kolla/<service>/` 下\n\n### 日志排查常用技巧\n\n```bash\n# 查看 Nova 错误\ngrep -i \"error\\|traceback\" /var/log/nova/nova-compute.log | tail -50\n\n# 查看 Neutron 错误\ngrep -i \"error\\|traceback\" /var/log/neutron/neutron-server.log | tail -30\n\n# 实时跟踪\ntail -f /var/log/nova/nova-compute.log\ntail -f /var/log/neutron/neutron-server.log\n\n# 根据虚拟机 UUID 全局搜索\ngrep \"<instance-uuid>\" /var/log/nova/*.log\ngrep \"<instance-uuid>\" /var/log/neutron/*.log\n\n# 根据 Request ID 关联多个日志（OpenStack 分布式追踪）\ngrep \"<request-id>\" /var/log/nova/*.log /var/log/neutron/*.log /var/log/cinder/*.log\n\n# Kolla 容器化部署\ndocker logs <container-name>                              # 查看容器日志\ndocker logs -f nova_compute                               # 实时跟踪\ncat /var/log/kolla/nova/nova-compute.log                  # 持久化日志\n```\n\n---\n\n## 13. 常用排查场景速查\n\n### 场景 1：虚拟机创建失败（ERROR 状态）\n\n```bash\n# 1. 查看虚拟机详情\nopenstack server show <server-id>\nopenstack console log show <server>\n\n# 2. 查看 Nova 日志\ngrep -i \"error\\|traceback\" /var/log/nova/nova-compute.log | tail -20\ntail -50 /var/log/nova/nova-scheduler.log              # 调度阶段问题\n\n# 3. 检查计算节点资源是否足够\nopenstack hypervisor stats show\nfree -h && df -h                                        # 在计算节点上\n\n# 4. 检查镜像是否可用\nopenstack image show <image-id>\n\n# 5. 检查网络是否可用\nopenstack network show <network-id>\nopenstack subnet show <subnet-id>\n\n# 6. 检查配额是否超出\nopenstack quota show <project-id>\n\n# 7. 查看计算节点 agent 是否正常\nopenstack compute service list\n```\n\n### 场景 2：虚拟机网络不通\n\n```bash\n# 1. 查看安全组是否放行\nopenstack security group rule list <group>\n\n# 2. 查看浮动 IP 是否正确绑定\nopenstack server show <server> | grep addresses\nopenstack floating ip list\n\n# 3. 查看端口状态\nopenstack port show <port-id> -c binding_host_id -c binding_vif_type -c device_owner\n\n# 4. 检查 DHCP Agent\nopenstack network agent list --agent-type dhcp\n\n# 5. 在 DHCP 命名空间中排查\n# 网络节点上：\nip netns exec qdhcp-<net-uuid> ping <vm-ip>\n\n# 6. 检查 OVS/LB Agent\nopenstack network agent list --agent-type open-vswitch\nopenstack network agent list --agent-type linux-bridge\n\n# 7. 查看 Neutron 日志\ngrep -i \"error\\|traceback\" /var/log/neutron/neutron-server.log | tail -20\n```\n\n### 场景 3：计算节点宕机后虚拟机恢复\n\n```bash\n# 1. 确认计算节点状态\nopenstack compute service list | grep <compute-node>\nopenstack hypervisor list | grep <compute-node>\n\n# 2. 检查哪些虚拟机受影响\nopenstack server list --host <compute-node> --all-projects\n\n# 3. 强制关机（如果状态未更新）\nnova force-down --service <compute-node>\n\n# 4. 疏散（在可恢复时使用）\nnova host-evacuate --target_host <target-node> <source-node>\n\n# 5. 或逐个重建\nopenstack server rebuild --image <original-image> <server-id>\n\n# 6. 如果计算节点恢复后重新上线\nopenstack compute service set <node> nova-compute --enable\n```\n\n### 场景 4：云硬盘无法挂载或状态异常\n\n```bash\n# 1. 查看云硬盘状态\nopenstack volume show <volume-id>\n\n# 2. 查看归属（是否已被其他虚机占用）\nopenstack volume show <volume-id> | grep attached\n\n# 3. 强制修正状态（如果需要重新挂载）\nopenstack volume reset state --state available <volume-id>\n\n# 4. 检查 Cinder 服务\ncinder service-list\n\n# 5. 查看 Cinder 日志\ngrep -i \"error\\|traceback\" /var/log/cinder/cinder-volume.log | tail -20\n```\n\n### 场景 5：OpenStack 服务全部或部分不可用\n\n```bash\n# 1. 检查各个服务的 systemd 状态\nsystemctl status openstack-nova-api\nsystemctl status openstack-nova-scheduler\nsystemctl status openstack-nova-conductor\nsystemctl status openstack-nova-compute\nsystemctl status openstack-neutron-server\nsystemctl status openstack-cinder-api\n# 或在 Kolla 部署中：\ndocker ps -a | grep nova\ndocker ps -a | grep neutron\n\n# 2. 检查 RabbitMQ 集群状态\nrabbitmqctl cluster_status\nrabbitmqctl list_queues | grep -i \"nova\\|neutron\\|cinder\"\n\n# 3. 检查数据库\nmysql -h <db-host> -u root -p\n# 在 MySQL 控制台：\n# SHOW STATUS LIKE '%wsrep%';       # Galera 集群状态\n# SHOW PROCESSLIST;\n\n# 4. 检查 Keystone 连通性\nopenstack token issue                  # 基础认证是否正常\ncurl -s http://<keystone-ip>:5000/v3  # API 是否可达\n\n# 5. 检查 Glance 连通性\nopenstack image list\n\n# 6. 消息队列积压排查\nrabbitmqctl list_queues name messages messages_ready messages_unacknowledged | sort -n -k2\n```\n\n### 场景 6：Kolla 容器化部署排障\n\n```bash\n# 查看容器状态\ndocker ps -a\ndocker ps -a --format \"table {{.Names}}\\t{{.Status}}\\t{{.Ports}}\"\n\n# 查看容器日志\ndocker logs nova_compute --tail 50\ndocker logs -f neutron_server\n\n# 进入容器排查\ndocker exec -it nova_compute bash\ndocker exec -it nova_compute cat /etc/nova/nova.conf\n\n# 重启容器\ndocker restart nova_compute\n\n# Kolla 重建特定容器\nkolla-ansible -i multinode reconfigure --tags nova      # 重新配置\nkolla-ansible -i multinode deploy --tags nova            # 重新部署\n\n# 查看 Kolla 整体状态\nkolla-ansible -i multinode check                        # 健康检查\n```\n\n---\n\n## 附录：命令快速索引（按字母）\n\n| 命令 | 分类 | 用途 |\n|------|------|------|\n| `ceilometer meter-list` | 监控 | 查看计量项 |\n| `cinder service-list` | 存储 | 查看 Cinder 后端服务 |\n| `docker logs` | 容器 | Kolla 容器日志 |\n| `glance image-list` | 镜像 | 查看镜像列表 |\n| `ip netns exec` | 网络 | 进入网络命名空间排障 |\n| `kolla-ansible check` | 部署 | Kolla 健康检查 |\n| `neutron agent-list` | 网络 | 查看网络 Agent |\n| `nova service-list` | 计算 | 查看 Nova 服务 |\n| `openstack compute service list` | 计算 | 计算服务状态 |\n| `openstack console log show` | 计算 | 虚拟机控制台日志 |\n| `openstack flavor list` | 计算 | 查看规格列表 |\n| `openstack floating ip list` | 网络 | 浮动 IP 列表 |\n| `openstack hypervisor list` | 计算 | 查看计算节点 |\n| `openstack image list` | 镜像 | 查看镜像列表 |\n| `openstack network agent list` | 网络 | 查看网络 Agent |\n| `openstack network list` | 网络 | 查看网络列表 |\n| `openstack port list` | 网络 | 查看端口列表 |\n| `openstack project list` | 认证 | 项目列表 |\n| `openstack quota show` | 认证 | 查看配额 |\n| `openstack role list` | 认证 | 角色列表 |\n| `openstack router list` | 网络 | 路由器列表 |\n| `openstack security group list` | 网络 | 安全组列表 |\n| `openstack server list` | 计算 | 虚拟机列表 |\n| `openstack server show` | 计算 | 虚拟机详情 |\n| `openstack stack list` | 编排 | 查看堆栈 |\n| `openstack subnet list` | 网络 | 子网列表 |\n| `openstack token issue` | 认证 | 验证认证 |\n| `openstack user list` | 认证 | 用户列表 |\n| `openstack volume list` | 存储 | 云硬盘列表 |\n| `rabbitmqctl cluster_status` | 消息 | 消息队列状态 |\n| `virsh list` | 计算 | libvirt 虚拟机列表 |\n\n---\n\n> **运维建议：**\n> 1. 日常巡检关注 `openstack compute service list` 和 `openstack network agent list` —— 服务挂了第一时间发现\n> 2. 虚拟机出问题最先看 `openstack server show` 和 `openstack console log show`\n> 3. 网络不通先看安全组和浮动 IP，其次看 Neutron Agent 状态\n> 4. 学会用 Request ID 串联各服务日志——这是 OpenStack 排障的核心技能\n\n---\n\n# Ansible 自动化运维手册\n\n> 适用场景：Ansible 批量运维、自动化配置管理、Playbook 编写与排障\n> 适用版本：Ansible Core ≥ 2.12 / ansible-base ≥ 2.10 / community.general\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n## 目录\n\n- [1. Ansible 架构速览](#1-ansible-架构速览)\n- [2. 安装与配置](#2-安装与配置)\n- [3. Inventory 主机清单](#3-inventory-主机清单)\n- [4. Ad-hoc 命令](#4-ad-hoc-命令)\n- [5. Playbook 基础](#5-playbook-基础)\n- [6. 核心模块速查](#6-核心模块速查)\n  - [6.1 文件操作](#61-文件操作)\n  - [6.2 命令执行](#62-命令执行)\n  - [6.3 包管理](#63-包管理)\n  - [6.4 服务管理](#64-服务管理)\n  - [6.5 用户与权限](#65-用户与权限)\n  - [6.6 网络检查](#66-网络检查)\n  - [6.7 系统信息](#67-系统信息)\n  - [6.8 容器管理](#68-容器管理)\n- [7. 变量与 Facts](#7-变量与-facts)\n- [8. 模板 (Jinja2)](#8-模板-jinja2)\n- [9. 条件与循环](#9-条件与循环)\n- [10. Roles 角色](#10-roles-角色)\n- [11. Ansible Vault 加密](#11-ansible-vault-加密)\n- [12. Tags 与 Limit](#12-tags-与-limit)\n- [13. 常用排查场景速查](#13-常用排查场景速查)\n- [附录：快速索引](#附录快速索引)\n\n---\n\n## 1. Ansible 架构速览\n\n### 核心概念\n\n| 概念 | 说明 |\n|------|------|\n| **Control Node** | 安装 Ansible 的控制节点（可以是任意 Linux 机器） |\n| **Managed Node** | 被管理的目标主机（通过 SSH 连接） |\n| **Inventory** | 主机清单（INI 或 YAML 格式，定义哪些主机被管理） |\n| **Module** | 执行特定任务的代码单元（如 `copy`、`yum`、`service`） |\n| **Playbook** | YAML 格式的任务编排文件（一组 plays 的有序集合） |\n| **Role** | Playbook 的组织单元（按功能拆分 tasks/handlers/vars/templates） |\n| **Task** | Playbook 中最小的执行单元（调用一个模块） |\n| **Handler** | 由 notify 触发的特殊 task（如重启服务） |\n| **Fact** | 目标主机的系统信息（由 Ansible 自动收集，以变量形式暴露） |\n\n### 执行模式\n\n```\nControl Node                    Managed Nodes\n┌─────────────────┐            ┌──────────────┐\n│  Playbook.yml   │            │ 192.168.1.10 │\n│       ↓         │   SSH      ├──────────────┤\n│  Ansible Engine │ ─────────→ │ 192.168.1.11 │\n│  (Python)       │   (模块推  ├──────────────┤\n│       ↑         │    送+执  │ 192.168.1.12 │\n│  Inventory      │    行)    └──────────────┘\n└─────────────────┘\n```\n\nAnsible 是无代理架构（Agentless），通过 SSH 把模块推送到目标主机执行，执行完即清理，不在目标主机上驻留进程。\n\n### 工作流程\n\n```text\n1. 控制节点读取 Inventory（确定目标主机）\n2. 加载变量（group_vars / host_vars / play vars）\n3. 按 Playbook 顺序执行 plays\n4. 每个 Play 内按 tasks 顺序依次执行\n5. 每个 task 调用一个模块，模块推送到远端执行\n6. 模块执行完毕后返回 JSON 结果\n7. 结果中可以触发 handler（如配置变更后重启服务）\n```\n\n---\n\n## 2. 安装与配置\n\n### 安装\n\n```bash\n# CentOS / RHEL / Rocky — EPEL 源安装\nyum install -y epel-release\nyum install -y ansible\n\n# Ubuntu / Debian — PPA 安装\napt update\napt install -y software-properties-common\nadd-apt-repository --yes --update ppa:ansible/ansible\napt install -y ansible\n\n# 验证安装\nansible --version\n# 输出示例：\n# ansible [core 2.15.x]\n#   config file = /etc/ansible/ansible.cfg\n#   python version = 3.9.x\n\n# Pip 安装（推荐，获取最新版）\npip3 install ansible\n```\n\n### 主配置文件\n\n```bash\n# 配置文件查找顺序（第一个找到的生效）：\n# 1. $ANSIBLE_CONFIG 环境变量\n# 2. ./ansible.cfg（当前目录）\n# 3. ~/.ansible.cfg（用户主目录）\n# 4. /etc/ansible/ansible.cfg（全局）\n\n# 生成默认配置\nansible-config init --disabled > ansible.cfg\n\n# 查看当前生效配置\nansible-config list\nansible-config dump\n```\n\n### 最小配置示例\n\n```ini\n# ansible.cfg\n[defaults]\ninventory = hosts.ini              # 主机清单文件\nhost_key_checking = False          # 首次连接跳过 Host Key 检查（仅内网安全环境）\nremote_user = root                 # SSH 远程用户\ntimeout = 30                       # SSH 连接超时（秒）\n\n[ssh_connection]\npipelining = True                  # 开启管道加速，大幅提升执行效率\ncontrol_path = /tmp/%%h-%%r-%%p   # SSH Control Master 路径\n```\n\n### SSH 免密配置（必须）\n\n```bash\n# 控制节点生成密钥\nssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N \"\"\n\n# 分发公钥到目标主机\nssh-copy-id -i ~/.ssh/id_ed25519.pub root@192.168.1.10\nssh-copy-id -i ~/.ssh/id_ed25519.pub root@192.168.1.11\n\n# 验证免密登录\nssh root@192.168.1.10 \"hostname\"\n\n# SSH Config 简化（~/.ssh/config）\ncat >> ~/.ssh/config << 'EOF'\nHost 192.168.1.*\n  User root\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\nEOF\n```\n\n---\n\n## 3. Inventory 主机清单\n\n### INI 格式（传统用法）\n\n```ini\n# hosts.ini\n[web]                          # 主机组\n192.168.1.10 ansible_host=web01.example.com\n192.168.1.11\n\n[db]\ndb1 ansible_host=192.168.1.20 ansible_user=admin\ndb2 ansible_host=192.168.1.21 ansible_port=2222\n\n[proxy]\n192.168.1.30\n\n[all:vars]                     # 全局变量\nntp_server = ntp.example.com\nproxy_server = proxy.example.com\n\n[web:vars]                     # 组变量\nhttp_port = 8080\n```\n\n### YAML 格式（推荐，更适合复杂场景）\n\n```yaml\
