                # 是否存在\nredis-cli EXPIRE mykey 3600                          # 设置过期（秒）\nredis-cli TTL mykey                                  # 查看剩余时间\nredis-cli TYPE mykey                                 # 查看类型\nredis-cli KEYS \"user:*\"                              # 按模式查找（生产慎用）\nredis-cli SCAN 0 MATCH \"user:*\" COUNT 100            # 游标遍历（推荐）\n\n# 批量操作（管道模式，一次网络往返）\nredis-cli --pipe < commands.txt                      # txt 内每行一个命令\necho \"SET k1 v1\\nSET k2 v2\" | redis-cli --pipe\n\n# 批量删除\nredis-cli KEYS \"cache:*\" | xargs redis-cli DEL       # 生产慎用\nredis-cli --scan --pattern \"cache:*\" | xargs redis-cli DEL  # 推荐\n\n# 查看键信息\nredis-cli DEBUG OBJECT mykey                         # 键的详细信息\nredis-cli MEMORY USAGE mykey                         # 键的内存占用（Redis 4+）\n\n# 重命名\nredis-cli RENAME oldkey newkey\n\n# 查看所有客户端\nredis-cli CLIENT LIST\n\n# 杀掉客户端\nredis-cli CLIENT KILL 127.0.0.1:12345\nredis-cli CLIENT KILL TYPE normal                   # 杀掉所有普通客户端\n```\n\n#### 3.3 数据操作（交互模式）\n\n```bash\nredis-cli\n```\n\n```redis\n# String\nSET user:1:name \"Alice\"\nGET user:1:name\nSET counter 100 INCR counter                         # 原子递增\nINCRBY counter 50                                    # 加 50\nDECR counter\n\n# Hash\nHSET user:1 name \"Alice\" age 30\nHGET user:1 name\nHGETALL user:1\nHDEL user:1 age\nHEXISTS user:1 email\n\n# List（队列/栈）\nLPUSH queue \"task1\" \"task2\"                          # 左进\nRPOP queue                                           # 右出（FIFO 队列）\nBRPOP queue 5                                        # 阻塞弹出（5秒超时）\nLLEN queue                                           # 长度\nLRANGE queue 0 -1                                    # 查看全部\n\n# Set（去重集合）\nSADD tags:article1 \"redis\" \"database\"\nSMEMBERS tags:article1\nSISMEMBER tags:article1 \"redis\"                      # 是否存在\nSINTER tags:article1 tags:article2                   # 交集\n\n# Sorted Set（排行榜）\nZADD leaderboard 100 \"Alice\" 200 \"Bob\"\nZRANGE leaderboard 0 -1 WITHSCORES                   # 按分数升序\nZREVRANGE leaderboard 0 9 WITHSCORES                 # Top 10\nZSCORE leaderboard \"Alice\"                           # 查分数\nZRANK leaderboard \"Alice\"                            # 排名（从0开始）\n```\n\n#### 3.4 持久化与备份\n\n```bash\n# RDB（快照）— 手动触发\nredis-cli SAVE                                       # 同步保存（阻塞）\nredis-cli BGSAVE                                     # 后台保存（推荐）\nredis-cli LASTSAVE                                   # 上次保存时间戳\n\n# AOF（追加日志）— 重写\nredis-cli BGREWRITEAOF                               # 后台重写 AOF\n\n# 备份（直接复制文件，Redis 运行时也可以）\ncp /var/lib/redis/dump.rdb /backup/dump_$(date +%Y%m%d).rdb\ncp /var/lib/redis/appendonly.aof /backup/\n\n# 恢复\nsystemctl stop redis\ncp /backup/dump.rdb /var/lib/redis/dump.rdb\nsystemctl start redis\n\n# 远程备份\nredis-cli --rdb /tmp/dump.rdb                        # 远程导出 RDB\n```\n\n#### 3.5 主从与哨兵\n\n```bash\n# 从库配置 redis.conf\n# replicaof 10.0.0.1 6379\n# masterauth password\n\n# 查看复制状态\nredis-cli INFO replication\n# role:slave — 是 slave\n# master_link_status:up — 连接正常\n# master_last_io_seconds_ago:0 — 同步延迟\n\n# 哨兵模式\nredis-cli -p 26379 SENTINEL masters                  # 列出所有主节点\nredis-cli -p 26379 SENTINEL slaves mymaster          # 列出某主节点的从\nredis-cli -p 26379 SENTINEL get-master-addr-by-name mymaster  # 获取主节点地址\nredis-cli -p 26379 SENTINEL failover mymaster        # 手动故障转移\n\n# 集群模式\nredis-cli CLUSTER INFO\nredis-cli CLUSTER NODES\nredis-cli --cluster check 10.0.0.1:6379             # 检查集群状态\n```\n\n#### 3.6 内存管理\n\n```bash\n# 查看内存\nredis-cli INFO memory | grep used_memory_human\nredis-cli INFO memory | grep maxmemory_human\n\n# 查看内存碎片率\nredis-cli INFO memory | grep mem_fragmentation_ratio  # >1.5 建议重启\n\n# 内存淘汰策略\nredis-cli CONFIG GET maxmemory-policy\n# noeviction — 不淘汰，写失败（默认）\n# allkeys-lru — 所有 key LRU 淘汰\n# volatile-lru — 有过期时间的 key LRU 淘汰\n# allkeys-random — 随机淘汰\nredis-cli CONFIG SET maxmemory-policy allkeys-lru\n\n# 设置最大内存\nredis-cli CONFIG SET maxmemory 2gb\n```\n\n#### 3.7 排障命令\n\n```bash\n# 连接数\nredis-cli INFO clients | grep connected_clients\n\n# 慢查询\nredis-cli SLOWLOG GET 10                             # 最近 10 条\nredis-cli SLOWLOG LEN                                # 慢查询数量\nredis-cli SLOWLOG RESET\n\n# 延迟排查\nredis-cli --latency-history                         # 持续记录延迟\nredis-cli --intrinsic-latency 5                     # 系统固有延迟测试\n\n# CPU 消耗大的命令\nredis-cli INFO commandstats | sort -t: -k2 -rn | head -10\n\n# 大 key 分析\nredis-cli --bigkeys\nredis-cli MEMORY DOCTOR                              # 内存诊断（Redis 4+）\n\n# 检查持久化状态\nredis-cli INFO persistence\n# rdb_last_bgsave_status:ok — 最后一次 RDB 成功\n\n# 重启\nsystemctl restart redis\n\n# 查看日志\ntail -100 /var/log/redis/redis-server.log\n```\n\n---\n\n### 四、通用排障场景\n\n#### 场景1：数据库连不上\n\n```bash\n# 1. 服务是否运行\nsystemctl status mysql       # 或 postgresql / redis\n\n# 2. 端口是否监听\nss -tlnp | grep 3306        # MySQL\nss -tlnp | grep 5432        # PostgreSQL\nss -tlnp | grep 6379        # Redis\n\n# 3. 防火墙\nfirewall-cmd --list-ports\n\n# 4. 连接测试\nmysql -u app -p -h 10.0.0.1 -e \"SELECT 1;\"\npsql -h 10.0.0.1 -U app -d mydb -c \"SELECT 1;\"\nredis-cli -h 10.0.0.1 PING\n\n# 5. 错误日志\ntail -100 /var/log/mysql/error.log\n```\n\n#### 场景2：查询慢/CPU 高\n\n```bash\n# MySQL：查看当前慢查询\nmysql -u root -p -e \"SHOW PROCESSLIST;\" | grep -v Sleep\nmysql -u root -p -e \"SELECT * FROM information_schema.processlist WHERE time > 5;\"\n\n# PostgreSQL：查看当前慢查询\npsql -U postgres -c \"SELECT pid, now()-query_start AS duration, query \n  FROM pg_stat_activity WHERE state='active' AND query_start < now()-interval'5s';\"\n\n# Redis：查看慢日志\nredis-cli SLOWLOG GET 10\n```\n\n#### 场景3：磁盘满\n\n```bash\n# 1. 确认占用\ndf -h /var/lib/mysql /var/lib/postgresql /var/lib/redis\n\n# 2. MySQL binlog 清理\nmysql -u root -p -e \"PURGE BINARY LOGS BEFORE DATE_SUB(NOW(), INTERVAL 7 DAY);\"\n\n# 3. PostgreSQL WAL 清理\npg_archivecleanup /var/lib/postgresql/*/pg_wal 0000000100000000000000A0\n\n# 4. Redis AOF 重写\nredis-cli BGREWRITEAOF\n\n# 5. 清理慢日志/错误日志\n> /var/log/mysql/slow-query.log\n```\n\n#### 场景4：主从延迟\n\n```bash\n# MySQL\nmysql -u root -p -e \"SHOW SLAVE STATUS\\G\" | grep Seconds_Behind_Master\n\n# PostgreSQL\npsql -U postgres -c \"SELECT pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) \n  AS lag_bytes FROM pg_stat_replication;\"\n\n# Redis\nredis-cli INFO replication | grep master_last_io_seconds_ago\n```\n\n---\n\n## 安全加固\n\n> 适用场景：生产环境 Linux 服务器安全配置、合规审计、入侵排查\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md) [11-防火墙](#)\n\n---\n\n### 1. SSH 加固\n\n```bash\n# === /etc/ssh/sshd_config 核心安全配置 ===\n# 编辑前先备份\ncp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak.$(date +%Y%m%d)\n\n# 禁止 root 直接登录\nPermitRootLogin no\n\n# 禁用密码认证，只用密钥\nPasswordAuthentication no\nPubkeyAuthentication yes\n\n# 修改默认端口（降低扫描噪音）\nPort 2222\n\n# 限制允许登录的用户\nAllowUsers alice bob\nAllowGroups ssh-users\n\n# 禁止空密码\nPermitEmptyPasswords no\n\n# 限制认证尝试次数\nMaxAuthTries 3\n\n# 客户端存活检测（断开空闲连接）\nClientAliveInterval 300\nClientAliveCountMax 2\n\n# 禁用不安全的协议\nProtocol 2\nHostKeyAlgorithms ssh-ed25519,ssh-rsa\nKexAlgorithms curve25519-sha256,diffie-hellman-group-exchange-sha256\nCiphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com\nMACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com\n\n# 应用配置\nsshd -t                          # 检查语法\nsystemctl reload sshd            # 重载（不中断现有连接）\n```\n\n**SSH 密钥管理**\n\n```bash\n# 生成 Ed25519 密钥（推荐，比 RSA 更安全更快）\nssh-keygen -t ed25519 -C \"user@host\" -f ~/.ssh/id_ed25519\n\n# 分发公钥\nssh-copy-id -i ~/.ssh/id_ed25519.pub user@host\nssh-copy-id -p 2222 user@host   # 非标准端口\n\n# 查看已授权的公钥\ncat ~/.ssh/authorized_keys\n\n# 移除特定公钥（按行号）\nsed -i '3d' ~/.ssh/authorized_keys\n\n# 锁定 authorized_keys（防篡改）\nchmod 600 ~/.ssh/authorized_keys\nchattr +i ~/.ssh/authorized_keys       # 不可变（root 也不例外）\nchattr -i ~/.ssh/authorized_keys       # 解锁\n```\n\n---\n\n### 2. Fail2ban（防暴力破解）\n\n```bash\n# 安装\nyum install fail2ban              # CentOS\napt install fail2ban              # Ubuntu\n\n# 配置 /etc/fail2ban/jail.local\ncat > /etc/fail2ban/jail.local << 'EOF'\n[DEFAULT]\nbantime = 3600                    # 封禁时长（秒）\nfindtime = 600                    # 统计窗口\nmaxretry = 5                      # 最大尝试次数\nignoreip = 127.0.0.1/8 10.0.0.0/8 # 白名单\ndestemail = admin@example.com\naction = %(action_mwl)s           # 封禁 + 发邮件通知\n\n[sshd]\nenabled = true\nport = ssh,2222\nmaxretry = 3\n\n[nginx-http-auth]\nenabled = true\nlogpath = /var/log/nginx/error.log\nEOF\n\n# 启动\nsystemctl enable --now fail2ban\n\n# 查看状态\nfail2ban-client status\nfail2ban-client status sshd        # 查看 sshd jail 详情\n\n# 手动解封\nfail2ban-client set sshd unbanip 10.0.0.55\n\n# 查看被封 IP\nfail2ban-client get sshd banned\niptables -L -n | grep f2b          # fail2ban 通过 iptables 封禁\n```\n\n---\n\n### 3. 系统加固\n\n#### 3.1 内核参数（sysctl）\n\n```bash\n# /etc/sysctl.d/99-security.conf\ncat > /etc/sysctl.d/99-security.conf << 'EOF'\n# 防 IP 欺骗\nnet.ipv4.conf.all.rp_filter = 1\nnet.ipv4.conf.default.rp_filter = 1\n\n# 忽略 ICMP 广播\nnet.ipv4.icmp_echo_ignore_broadcasts = 1\n\n# 忽略所有 ICMP（彻底禁 ping）\n# net.ipv4.icmp_echo_ignore_all = 1\n\n# 防 SYN Flood\nnet.ipv4.tcp_syncookies = 1\n\n# 减少 TIME_WAIT\nnet.ipv4.tcp_tw_reuse = 1\n\n# 记录可疑包\nnet.ipv4.conf.all.log_martians = 1\n\n# 禁用 IPv6（如不需要）\nnet.ipv6.conf.all.disable_ipv6 = 1\n\n# 禁止 IP 转发（非路由器）\nnet.ipv4.ip_forward = 0\n\n# 内核指针混淆（防内存地址泄露）\nkernel.kptr_restrict = 2\n\n# 限制 dmesg 访问\nkernel.dmesg_restrict = 1\n\n# 禁止非 root 加载内核模块\nkernel.modules_disabled = 0\nEOF\n\nsysctl -p /etc/sysctl.d/99-security.conf\n```\n\n#### 3.2 文件权限与 SUID/SGID\n\n```bash\n# 查找 SUID/SGID 文件（可能的提权点）\nfind / -perm -4000 -type f 2>/dev/null       # SUID\nfind / -perm -2000 -type f 2>/dev/null       # SGID\nfind / -perm -6000 -type f 2>/dev/null       # 两者\n\n# 查找全局可写文件\nfind / -perm -2 -type f ! -type l 2>/dev/null\n\n# 查找无主文件\nfind / -nouser -o -nogroup 2>/dev/null\n\n# 锁定关键文件\nchattr +i /etc/passwd /etc/shadow /etc/group /etc/gshadow\nchattr +i /etc/sudoers\n\n# 检查 /etc/passwd 是否有 uid=0 的非 root 用户\nawk -F: '($3 == 0) {print $1}' /etc/passwd   # 应该只有 root\n\n# 检查空密码账户\nawk -F: '($2 == \"\" || $2 == \"!\") {print $1}' /etc/shadow\n\n# 限制 cron 使用\necho \"root\" > /etc/cron.allow\necho \"root\" > /etc/at.allow\n# 同时确保 cron.deny 为空或不存在\n```\n\n#### 3.3 核心 dump 限制\n\n```bash\n# /etc/security/limits.conf\ncat >> /etc/security/limits.conf << 'EOF'\n* hard core 0                     # 禁止 core dump\n* soft nproc 4096                 # 限制进程数\n* hard nproc 8192\nEOF\n\n# 系统级 core dump 禁用\necho \"* hard core 0\" >> /etc/security/limits.conf\necho \"fs.suid_dumpable = 0\" >> /etc/sysctl.d/99-security.conf\nsysctl -p /etc/sysctl.d/99-security.conf\n```\n\n---\n\n### 4. SELinux\n\n```bash\n# 查看状态\ngetenforce                         # Enforcing / Permissive / Disabled\nsestatus                           # 详细信息\n\n# 临时切换模式\nsetenforce 0                       # Permissive（只记录不阻止）\nsetenforce 1                       # Enforcing（强制）\n\n# 永久配置 /etc/selinux/config\n# SELINUX=enforcing\n# SELINUX=permissive\n# SELINUX=disabled\n\n# 排障：查看拒绝日志\nausearch -m avc -ts recent | tail -20\ngrep \"denied\" /var/log/audit/audit.log | tail -20\n\n# 分析建议修复\naudit2allow -a                     # 查看所有拒绝\naudit2why -a                       # 解释拒绝原因\n\n# 生成自定义策略模块\ngrep \"denied\" /var/log/audit/audit.log | audit2allow -M mymodule\nsemodule -i mymodule.pp            # 安装策略\n\n# 管理文件上下文\nls -Z /var/www/html                # 查看文件安全上下文\nrestorecon -Rv /var/www/html       # 恢复默认上下文\nchcon -R -t httpd_sys_content_t /var/www/html  # 手动设置\n\n# 管理布尔值\ngetsebool -a | grep http           # 查看\nsetsebool -P httpd_can_network_connect on  # 设置（-P 永久）\n\n# 管理端口\nsemanage port -l | grep http       # 查看端口标签\nsemanage port -a -t http_port_t -p tcp 8080  # 允许 httpd 监听 8080\n```\n\n### AppArmor（Ubuntu/Debian 默认）\n\n```bash\n# 查看状态\naa-status                          # 概况\naa-status --complaining            # 列出 complain 模式的 profile\n\n# 管理 profile\naa-enforce /etc/apparmor.d/usr.bin.nginx   # 强制模式\naa-complain /etc/apparmor.d/usr.bin.nginx  # 学习模式（只记录）\naa-disable /etc/apparmor.d/usr.bin.nginx   # 禁用\n\n# 排障：查看拒绝日志\ngrep \"apparmor=.*DENIED\" /var/log/syslog | tail -20\ndmesg | grep apparmor\n```\n\n---\n\n### 5. Auditd（审计）\n\n```bash\n# 安装启动\nyum install audit                 # CentOS\napt install auditd                # Ubuntu\nsystemctl enable --now auditd\n\n# 添加审计规则 /etc/audit/rules.d/my.rules\ncat > /etc/audit/rules.d/my.rules << 'EOF'\n# 监控 /etc/passwd 和 /etc/shadow 修改\n-w /etc/passwd -p wa -k identity\n-w /etc/shadow -p wa -k identity\n-w /etc/sudoers -p wa -k sudoers\n-w /etc/ssh/sshd_config -p wa -k sshd_config\n\n# 监控关键命令执行\n-w /usr/bin/chmod -p x -k permission_change\n-w /usr/bin/chown -p x -k permission_change\n-w /usr/bin/useradd -p x -k user_manage\n-w /usr/bin/usermod -p x -k user_manage\n-w /usr/bin/passwd -p x -k user_manage\n-w /usr/sbin/iptables -p x -k firewall_change\n\n# 监控 SUID/SGID 设置\n-a always,exit -F arch=b64 -S chmod -F a1=+4000 -k suid_set\n-a always,exit -F arch=b64 -S chmod -F a1=+2000 -k sgid_set\nEOF\n\n# 加载规则\nauditctl -R /etc/audit/rules.d/my.rules\nsystemctl restart auditd\n\n# 查看规则\nauditctl -l\n\n# 查询审计日志\nausearch -k identity --start today\nausearch -m avc -ts recent                         # SELinux 拒绝\nausearch -f /etc/passwd                            # 指定文件\nausearch -ui 1000                                  # 指定 UID\nausearch -m SYSCALL --success no                   # 失败的系统调用\n\n# 生成报告\naureport --summary                                 # 概览\naureport -k --summary                              # 按 key 汇总\naureport -f --summary                              # 文件访问汇总\naureport --login --summary -i                      # 登录汇总（-i 解析 IP）\n\n# 查看实时事件\nausearch -f /etc/passwd -i --just-one | aureport -f -i\n```\n\n---\n\n### 6. 密码策略（PAM）\n\n```bash\n# 密码复杂度 /etc/security/pwquality.conf\ncat > /etc/security/pwquality.conf << 'EOF'\nminlen = 12                        # 最小长度\ndcredit = -1                       # 至少 1 个数字\nucredit = -1                       # 至少 1 个大写字母\nlcredit = -1                       # 至少 1 个小写字母\nocredit = -1                       # 至少 1 个特殊字符\nminclass = 3                       # 至少 3 类字符\nmaxrepeat = 3                      # 最多连续重复字符\nEOF\n\n# 密码过期策略 /etc/login.defs\n# PASS_MAX_DAYS   90               # 密码最长使用天数\n# PASS_MIN_DAYS   7                # 两次改密码最小间隔\n# PASS_WARN_AGE   14               # 过期前警告天数\n\n# 为已有用户设置\nchage -M 90 -m 7 -W 14 alice      # 最大90天/最小7天/提前14天警告\nchage -l alice                     # 查看用户密码策略\n\n# 账户锁定 /etc/pam.d/system-auth（CentOS）或 /etc/pam.d/common-auth（Ubuntu）\n# 在 pam_unix.so 行前添加：\n# auth required pam_tally2.so deny=5 unlock_time=600\n# — 5 次失败锁定 10 分钟\n\n# 查看失败次数\npam_tally2 --user alice\n\n# 手动解锁\npam_tally2 --user alice --reset\n\n# Umask 设置\necho \"umask 027\" >> /etc/profile   # 默认权限 750（组读，其他无）\n```\n\n---\n\n### 7. 文件完整性检查（AIDE）\n\n```bash\n# 安装\nyum install aide                  # CentOS\napt install aide                  # Ubuntu\n\n# 初始化数据库\naide --init\ncp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz\n\n# 检查（与基线对比）\naide --check\n\n# 更新基线（系统合法变更后）\naide --update\ncp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz\n\n# 典型配置 /etc/aide.conf\n# 监控关键目录：\n# /etc      — 配置文件\n# /bin /sbin /usr/bin /usr/sbin — 可执行文件\n# /lib /lib64 — 库文件\n```\n\n---\n\n### 8. 安全扫描\n\n```bash\n# === Lynis（系统安全审计）===\nyum install lynis                  # EPEL\napt install lynis\nlynis audit system                 # 全系统审计\nlynis audit system --quick         # 快速检查\nlynis show suggestions             # 查看建议（需先审计）\n\n# === ClamAV（病毒扫描，Linux 下主要用于扫描 Windows 文件）===\nyum install clamav clamav-update   # EPEL\napt install clamav\nfreshclam                          # 更新病毒库\nclamscan -r /var/www               # 扫描目录\nclamscan -r --bell /home           # 发现病毒时响铃\n\n# === rkhunter（rootkit 检测）===\nyum install rkhunter               # EPEL\nrkhunter --check\nrkhunter --propupd                 # 更新文件属性库\nrkhunter --check --skip-keypress   # 免交互\n\n# === chkrootkit ===\nchkrootkit | grep INFECTED\n```\n\n---\n\n### 9. 入侵排查\n\n```bash\n# 1. 检查异常登录\nlast -20                           # 最近登录\nlastb -20                          # 最近失败尝试\nlastlog                            # 所有用户最后登录\ngrep \"Failed password\" /var/log/secure | tail -20    # CentOS\ngrep \"Failed password\" /var/log/auth.log | tail -20  # Ubuntu\n\n# 2. 检查异常账户\nawk -F: '($3 == 0) {print $1}' /etc/passwd    # uid=0\ngrep -v '^#' /etc/passwd | awk -F: '($3 >= 1000) {print $1}' # 所有普通用户\n\n# 3. 检查异常进程\nps auxf                            # 树状进程树\nps aux --sort=-%cpu | head -10     # CPU 最高\nps aux --sort=-%mem | head -10     # 内存最高\nlsof -i -P -n | grep LISTEN        # 监听端口及对应进程\nnetstat -tulnp | grep -v '127.0.0.1\\|::1'  # 非本地监听\n\n# 4. 检查计划任务\ncrontab -l -u root\ncrontab -l -u alice\nfor user in $(awk -F: '{print $1}' /etc/passwd); do \n  echo \"=== $user ===\"; crontab -l -u $user 2>/dev/null\ndone\nls -la /etc/cron.* /var/spool/cron/\n\n# 5. 检查异常网络连接\nss -tunap | grep ESTAB\nss -tunap | grep -v '127.0.0.1\\|::1'\n\n# 6. 检查系统服务\nsystemctl list-units --type=service | grep -v 'loaded.*active'\nchkconfig --list 2>/dev/null       # 旧版 SysV\n\n# 7. 检查 /tmp 可疑文件\nfind /tmp -type f -perm -4000 2>/dev/null\nfind /tmp -type f -name \".*\" 2>/dev/null\n\n# 8. 检查历史命令\ncat ~/.bash_history | tail -50\nfind /home -name \".bash_history\" -exec tail -5 {} \\;\n\n# 9. 检查隐藏目录\nfind / -name \".*\" -type d ! -path \"/proc/*\" ! -path \"/sys/*\" 2>/dev/null\n\n# 10. 检查近期修改的文件\nfind /etc -type f -mtime -1        # 最近 1 天修改的配置\nfind / -type f -mmin -60 ! -path '/proc/*' ! -path '/sys/*' 2>/dev/null  # 最近 60 分钟\n```\n\n---\n\n### 10. 应急响应检查清单\n\n```\n□ 隔离：断网或限制网络访问\n  ifdown eth0  或  iptables -P INPUT DROP\n\n□ 取证：保存当前状态\n  ps auxf > /tmp/ps_$(date +%s).txt\n  netstat -tulnp > /tmp/netstat_$(date +%s).txt\n  ss -tunap > /tmp/ss_$(date +%s).txt\n  last -50 > /tmp/last_$(date +%s).txt\n  w > /tmp/w_$(date +%s).txt\n\n□ 检查：按上述\"入侵排查\"逐项检查\n\n□ 清除：删除后门账户/计划任务/恶意进程\n  userdel -r suspicious_user\n  crontab -r -u suspicious_user\n  kill -9 PID\n\n□ 修复：打补丁、改密码、加固配置\n\n□ 恢复：从已知干净的备份恢复（如不确定，重装更安全）\n```\n\n---\n\n## Nginx / Web 服务器\n\n> 适用场景：Nginx 安装部署、反向代理、负载均衡、SSL 配置、性能调优、故障排查\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n### 1. 安装与基础\n\n```bash\n# CentOS / RHEL\nyum install nginx\n# 或官方仓库（最新版）\nyum install yum-utils\ncat > /etc/yum.repos.d/nginx.repo << 'EOF'\n[nginx-stable]\nname=nginx stable repo\nbaseurl=http://nginx.org/packages/centos/$releasever/$basearch/\ngpgcheck=1\nenabled=1\ngpgkey=https://nginx.org/keys/nginx_signing.key\nEOF\nyum install nginx\n\n# Ubuntu / Debian\napt update && apt install nginx\n\n# 服务管理\nsystemctl enable --now nginx\nsystemctl status nginx\nsystemctl reload nginx                              # 热重载配置\nsystemctl restart nginx\n\n# 测试配置\nnginx -t                                            # 语法检查\nnginx -T                                            # 语法检查 + 打印全部配置\nnginx -s reload                                     # 信号热重载\nnginx -s stop                                       # 快速停止\nnginx -s quit                                       # 优雅停止\n\n# 查看版本与编译参数\nnginx -v\nnginx -V\n```\n\n**配置文件结构**\n\n```\n/etc/nginx/\n├── nginx.conf                  # 主配置\n├── conf.d/                     # server 配置片段\n│   └── default.conf\n├── sites-enabled/              # Debian/Ubuntu 站点配置\n│   └── default -> ../sites-available/default\n├── sites-available/            # 可用站点模板\n├── fastcgi_params              # FastCGI 参数\n├── mime.types                  # MIME 类型映射\n└── ssl/                        # SSL 证书目录\n```\n\n---\n\n### 2. 核心配置\n\n```nginx\n# /etc/nginx/nginx.conf — 主配置骨架\nuser nginx;\nworker_processes auto;                             # 自动匹配 CPU 核心数\nworker_rlimit_nofile 65535;\nerror_log /var/log/nginx/error.log warn;\npid /run/nginx.pid;\n\nevents {\n    worker_connections 4096;                       # 每 worker 最大连接数\n    use epoll;                                     # Linux 推荐 epoll\n    multi_accept on;                               # 一次接受所有新连接\n}\n\nhttp {\n    include /etc/nginx/mime.types;\n    default_type application/octet-stream;\n\n    # 日志格式\n    log_format main '$remote_addr - $remote_user [$time_local] '\n                    '\"$request\" $status $body_bytes_sent '\n                    '\"$http_referer\" \"$http_user_agent\"';\n\n    access_log /var/log/nginx/access.log main;\n\n    # 性能\n    sendfile on;\n    tcp_nopush on;\n    tcp_nodelay on;\n    keepalive_timeout 65;\n    types_hash_max_size 2048;\n\n    # Gzip 压缩\n    gzip on;\n    gzip_types text/plain text/css application/json application/javascript text/xml;\n\n    # 隐藏 Nginx 版本号\n    server_tokens off;\n\n    include /etc/nginx/conf.d/*.conf;\n}\n```\n\n---\n\n### 3. Server 块（虚拟主机）\n\n```nginx\n# /etc/nginx/conf.d/example.conf\nserver {\n    listen 80;\n    server_name example.com www.example.com;\n    root /var/www/example;\n    index index.html index.htm index.php;\n\n    # 日志\n    access_log /var/log/nginx/example_access.log main;\n    error_log /var/log/nginx/example_error.log;\n\n    # 限制请求方法\n    if ($request_method !~ ^(GET|HEAD|POST)$) {\n        return 405;\n    }\n\n    # 静态文件\n    location / {\n        try_files $uri $uri/ =404;\n    }\n\n    # 静态资源缓存\n    location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {\n        expires 30d;\n        add_header Cache-Control \"public, immutable\";\n    }\n\n    # 禁止访问隐藏文件\n    location ~ /\\. {\n        deny all;\n        access_log off;\n        log_not_found off;\n    }\n\n    # 自定义 404\n    error_page 404 /404.html;\n    error_page 500 502 503 504 /50x.html;\n}\n```\n\n---\n\n### 4. 反向代理\n\n```nginx\n# 基础反向代理\nlocation /api/ {\n    proxy_pass http://backend:8080/;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n}\n\n# WebSocket 代理\nlocation /ws/ {\n    proxy_pass http://backend:8080/;\n    proxy_http_version 1.1;\n    proxy_set_header Upgrade $http_upgrade;\n    proxy_set_header Connection \"upgrade\";\n    proxy_set_header Host $host;\n    proxy_read_timeout 86400;                      # WebSocket 长连接\n}\n\n# 超时与缓冲\nlocation /app/ {\n    proxy_pass http://backend:8080/;\n    proxy_connect_timeout 60s;\n    proxy_send_timeout 60s;\n    proxy_read_timeout 60s;\n    proxy_buffering off;                            # 实时响应不缓冲\n    client_max_body_size 100m;                      # 上传限制\n}\n\n# 健康检查（被动）\nupstream backend {\n    server 10.0.0.1:8080 max_fails=3 fail_timeout=30s;\n    server 10.0.0.2:8080 max_fails=3 fail_timeout=30s;\n    server 10.0.0.3:8080 backup;                    # 备用服务器\n}\n```\n\n---\n\n### 5. 负载均衡\n\n```nginx\nupstream app_cluster {\n    # 轮询（默认）\n    # server 10.0.0.1:8080;\n    # server 10.0.0.2:8080;\n\n    # 加权轮询\n    server 10.0.0.1:8080 weight=3;\n    server 10.0.0.2:8080 weight=1;\n\n    # IP Hash（会话保持）\n    # ip_hash;\n\n    # 最少连接\n    # least_conn;\n\n    # 健康检查\n    # Nginx Plus 支持主动健康检查（开源版仅有被动检查）\n    keepalive 32;                                    # 保持到后端的空闲连接数\n}\n\nserver {\n    listen 80;\n    location / {\n        proxy_pass http://app_cluster;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n    }\n}\n```\n\n---\n\n### 6. SSL / HTTPS\n\n```bash\n# 生成自签名证书（测试用）\nopenssl req -x509 -nodes -days 365 -newkey rsa:2048 \\\n  -keyout /etc/nginx/ssl/server.key \\\n  -out /etc/nginx/ssl/server.crt \\\n  -subj \"/CN=example.com\"\n\n# Let's Encrypt（生产用）\nyum install certbot python3-certbot-nginx\napt install certbot python3-certbot-nginx\ncertbot --nginx -d example.com -d www.example.com\ncertbot renew --dry-run                              # 测试自动续期\n```\n\n```nginx\n# SSL 配置\nserver {\n    listen 443 ssl http2;\n    server_name example.com;\n\n    ssl_certificate /etc/nginx/ssl/server.crt;\n    ssl_certificate_key /etc/nginx/ssl/server.key;\n\n    # 现代 SSL 配置（Mozilla Intermediate）\n    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;\n    ssl_prefer_server_ciphers off;\n\n    # HSTS（强制 HTTPS，谨慎启用）\n    add_header Strict-Transport-Security \"max-age=63072000\" always;\n\n    # OCSP Stapling\n    ssl_stapling on;\n    ssl_stapling_verify on;\n\n    root /var/www/example;\n}\n\n# HTTP → HTTPS 跳转\nserver {\n    listen 80;\n    server_name example.com;\n    return 301 https://$server_name$request_uri;\n}\n```\n\n---\n\n### 7. 常用 Rewrite 与重定向\n\n```nginx\n# 永久重定向\nrewrite ^/old-page$ /new-page permanent;\nreturn 301 /new-url;\n\n# 临时重定向\nrewrite ^/maintenance$ /maintenance.html redirect;\n\n# 域名跳转\nserver {\n    listen 80;\n    server_name old-domain.com;\n    return 301 https://new-domain.com$request_uri;\n}\n\n# www → non-www\nserver {\n    listen 80;\n    server_name www.example.com;\n    return 301 $scheme://example.com$request_uri;\n}\n\n# 路径重写（内部，URL 不变）\nlocation /app/ {\n    rewrite ^/app/(.*)$ /$1 break;\n    proxy_pass http://backend:8080;\n}\n\n# 条件重写\nif ($http_user_agent ~* \"bot|crawler\") {\n    return 403;\n}\n\n# 按路径返回不同状态码\nlocation /health { return 200 \"ok\"; }\nlocation /api/v1/ { return 410; }                  # 废弃的 API\n```\n\n---\n\n### 8. 访问控制\n\n```nginx\n# IP 白名单\nlocation /admin/ {\n    allow 10.0.0.0/8;\n    allow 192.168.0.0/16;\n    deny all;\n}\n\n# Basic Auth\nlocation /private/ {\n    auth_basic \"Restricted\";\n    auth_basic_user_file /etc/nginx/.htpasswd;\n}\n```\n\n```bash\n# 创建 htpasswd\nhtpasswd -c /etc/nginx/.htpasswd admin\nhtpasswd /etc/nginx/.htpasswd alice                 # 追加用户\n\n# 限流\nlimit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;\nlimit_req zone=mylimit burst=20 nodelay;             # 放入 location 内\n\n# 连接数限制\nlimit_conn_zone $binary_remote_addr zone=perip:10m;\nlimit_conn perip 10;\n```\n\n---\n\n### 9. 日志与排障\n\n```bash\n# 实时查看访问日志\ntail -f /var/log/nginx/access.log\n\n# 统计 IP 访问次数\nawk '{print $1}' /var/log/nginx/access.log | sort | uniq -c | sort -rn | head -10\n\n# 统计状态码分布\nawk '{print $9}' /var/log/nginx/access.log | sort | uniq -c | sort -rn\n\n# 统计请求耗时前 10\nawk '{print $NF,$0}' /var/log/nginx/access.log | sort -rn | head -10\n\n# 查找 5xx 错误日志\ngrep \" 5[0-9][0-9] \" /var/log/nginx/access.log | tail -20\n\n# 查找特定时段的请求\ngrep \"13/Jul/2026:1[4-5]\" /var/log/nginx/access.log\n\n# 统计最耗时的 URL\nawk '{print $7,$NF}' /var/log/nginx/access.log | sort -k2 -rn | head -10\n```\n\n**常见错误速查**\n\n| 错误 | 含义 | 排查方向 |\n|------|------|---------|\n| `502 Bad Gateway` | 后端无响应 | 后端服务是否运行、端口是否正确、超时 |\n| `504 Gateway Timeout` | 后端超时 | 延长 `proxy_read_timeout`、检查后端性能 |\n| `403 Forbidden` | 权限不足 | 文件权限/目录索引/IP 限制 |\n| `404 Not Found` | 资源不存在 | `root`/`try_files` 路径是否正确 |\n| `413 Request Entity Too Large` | 上传超限 | 增大 `client_max_body_size` |\n| `connection refused` | 端口未监听 | `ss -tlnp` 检查端口、SELinux |\n| `13: Permission denied` | 文件权限 | nginx 用户对文件/目录无读权限、SELinux |\n\n---\n\n### 10. 性能调优\n\n```nginx\n# worker 进程\nworker_processes auto;                             # CPU 核心数\nworker_connections 4096;                           # max_clients = worker_processes × worker_connections\n\n# 文件描述符限制（系统级）\n# /etc/security/limits.conf\n# nginx soft nofile 65535\n# nginx hard nofile 65535\n\n# 缓冲区\nclient_body_buffer_size 128k;\nclient_header_buffer_size 1k;\nlarge_client_header_buffers 4 8k;\n\n# 静态文件（sendfile 零拷贝）\nsendfile on;\ntcp_nopush on;                                     # 与 sendfile 配合\nopen_file_cache max=10000 inactive=60s;            # 缓存文件句柄\nopen_file_cache_valid 30s;\nopen_file_cache_min_uses 2;\n\n# 压缩\ngzip on;\ngzip_min_length 1000;\ngzip_comp_level 5;                                 # 1-9，推荐 5-6\ngzip_vary on;\n```\n\n**性能检查命令**\n\n```bash\n# 查看当前连接数\nss -ant | grep :80 | wc -l\n\n# 查看 Nginx 状态（需启用 stub_status）\ncurl http://localhost/nginx_status\n# Active connections / accepts / handled / requests / Reading / Writing / Waiting\n\n# stub_status 配置\n# location /nginx_status {\n#     stub_status on;\n#     allow 127.0.0.1;\n#     deny all;\n# }\n```\n\n---\n\n## Git 版本控制\n\n> 适用场景：代码版本管理、分支协作、回滚修复、排障追溯\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n### 1. 基础配置\n\n```bash\n# 用户信息\ngit config --global user.name \"Your Name\"\ngit config --global user.email \"you@example.com\"\n\n# 常用别名\ngit config --global alias.co checkout\ngit config --global alias.br branch\ngit config --global alias.ci commit\ngit config --global alias.st status\ngit config --global alias.lg \"log --oneline --graph --all --decorate\"\ngit config --global alias.unstage \"reset HEAD --\"\ngit config --global alias.last \"log -1 HEAD\"\n\n# 换行符处理\ngit config --global core.autocrlf input              # Linux/Mac\ngit config --global core.autocrlf true               # Windows\n\n# 凭证缓存\ngit config --global credential.helper cache --timeout=3600\n\n# 查看所有配置\ngit config --list\ngit config --global --list\n```\n\n---\n\n### 2. 基本操作\n\n```bash\n# 初始化 / 克隆\ngit init                                              # 当前目录初始化\ngit clone https://github.com/user/repo.git            # HTTPS\ngit clone git@github.com:user/repo.git                # SSH\ngit clone -b develop https://github.com/user/repo.git # 指定分支\ngit clone --depth 1 https://github.com/user/repo.git  # 浅克隆（省空间）\n\n# 状态与差异\ngit status                                            # 工作区状态\ngit status -s                                         # 简版\ngit diff                                              # 工作区 vs 暂存区\ngit diff --staged                                     # 暂存区 vs HEAD\ngit diff HEAD                                         # 工作区 vs HEAD\ngit diff branch1..branch2                             # 分支间差异\ngit diff --name-only HEAD~1                           # 只看文件名\n\n# 暂存与提交\ngit add file.txt                                      # 暂存单个文件\ngit add -A                                            # 暂存所有变更\ngit add -p                                            # 交互式分段暂存\ngit commit -m \"message\"                               # 提交\ngit commit -am \"message\"                              # 暂存所有已跟踪文件并提交\ngit commit --amend -m \"new message\"                   # 修改最后一次提交\ngit commit --amend --no-edit                          # 追加到上次提交（不改 message）\n\n# 推送与拉取\ngit push origin main                                  # 推送\ngit push -u origin main                               # 首次推送并设置上游\ngit push --force-with-lease                            # 安全强制推送\ngit pull                                              # 拉取 = fetch + merge\ngit pull --rebase                                     # 拉取 + rebase\ngit fetch origin                                      # 只拉取不合并\ngit fetch --prune                                     # 清理远程已删除的分支\n```\n\n---\n\n### 3. 分支管理\n\n```bash\n# 查看分支\ngit branch                                            # 本地分支\ngit branch -a                                         # 所有分支（含远程）\ngit branch -v                                         # 分支 + 最后一次提交\ngit branch --merged                                   # 已合并的分支\ngit branch --no-merged                                # 未合并的分支\n\n# 创建与切换\ngit branch feature-x                                  # 创建分支\ngit checkout feature-x                                # 切换分支\ngit checkout -b feature-x                             # 创建并切换\ngit switch feature-x                                  # 切换（Git 2.23+，推荐）\ngit switch -c feature-x                               # 创建并切换\n\n# 合并\ngit merge feature-x                                   # 合并到当前分支\ngit merge --no-ff feature-x                           # 禁止快进合并（保留分支记录）\ngit merge --squash feature-x                          # 压缩合并（所有提交合成一个）\n\n# 合并冲突处理\ngit merge feature-x                                   # 出现冲突\ngit diff --name-only --diff-filter=U                  # 查看冲突文件\n# 手动编辑冲突文件，然后：\ngit add resolved_file.txt\ngit commit                                            # 完成合并\ngit merge --abort                                     # 取消合并\n\n# 删除分支\ngit branch -d feature-x                               # 删除已合并分支\ngit branch -D feature-x                               # 强制删除\ngit push origin --delete feature-x                    # 删除远程分支\n\n# 重命名分支\ngit branch -m old-name new-name                       # 重命名本地\ngit push origin -u new-name\ngit push origin --delete old-name\n```\n\n---\n\n### 4. 撤销与回滚\n\n```bash\n# === 工作区撤销 ===\ngit restore file.txt                                  # 撤销工作区修改（回到暂存区状态）\ngit restore .                                         # 撤销所有工作区修改\ngit restore --source HEAD~1 file.txt                  # 恢复到某个历史版本\n\n# === 暂存区撤销 ===\ngit restore --staged file.txt                         # 取消暂存（回到工作区）\ngit reset HEAD file.txt                               # 同上（旧写法）\n\n# === 提交撤销 ===\ngit reset --soft HEAD~1                               # 撤销提交，改动回到暂存区\ngit reset --mixed HEAD~1                              # 撤销提交，改动回到工作区（默认）\ngit reset --hard HEAD~1                               # 撤销提交，丢弃所有改动\n\n# === 安全回滚（保留历史） ===\ngit revert HEAD                                       # 反转最后一次提交（创建新提交）\ngit revert HEAD~3..HEAD                               # 反转最近 3 个提交\ngit revert -m 1 <merge-commit>                        # 反转合并提交（指定保留哪个父分支）\n\n# === 找回已删除的提交 ===\ngit reflog                                            # 查看所有 HEAD 变更历史\ngit checkout HEAD@{2}                                 # 回到 2 步前的状态\ngit reset --hard HEAD@{3}                             # 硬重置到 reflog 中的某个位置\n```\n\n**reset 三模式对比**\n\n| 模式 | HEAD | 暂存区 | 工作区 | 用途 |\n|------|------|--------|--------|------|\n| `--soft` | 移动 | 保留 | 保留 | 重新组织提交 |\n| `--mixed`（默认） | 移动 | 重置 | 保留 | 取消暂存 |\n| `--hard` | 移动 | 重置 | 重置 | 彻底丢弃（⚠️） |\n\n---\n\n### 5. 历史查看\n\n```bash\n# 日志\ngit log                                               # 完整日志\ngit log --oneline                                     # 单行摘要\ngit log --oneline --graph --all --decorate            # 图形化分支历史\ngit log -5                                            # 最近 5 条\ngit log --since=\"2024-01-01\" --until=\"2024-01-31\"     # 时间段\ngit log --author=\"name\"                               # 按作者\ngit log --grep=\"keyword\"                              # 按提交信息搜索\ngit log -p                                            # 显示每个提交的 patch\ngit log --stat                                        # 显示文件变更统计\ngit log -S \"function_name\"                            # 搜索代码变更内容\ngit log --oneline file.txt                            # 某文件的历史\n\n# 查看某次提交\ngit show HEAD                                         # 最新提交详情\ngit show abc1234                                      # 指定提交\ngit show abc1234 --stat                               # 只显示统计\ngit show abc1234:path/to/file                         # 查看提交时的文件内容\n\n# 追溯\ngit blame file.txt                                    # 每行是谁什么时候改的\ngit blame -L 10,20 file.txt                           # 指定行范围\ngit blame -L '/start_pattern/,/end_pattern/' file.txt # 正则范围\n\n# 搜索\ngit grep \"pattern\"                                    # 搜索代码库\ngit grep -n \"pattern\"                                 # 显示行号\ngit grep -l \"pattern\"                                 # 只列文件名\ngit grep \"pattern\" HEAD~5                             # 搜索历史版本\n```\n\n---\n\n### 6. Stash（暂存工作区）\n\n```bash\ngit stash                                             # 暂存当前改动\ngit stash save \"描述信息\"                               # 带描述\ngit stash -u                                          # 包含未跟踪文件\ngit stash -a                                          # 包含所有（含忽略文件）\n\ngit stash list                                        # 查看 stash 列表\ngit stash show -p stash@{0}                           # 查看某个 stash 的内容\n\ngit stash pop                                         # 恢复最近一次（同时删除）\ngit stash pop stash@{1}                               # 恢复指定 stash\ngit stash apply                                       # 恢复但不删除\ngit stash drop stash@{0}                              # 删除指定 stash\ngit stash clear                                       # 清空所有 stash\n\n# 典型场景：正在开发时需紧急修复\ngit stash -u                                          # 暂存当前工作\ngit checkout main && git pull\n# 修复 bug，提交\ngit checkout feature-x\ngit stash pop                                         # 恢复之前的开发\n```\n\n---\n\n### 7. 远程仓库\n\n```bash\n# 查看与添加\ngit remote -v                                         # 远程仓库列表\ngit remote add origin git@github.com:user/repo.git    # 添加远程\ngit remote add upstream https://github.com/orig/repo  # 添加上游（fork 场景）\ngit remote set-url origin git@github.com:new/repo.git # 修改 URL\ngit remote remove origin                              # 删除\n\n# 远程分支\ngit branch -r                                         # 查看远程分支\ngit fetch origin                                      # 拉取所有远程分支\ngit checkout -b local-branch origin/remote-branch     # 基于远程分支创建本地\ngit push origin local-branch:remote-branch            # 推送到不同名称的远程分支\n\n# 跟踪关系\ngit branch -vv                                        # 查看本地分支跟踪的远程分支\ngit branch -u origin/main                             # 设置上游\n\n# 清理\ngit remote prune origin                               # 清理本地已失效的远程分支引用\n```\n\n---\n\n### 8. 标签\n\n```bash\n# 创建标签\ngit tag v1.0.0                                        # 轻量标签\ngit tag -a v1.0.0 -m \"release v1.0.0\"                 # 附注标签（推荐）\ngit tag -a v1.0.0 abc1234 -m \"message\"                # 对历史提交打标签\n\n# 查看标签\ngit tag                                               # 列出所有标签\ngit tag -l \"v1.*\"                                     # 按模式过滤\ngit show v1.0.0                                       # 标签详情\n\n# 推送标签\ngit push origin v1.0.0                                # 推送单个标签\ngit push origin --tags                                # 推送所有标签\n\n# 删除标签\ngit tag -d v1.0.0                                     # 删除本地\ngit push origin --delete v1.0.0                       # 删除远程\n\n# 基于标签创建分支\ngit checkout -b hotfix-v1 v1.0.0\n```\n\n---\n\n### 9. 高级操作\n\n#### 9.1 Cherry-pick（选择性合并）\n\n```bash\ngit cherry-pick abc1234                               # 将某次提交应用到当前分支\ngit cherry-pick abc1234 def5678                       # 多个提交\ngit cherry-pick abc1234..def5678                      # 连续范围（不含 abc1234）\ngit cherry-pick abc1234^..def5678                     # 连续范围（含 abc1234）\ngit cherry-pick --no-commit abc1234                   # 不自动提交，可修改\n\n# 冲突处理\ngit cherry-pick abc1234                               # 如有冲突\n# 手动解决后：\ngit add .\ngit cherry-pick --continue\ngit cherry-pick --abort                               # 放弃\n```\n\n#### 9.2 Rebase（变基）\n\n```bash\ngit rebase main                                       # 将当前分支变基到 main\ngit rebase -i HEAD~3                                  # 交互式变基最近 3 个提交\n\n# 交互式 rebase 命令\n# pick   — 保留该提交\n# reword — 修改提交信息\n# squash — 合并到上一个提交（保留信息）\n# fixup  — 合并到上一个提交（丢弃信息）\n# drop   — 删除该提交\n\n# 冲突处理\ngit rebase main                                       # 如有冲突\n# 手动解决后：\ngit add .\ngit rebase --continue\ngit rebase --abort                                    # 放弃\ngit rebase --skip                                     # 跳过当前提交\n\n# 将多个提交合并为一个\ngit rebase -i HEAD~3\n# 将后两个的 pick 改为 squash\n```\n\n#### 9.3 Bisect（二分查找 Bug）\n\n```bash\ngit bisect start                                       # 开始\ngit bisect bad HEAD                                    # 标记当前版本有问题\ngit bisect good v1.0.0                                 # 标记已知正常版本\n# Git 自动 checkout 到中间版本\n# 测试后：\ngit bisect good                                        # 这个版本正常\ngit bisect bad                                         # 这个版本有问题\n# 重复直到定位到引入 bug 的提交\ngit bisect reset                                       # 结束 bisect\n```\n\n#### 9.4 Submodule（子模块）\n\n```bash\n# 添加子模块\ngit submodule add https://github.com/user/lib.git libs/lib\n\n# 克隆含子模块的仓库\ngit clone --recurse-submodules https://github.com/user/repo.git\ngit submodule update --init --recursive               # 已有仓库初始化子模块\n\n# 更新子模块\ngit submodule update --remote                          # 更新到最新\ngit submodule update --remote --merge                  # 更新并合并\n\n# 查看状态\ngit submodule status\n\n# 删除子模块\ngit submodule deinit libs/lib\ngit rm libs/lib\n```\n\n#### 9.5 Worktree（多分支并行）\n\n```bash\n# 在独立目录 checkout 另一个分支（不中断当前工作）\ngit worktree add ../repo-hotfix hotfix-urgent\ngit worktree list                                     # 查看所有 worktree\ngit worktree remove ../repo-hotfix                     # 删除\ngit worktree prune                                     # 清理失效的 worktree\n```\n\n---\n\n### 10. 常用工作流\n\n#### 场景1：修复线上 Bug\n\n```bash\ngit checkout main && git pull                          # 切到最新 main\ngit checkout -b hotfix/crash-fix                       # 创建 hotfix 分支\n# 修改代码...\ngit add . && git commit -m \"fix: crash on startup\"\ngit push -u origin hotfix/crash-fix\n# 创建 PR/MR → 合并到 main\ngit checkout main && git pull\ngit tag -a v1.0.1 -m \"hotfix\"\ngit push origin v1.0.1\ngit branch -d hotfix/crash-fix\n```\n\n#### 场景2：开发中需切换任务\n\n```bash\ngit stash -u                                          # 暂存当前工作\ngit checkout main && git pull\n# 处理紧急任务，提交\ngit checkout feature-x\ngit stash pop                                         # 回来继续开发\n```\n\n#### 场景3：提交太多了，合并再 PR\n\n```bash\ngit rebase -i HEAD~5                                  # 交互式整理最近 5 个提交\n# 保留第一个 pick，其余改为 squash（s）\n# 编辑合并后的提交信息\ngit push --force-with-lease                            # 更新远程分支\n```\n\n#### 场景4：谁改坏了生产配置\n\n```bash\ngit log --oneline config/production.yml\ngit show abc1234 config/production.yml                # 看某次提交改了什么\ngit blame config/production.yml                        # 每行的责任人\n```\n\n#### 场景5：找回误删的代码\n\n```bash\ngit reflog                                            # 找到误操作前的 HEAD\ngit checkout HEAD@{5} -- path/to/deleted_file         # 恢复单个文件\ngit checkout -b recovery-branch HEAD@{5}              # 恢复整个状态\n```\n\n---\n\n### 11. 排障与技巧\n\n```bash\n# 忽略已跟踪文件的本地修改\ngit update-index --assume-unchanged file.txt          # 忽略\ngit update-index --no-assume-unchanged file.txt       # 恢复跟踪\n\n# 查看某个文件在所有历史中的大小\ngit rev-list --objects --all | git cat-file --batch-check='%(objectsize) %(rest)' | sort -rn | head -10\n\n# 清理大文件\ngit gc --aggressive --prune=now                       # 垃圾回收\ngit reflog expire --expire=now --all\ngit gc --prune=now                                    # 彻底清理\n\n# 查找引入 bug 的提交（自动 bisect）\ngit bisect start HEAD v1.0.0\ngit bisect run npm test                               # 自动运行测试直到找到\n\n# 导出 patch\ngit format-patch -1 HEAD                              # 最新提交生成 .patch\ngit format-patch main..feature-x                      # 分支上所有提交\ngit apply 0001-fix.patch                              # 应用 patch\n\n# 仓库统计\ngit shortlog -sn                                      # 贡献者排名\ngit log --format='%aN' | sort -u | wc -l             # 贡献者数量\ngit diff --stat HEAD~10                               # 最近 10 次提交的文件统计\n```\n\n---\n\n## 软件架构\n\n> 本节描述 ops-ref 项目自身的架构设计，方便后续维护者理解整体结构。\n\n### 架构模式：管道 + SSG\n\n```\n                   管道阶段一                       管道阶段二\n   ┌─────────────┐    build.sh     ┌──────────┐   build_html.js   ┌──────────────┐\n   │ 01-*.md 源码 │ ─────────────→ │ index.md │ ────────────────→ │ docs/index   │\n   │ 02-*.md     │   cat 顺序合并   │ 完整版    │   读取 VERSION +   │ .html        │\n   │ 03-*.md     │                 │ Markdown │   注入 render.js   │ 完整离线文档  │\n   │ 04-*.md     │                 │          │                   │ (单文件无依赖) │\n   │ 05-*.md     │                 │          │                   │              │\n   │ 06-*.md ◄── │                 │          │                   │              │\n   └─────────────┘                 └──────────┘                   └──────────────┘\n        ▲                               ▲                              ▲\n        │                               │                              │\n   数据源（Model）                  合并视图                      渲染产物（View）\n```\n\n### 各层职责\n\n| 文件 | 模式角色 | 职责 |\n|------|---------|------|\n| `01-*.md` ~ `05-*.md` | **数据源** | 按技术域分拆的原始内容，各文件单一职责（`06-*` 架构、`07-*` 帮助为项目元文档） |\n| `VERSION` | **元数据** | 版本号的唯一数据源，构建时被读取 |\n| `build.sh` | **管道调度器** | 读取 CHAPTERS 数组依次合并 → `index.md` |\n| `build_html.js` | **构建器** | 读取 VERSION + `index.md` → 注入 HTML 模板 |\n| `render.js` | **运行时渲染器** | 浏览器端 Markdown → DOM、TOC 生成、搜索高亮 |\n| `docs/index.html` | **最终产物** | 自包含单文件，零外部依赖，离线可用 |\n\n### 设计原则\n\n- **管道单向流**：数据只能往前走，每个阶段只管一件事\n- **源码即文档**：`.md` 是唯一内容源，构建产物可丢弃重生成\n- **离线优先**：最终产物是一个 HTML 文件，浏览器打开就能用\n- **无框架依赖**：零 npm 包、零 node_modules、纯 JS + CSS 内联\n\n### 章节文件命名规则\n\n```\n{序号}-{技术域}.md\n\n01-linux-basics.md              # Linux 基础命令\n02-linux-troubleshooting.md     # Linux 故障排查\n03-kubernetes.md                # Kubernetes\n04-openstack.md                 # OpenStack\n05-ansible.md                   # Ansible 自动化运维\n06-architecture.md              # 项目架构（本文件）\n07-help.md                      # 使用帮助\n```\n\n新增技术栈时，按顺序编号并添加到 `build.sh` 的 `CHAPTERS` 数组即可。\n\n---\n\n## 帮助\n\n> 本节包含 ops-ref 的使用说明、扩展示例和常见问题，方便新用户快速上手。\n\n### 如何添加新章节\n\n```bash\n# 1. 创建新文件（序号插在 04-openstack.md 与 06-architecture.md 之间）\ntouch 05-xxx.md\n\n# 2. 编辑 build.sh 追加文件名\n#    CHAPTERS=(\n#      ...\n#      \"05-xxx.md\"\n#      \"06-architecture.md\"\n#      \"07-help.md\"\n#    )\n\n# 3. 重新构建\nbash build.sh\nnode build_html.js\n```\n\n文件格式要求：\n\n| 要求 | 说明 |\n|------|------|\n| 文件名 | `{序号}-{英文简短描述}.md`（技术章节 01-05，06 架构、07 帮助固定） |\n| 标题 | 第一行用 `## 章节名`（H2，对应侧边栏分组） |\n| 内容 | 正文用 `###`（H3，对应侧边栏子条目） |\n| 构建 | 需注册到 `build.sh` 的 `CHAPTERS` 数组 |\n\n### 如何升级版本\n\n```bash\n# 查看当前版本\ncat VERSION\n\n# 升级（v1.0.0 → v1.1.0）\necho \"v1.1.0\" > VERSION\n\n# 追加更新日志\necho \"- 新增 XXX 内容\" >> CHANGELOG.md\n\n# 重新构建\nbash build.sh\nnode build_html.js\n```\n\n版本号规则：`MAJOR.MINOR.PATCH`\n- **MAJOR** — 结构或内容大重构\n- **MINOR** — 新增章节或重要命令\n- **PATCH** — 小修正、格式调整、bug 修复\n\n### 如何使用\n\n**离线环境（服务器上查问题）：**\n\n```bash\n# 推荐：使用交互脚本（菜单式浏览 + 搜索）\n./ops                     # 进入交互菜单\n./ops list                # 列出所有章节\n./ops search tcpdump      # 全文搜索\n./ops show 05             # 查看 Ansible 章节\n\n# 传统方式：直接查看 markdown 源文件\nless 05-ansible.md\n\n# 搜索关键词\ngrep -i \"tcpdump\\|netstat\" index.md\n\n# 复制到服务器使用\nscp -r ops-ref/ user@server:/usr/local/share/\n\n# 在服务器上设置别名（推荐）\necho 'alias ops=\"/usr/local/share/ops-ref/ops\"' >> ~/.bashrc\nsource ~/.bashrc\n```\n\n**本地浏览器阅读：**\n\n```\n直接双击打开 docs/index.html\n支持：全文搜索 / 侧边栏导航 / 暗色主题\n```\n\n### 文件结构\n\n```\nops-ref/\n├── VERSION                        # 版本号（唯一数据源）\n├── CHANGELOG.md                   # 更新日志\n├── README.md                      # 项目总说明\n├── build.sh                       # 构建脚本（合并 .md）\n├── build_html.js                  # HTML 生成脚本\n├── render.js                      # 浏览器端渲染（TOC + 搜索）\n├── ops                            # [新增] 服务器端交互脚本（ssh + grep + less）\n│\n├── 01-linux-basics.md             # Linux 基础命令\n├── 02-linux-troubleshooting.md    # Linux 故障排查\n├── 03-kubernetes.md               # Kubernetes\n├── 04-openstack.md                # OpenStack\n├── 05-ansible.md                  # Ansible 自动化运维\n├── 06-architecture.md             # 项目架构\n├── 07-help.md                     # 使用帮助（本文件）\n│\n├── index.md                       # [自动生成] 合并完整版\n└── docs/\n    └── index.html                 # [自动生成] 离线 HTML\n```\n\n> 提示：`index.md` 和 `docs/index.html` 由构建脚本自动生成，**不要手动编辑**。所有修改应编辑对应的源 `.md` 文件后重新构建。\n";

    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')

}

      .replace(/(&quot;[^&]*&quot;|&#39;[^&]*&#39;|"[^"]*"|'[^']*')/g, '<span class="syn-str">$1</span>')
      // 长选项 --xxx
      .replace(/(\s|^)(--[a-zA-Z0-9][a-zA-Z0-9_.-]*)/g, '$1<span class="syn-opt">$2</span>')
      // 短选项 -x
      .replace(/(\s|^)(-[a-zA-Z])(?=\s|$)/g, '$1<span class="syn-opt">$2</span>')
      // 管道/重定向/逻辑运算符
      .replace(/(\||&gt;|&gt;&gt;|&lt;|&amp;&amp;|\|\|)/g, '<span class="syn-op">$1</span>')
      // 常见关键字
      .replace(/\b(sudo|kubectl|docker|systemctl|grep|awk|sed|find|curl|wget|ssh|scp|rsync|tar|git|helm|ansible|python|node|npm|pip|apt|yum|dnf|echo|cat|ls|cd|cp|mv|rm|mkdir|chmod|chown|ps|kill|top|df|du|mount|iptables|nft|ss|netstat|tcpdump|ifconfig|ip|route|ping|nslookup|dig|nc|tee|xargs|sort|uniq|cut|tr|wc|head|tail|less|vi|vim|nano|export|source|alias|unalias|env)\b/g, '<span class="syn-kw">$1</span>')
      // 数字
      .replace(/\b(\d+)\b/g, '<span class="syn-num">$1</span>')
      // 行内注释
      .replace(/(\s#\s.*$)/, '<span class="syn-cmt">$1</span>');
    out.push(line);
  }
  return out.join('\n');
}

function highlightCode(code, lang) {
  if (!lang || lang === 'bash' || lang === 'sh' || lang === 'shell' || lang === 'console') {
    return highlightShell(code);
  }
  if (lang === 'yaml' || lang === 'yml') {
    return highlightYaml(code);
  }
  // 其他语言：只转义
  return esc(code);
}

function highlightYaml(raw) {
  var lines = raw.split('\n');
  var out = [];
  for (var i = 0; i < lines.length; i++) {
    var line = esc(lines[i]);
    if (/^\s*#/.test(line)) {
      out.push('<span class="syn-cmt">' + line + '</span>');
    } else {
      line = line
        .replace(/^(\s*)([a-zA-Z_][a-zA-Z0-9_.-]*)(\s*:)/, '$1<span class="syn-kw">$2</span>$3')
        .replace(/(:\s+)(true|false|null|yes|no)(\s*)$/i, '$1<span class="syn-num">$2</span>$3')
        .replace(/(:\s+)(".*?"|'.*?')(\s*)$/, '$1<span class="syn-str">$2</span>$3');
      out.push(line);
    }
  }
  return out.join('\n');
}

// ============================================================
// Markdown 渲染
// ============================================================
function render(md) {
  var html = '';
  var lines = md.split('\n');
  var inCode = false, codeBuf = [], codeLang = '';
  var inTable = false, tableRowNum = 0;
  var inList = false;
  var codeIdx = 0;   // 代码块计数器（用于收藏 key）

  function closeList() {
    if (inList) { html += '</' + inList + '>\n'; inList = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Skip old TOC sections
    var headingMatch = line.match(/^(#{1,4})\s+(.+)/);
    if (headingMatch && headingMatch[2].indexOf('目录') >= 0) {
      while (i + 1 < lines.length) {
        i++;
        var nl = lines[i];
        var nm = nl.match(/^(#+)\s/);
        if (nm && nm[1].length <= headingMatch[1].length) { i--; break; }
      }
      continue;
    }

    // Fenced code block
    if (line.indexOf('```') === 0) {
      if (inCode) {
        closeList();
        var raw = codeBuf.join('\n');
        var highlighted = highlightCode(raw, codeLang);
        var firstCmd = raw.split('\n').find(function(l) { return l.trim() && !l.trim().startsWith('#'); }) || '';
        firstCmd = firstCmd.trim().substring(0, 80).replace(/"/g, '&quot;');
        var langLabel = codeLang ? '<span class="code-lang">' + esc(codeLang) + '</span>' : '';
        html += '<div class="code-block">' + langLabel +
          '<span class="star-btn star-btn-cmd" data-key="cmd-' + (codeIdx++) + '" data-text="' + firstCmd + '" title="收藏">☆</span>' +
          '<button class="copy-btn" title="复制">📋</button><pre>' + highlighted + '</pre></div>';
        codeBuf = []; codeLang = ''; inCode = false;
      } else {
        closeList();
        inCode = true;
        codeLang = line.slice(3).trim();
      }
      continue;
    }
    if (inCode) { codeBuf.push(line); continue; }

    // Empty line
    if (line.trim() === '') {
      if (inTable) { html += '</table>\n'; inTable = false; }
      html += '\n';
      continue;
    }

    // Headings
    var match = line.match(/^(#{1,4})\s+(.+)/);
    if (match) {
      if (inTable) { html += '</table>\n'; inTable = false; }
      closeList();
      var level = match[1].length;
      var text = inl(match[2]);
      var anchor = text.replace(/<[^>]+>/g, '').replace(/[^\w\u4e00-\u9fff\-]/g, ' ').trim().toLowerCase().replace(/\s+/g, '-');
      // Anchor permalink icon
      var linkIcon = '<a class="anchor-link" href="#' + anchor + '" title="复制链接">#</a>';
      var starIcon = '<span class="star-btn" data-key="h2-' + anchor + '" data-text="' + text.replace(/"/g, '&quot;') + '" data-anchor="' + anchor + '" title="收藏">☆</span>';
      html += '<h' + level + ' id="' + anchor + '">' + linkIcon + starIcon + text + '</h' + level + '>\n';
      continue;
    }

    // HR
    if (/^[-*_]{3,}\s*$/.test(line)) {
      if (inTable) { html += '</table>\n'; inTable = false; }
      closeList();
      html += '<hr>\n';
      continue;
    }

    // Blockquote
    if (line.indexOf('> ') === 0) {
      if (inTable) { html += '</table>\n'; inTable = false; }
      closeList();
      html += '<blockquote>' + inl(line.slice(2)) + '</blockquote>\n';
      continue;
    }

    // Table
    if (line.indexOf('|') === 0) {
      closeList();
      if (!inTable) { html += '<table>\n'; inTable = true; tableRowNum = 0; }
      var cells = line.split('|').filter(function(c) { return c !== ''; }).map(function(c) { return inl(c.trim()); });
      if (!cells.every(function(c) { return /^[-:]+$/.test(c.replace(/<[^>]+>/g, '')); })) {
        tableRowNum++;
        var cellTag = tableRowNum === 1 ? 'th' : 'td';
        html += '<tr>' + cells.map(function(c) { return '<' + cellTag + '>' + c + '</' + cellTag + '>'; }).join('') + '</tr>\n';
      }
      continue;
    }

    // UL
    var ulMatch = line.match(/^\s*[-*+]\s+(.+)/);
    if (ulMatch) {
      if (inTable) { html += '</table>\n'; inTable = false; }
      if (inList !== 'ul') { closeList(); html += '<ul>\n'; inList = 'ul'; }
      html += '<li>' + inl(ulMatch[1]) + '</li>\n';
      continue;
    }

    // OL
    var olMatch = line.match(/^\s*\d+\.\s+(.+)/);
    if (olMatch) {
      if (inTable) { html += '</table>\n'; inTable = false; }
      if (inList !== 'ol') { closeList(); html += '<ol>\n'; inList = 'ol'; }
      html += '<li>' + inl(olMatch[1]) + '</li>\n';
      continue;
    }

    // Paragraph
    if (inTable) { html += '</table>\n'; inTable = false; }
    closeList();
    html += '<p>' + inl(line) + '</p>\n';
  }

  if (inCode) html += '<div class="code-block"><pre>' + esc(codeBuf.join('\n')) + '</pre></div>';
  if (inTable) html += '</table>\n';
  closeList();
  return html;
}

// ============================================================
// 搜索索引（渲染后构建，供自动补全使用）
// ============================================================
var searchIndex = [];

function buildSearchIndex() {
  searchIndex = [];
  var main = document.getElementById('mainContent');

  // 收集标题
  var headings = main.querySelectorAll('h2, h3');
  headings.forEach(function(h) {
    var section = '';
    var prev = h.previousElementSibling;
    while (prev) {
      if (prev.tagName === 'H2') { section = prev.textContent + ' › ' + section; break; }
      prev = prev.previousElementSibling;
    }
    searchIndex.push({
      type: 'heading',
      text: h.textContent,
      section: section.replace(/ › $/, ''),
      anchor: '#' + h.id,
      pinyin: toPinyin(h.textContent)
    });
  });

  // 收集代码块命令（第一行）
  var codeBlocks = main.querySelectorAll('.code-block pre');
  codeBlocks.forEach(function(pre) {
    var firstLine = pre.textContent.split('\n')[0].trim();
    if (firstLine && firstLine.length > 3 && firstLine.length < 150) {
      var section = '';
      var prev = pre.closest('.code-block').previousElementSibling;
      while (prev) {
        if (prev.tagName === 'H2' || prev.tagName === 'H3') { section = prev.textContent; break; }
        prev = prev.previousElementSibling;
      }
      // 只取命令本身（去掉注释）
      var cmd = firstLine.replace(/#.*$/, '').trim();
      if (cmd && !/^[A-Z\u4e00-\u9fff]/.test(cmd)) {
        searchIndex.push({
          type: 'command',
          text: cmd,
          section: section || '',
          anchor: ''
        });
      }
    }
  });

  // 去重
  var seen = {};
  searchIndex = searchIndex.filter(function(item) {
    var key = item.text + item.section;
    if (seen[key]) return false;
    seen[key] = true;
    return true;
  });
}

var suggestEl = null;
var suggestVisible = false;

function createSuggestEl() {
  if (suggestEl) return;
  suggestEl = document.createElement('ul');
  suggestEl.className = 'suggest-list';
  suggestEl.id = 'suggestList';
  var input = document.getElementById('searchInput');
  input.parentNode.appendChild(suggestEl);
}

function showSuggestions(query) {
  if (!suggestEl) createSuggestEl();
  if (!query || query.length < 1) { hideSuggestions(); return; }

  var q = query.toLowerCase();
  var results = [];

  // 精确前缀匹配优先（原文 + 拼音）
  var exact = [], fuzzy = [];
  for (var i = 0; i < searchIndex.length; i++) {
    var item = searchIndex[i];
    var txt = item.text.toLowerCase();
    var py = (item.pinyin || '').toLowerCase();
    var idx = txt.indexOf(q);
    var pyIdx = py.indexOf(q);
    if (idx === 0 || pyIdx === 0) {
      exact.push(item);
    } else if (idx > 0 || pyIdx > 0 || item.section.toLowerCase().indexOf(q) >= 0) {
      fuzzy.push(item);
    }
  }
  results = exact.concat(fuzzy).slice(0, 10);

  if (results.length === 0) { hideSuggestions(); return; }

  var html = '';
  for (var j = 0; j < results.length; j++) {
    var r = results[j];
    var icon = r.type === 'heading' ? '§' : '>';
    var sec = r.section ? '<span class="suggest-sec">' + esc(r.section) + '</span>' : '';
    html += '<li data-anchor="' + (r.anchor || '') + '" data-type="' + r.type + '"><span class="suggest-icon">' + icon + '</span> ' + esc(r.text) + sec + '</li>';
  }
  suggestEl.innerHTML = html;
  suggestEl.style.display = 'block';
  suggestVisible = true;

  // 点击建议项
  suggestEl.querySelectorAll('li').forEach(function(li) {
    li.addEventListener('mousedown', function(e) {
      e.preventDefault();
      selectSuggestion(li);
    });
  });
}

function hideSuggestions() {
  if (suggestEl) suggestEl.style.display = 'none';
  suggestVisible = false;
}

function selectSuggestion(li) {
  var anchor = li.dataset.anchor;
  var type = li.dataset.type;
  if (anchor) {
    var el = document.getElementById(anchor.slice(1));
    if (el) {
      el.scrollIntoView({behavior: 'smooth', block: 'start'});
    }
  } else if (type === 'command') {
    // 搜索该命令文本
    document.getElementById('searchInput').value = li.textContent.trim();
    doSearch(li.textContent.trim().toLowerCase());
  }
  hideSuggestions();
}

function initTheme() {
  var saved = localStorage.getItem('ops-ref-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeToggle();

  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (!localStorage.getItem('ops-ref-theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        updateThemeToggle();
      }
    });
  }
}

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ops-ref-theme', next);
  updateThemeToggle();
}

function updateThemeToggle() {
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  btn.textContent = current === 'dark' ? '☀' : '🌙';
  btn.title = current === 'dark' ? '切换亮色模式' : '切换暗色模式';
}

// TOC
// ============================================================
function generateTOC() {
  var headings = document.querySelectorAll('#mainContent h2, #mainContent h3');
  var sidebar = document.getElementById('sidebarToc');
  var group = null, groupId = 0;
  for (var i = 0; i < headings.length; i++) {
    var h = headings[i];
    if (h.tagName === 'H2') {
      group = document.createElement('div');
      group.className = 'toc-group';
      groupId++;
      var header = document.createElement('div');
      header.className = 'toc-group-header';
      header.innerHTML = '<span class="toc-arrow">▼</span><span>' + h.textContent + '</span>';
      header.dataset.groupId = groupId;
      header.dataset.headingId = h.id;
      var body = document.createElement('div');
      body.className = 'toc-group-body';
      body.id = 'toc-body-' + groupId;
      group.appendChild(header);
      group.appendChild(body);
      sidebar.appendChild(group);
    } else if (h.tagName === 'H3' && group) {
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.className = 'toc-l2';
      a.textContent = h.textContent;
      group.querySelector('.toc-group-body').appendChild(a);
    }
  }
  document.querySelectorAll('.toc-group').forEach(function(g) {
    var body = g.querySelector('.toc-group-body');
    var arrow = g.querySelector('.toc-arrow');
    if (!body.querySelector('a')) arrow.style.visibility = 'hidden';
  });
  sidebar.addEventListener('click', function(e) {
    var header = e.target.closest('.toc-group-header');
    if (!header) return;
    var body = document.getElementById('toc-body-' + header.dataset.groupId);
    if (!body) return;
    if (body.querySelector('a')) {
      body.classList.toggle('collapsed');
      header.querySelector('.toc-arrow').textContent = body.classList.contains('collapsed') ? '▶' : '▼';
    }
    var headingId = header.dataset.headingId;
    if (headingId) {
      var el = document.getElementById(headingId);
      if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
    }
    e.preventDefault();
  });
}

function updateActiveTOC() {
  var headings = document.querySelectorAll('#mainContent h2, #mainContent h3');
  var scrollPos = window.scrollY + 100;
  var activeIdx = -1;
  for (var i = 0; i < headings.length; i++) {
    if (headings[i].offsetTop <= scrollPos) activeIdx = i;
  }
  document.querySelectorAll('#sidebarToc .active').forEach(function(el) { el.classList.remove('active'); });
  if (activeIdx >= 0) {
    var activeH = headings[activeIdx];
    if (activeH.tagName === 'H3') {
      var tgt = document.querySelector('#sidebarToc .toc-l2[href="#' + activeH.id + '"]');
      if (tgt) tgt.classList.add('active');
    } else if (activeH.tagName === 'H2') {
      document.querySelectorAll('#sidebarToc .toc-group-header').forEach(function(hdr) {
        if (hdr.dataset.headingId === activeH.id) hdr.classList.add('active');
      });
    }
  }
}

// ============================================================
// Anchor 复制
// ============================================================
function initAnchorLinks() {
  document.addEventListener('click', function(e) {
    var link = e.target.closest('.anchor-link');
    if (!link) return;
    e.preventDefault();
    var url = location.origin + location.pathname + link.getAttribute('href');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() {
        link.classList.add('copied');
        setTimeout(function() { link.classList.remove('copied'); }, 1200);
      });
    } else {
      // Fallback
      var ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); link.classList.add('copied'); }
      catch(ex) {}
      document.body.removeChild(ta);
      setTimeout(function() { link.classList.remove('copied'); }, 1200);
    }
  });
}

// ============================================================
// Copy button for code blocks
// ============================================================
function initCopyButtons() {
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.copy-btn');
    if (!btn) return;
    var pre = btn.parentElement.querySelector('pre');
    if (!pre) return;
    var text = pre.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '✓'; btn.classList.add('copied');
        setTimeout(function() { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); btn.textContent = '✓'; btn.classList.add('copied'); }
      catch(ex) { btn.textContent = '✗'; }
      document.body.removeChild(ta);
      setTimeout(function() { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
    }
  });
}

var favorites = {};

function loadFavorites() {
  try { favorites = JSON.parse(localStorage.getItem('ops-ref-fav') || '{}'); } catch(e) { favorites = {}; }
}

function saveFavorites() {
  try { localStorage.setItem('ops-ref-fav', JSON.stringify(favorites)); } catch(e) {}
}

function toggleFavorite(key, text, anchor, el) {
  if (favorites[key]) {
    delete favorites[key];
    if (el) { el.textContent = '☆'; el.classList.remove('starred'); }
  } else {
    favorites[key] = { text: text, anchor: anchor, time: Date.now() };
    if (el) { el.textContent = '★'; el.classList.add('starred'); }
  }
  saveFavorites();
  buildFavoritesList();
}

function buildFavoritesList() {
  var list = document.getElementById('favoritesList');
  if (!list) return;
  var entries = Object.values(favorites).sort(function(a,b) { return b.time - a.time; });
  if (entries.length === 0) {
    list.innerHTML = '<div class="fav-empty">暂无收藏</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    html += '<a href="#' + e.anchor + '" class="fav-item" title="' + esc(e.text) + '">★ ' + esc(e.text.substring(0, 50)) + '</a>';
  }
  list.innerHTML = html;
}

function initFavorites() {
  loadFavorites();
  // 更新已收藏项的星标显示
  for (var key in favorites) {
    var el = document.querySelector('.star-btn[data-key="' + key + '"]');
    if (el) { el.textContent = '★'; el.classList.add('starred'); }
  }
  buildFavoritesList();

  // 星标点击事件委托
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.star-btn');
    if (!btn) return;
    e.preventDefault();
    var key = btn.dataset.key;
    var text = btn.dataset.text || '';
    var anchor = btn.dataset.anchor || '';
    toggleFavorite(key, text, anchor, btn);
  });
}
var activeDomain = '';

var DOMAIN_MAP = {
  linux:  ['linux', 'linux 基础', 'linux 故障'],
  kubernetes: ['kubernetes', 'k8s'],
  openstack: ['openstack'],
  ansible: ['ansible'],
  docker: ['docker']
};
var DOMAIN_NAMES = {linux:'Linux', kubernetes:'K8s', openstack:'OpenStack', ansible:'Ansible', docker:'Docker'};

function mapDomain(h2Text) {
  var t = h2Text.toLowerCase();
  for (var d in DOMAIN_MAP) {
    for (var i = 0; i < DOMAIN_MAP[d].length; i++) {
      if (t.indexOf(DOMAIN_MAP[d][i]) >= 0) return d;
    }
  }
  return '';
}

function getNodeDomain(node) {
  var el = node.parentElement;
  while (el && el.id !== 'mainContent') {
    if (el.dataset && el.dataset.domain) return el.dataset.domain;
    el = el.parentElement;
  }
  return '';
}

function initDomainFilter() {
  var headings = document.querySelectorAll('#mainContent h1, #mainContent h2');
  headings.forEach(function(h) {
    var domain = mapDomain(h.textContent);
    if (!domain) return;
    h.setAttribute('data-domain', domain);
    var el = h;
    while (el) {
      el = el.nextElementSibling;
      if (!el || el.tagName === 'H1' || el.tagName === 'H2') break;
      el.setAttribute('data-domain', domain);
    }
  });
}

function updateMatchStats(domainHits) {
  var el = document.getElementById('matchCount');
  if (!domainHits) { el.textContent = ''; return; }
  var total = 0, parts = [];
  for (var d in domainHits) {
    total += domainHits[d];
    parts.push((DOMAIN_NAMES[d] || d) + ':' + domainHits[d]);
  }
  var text = total + ' 条匹配';
  if (parts.length > 1) text += '  (' + parts.join(' ') + ')';
  el.textContent = text;
}

function setDomainFilter(domain, chip) {
  activeDomain = domain;
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  if (chip) chip.classList.add('active');
  var q = document.getElementById('searchInput').value.trim();
  if (q) { doSearch(q); return; }
  // 无搜索词：清除高亮，滚动到该域第一个章节
  clearSearchHighlights();
  updateMatchStats(null);
  if (domain) {
    var h = document.querySelector('#mainContent h1[data-domain="' + domain + '"], #mainContent h2[data-domain="' + domain + '"]');
    if (h) h.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}

// ============================================================
// 页内搜索高亮 (AND + 域过滤)
// ============================================================
var searchMatches = [], searchIdx = -1;

function clearSearchHighlights() {
  document.querySelectorAll('.search-hl').forEach(function(el) {
    var parent = el.parentNode;
    parent.replaceChild(document.createTextNode(el.textContent), el);
    parent.normalize();
  });
}

function doSearch(q) {
  clearSearchHighlights();
  searchMatches = []; searchIdx = -1;

  if (!q) { updateMatchStats(null); return; }

  // AND 搜索：空格分隔 = 全部关键词必须匹配
  var keywords = q.toLowerCase().split(/\s+/).filter(function(k) { return k.length > 0; });
  // 检测是否纯拼音（全小写 ASCII，无汉字）
  var isPinyin = /^[a-z\s]+$/.test(q);

  var walker = document.createTreeWalker(
    document.getElementById('mainContent'),
    NodeFilter.SHOW_TEXT, null, false
  );
  var nodes = [];
  while (walker.nextNode()) {
    var parent = walker.currentNode.parentElement;
    if (parent.closest('#suggestList') || parent.closest('.anchor-link') || parent.closest('.filter-chips')) continue;
    if (parent.tagName === 'CODE' && !parent.closest('pre')) continue;
    if (activeDomain && getNodeDomain(walker.currentNode) !== activeDomain) continue;
    nodes.push(walker.currentNode);
  }

  var domainHits = {};

  for (var n = 0; n < nodes.length; n++) {
    var node = nodes[n];
    var text = node.textContent;
    var lower = text.toLowerCase();
    // 拼音匹配：用预计算的 data-py 属性
    var pyLower = '';
    if (isPinyin && node.parentElement.dataset && node.parentElement.dataset.py) {
      pyLower = node.parentElement.dataset.py;
    }

    // AND 检查：所有关键词必须在原文或拼音中出现
    var allMatch = true;
    for (var kw = 0; kw < keywords.length; kw++) {
      var inText = lower.indexOf(keywords[kw]) >= 0;
      var inPy = pyLower && pyLower.indexOf(keywords[kw]) >= 0;
      if (!inText && !inPy) { allMatch = false; break; }
    }
    if (!allMatch) continue;

    // 高亮匹配（只高亮原文中的匹配，拼音中的不标）
    var frag = document.createDocumentFragment();
    var lastIdx = 0;
    var marks = [];

    while (true) {
      var earliestPos = text.length, earliestKw = -1;
      for (var kw = 0; kw < keywords.length; kw++) {
        var pos = lower.indexOf(keywords[kw], lastIdx);
        if (pos !== -1 && pos < earliestPos) { earliestPos = pos; earliestKw = kw; }
      }
      if (earliestKw === -1) break;

      if (earliestPos > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, earliestPos)));
      var mark = document.createElement('mark');
      mark.className = 'search-hl';
      mark.textContent = text.slice(earliestPos, earliestPos + keywords[earliestKw].length);
      frag.appendChild(mark);
      marks.push(mark);
      lastIdx = earliestPos + keywords[earliestKw].length;
    }

    if (marks.length > 0) {
      if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
      node.parentNode.replaceChild(frag, node);
      searchMatches = searchMatches.concat(marks);
      var d = getNodeDomain(node) || 'other';
      domainHits[d] = (domainHits[d] || 0) + marks.length;
    }
  }

  updateMatchStats(domainHits);
  if (searchMatches.length > 0) {
    searchIdx = 0;
    searchMatches[0].scrollIntoView({behavior: 'smooth', block: 'center'});
    searchMatches[0].classList.add('search-active');
  }
}

function goToMatch(dir) {
  if (searchMatches.length === 0) return;
  if (searchIdx >= 0 && searchMatches[searchIdx]) {
    searchMatches[searchIdx].classList.remove('search-active');
  }
  searchIdx += dir;
  if (searchIdx < 0) searchIdx = searchMatches.length - 1;
  if (searchIdx >= searchMatches.length) searchIdx = 0;
  searchMatches[searchIdx].scrollIntoView({behavior: 'smooth', block: 'center'});
  searchMatches[searchIdx].classList.add('search-active');
}

// ============================================================
// 命令统计
// ============================================================
function updateCommandCount() {
  var codeBlocks = document.querySelectorAll('#mainContent .code-block pre');
  var cmdCount = 0;
  codeBlocks.forEach(function(pre) {
    var text = pre.textContent.trim();
    if (text) cmdCount += text.split('\n').filter(function(l) {
      return l.trim() && !/^\s*#/.test(l) && !/^[A-Z\u4e00-\u9fff]/.test(l.trim());
    }).length;
  });
  var el = document.getElementById('cmdCount');
  if (el) el.textContent = cmdCount;
}

// 预计算拼音属性（用于 doSearch 的拼音匹配）
function buildPinyinAttrs() {
  var walker = document.createTreeWalker(
    document.getElementById('mainContent'),
    NodeFilter.SHOW_TEXT, null, false
  );
  while (walker.nextNode()) {
    var node = walker.currentNode;
    var text = node.textContent;
    // 只对含中文的文本节点计算拼音
    if (!/[\u4e00-\u9fff]/.test(text)) continue;
    var parent = node.parentElement;
    // 每个父元素只设置一次（合并子文本节点的拼音）
    if (parent.dataset && parent.dataset.py) continue;
    // 计算整个元素的拼音
    var py = toPinyin(parent.textContent).toLowerCase().replace(/[^a-z0-9]/g, '');
    if (parent.dataset) parent.dataset.py = py;
  }
}

// ============================================================
// 初始化
// ============================================================
var mainEl = document.getElementById('mainContent');
mainEl.insertAdjacentHTML('beforeend', render(MD));

PYDICT_MAP = parsePinyinDict();
generateTOC();
updateActiveTOC();
buildSearchIndex();
initDomainFilter();
initFavorites();
buildPinyinAttrs();
initTheme();
initAnchorLinks();
initCopyButtons();
updateCommandCount();

// Back to top
var topBtn = document.getElementById('backToTop');
window.addEventListener('scroll', function() {
  topBtn.classList.toggle('visible', window.scrollY > 300);
  updateActiveTOC();
});
topBtn.addEventListener('click', function() {
  window.scrollTo({top: 0, behavior: 'smooth'});
});

// Mobile hamburger menu
var hamburger = document.getElementById('hamburgerBtn');
var sidebar = document.querySelector('.sidebar');
var overlay = document.getElementById('sidebarOverlay');

function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

hamburger.addEventListener('click', function(e) { e.stopPropagation(); openSidebar(); });
overlay.addEventListener('click', closeSidebar);

// Close sidebar when a TOC link is clicked (mobile nav)
document.getElementById('sidebarToc').addEventListener('click', function(e) {
  if (e.target.tagName === 'A' || e.target.closest('.toc-group-header')) {
    var id = (e.target.getAttribute('href') || '').slice(1);
    if (id) {
      var el = document.getElementById(id);
      if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
    }
    if (window.innerWidth <= 768) setTimeout(closeSidebar, 200);
  }
});

// Search input: autocomplete + page highlight
var searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', function() {
  var val = this.value.trim();
  showSuggestions(val);
  // 输入时不清除高亮，只在按 Enter 时搜索
});
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (suggestVisible) {
      // 有建议时，选第一个
      var first = suggestEl.querySelector('li');
      if (first) { selectSuggestion(first); return; }
    }
    // 没有建议时 → 页内搜索
    doSearch(this.value.trim().toLowerCase());
  }
  if (e.key === 'Escape') {
    hideSuggestions();
  }
  if (e.key === 'ArrowDown' && suggestVisible) {
    e.preventDefault();
    var items = suggestEl.querySelectorAll('li');
    var active = suggestEl.querySelector('li.active');
    if (active) {
      active.classList.remove('active');
      var next = active.nextElementSibling || items[0];
      next.classList.add('active');
    } else {
      items[0].classList.add('active');
    }
  }
  if (e.key === 'ArrowUp' && suggestVisible) {
    e.preventDefault();
    var items = suggestEl.querySelectorAll('li');
    var active = suggestEl.querySelector('li.active');
    if (active) {
      active.classList.remove('active');
      var prev = active.previousElementSibling || items[items.length - 1];
      prev.classList.add('active');
    } else {
      items[items.length - 1].classList.add('active');
    }
  }
});

// 点击外部关闭建议
document.addEventListener('click', function(e) {
  if (!e.target.closest('#searchInput') && !e.target.closest('#suggestList')) {
    hideSuggestions();
  }
});

// `/` 快捷键聚焦搜索框
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement !== searchInput &&
      document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.blur();
    hideSuggestions();
  }
});

// Theme toggle button
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

// Hash navigation
function scrollToHash() {
  var id = location.hash.slice(1);
  if (id) {
    var el = document.getElementById(id);
    if (el) setTimeout(function() { el.scrollIntoView({behavior: 'smooth'}); }, 50);
  }
}
window.addEventListener('hashchange', scrollToHash);
window.addEventListener('load', scrollToHash);
</script>
