n# hosts.yml\nall:\n  children:\n    web:\n      hosts:\n        192.168.1.10:\n          ansible_host: web01.example.com\n        192.168.1.11:\n    db:\n      hosts:\n        db1:\n          ansible_host: 192.168.1.20\n          ansible_user: admin\n        db2:\n          ansible_host: 192.168.1.21\n          ansible_port: 2222\n    proxy:\n      hosts:\n        192.168.1.30:\n    prod:                       # 生产环境分组\n      children:\n        web:\n        db:\n      vars:\n        env: production\n        log_level: warn\n```\n\n### 常用内置变量\n\n| 变量 | 默认值 | 说明 |\n|------|--------|------|\n| `ansible_host` | 主机名 | 实际连接的 SSH 地址 |\n| `ansible_port` | 22 | SSH 端口 |\n| `ansible_user` | root | SSH 用户 |\n| `ansible_ssh_pass` | — | SSH 密码（建议用 Vault 加密） |\n| `ansible_become` | false | 是否提权执行 |\n| `ansible_become_user` | root | 提权到哪个用户 |\n| `ansible_become_method` | sudo | 提权方式（sudo/su/pbrun） |\n| `ansible_python_interpreter` | /usr/bin/python3 | Python 解释器路径 |\n\n### 组嵌套与继承\n\n```ini\n[linux:children]\nweb\ndb\nproxy\n\n[linux:vars]\nansible_user = ops\n```\n\n### 正则匹配和范围\n\n```ini\n# 范围批量定义\n[app]\nnode-[01:10]    # → node-01, node-02, ..., node-10\n\n[web]\nwww-[a:f]       # → www-a, www-b, ..., www-f\n\n[prod-db]\ndb-[01:05].prod.example.com\n```\n\n---\n\n## 4. Ad-hoc 命令\n\nAd-hoc 模式适用于快速单次操作，无需写 Playbook。\n\n### 基础语法\n\n```bash\nansible <主机组> -m <模块名> -a \"<模块参数>\"\nansible <主机组> -m shell -a \"uptime\"          # 批量执行命令\nansible <主机组> -m ping                        # 连通性测试\nansible all --list-hosts                        # 列出所有受管主机\n```\n\n### 常见模块 Ad-hoc 示例\n\n```bash\n# Ping 测试（返回 pong 即正常）\nansible all -m ping\n\n# 执行命令\nansible web -m command -a \"uptime\"\nansible web -m shell -a \"free -h && df -h\"\nansible web -m raw -a \"ifconfig eth0\"           # raw 不依赖 Python（适用于网络设备）\n\n# 文件操作\nansible web -m file -a \"path=/data state=directory mode=0755\"\nansible web -m copy -a \"src=/etc/hosts dest=/tmp/hosts backup=yes\"\nansible web -m fetch -a \"src=/var/log/syslog dest=logs/ flat=yes\"\n\n# 包管理\nansible web -m yum -a \"name=nginx state=latest\"\nansible web -m apt -a \"name=curl state=present update_cache=yes\"\n\n# 服务管理\nansible web -m service -a \"name=nginx state=started enabled=yes\"\nansible web -m systemd -a \"name=nginx state=reloaded\"\n\n# 用户管理\nansible web -m user -a \"name=deploy uid=2001 group=deploy state=present\"\n\n# 系统信息\nansible all -m setup -a \"filter=ansible_distribution*\"      # 筛选 fact\nansible all -m setup -a \"filter=ansible_*_mb\"               # 内存信息\nansible all -m setup | grep -i \"ansible_processor\"          # CPU 信息\n```\n\n### Ad-hoc 常用选项\n\n```bash\n# 常用参数\nansible web -m shell -a \"df -h\" -i hosts.ini        # 指定 inventory\nansible web -m copy -a \"...\" -b                      # --become 提权\nansible web -m yum -a \"...\" --become-user=admin      # 提权到指定用户\nansible web -m command -a \"...\" -f 10                # 并发数（默认 5）\nansible web -m shell -a \"...\" -o                     # 单行输出（紧凑模式）\nansible web -m shell -a \"...\" --check                # 检查模式（dry-run）\nansible web -m shell -a \"sleep 5\" --forks=20         # 设置并发进程数\n\n# 连接测试\nansible all -m ping -vvv                             # 详细调试输出\nansible all -m ping --private-key ~/.ssh/new_key     # 指定密钥\n```\n\n---\n\n## 5. Playbook 基础\n\n### 最小 Playbook\n\n```yaml\n# deploy-nginx.yml\n---\n- name: 部署 Nginx Web 服务\n  hosts: web                        # 目标主机组\n  gather_facts: true                # 收集事实信息\n  become: yes                       # 提权执行\n\n  tasks:\n    - name: 安装 Nginx\n      yum:\n        name: nginx\n        state: present\n\n    - name: 确保 Nginx 已启动并开机自启\n      service:\n        name: nginx\n        state: started\n        enabled: yes\n\n    - name: 拷贝配置文件\n      copy:\n        src: ./files/nginx.conf\n        dest: /etc/nginx/nginx.conf\n        owner: root\n        group: root\n        mode: '0644'\n      notify: restart nginx         # 触发 handler\n\n  handlers:\n    - name: restart nginx           # handler 名字与 notify 对应\n      service:\n        name: nginx\n        state: restarted\n```\n\n### 执行 Playbook\n\n```bash\n# 基本用法\nansible-playbook deploy-nginx.yml\n\n# 常用选项\nansible-playbook deploy-nginx.yml -i hosts.ini          # 指定 inventory\nansible-playbook deploy-nginx.yml --check               # dry-run 模拟执行\nansible-playbook deploy-nginx.yml --diff                # 显示文件差异\nansible-playbook deploy-nginx.yml -v                    # 详细输出（-v / -vv / -vvv）\nansible-playbook deploy-nginx.yml -v --step            # 交互式逐步骤执行\nansible-playbook deploy-nginx.yml --syntax-check        # 仅检查语法\nansible-playbook deploy-nginx.yml --list-tasks          # 列出将要执行的任务\nansible-playbook deploy-nginx.yml --list-hosts          # 列出受管主机\nansible-playbook deploy-nginx.yml --list-tags           # 列出所有 tags\nansible-playbook deploy-nginx.yml --tags \"install,config\"  # 按 tag 执行\nansible-playbook deploy-nginx.yml --skip-tags \"debug\"     # 跳过指定 tag\n\n# 限制目标主机（调试用）\nansible-playbook deploy-nginx.yml --limit web-01        # 只对单台执行\nansible-playbook deploy-nginx.yml --limit \"web-01,web-02\"  # 多台\n\n# 从特定 task 开始执行\nansible-playbook deploy-nginx.yml --start-at-task \"安装 Nginx\"\n\n# 部署前语法检查（CI 中常用）\nansible-playbook deploy-nginx.yml --syntax-check || exit 1\n```\n\n### Playbook 错误处理\n\n```yaml\n- name: 错误处理示例\n  hosts: all\n  tasks:\n    - name: 忽略错误继续执行\n      command: /bin/false\n      ignore_errors: yes\n\n    - name: 设置任务超时时间\n      command: /bin/sleep 30\n      timeout: 10                   # 10 秒超时\n\n    - name: 捕获失败并执行恢复\n      block:\n        - name: 有可能失败的任务\n          command: /bin/false\n      rescue:\n        - name: 失败后的恢复动作\n          debug:\n            msg: \"任务失败，执行恢复\"\n      always:\n        - name: 无论如何都会执行\n          debug:\n            msg: \"清理工作\"\n\n    - name: 注册变量并判断结果\n      command: /usr/bin/uptime\n      register: result\n      failed_when:\n        - '\"up\" not in result.stdout'\n        - result.rc != 0\n\n    - name: 条件式执行（仅当上次成功）\n      debug:\n        msg: \"上一步执行成功后的后续操作\"\n      when: result.rc == 0\n\n    - name: 幂等性检查 — changed_when\n      shell: |\n        if grep -q \"OPTIONS\" /etc/sysconfig/docker; then\n          echo \"already configured\"\n        else\n          echo \"OPTIONS=--log-level=warn\" >> /etc/sysconfig/docker\n          echo \"changed\"\n        fi\n      register: docker_config\n      changed_when: \"'changed' in docker_config.stdout\"\n```\n\n---\n\n## 6. 核心模块速查\n\n### 6.1 文件操作\n\n```yaml\n- name: 创建目录\n  file:\n    path: /data/app\n    state: directory\n    owner: app\n    group: app\n    mode: '0755'\n\n- name: 创建文件\n  file:\n    path: /data/app/config.yml\n    state: touch\n    owner: app\n    mode: '0644'\n\n- name: 拷贝文件\n  copy:\n    src: ./files/app.conf          # 相对路径，相对于 playbook 目录或 roles 目录\n    dest: /etc/app/app.conf\n    backup: yes                    # 备份已有文件（文件名加时间戳）\n    owner: root\n    group: root\n    mode: '0644'\n    validate: /usr/sbin/nginx -t %s  # 文件校验（配置生效前检查语法）\n\n- name: 从远端拉取文件到控制节点\n  fetch:\n    src: /var/log/nginx/access.log\n    dest: ./logs/{{ inventory_hostname }}/access.log\n    flat: no\n\n- name: 创建软链接\n  file:\n    src: /data/app/current\n    dest: /data/app/releases/1.0.0\n    state: link\n\n- name: 删除文件/目录\n  file:\n    path: /tmp/old_config\n    state: absent\n\n- name: 使用模板生成配置文件\n  template:\n    src: nginx.conf.j2\n    dest: /etc/nginx/nginx.conf\n    owner: root\n    group: root\n    mode: '0644'\n  notify: restart nginx\n\n- name: 追加一行到文件（lineinfile）\n  lineinfile:\n    path: /etc/hosts\n    line: \"192.168.1.100  monitoring.example.com\"\n    regexp: '^192\\.168\\.1\\.100'    # 如果行已存在则替换\n    state: present\n\n- name: 替换文件中的某行\n  lineinfile:\n    path: /etc/ssh/sshd_config\n    regexp: '^#PermitRootLogin'\n    line: 'PermitRootLogin yes'\n    backup: yes\n\n- name: 替换多行文本块（blockinfile）\n  blockinfile:\n    path: /etc/hosts\n    block: |\n      192.168.1.50  db-primary\n      192.168.1.51  db-replica\n    marker: \"# {mark} ANSIBLE MANAGED BLOCK - DB HOSTS\"\n    state: present\n```\n\n### 6.2 命令执行\n\n```yaml\n- name: 执行 shell 命令（支持管道、重定向）\n  shell: |\n    df -h | grep /data\n    echo \"Disk check completed\"\n  args:\n    chdir: /tmp                    # 切换工作目录\n    executable: /bin/bash          # 指定 shell\n  register: disk_result\n\n- name: 执行命令（不支持管道，更安全）\n  command:\n    cmd: /usr/bin/uptime\n    chdir: /root\n  register: uptime_result\n\n- name: raw 模块（不依赖 Python，适用网络设备、最小系统）\n  raw: |\n    show ip interface brief\n  register: raw_result\n```\n\n### 6.3 包管理\n\n```yaml\n# Red Hat 系列（yum / dnf）\n- name: 安装多个包\n  yum:\n    name:\n      - nginx\n      - python3\n      - git\n    state: present\n\n- name: 从本地 RPM 安装\n  yum:\n    name: /tmp/package.rpm\n    state: present\n\n- name: 升级所有包\n  yum:\n    name: '*'\n    state: latest\n\n# Debian 系列\n- name: 更新缓存并安装\n  apt:\n    name:\n      - nginx\n      - python3-pip\n    state: present\n    update_cache: yes\n\n# 通用包管理器\n- name: 通用安装（自动适配 yum/apt/dnf）\n  package:\n    name: htop\n    state: present\n\n# Pip\n- name: 安装 Python 包\n  pip:\n    name:\n      - flask\n      - requests\n      - gunicorn\n    state: present\n```\n\n### 6.4 服务管理\n\n```yaml\n- name: 启动并启用服务\n  service:\n    name: nginx\n    state: started\n    enabled: yes\n\n- name: 重启服务\n  systemd:\n    name: nginx\n    state: restarted\n    daemon_reload: yes             # 重载 systemd 配置\n\n- name: 停止服务\n  service:\n    name: firewalld\n    state: stopped\n    enabled: no\n\n- name: 检查服务状态\n  command: systemctl is-active nginx\n  register: nginx_status\n  changed_when: false\n  failed_when: nginx_status.rc not in [0, 3]\n```\n\n### 6.5 用户与权限\n\n```yaml\n- name: 创建用户组\n  group:\n    name: app\n    gid: 2001\n    state: present\n\n- name: 创建用户\n  user:\n    name: deploy\n    comment: \"Deploy User\"\n    uid: 2001\n    group: app\n    groups: wheel                  # 附加组\n    shell: /bin/bash\n    create_home: yes\n    home: /home/deploy\n    state: present\n\n- name: 设置 SSH 公钥认证\n  authorized_key:\n    user: deploy\n    key: \"{{ lookup('file', '~/.ssh/deploy_key.pub') }}\"\n    state: present\n\n- name: 设置 sudo 免密\n  copy:\n    content: \"deploy ALL=(ALL) NOPASSWD: ALL\"\n    dest: /etc/sudoers.d/deploy\n    mode: '0440'\n    validate: /usr/sbin/visudo -cf %s\n\n- name: 删除用户\n  user:\n    name: olduser\n    state: absent\n    remove: yes                   # 删除家目录和邮件池\n```\n\n### 6.6 网络检查\n\n```yaml\n- name: 测试网络连通性\n  ping:\n\n- name: HTTP 请求测试\n  uri:\n    url: http://{{ ansible_default_ipv4.address }}/health\n    status_code: 200\n    timeout: 5\n  register: health_check\n\n- name: 获取 URL 内容\n  uri:\n    url: https://api.example.com/status\n    method: GET\n    headers:\n      Authorization: \"Bearer {{ api_token }}\"\n    return_content: yes\n  register: api_response\n\n- name: 检查端口是否开放\n  wait_for:\n    host: \"{{ ansible_default_ipv4.address }}\"\n    port: 80\n    state: started\n    timeout: 30\n    msg: \"端口 80 未在 30 秒内开放\"\n\n- name: DNS 解析测试\n  shell: \"nslookup {{ item }} | grep Address\"\n  loop:\n    - example.com\n    - api.example.com\n```\n\n### 6.7 系统信息\n\n```yaml\n- name: 收集系统信息（默认在 play 中 gather_facts: yes 时自动执行）\n  setup:\n    filter: \"ansible_*\"\n\n- name: 设置系统时间\n  timezone:\n    name: Asia/Shanghai\n\n- name: 设置主机名\n  hostname:\n    name: \"{{ inventory_hostname }}\"\n\n- name: 配置内核参数\n  sysctl:\n    name: net.ipv4.ip_forward\n    value: '1'\n    state: present\n    reload: yes\n\n- name: 挂载文件系统\n  mount:\n    path: /data\n    src: /dev/sdb1\n    fstype: xfs\n    opts: defaults,noatime\n    state: mounted\n```\n\n### 6.8 容器管理\n\n```yaml\n- name: Docker 容器管理\n  community.docker.docker_container:\n    name: my-app\n    image: nginx:alpine\n    state: started\n    restart_policy: always\n    ports:\n      - \"80:80\"\n    env:\n      TZ: Asia/Shanghai\n\n- name: Docker Compose 部署\n  community.docker.docker_compose:\n    project_src: /opt/myapp\n    state: present\n    restarted: yes\n\n- name: 容器镜像拉取\n  community.docker.docker_image:\n    name: \"{{ item }}\"\n    source: pull\n  loop:\n    - nginx:alpine\n    - redis:alpine\n```\n\n> **注意**：Docker 相关模块位于 `community.docker` 集合，需先安装：\n> ```bash\n> ansible-galaxy collection install community.docker\n> ```\n\n---\n\n## 7. 变量与 Facts\n\n### 变量定义方式与优先级\n\n优先级从低到高（后定义的覆盖先定义的）：\n\n| 优先级 | 定义位置 | 示例 |\n|--------|---------|------|\n| 1 (最低) | Inventory group_vars/all | `group_vars/all.yml` |\n| 2 | Inventory group_vars/组名 | `group_vars/nginx.yml` |\n| 3 | Inventory host_vars/主机 | `host_vars/web-01.yml` |\n| 4 | Playbook vars | `vars:` 块 |\n| 5 | Playbook vars_files | `vars_files: [vars.yml]` |\n| 6 | Playbook vars_prompt | 交互式输入 |\n| 7 | Role defaults | `roles/xxx/defaults/main.yml`（最低优先级角色变量） |\n| 8 | Role vars | `roles/xxx/vars/main.yml` |\n| 9 | 命令行 -e 参数 | `ansible-playbook -e \"version=1.2\"` |\n| 10 (最高) | `set_fact` / `register` | 运行时动态赋值 |\n\n### 变量定义示例\n\n```yaml\n# group_vars/all.yml\n---\nntp_server: cn.pool.ntp.org\ntimezone: Asia/Shanghai\nproxy_server: \"\"\n\n# group_vars/web.yml\n---\nhttp_port: 8080\nnginx_worker_processes: auto\napp_env: production\n\n# host_vars/web-01.yml\n---\nhttp_port: 8081                    # 单台主机的特殊配置\nansible_host: 10.0.0.101\n```\n\n### 变量引用方式\n\n```yaml\n- name: 打印变量\n  debug:\n    msg: \"{{ nginx_worker_processes }}\"        # Jinja2 双花括号\n\n- name: 命令行传递变量\n  debug:\n    msg: \"Version: {{ version | default('unknown') }}\"\n```\n\n```bash\n# 通过命令行传递变量\nansible-playbook deploy.yml -e \"version=v2.0 env=production\"\nansible-playbook deploy.yml -e \"@vars.json\"        # 从 JSON 文件加载\nansible-playbook deploy.yml -e \"@vars.yml\"         # 从 YAML 文件加载\n```\n\n### Facts 系统信息\n\n```yaml\n# 查看所有 facts（debug 时很有用）\n- name: 打印所有 facts\n  debug:\n    var: ansible_facts\n\n# 常见 facts 变量\n# ansible_distribution          # CentOS / Ubuntu / Debian\n# ansible_distribution_version  # 7.9 / 20.04 / 11\n# ansible_os_family             # RedHat / Debian\n# ansible_default_ipv4.address  # 默认网卡 IPv4\n# ansible_all_ipv4_addresses    # 所有 IPv4 地址\n# ansible_hostname              # 主机名\n# ansible_processor_cores       # CPU 核心数\n# ansible_memtotal_mb           # 总内存 (MB)\n# ansible_architecture          # x86_64 / aarch64\n# ansible_kernel                # 内核版本\n\n# 禁用 facts 收集（加速执行）\n- name: 不收集 facts\n  hosts: web\n  gather_facts: no\n\n# 手动收集 facts\n- name: 手动收集\n  setup:\n    filter: \"ansible_distribution*\"\n```\n\n### 变量进阶用法\n\n```yaml\n# 嵌套字典变量\n---\napp_config:\n  port: 8080\n  workers: 4\n  database:\n    host: db-primary\n    port: 3306\n    name: myapp\n\n# 引用嵌套变量\ntasks:\n  - debug:\n      msg: \"数据库主机: {{ app_config.database.host }}\"\n\n# 注册变量\ntasks:\n  - name: 获取磁盘使用率\n    shell: df -h / | tail -1 | awk '{print $5}'\n    register: disk_usage\n\n  - name: 磁盘空间不足告警\n    debug:\n      msg: \"⚠ 磁盘使用率 {{ disk_usage.stdout }}\"\n    when: disk_usage.stdout | int > 80\n\n# set_fact 动态设置变量\ntasks:\n  - name: 动态计算并设置变量\n    set_fact:\n      deploy_path: \"/data/app/{{ app_version }}\"\n      full_name: \"{{ first_name | upper }} {{ last_name | upper }}\"\n\n# 提示用户输入变量\nvars_prompt:\n  - name: db_password\n    prompt: \"请输入数据库密码\"\n    private: yes\n    confirm: yes\n  - name: deploy_env\n    prompt: \"部署环境 (dev/staging/prod)\"\n    default: dev\n    private: no\n```\n\n---\n\n## 8. 模板 (Jinja2)\n\n### 模板文件语法\n\n```jinja2\n# templates/nginx.conf.j2\nupstream {{ app_name }} {\n{% for backend in backend_servers %}\n    server {{ backend }}:{{ app_port }};\n{% endfor %}\n}\n\nserver {\n    listen {{ http_port }};\n    server_name {{ server_name }};\n    client_max_body_size {{ upload_max_size | default('10m') }};\n\n    location / {\n        proxy_pass http://{{ app_name }};\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n    }\n\n    location /health {\n        return 200 \"OK\\n\";\n        add_header Content-Type text/plain;\n    }\n}\n```\n\n### 常用 Jinja2 过滤器\n\n```jinja2\n{{ variable | default('fallback') }}    {# 默认值 #}\n{{ variable | mandatory }}              {# 变量必须存在 #}\n{{ name | upper }}                      {# 大写 #}\n{{ name | lower }}                      {# 小写 #}\n{{ name | title }}                      {# 首字母大写 #}\n{{ text | trim }}                       {# 去除首尾空白 #}\n{{ text | quote }}                      {# 加引号 #}\n{{ list | join(', ') }}                 {# 列表拼接 #}\n{{ path | basename }}                   {# 文件名 #}\n{{ path | dirname }}                    {# 目录路径 #}\n{{ ip | ipaddr('network') }}            {# IP 网络计算 #}\n{{ dict | to_json }}                    {# 转 JSON #}\n{{ dict | to_yaml }}                    {# 转 YAML #}\n{{ password | password_hash('sha512') }}{# 密码加密 #}\n{{ \"hello\" | regex_replace('ello', 'i') }}{# 正则替换 #}\n{{ list | unique }}                     {# 去重 #}\n{{ list | flatten }}                    {# 展开嵌套列表 #}\n{{ list | sort }}                       {# 排序 #}\n{{ list | rejectattr('state', 'eq', 'absent') | list }}  {# 过滤 #}\n```\n\n### 模板使用示例\n\n```yaml\n- name: 使用模板生成配置文件\n  template:\n    src: nginx.conf.j2\n    dest: /etc/nginx/nginx.conf\n    owner: root\n    group: root\n    mode: '0644'\n\n- name: 使用模板生成多台主机各自的配置\n  template:\n    src: app.properties.j2\n    dest: \"/data/app/{{ inventory_hostname }}.properties\"\n```\n\n**模板文件存放位置：**\n- Playbook 同级 `templates/` 目录\n- Role 中的 `roles/<rolename>/templates/` 目录\n\n---\n\n## 9. 条件与循环\n\n### 条件判断\n\n```yaml\n# when 条件\ntasks:\n  - name: CentOS 系统特定操作\n    yum:\n      name: httpd\n      state: present\n    when: ansible_os_family == \"RedHat\"\n\n  - name: Ubuntu 系统特定操作\n    apt:\n      name: apache2\n      state: present\n    when: ansible_os_family == \"Debian\"\n\n  - name: 多条件组合\n    service:\n      name: nginx\n      state: restarted\n    when:\n      - ansible_distribution == \"CentOS\"\n      - ansible_distribution_major_version | int >= 7\n      - nginx_installed is defined\n      - not (skip_restart | default(false))\n\n  - name: 条件判断变量存在与否\n    debug:\n      msg: \"自定义变量已定义\"\n    when: custom_var is defined\n\n  - name: 条件判断路径是否存在\n    debug:\n      msg: \"配置文件存在\"\n    when: config_path is exists\n\n  # 注意：exists / is_dir / is_file / is_link / is_abs 是 Jinja2 测试，\n  # 可以用 stat 模块更精确地判断\n  - name: 使用 stat 模块检查文件\n    stat:\n      path: /etc/nginx/nginx.conf\n    register: nginx_conf\n\n  - name: 文件存在时执行操作\n    debug:\n      msg: \"文件大小: {{ nginx_conf.stat.size }} 字节\"\n    when: nginx_conf.stat.exists\n```\n\n### 循环\n\n```yaml\n# 标准循环 — with_items（推荐用 loop）\ntasks:\n  - name: 安装多个软件包\n    yum:\n      name: \"{{ item }}\"\n      state: present\n    loop:\n      - nginx\n      - python3\n      - git\n      - htop\n\n  - name: 创建多个用户\n    user:\n      name: \"{{ item.name }}\"\n      group: \"{{ item.group | default('users') }}\"\n      shell: \"{{ item.shell | default('/bin/bash') }}\"\n    loop:\n      - { name: alice, group: wheel }\n      - { name: bob, shell: /bin/zsh }\n      - { name: charlie }\n\n  - name: 遍历字典\n    debug:\n      msg: \"Key: {{ item.key }}, Value: {{ item.value }}\"\n    loop: \"{{ { 'name': 'nginx', 'port': 80, 'enabled': true } | dict2items }}\"\n\n# 循环控制\n  - name: 带索引的循环\n    debug:\n      msg: \"第 {{ ansible_loop.index }} 次: {{ item }}\"\n    loop:\n      - a\n      - b\n      - c\n    loop_control:\n      index_var: ansible_loop.index\n\n  - name: 循环 + 条件\n    debug:\n      msg: \"{{ item }} 已启用\"\n    loop: \"{{ services }}\"\n    when: item.enabled\n\n# 循环直到条件满足\n  - name: 等待服务启动\n    shell: \"curl -s http://localhost:8080/health | grep -c OK\"\n    register: result\n    until: result.stdout == \"1\"\n    retries: 12\n    delay: 5\n\n# 文件 glob 循环\n  - name: 批量分发脚本\n    copy:\n      src: \"{{ item }}\"\n      dest: /usr/local/bin/\n      mode: '0755'\n    loop: \"{{ lookup('fileglob', 'scripts/*.sh').split(',') }}\"\n\n# 生成序列\n  - name: 创建一系列目录\n    file:\n      path: \"/data/{{ item }}\"\n      state: directory\n    loop: \"{{ range(1, 6) | list }}\"         # → [1,2,3,4,5]\n```\n\n---\n\n## 10. Roles 角色\n\n### 角色目录结构\n\n```\nroles/\n├── nginx/                         # 角色名\n│   ├── tasks/\n│   │   └── main.yml              # 主任务文件\n│   ├── handlers/\n│   │   └── main.yml              # handler 定义\n│   ├── templates/\n│   │   └── nginx.conf.j2         # Jinja2 模板\n│   ├── files/\n│   │   └── default.conf          # 静态文件\n│   ├── vars/\n│   │   └── main.yml              # 高优先级变量（不可被外部覆盖）\n│   ├── defaults/\n│   │   └── main.yml              # 默认变量（最低优先级）\n│   ├── meta/\n│   │   └── main.yml              # 角色依赖和元信息\n│   └── README.md                 # 角色说明\n├── mysql/\n│   └── tasks/\n│       └── main.yml\n└── monitor/\n    └── tasks/\n        └── main.yml\n```\n\n### Task 示例\n\n```yaml\n# roles/nginx/tasks/main.yml\n---\n- name: 确保 EPEL 源已安装\n  yum:\n    name: epel-release\n    state: present\n  when: ansible_os_family == \"RedHat\"\n\n- name: 安装 Nginx\n  package:\n    name: nginx\n    state: present\n\n- name: 创建站点目录\n  file:\n    path: /var/www/{{ app_name | default('default') }}\n    state: directory\n    owner: nginx\n    group: nginx\n    mode: '0755'\n\n- name: 分发 Nginx 配置\n  template:\n    src: nginx.conf.j2\n    dest: /etc/nginx/nginx.conf\n    owner: root\n    group: root\n    mode: '0644'\n  notify: restart nginx\n\n- name: 启动并启用 Nginx\n  service:\n    name: nginx\n    state: started\n    enabled: yes\n```\n\n### Handler 示例\n\n```yaml\n# roles/nginx/handlers/main.yml\n---\n- name: restart nginx\n  service:\n    name: nginx\n    state: restarted\n\n- name: reload nginx\n  service:\n    name: nginx\n    state: reloaded\n```\n\n### 默认变量\n\n```yaml\n# roles/nginx/defaults/main.yml\n---\nnginx_port: 80\nnginx_worker_processes: auto\nnginx_worker_connections: 1024\nnginx_keepalive_timeout: 65\napp_name: default\n```\n\n### Playbook 中使用角色\n\n```yaml\n# site.yml — 站点级部署入口\n---\n- name: 配置 Web 服务器\n  hosts: web\n  become: yes\n  roles:\n    - role: common                 # 通用基础配置\n      tags: common\n    - role: nginx\n      vars:\n        nginx_port: 8080          # 覆盖默认变量\n        app_name: mywebapp\n      tags: nginx\n      when: ansible_os_family == \"RedHat\"\n    - role: mysql\n      tags: mysql\n\n# 等同于以下传统写法（用 tasks/include_role）\n- name: 配置 Web 服务器（等效写法）\n  hosts: web\n  become: yes\n  tasks:\n    - include_role:\n        name: common\n    - include_role:\n        name: nginx\n      vars:\n        nginx_port: 8080\n```\n\n### 角色依赖\n\n```yaml\n# roles/nginx/meta/main.yml\n---\ndependencies:\n  - role: common                   # 先执行 common 角色\n    tags: common\n  - role: epel                    # 再安装 EPEL\n    when: ansible_os_family == \"RedHat\"\n```\n\n### Role 常用命令\n\n```bash\n# 创建角色骨架\nansible-galaxy init roles/nginx\n\n# 从 Ansible Galaxy 安装社区角色\nansible-galaxy install geerlingguy.nginx\nansible-galaxy install geerlingguy.nginx -p roles/    # 指定目录\n\n# 查看已安装角色\nansible-galaxy list\n\n# 创建角色集合的 requirements.yml\nansible-galaxy install -r requirements.yml -p roles/\n```\n\n```yaml\n# requirements.yml\n---\nroles:\n  - name: geerlingguy.nginx\n    version: 3.1.0\n  - name: geerlingguy.certbot\n    version: 5.0.0\n\ncollections:\n  - name: community.docker\n    version: \">=3.0.0\"\n  - name: ansible.posix\n```\n\n---\n\n## 11. Ansible Vault 加密\n\n### 基本用法\n\n```bash\n# 创建加密文件（会提示输入密码）\nansible-vault create secrets.yml\n\n# 加密已有文件\nansible-vault encrypt secrets.yml\n\n# 查看加密文件内容\nansible-vault view secrets.yml\n\n# 编辑加密文件\nansible-vault edit secrets.yml\n\n# 解密\nansible-vault decrypt secrets.yml\n\n# 修改密码\nansible-vault rekey secrets.yml\n```\n\n### 加密文件示例\n\n```yaml\n# secrets.yml（加密前的内容）\n---\ndb_password: \"S3cur3P@ssw0rd\"\napi_key: \"ak-2a3b4c5d6e7f8g9h\"\nssh_key_passphrase: \"my-passphrase\"\n```\n\n### Playbook 中使用加密变量\n\n```bash\n# 执行时输入密码\nansible-playbook deploy.yml --ask-vault-pass\n\n# 使用密码文件\nansible-playbook deploy.yml --vault-password-file ~/.vault_pass\n\n# 使用多个 vault ID（不同环境不同密码）\nansible-playbook deploy.yml --vault-id prod@~/.vault_pass_prod\nansible-playbook deploy.yml --vault-id dev@~/.vault_pass_dev\n```\n\n```yaml\n# playbook 引用加密变量\n---\n- name: 部署应用\n  hosts: web\n  vars_files:\n    - secrets.yml                  # Ansible 自动解密\n  tasks:\n    - name: 使用数据库密码\n      debug:\n        msg: \"DB Password: {{ db_password }}\"\n      no_log: true                 # 隐藏敏感输出\n```\n\n### Vault 加密字符串（非整个文件）\n\n```bash\n# 加密单个字符串\nansible-vault encrypt_string 'S3cur3P@ssw0rd' --name db_password\n\n# 输出：\n# db_password: !vault |\n#           $ANSIBLE_VAULT;1.1;AES256\n#           613861306466383...\n```\n\n```yaml\n# 可以直接嵌入 YAML 使用\ndb_password: !vault |\n  $ANSIBLE_VAULT;1.1;AES256\n  613861306466383...\n```\n\n### 实用技巧\n\n```bash\n# 生成随机密码并加密\necho \"db_password: $(openssl rand -base64 24)\" | ansible-vault encrypt\n\n# 查看加密文件信息（不显示内容）\nansible-vault decrypt secrets.yml --output - 2>/dev/null || true\n```\n\n---\n\n## 12. Tags 与 Limit\n\n### Tags\n\n```yaml\n# playbook.yml\n---\n- name: 全量部署\n  hosts: web\n  tasks:\n    - name: 安装包\n      yum:\n        name: nginx\n        state: present\n      tags:\n        - install\n        - packages\n\n    - name: 配置 Nginx\n      template:\n        src: nginx.conf.j2\n        dest: /etc/nginx/nginx.conf\n      tags:\n        - config\n        - nginx\n\n    - name: 启动服务\n      service:\n        name: nginx\n        state: started\n      tags:\n        - service\n        - nginx\n```\n\n```bash\n# 按 tag 执行特定任务\nansible-playbook playbook.yml --tags \"install\"            # 只执行 install 标签\nansible-playbook playbook.yml --tags \"nginx\"              # 只执行 nginx 标签\nansible-playbook playbook.yml --skip-tags \"config\"        # 跳过 config 标签\n\n# 特殊内置 tags\nansible-playbook playbook.yml --tags \"tagged\"             # 只执行有标签的 task\nansible-playbook playbook.yml --tags \"untagged\"           # 只执行无标签的 task\nansible-playbook playbook.yml --tags \"all\"                # 全部执行（默认）\n```\n\n### Limit\n\n```bash\n# 限制执行范围\nansible-playbook playbook.yml --limit web-01              # 单台\nansible-playbook playbook.yml --limit \"web-01,web-02\"     # 多台（逗号分隔）\nansible-playbook playbook.yml --limit \"~web-\\d+\"          # 正则匹配\nansible-playbook playbook.yml --limit @hosts.txt          # 从文件读取主机列表\n\n# 先从目标中排除\nansible-playbook playbook.yml --limit \"all:!web-02\"       # 排除 web-02\nansible-playbook playbook.yml --limit \"web:&db\"           # 同时属于 web 和 db 组的主机\n```\n\n---\n\n## 13. 常用排查场景速查\n\n### 13.1 连接失败排查\n\n```bash\n# 检查连通性\nansible target-host -m ping -vvv\n\n# 常见原因：\n# 1. SSH 免密未配置\nssh-copy-id root@target-host\n\n# 2. SSH 端口非默认\nansible target-host -m ping -e \"ansible_port=2222\"\n\n# 3. Python 未安装（目标主机无 Python 时使用 raw 模块）\nansible target-host -m raw -a \"test -e /usr/bin/python3\"\n\n# 4. 控制节点和目标节点 Python 版本不兼容\nansible target-host -m ping -e \"ansible_python_interpreter=/usr/bin/python3\"\n\n# 5. Host Key 检查失败\n# 在 ansible.cfg 中设置：\n# host_key_checking = False\n# 或在 ~/.ssh/config 中：\n# StrictHostKeyChecking no\n\n# 6. SSH 连接超时\n# 在 ansible.cfg 中：\n# timeout = 60\n```\n\n### 13.2 执行结果不符合预期\n\n```bash\n# 增加详细输出等级\nansible-playbook playbook.yml -v          # 1 级：输出结果\nansible-playbook playbook.yml -vv         # 2 级：输入输出详情\nansible-playbook playbook.yml -vvv        # 3 级：SSH 连接详情\nansible-playbook playbook.yml -vvvv       # 4 级：所有调试信息\n\n# Dry-run 验证\nansible-playbook playbook.yml --check\nansible-playbook playbook.yml --check --diff    # 同时显示文件差异\n\n# 限制为单台主机调试\nansible-playbook playbook.yml --limit single-host\n```\n\n### 13.3 Playbook 语法检查\n\n```bash\n# 语法检查（不实际执行）\nansible-playbook playbook.yml --syntax-check\n\n# 列出任务结构\nansible-playbook playbook.yml --list-tasks\nansible-playbook playbook.yml --list-tags\nansible-playbook playbook.yml --list-hosts\n\n# 输出 YAML 解析结果\ncat playbook.yml | python3 -c \"import yaml,sys; yaml.safe_load(sys.stdin); print('YAML OK')\"\n```\n\n### 13.4 模版渲染问题\n\n```bash\n# 测试 Jinja2 模板渲染结果\nansible all -i \"localhost,\" -m debug -a \"msg={{ '{{' }} lookup('template', 'test.j2') {{ '}}' }}\"\n\n# 或者用 ansible 的 debug 模块查看变量\nansible-playbook debug.yml -e \"target_host=web-01\"\n```\n\n```yaml\n# debug.yml — 变量调试专用 Playbook\n---\n- name: 调试变量\n  hosts: \"{{ target_host | default('all') }}\"\n  gather_facts: yes\n  tasks:\n    - name: 打印所有变量\n      debug:\n        var: hostvars[inventory_hostname]\n\n    - name: 打印特定变量\n      debug:\n        var: nginx_port\n\n    - name: 打印模板文件内容（不实际部署）\n      debug:\n        msg: \"{{ lookup('template', 'nginx.conf.j2') }}\"\n```\n\n### 13.5 递归依赖与死循环\n\n```bash\n# 查看角色依赖树\nansible-galaxy info geerlingguy.nginx --offline\n\n# 检查 meta/main.yml 依赖配置是否正确\n# 避免：A 依赖 B，B 也依赖 A\n```\n\n### 13.6 性能调优\n\n```bash\n# 开启 SSH pipelining（大幅度提升速度）\n# ansible.cfg:\n# [ssh_connection]\n# pipelining = True\n\n# 增加并发数\nansible-playbook playbook.yml -f 20                  # 20 台并发\nansible-playbook playbook.yml --forks=30             # 等价写法\n\n# 禁用 facts 收集（如果不需要系统信息）\n# playbook 中设置：gather_facts: no\n\n# 使用 facts 缓存\n# ansible.cfg:\n# gathering = smart\n# fact_caching = jsonfile\n# fact_caching_connection = /tmp/ansible_facts\n# fact_caching_timeout = 3600\n\n# SSH 连接复用\n# ansible.cfg:\n# [ssh_connection]\n# control_path = /tmp/%%h-%%r-%%p\n# ssh_args = -o ControlMaster=auto -o ControlPersist=60s\n```\n\n### 13.7 幂等性检查\n\n```yaml\n# 幂等性是 Ansible 的核心原则，重复执行应得到相同结果\n\n# 正确做法：永远不在 shell 中直接 chmod/chown\n# ❌ 不幂等\n- shell: chmod 755 /data/app\n\n# ✅ 幂等\n- file:\n    path: /data/app\n    mode: '0755'\n\n# ❌ 不幂等\n- shell: echo \"hello\" >> /etc/motd\n\n# ✅ 幂等\n- lineinfile:\n    path: /etc/motd\n    line: \"hello\"\n    create: yes\n\n# 检查幂等性：两次执行 --check 模式应无 changed\nansible-playbook playbook.yml --check | grep \"changed=\"\n```\n\n### 13.8 常见报错与解决\n\n| 报错信息 | 原因 | 解决方法 |\n|---------|------|---------|\n| `Host key verification failed` | SSH Host Key 不匹配 | `ssh-keygen -R 目标IP` 或关闭 Host Key 检查 |\n| `ModuleNotFoundError` | 目标主机缺少 Python 模块 | `pip install <模块>` 或使用 raw 模块降级 |\n| `ERROR! Timeout exceeded` | SSH 连接超时 | 检查网络/防火墙，增加 `timeout` 配置 |\n| `ERROR! Syntax Error` | YAML 缩进错误 | 检查缩进（用空格，不要用 Tab） |\n| `ERROR! 'ansible.builtin.xxx' is not a valid attribute` | 模块名拼写错误 | 核对模块文档中的正确名称 |\n| `ERROR! 'dict object' has no attribute 'xxx'` | 引用不存在的变量 | 检查变量名拼写，或使用 `default` 过滤器 |\n| `ERROR! The field 'hosts' has an invalid value` | hosts 拼写错误 | 确认主机组名在 inventory 中存在 |\n| `Connection refused` | SSH 端口不正确 | 指定 `ansible_port` 或检查 SSH 服务状态 |\n| `Permission denied (publickey)` | SSH 密钥认证失败 | 重新分发公钥，确认密钥路径正确 |\n| `ERROR! 'become' is not a valid attribute` | become 缩进层级错误 | become 应在 play 层级，非 task 层级 |\n\n---\n\n## 附录：快速索引\n\n### 常用模块速查表\n\n| 模块 | 用途 | Ad-hoc 示例 |\n|------|------|------------|\n| `ping` | 连通性测试 | `ansible all -m ping` |\n| `setup` | 收集系统信息 | `ansible all -m setup -a \"filter=ansible_distribution*\"` |\n| `command` | 执行命令 | `ansible web -m command -a \"uptime\"` |\n| `shell` | Shell 命令 | `ansible web -m shell -a \"df -h \\| grep /data\"` |\n| `raw` | 无 Python 依赖执行 | `ansible web -m raw -a \"show version\"` |\n| `copy` | 复制文件到远端 | `ansible web -m copy -a \"src=./hosts dest=/tmp/\"` |\n| `fetch` | 从远端拉取文件 | `ansible web -m fetch -a \"src=/etc/hosts dest=./\"` |\n| `file` | 文件/目录管理 | `ansible web -m file -a \"path=/data state=directory\"` |\n| `template` | 模板渲染并分发 | 见 Playbook |\n| `lineinfile` | 单行文本管理 | `ansible web -m lineinfile -a \"path=/etc/hosts line='...'\"` |\n| `blockinfile` | 多行文本块管理 | `ansible web -m blockinfile -a \"path=/etc/hosts block='...'\"` |\n| `yum`/`apt` | 包管理 | `ansible web -m yum -a \"name=nginx state=present\"` |\n| `service`/`systemd` | 服务管理 | `ansible web -m service -a \"name=nginx state=started\"` |\n| `user` | 用户管理 | `ansible web -m user -a \"name=deploy state=present\"` |\n| `group` | 用户组管理 | `ansible web -m group -a \"name=deploy state=present\"` |\n| `uri` | HTTP 请求 | `ansible web -m uri -a \"url=http://localhost/health\"` |\n| `wait_for` | 端口等待 | `ansible web -m wait_for -a \"port=80 state=started\"` |\n| `debug` | 打印调式信息 | `ansible web -m debug -a \"msg=Hello\"` |\n| `mount` | 文件系统挂载 | `ansible web -m mount -a \"path=/data src=/dev/sdb1 state=mounted\"` |\n| `sysctl` | 内核参数 | `ansible web -m sysctl -a \"name=net.ipv4.ip_forward value=1\"` |\n| `cron` | 计划任务 | `ansible web -m cron -a \"name=cleanup hour=2 job=/script.sh\"` |\n| `authorized_key` | SSH 密钥管理 | 见 Playbook |\n| `timezone` | 时区设置 | `ansible web -m timezone -a \"name=Asia/Shanghai\"` |\n\n### 常用命令速查表\n\n| 命令 | 用途 |\n|------|------|\n| `ansible all -m ping` | 连通性测试 |\n| `ansible all --list-hosts` | 列出所有受管主机 |\n| `ansible-playbook play.yml --syntax-check` | 检查 Playbook 语法 |\n| `ansible-playbook play.yml --check` | Dry-run 模拟执行 |\n| `ansible-playbook play.yml --diff` | 显示文件变更差异 |\n| `ansible-playbook play.yml -v` | 详细输出模式 |\n| `ansible-playbook play.yml --list-tasks` | 列出所有任务 |\n| `ansible-playbook play.yml --limit host1` | 限制执行范围 |\n| `ansible-vault create file.yml` | 创建加密文件 |\n| `ansible-vault encrypt file.yml` | 加密已有文件 |\n| `ansible-galaxy init roles/xxx` | 创建角色骨架 |\n| `ansible-galaxy install geerlingguy.nginx` | 安装社区角色 |\n| `ansible-config dump` | 查看当前配置 |\n\n### Playbook 文件结构建议\n\n```\nops-ansible/\n├── ansible.cfg                    # Ansible 配置\n├── hosts.ini                      # 主机清单\n├── site.yml                       # 主入口 Playbook\n├── requirements.yml               # Galaxy 依赖\n├── secrets.yml                    # 加密变量（Vault）\n├── files/                         # 静态文件\n│   └── sshd_config\n├── templates/                     # Jinja2 模板\n│   └── nginx.conf.j2\n├── vars/                          # 变量文件\n│   ├── main.yml\n│   └── versions.yml\n├── group_vars/                    # 组变量\n│   ├── all.yml\n│   ├── web.yml\n│   └── db.yml\n├── host_vars/                     # 主机变量\n│   └── web-01.yml\n└── roles/                         # 角色目录\n    ├── common/\n    ├── nginx/\n    ├── mysql/\n    └── monitor/\n```\n\n---\n\n## Docker 容器运维\n\n> 适用场景：容器化应用部署、镜像构建、编排管理、故障排查\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n### 1. 容器生命周期\n\n```bash\n# 运行容器\ndocker run -d --name nginx -p 80:80 nginx:alpine          # 后台运行，端口映射\ndocker run -it --rm ubuntu bash                             # 交互式，退出自动删除\ndocker run -d --restart=always --name app myapp:latest      # 自动重启\ndocker run -d -v /data:/app/data -e ENV=prod myapp         # 挂载卷 + 环境变量\n\n# 查看容器\ndocker ps                                                   # 运行中的容器\ndocker ps -a                                                # 所有容器（含已停止）\ndocker ps -a --format \"table {{.ID}}\\t{{.Names}}\\t{{.Status}}\\t{{.Ports}}\"\ndocker ps -q                                                # 只输出容器 ID\n\n# 启停操作\ndocker start nginx            # 启动已停止的容器\ndocker stop nginx             # 优雅停止（SIGTERM → 10s → SIGKILL）\ndocker stop -t 30 nginx       # 等待 30 秒再强杀\ndocker restart nginx          # 重启\ndocker pause/unpause nginx    # 暂停/恢复进程（不释放内存）\ndocker kill nginx             # 立即强杀（SIGKILL）\n\n# 删除容器\ndocker rm nginx                                  # 删除已停止的容器\ndocker rm -f nginx                               # 强制删除运行中的\ndocker container prune -f                        # 删除所有已停止容器\ndocker rm $(docker ps -aq)                       # 删除所有容器（⚠️）\ndocker stop $(docker ps -q) && docker rm $(docker ps -aq)  # 先停后删\n\n# 进入容器\ndocker exec -it nginx bash                       # 进入 bash\ndocker exec -it nginx sh                         # Alpine 用 sh\ndocker exec nginx cat /etc/nginx/nginx.conf      # 执行单条命令\ndocker exec -u root nginx whoami                 # 以 root 身份执行\ndocker attach nginx                              # 附着到容器主进程（不推荐）\n\n# 日志\ndocker logs nginx                                # 查看日志\ndocker logs -f nginx                             # 实时跟踪\ndocker logs --tail 100 nginx                     # 最后 100 行\ndocker logs --since 30m nginx                    # 最近 30 分钟\ndocker logs --until \"2024-01-01T12:00:00\" nginx  # 截止到某时间\ndocker logs -f --tail 50 nginx 2>&1 | grep ERROR # 过滤错误日志\n```\n\n### 2. 镜像管理\n\n```bash\n# 查看与搜索\ndocker images                                      # 本地镜像列表\ndocker images --format \"table {{.Repository}}\\t{{.Tag}}\\t{{.Size}}\"\ndocker search nginx --limit 10                    # 搜索 Docker Hub\ndocker history nginx:alpine                        # 镜像构建历史（层）\n\n# 拉取与推送\ndocker pull nginx:alpine                           # 拉取指定标签\ndocker pull nginx                                  # 默认拉取 latest\ndocker tag nginx:alpine myrepo/nginx:v1.0          # 打标签\ndocker push myrepo/nginx:v1.0                      # 推送到仓库\ndocker pull registry.example.com:5000/myapp:v1     # 从私有仓库拉取\n\n# 构建镜像\ndocker build -t myapp:v1.0 .                       # 从 Dockerfile 构建\ndocker build --no-cache -t myapp:v2 .              # 不使用缓存\ndocker build --build-arg VERSION=2.0 -t app:v2 .   # 传递构建参数\ndocker build -f Dockerfile.prod -t app:prod .      # 指定 Dockerfile\n\n# 清理镜像\ndocker rmi nginx:alpine                            # 删除镜像\ndocker rmi $(docker images -q)                     # 删除所有镜像（⚠️）\ndocker image prune -a                              # 删除未使用的镜像\ndocker system prune -a --volumes                   # 彻底清理所有未使用资源\n\n# 导入导出\ndocker save -o nginx.tar nginx:alpine              # 导出镜像为 tar\ndocker load -i nginx.tar                           # 从 tar 导入\ndocker export nginx > nginx.tar                    # 导出容器文件系统\ndocker import nginx.tar mynginx:latest             # 从 tar 导入为镜像\n\n# 查看镜像详情\ndocker inspect nginx:alpine                        # 镜像 JSON 详情\ndocker inspect -f '{{.Config.Env}}' nginx          # 格式化提取环境变量\ndocker inspect -f '{{range .RootFS.Layers}}{{println .}}{{end}}' nginx  # 列出所有层\n```\n\n### 3. Dockerfile 编写\n\n```dockerfile\n# 基础镜像\nFROM node:18-alpine AS builder                     # 多阶段构建，命名为 builder\n\n# 元信息\nLABEL maintainer=\"ops@example.com\"\nLABEL version=\"1.0\"\n\n# 工作目录\nWORKDIR /app\n\n# 复制文件\nCOPY package*.json ./\nCOPY --chown=node:node . .\n\n# 安装依赖\nRUN npm ci --only=production && npm cache clean --force\n\n# 构建参数（仅构建时可用）\nARG BUILD_DATE\nARG VCS_REF\n\n# 环境变量（运行时可用）\nENV NODE_ENV=production\nENV PORT=3000\n\n# 声明端口（文档作用，不实际开放）\nEXPOSE 3000\n\n# 创建非 root 用户\nRUN addgroup -g 1001 appgroup && adduser -u 1001 -G appgroup -s /bin/sh -D appuser\nUSER appuser\n\n# 健康检查\nHEALTHCHECK --interval=30s --timeout=3s --retries=3 \\\n  CMD curl -f http://localhost:3000/health || exit 1\n\n# 持久化目录\nVOLUME [\"/app/data\", \"/app/logs\"]\n\n# 入口点（不可被 docker run 后的命令覆盖）\nENTRYPOINT [\"node\", \"server.js\"]\n\n# 默认命令（可被覆盖）\nCMD [\"--port\", \"3000\"]\n```\n\n**CMD vs ENTRYPOINT 组合**\n\n| 模式 | Dockerfile | docker run 传参 | 实际执行 |\n|------|-----------|----------------|---------|\n| CMD 仅 | `CMD [\"echo\", \"hello\"]` | `world` | `echo world` |\n| ENTRYPOINT 仅 | `ENTRYPOINT [\"echo\"]` | `hello` | `echo hello` |\n| 组合 | `ENTRYPOINT [\"echo\"]` + `CMD [\"hello\"]` | `world` | `echo world` |\n| 脚本入口 | `ENTRYPOINT [\"/entrypoint.sh\"]` + `CMD [\"nginx\", \"-g\", \"daemon off;\"]` | 不传则用 CMD | `/entrypoint.sh nginx -g daemon off;` |\n\n**多阶段构建（减小镜像体积）**\n\n```dockerfile\n# 阶段1：编译\nFROM golang:1.21-alpine AS builder\nWORKDIR /src\nCOPY . .\nRUN go build -o /app .\n\n# 阶段2：运行（只复制编译产物）\nFROM alpine:3.19\nCOPY --from=builder /app /usr/local/bin/app\nENTRYPOINT [\"app\"]\n```\n\n**构建优化技巧**\n\n| 技巧 | 说明 |\n|------|------|\n| `.dockerignore` | 排除 node_modules、.git、测试文件 |\n| 合并 RUN 层 | `RUN apt update && apt install -y pkg && rm -rf /var/lib/apt/lists/*` |\n| 先 COPY 依赖文件 | COPY package.json → RUN npm install → COPY . |\n| 使用特定标签 | `FROM node:18.17-alpine` 而非 `node:latest` |\n| 多阶段构建 | 编译环境和运行环境分离 |\n\n### 4. 网络管理\n\n```bash\n# 查看网络\ndocker network ls                              # 列出所有网络\ndocker network inspect bridge                  # 查看桥接网络详情\ndocker network inspect -f '{{range .Containers}}{{.Name}} {{.IPv4Address}}{{\"\\n\"}}{{end}}' bridge\n\n# 创建网络\ndocker network create mynet                    # 创建桥接网络\ndocker network create --subnet=10.10.0.0/16 --gateway=10.10.0.1 mynet\ndocker network create --driver overlay myover  # Swarm overlay 网络\n\n# 连接管理\ndocker network connect mynet nginx             # 容器加入网络\ndocker network disconnect mynet nginx          # 容器离开网络\ndocker run --network mynet --ip 10.10.0.10 nginx  # 指定 IP 运行\n\n# 端口映射\ndocker run -p 8080:80 nginx                    # 映射 8080→80\ndocker run -p 127.0.0.1:8080:80 nginx          # 仅本地监听\ndocker run -P nginx                            # 随机映射所有 EXPOSE 端口\ndocker port nginx                              # 查看容器端口映射\n\n# 网络排障\ndocker run --rm --net container:nginx alpine ping -c 2 google.com  # 借用 nginx 网络\ndocker run --rm --net host alpine ip a                                # 使用宿主机网络\ndocker run --rm alpine nslookup redis                                 # DNS 测试\n```\n\n**网络模式对比**\n\n| 模式 | 说明 | 适用场景 |\n|------|------|---------|\n| `bridge`（默认） | 独立网络命名空间，通过 NAT 访问外网 | 一般容器 |\n| `host` | 共享宿主机网络栈，性能最好 | 高性能网络服务 |\n| `none` | 无网络 | 纯计算任务 |\n| `container:NAME` | 共享指定容器的网络栈 | 代理/日志收集器 |\n| `overlay` | 跨主机通信（Swarm） | 集群部署 |\n\n### 5. 存储管理\n\n```bash\n# Volume（推荐，Docker 管理）\ndocker volume create app_data                             # 创建卷\ndocker volume ls                                          # 列出卷\ndocker volume inspect app_data                            # 查看卷详情（Mountpoint）\ndocker volume rm app_data                                 # 删除卷\ndocker volume prune                                       # 清理未使用的卷\ndocker run -v app_data:/app/data nginx                    # 挂载卷\ndocker run --mount source=app_data,target=/app/data nginx # 推荐写法\n\n# Bind Mount（宿主机目录）\ndocker run -v /host/path:/container/path nginx\ndocker run -v /host/path:/container/path:ro nginx         # 只读挂载\ndocker run --mount type=bind,source=/host/path,target=/app,readonly nginx\n\n# tmpfs（内存临时存储）\ndocker run --tmpfs /app/tmp:rw,size=128M nginx\ndocker run --mount type=tmpfs,destination=/app/tmp,tmpfs-size=128M nginx\n\n# 容器间共享卷\ndocker run -d --name app1 -v shared:/data nginx\ndocker run -d --name app2 --volumes-from app1 alpine\n\n# 备份卷\ndocker run --rm -v app_data:/data -v $(pwd):/backup alpine tar czf /backup/app_backup.tar.gz -C /data .\n```\n\n### 6. Docker Compose\n\n```yaml\n# docker-compose.yml\nversion: '3.8'\nservices:\n  web:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    image: myapp:${TAG:-latest}\n    container_name: myapp-web\n    ports:\n      - \"8080:3000\"\n    environment:\n      - NODE_ENV=production\n      - DB_HOST=db\n    env_file:\n      - .env.production\n    volumes:\n      - app_data:/app/data\n      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro\n    networks:\n      - frontend\n      - backend\n    depends_on:\n      db:\n        condition: service_healthy\n    restart: unless-stopped\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:3000/health\"]\n      interval: 30s\n      timeout: 5s\n      retries: 3\n      start_period: 10s\n    logging:\n      driver: \"json-file\"\n      options:\n        max-size: \"10m\"\n        max-file: \"3\"\n    deploy:\n      resources:\n        limits:\n          cpus: '0.5'\n          memory: 256M\n        reservations:\n          cpus: '0.25'\n          memory: 128M\n\n  db:\n    image: postgres:16-alpine\n    environment:\n      POSTGRES_DB: myapp\n      POSTGRES_USER: app\n      POSTGRES_PASSWORD_FILE: /run/secrets/db_password\n    secrets:\n      - db_password\n    volumes:\n      - db_data:/var/lib/postgresql/data\n    networks:\n      - backend\n    restart: unless-stopped\n\n  nginx:\n    image: nginx:alpine\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    volumes:\n      - ./nginx.conf:/etc/nginx/nginx.conf:ro\n      - ./certs:/etc/nginx/certs:ro\n    depends_on:\n      - web\n    networks:\n      - frontend\n\nnetworks:\n  frontend:\n  backend:\n    internal: true                  # 内部网络，不暴露到宿主机\n\nvolumes:\n  app_data:\n  db_data:\n\nsecrets:\n  db_password:\n    file: ./secrets/db_password.txt\n```\n\n```bash\n# Compose 常用命令\ndocker compose up -d                                   # 后台启动所有服务\ndocker compose up -d --build                           # 重新构建并启动\ndocker compose up -d web                               # 只启动某服务\ndocker compose down                                    # 停止并删除（保留卷）\ndocker compose down -v                                 # 同时删除卷\ndocker compose restart web                             # 重启某服务\ndocker compose logs -f web                             # 实时日志\ndocker compose logs -f --tail=50 web                   # 最后 50 行\ndocker compose exec web bash                           # 进入容器\ndocker compose exec -u root web bash                   # root 进入\ndocker compose ps                                      # 查看服务状态\ndocker compose config                                  # 验证并打印合并后的配置\ndocker compose config --services                       # 只列服务名\ndocker compose pull                                    # 拉取最新镜像\ndocker compose build --no-cache                        # 强制重建\n```\n\n### 7. 资源限制\n\n```bash\n# CPU 限制\ndocker run --cpus=\"1.5\" nginx                          # 最多使用 1.5 个 CPU\ndocker run --cpuset-cpus=\"0,2\" nginx                   # 绑定到 CPU 0 和 2\ndocker run --cpu-shares=512 nginx                      # CPU 权重（默认 1024）\n\n# 内存限制\ndocker run --memory=\"512m\" --memory-swap=\"1g\" nginx    # 内存 512M，swap 1G\ndocker run --memory=\"256m\" --memory-swap=\"256m\" nginx  # 禁用 swap（相等）\ndocker run --memory-reservation=\"128m\" nginx           # 软限制（竞争时生效）\n\n# 磁盘 IO 限制\ndocker run --blkio-weight=500 nginx                    # IO 权重（10-1000）\ndocker run --device-read-bps=/dev/sda:1mb nginx        # 读速率限制\ndocker run --device-write-iops=/dev/sda:50 nginx       # 写 IOPS 限制\n\n# 其他限制\ndocker run --restart=on-failure:3 nginx                # 失败最多重启 3 次\ndocker run --ulimit nofile=65536:65536 nginx           # 文件描述符限制\ndocker run --pids-limit=100 nginx                      # 进程数限制\ndocker run --shm-size=256m nginx                       # /dev/shm 大小\ndocker run --read-only nginx                           # 只读根文件系统\n\n# 运行时更新限制\ndocker update --memory=\"1g\" --cpus=\"2\" nginx           # 更新运行中容器的限制\ndocker stats                                            # 查看所有容器资源占用\ndocker stats --no-stream nginx                          # 一次性输出\n```\n\n### 8. 排障命令\n\n```bash\n# 容器状态\ndocker inspect nginx                                   # 完整 JSON 配置\ndocker inspect -f '{{.State.Status}}' nginx            # 格式化提取状态\ndocker inspect -f '{{.State.StartedAt}}' nginx         # 启动时间\ndocker inspect -f '{{.NetworkSettings.IPAddress}}' nginx # 容器 IP\ndocker top nginx                                       # 容器内进程列表\ndocker stats --no-stream                               # 一次性资源快照\n\n# 文件变动\ndocker diff nginx                                      # 容器文件系统变化（A 新增/C 修改/D 删除）\ndocker cp nginx:/etc/nginx/nginx.conf ./               # 从容器复制文件到宿主机\ndocker cp ./nginx.conf nginx:/etc/nginx/nginx.conf     # 复制文件到容器\n\n# 查看退出原因\ndocker logs --tail 20 nginx                            # 容器退出前最后日志\ndocker inspect -f '{{.State.ExitCode}}' nginx          # 退出码\ndocker inspect -f '{{.State.Error}}' nginx             # 错误信息\ndocker inspect -f '{{json .State.Health}}' nginx | python3 -m json.tool  # 健康检查状态\ndocker events --since 10m --filter container=nginx     # 最近 10 分钟事件\n\n# 磁盘空间\ndocker system df                                        # Docker 磁盘使用概览\ndocker system df -v                                     # 详细空间分析\ndocker system prune -a -f --volumes                     # 彻底清理\ndu -sh /var/lib/docker                                  # Docker 数据目录大小\n\n# 进程与信号\ndocker kill -s HUP nginx                                # 发送重载信号\ndocker kill -s USR1 nginx                               # 发送自定义信号\ndocker pause nginx && docker unpause nginx              # 暂停/恢复\n\n# 导出配置\ndocker commit nginx mydebug:latest                      # 将容器保存为新镜像（调试用，不用于生产）\n```\n\n### 9. 安全实践\n\n```bash\n# 检查镜像漏洞\ndocker scan nginx:alpine                                # Docker 内置扫描（需登录）\ndocker scout quickview nginx:alpine                     # Docker Scout\n\n# 以非 root 运行\ndocker run -u 1001:1001 nginx                           # 指定 UID:GID\ndocker run --user \"$(id -u):$(id -g)\" nginx            # 使用当前用户\n\n# 安全选项\ndocker run --read-only nginx                            # 只读根文件系统\ndocker run --security-opt no-new-privileges nginx       # 禁止提权\ndocker run --cap-drop=ALL --cap-add=NET_BIND_SERVICE nginx  # 最小权限\ndocker run --tmpfs /tmp:rw,noexec,nosuid,size=64M nginx # 安全 tmpfs\n\n# 内容信任\nexport DOCKER_CONTENT_TRUST=1                           # 启用镜像签名验证\ndocker pull nginx:alpine                                # 只拉取已签名的镜像\n\n# 密钥管理（不要用环境变量传密码）\necho \"mypassword\" | docker secret create db_password -   # Swarm secret\ndocker run --secret db_password nginx                   # 挂载 secret\n# Compose 中使用 secrets: 字段（见上面 Compose 示例）\n\n# 审计\ndocker system info                                      # Docker 守护进程信息\ndocker info -f '{{.ServerVersion}}'                    # 版本号\ndocker system events --since 1h                          # 最近 1 小时事件审计\n```\n\n### 10. 常用场景速查\n\n**部署一个 Web 应用（完整流程）**\n\n```bash\n# 1. 创建网络\ndocker network create webnet\n\n# 2. 启动数据库\ndocker run -d --name db --network webnet \\\n  -v db_data:/var/lib/postgresql/data \\\n  -e POSTGRES_PASSWORD=secret \\\n  postgres:16-alpine\n\n# 3. 构建并启动应用\ndocker build -t myapp:v1 .\ndocker run -d --name app --network webnet \\\n  -p 8080:3000 \\\n  -e DB_HOST=db \\\n  -v app_uploads:/app/uploads \\\n  --restart=unless-stopped \\\n  myapp:v1\n\n# 4. 查看日志确认启动\ndocker logs -f app\n\n# 5. 测试\ncurl http://localhost:8080/health\n```\n\n**更新镜像（滚动更新）**\n\n```bash\n# 构建新版本\ndocker build -t myapp:v2 .\n\n# 停止旧容器\ndocker stop app && docker rm app\n\n# 启动新容器（保留数据和网络）\ndocker run -d --name app --network webnet \\\n  -p 8080:3000 \\\n  -e DB_HOST=db \\\n  -v app_uploads:/app/uploads \\\n  --restart=unless-stopped \\\n  myapp:v2\n```\n\n**容器化遗留应用（最小侵入）**\n\n```bash\n# 导出宿主机配置\ndocker run --rm --net host -v /etc:/host-etc:ro alpine cp -r /host-etc /backup-etc\n\n# 用宿主机网络运行（过渡方案）\ndocker run -d --net host --restart=always legacy-app:latest\n```\n\n**清理磁盘空间应急**\n\n```bash\n# 查看占用\ndocker system df\n\n# 停止所有非必要容器\ndocker stop $(docker ps -q --filter \"name=test\")\n\n# 清理\ndocker container prune -f\ndocker image prune -a -f\ndocker volume prune -f\ndocker network prune -f\ndocker builder prune -a -f     # 清理构建缓存\n\n# 最终手段\ndocker system prune -a -f --volumes\n```\n\n---\n\n## 监控告警\n\n> 适用场景：Prometheus + Grafana + Alertmanager 搭建、指标查询、告警配置、故障定位\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n### 1. Prometheus 基础\n\n```bash\n# 启动（Docker 方式，最常用）\ndocker run -d --name prometheus --restart=always \\\n  -p 9090:9090 \\\n  -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml \\\n  -v prometheus_data:/prometheus \\\n  prom/prometheus\n\n# 启动（二进制方式）\n./prometheus --config.file=prometheus.yml --storage.tsdb.path=/data/prometheus \\\n  --storage.tsdb.retention.time=15d --web.listen-address=:9090 &\n\n# 热重载配置（不中断服务）\ncurl -X POST http://localhost:9090/-/reload\nkill -HUP $(pgrep prometheus)\n\n# 检查配置\npromtool check config prometheus.yml                    # 语法检查\npromtool check rules rules/*.yml                        # 规则检查\n\n# 查看状态\ncurl http://localhost:9090/api/v1/status/config          # 当前配置\ncurl http://localhost:9090/api/v1/targets                # 抓取目标状态\ncurl http://localhost:9090/api/v1/rules                  # 告警/记录规则\ncurl http://localhost:9090/api/v1/status/tsdb            # 存储统计\ncurl http://localhost:9090/metrics                       # Prometheus 自身指标\n\n# TSDB 管理\npromtool tsdb list /data/prometheus                      # 列出数据块\npromtool tsdb dump /data/prometheus                      # 导出数据（调试用）\n```\n\n**prometheus.yml 核心配置**\n\n```yaml\nglobal:\n  scrape_interval: 15s              # 抓取间隔\n  evaluation_interval: 15s          # 规则评估间隔\n  external_labels:\n    cluster: prod\n    region: cn-east\n\nalerting:\n  alertmanagers:\n    - static_configs:\n        - targets: ['alertmanager:9093']\n\nrule_files:\n  - 'rules/*.yml'\n\nscrape_configs:\n  - job_name: 'prometheus'\n    static_configs:\n      - targets: ['localhost:9090']\n\n  - job_name: 'node'\n    static_configs:\n      - targets: ['node1:9100', 'node2:9100', 'node3:9100']\n        labels:\n          env: production\n          role: app\n\n  - job_name: 'kubernetes-pods'\n    kubernetes_sd_configs:\n      - role: pod\n    relabel_configs:\n      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]\n        action: keep\n        regex: true\n      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]\n        action: replace\n        target_label: __metrics_path__\n        regex: (.+)\n\n  - job_name: 'docker'\n    static_configs:\n      - targets: ['localhost:9323']   # Docker 内置 metrics\n```\n\n---\n\n### 2. PromQL 常用查询\n\n```promql\n# === 基础运算 ===\n# 瞬时向量（当前值）\nnode_cpu_seconds_total{mode=\"idle\"}\n\n# 范围向量（5分钟窗口）\nnode_cpu_seconds_total{mode=\"idle\"}[5m]\n\n# 速率（每秒增长率，最常用）\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m])\nirate(node_cpu_seconds_total{mode=\"idle\"}[5m])       # 更灵敏的瞬时速率\n\n# 增长量\nincrease(node_network_receive_bytes_total[1h])        # 1小时增长量\n\n# === CPU ===\n# CPU 使用率（所有模式汇总）\n100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\n\n# 按实例分组的 CPU 使用率\n100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\n\n# Per-mode CPU\nsum by(mode)(rate(node_cpu_seconds_total[5m]))\n\n# === 内存 ===\n# 内存使用率\n(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100\n\n# 内存使用量（GB）\n(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 1024^3\n\n# === 磁盘 ===\n# 磁盘使用率\n(node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100\n\n# 磁盘使用率 > 80% 的挂载点\n(node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 80\n\n# 预测磁盘满时间（基于最近1小时速率）\npredict_linear(node_filesystem_free_bytes[1h], 3600 * 24) < 0\n\n# 磁盘 IO 使用率\nrate(node_disk_io_time_seconds_total[5m]) * 100\n\n# === 网络 ===\n# 网络接收速率（MB/s）\nrate(node_network_receive_bytes_total[5m]) / 1024 / 1024\n\n# 网络错误包\nrate(node_network_receive_errors_total[5m])\n\n# TCP 连接数\nnode_netstat_Tcp_CurrEstab\n\n# === 服务状态 ===\n# 目标 UP/DOWN\nup{job=\"node\"}                                           # 1=UP, 0=DOWN\ncount by(job)(up == 0)                                  # 各 job 的 DOWN 数量\n\n# 抓取耗时\nrate(prometheus_target_interval_length_seconds_count[5m])\n\n# === 聚合与排序 ===\n# Top 5 CPU 使用的实例\ntopk(5, 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100))\n\n# 按环境分组的平均内存\navg by(env)(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100)\n\n# === 时间函数 ===\n# 过去1小时的平均值\navg_over_time(node_load1[1h])\n\n# 过去1小时最大值\nmax_over_time(node_load1[1h])\n\n# 同比上周\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m]) /\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m] offset 1w)\n\n# === Histogram（P50/P90/P99）===\n# 请求延迟分位数\nhistogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))\n\n# Apdex 得分\n(sum(rate(http_request_duration_seconds_bucket{le=\"0.1\"}[5m])) +\n sum(rate(http_request_duration_seconds_bucket{le=\"1.0\"}[5m]))) / 2 /\n sum(rate(http_request_duration_seconds_count[5m]))\n```\n\n---\n\n### 3. Node Exporter（系统指标采集）\n\n```bash\n# 安装运行\nwget https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz\ntar xzf node_exporter-*.tar.gz\n./node_exporter --web.listen-address=:9100 &\n\n# Docker 方式\ndocker run -d --name node-exporter --restart=always --net host \\\n  -v /proc:/host/proc:ro -v /sys:/host/sys:ro -v /:/rootfs:ro \\\n  prom/node-exporter \\\n  --path.procfs=/host/proc --path.sysfs=/host/sys --path.rootfs=/rootfs\n\n# 验证指标\ncurl http://localhost:9100/metrics | head -30\n\n# 常用 collector（默认启用大部分）\n./node_exporter --collector.disable-defaults \\\n  --collector.cpu --collector.meminfo --collector.diskstats \\\n  --collector.netdev --collector.filesystem --collector.loadavg\n\n# 特定 collector\n--collector.systemd                          # systemd 服务状态\n--collector.textfile.directory=/var/lib/node_exporter  # 自定义指标目录\n--collector.processes                        # 进程统计\n```\n\n**常用 Node Exporter 指标速查**\n\n| 指标前缀 | 含义 | 关键标签 |\n|---------|------|---------|\n| `node_cpu_seconds_total` | CPU 时间 | `mode`: idle/iowait/system/user |\n| `node_memory_MemTotal_bytes` | 总内存 | — |\n| `node_memory_MemAvailable_bytes` | 可用内存 | — |\n| `node_filesystem_size_bytes` | 文件系统大小 | `mountpoint`, `fstype` |\n| `node_filesystem_free_bytes` | 文件系统剩余 | `mountpoint` |\n| `node_disk_read_bytes_total` | 磁盘读取量 | `device` |\n| `node_network_receive_bytes_total` | 网络接收量 | `device` |\n| `node_load1` / `load5` / `load15` | 系统负载 | — |\n| `node_netstat_Tcp_CurrEstab` | TCP 连接数 | — |\n| `node_time_seconds` | 系统时间 | — |\n\n---\n\n### 4. 告警规则\n\n```yaml\n# rules/node.yml\ngroups:\n  - name: node_alerts\n    rules:\n      # 实例宕机\n      - alert: InstanceDown\n        expr: up == 0\n        for: 2m\n        labels:\n          severity: critical\n        annotations:\n          summary: \"实例 {{ $labels.instance }} 宕机\"\n          description: \"{{ $labels.instance }} 已超过 2 分钟无响应\"\n\n      # CPU 使用率 > 80%\n      - alert: HighCPUUsage\n        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100) > 80\n        for: 5m\n        labels:\n          severity: warning\n        annotations:\n          summary: \"CPU 使用率 > 80% ({{ $labels.instance }})\"\n          description: \"当前值: {{ $value | humanize }}%\"\n\n      # 内存 > 90%\n      - alert: HighMemoryUsage\n        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90\n        for: 5m\n        labels:\n          severity: warning\n        annotations:\n          summary: \"内存使用率 > 90% ({{ $labels.instance }})\"\n\n      # 磁盘 > 85%（排除 tmpfs）\n      - alert: HighDiskUsage\n        expr: (node_filesystem_size_bytes{fstype!=\"tmpfs\"} - node_filesystem_free_bytes{fstype!=\"tmpfs\"})\n              / node_filesystem_size_bytes{fstype!=\"tmpfs\"} * 100 > 85\n        for: 5m\n        labels:\n          severity: warning\n        annotations:\n          summary: \"磁盘使用率 > 85% ({{ $labels.instance }}:{{ $labels.mountpoint }})\"\n\n      # 磁盘预测 4 小时内满\n      - alert: DiskWillFillIn4Hours\n        expr: predict_linear(node_filesystem_free_bytes{fstype!=\"tmpfs\"}[1h], 4*3600) < 0\n        for: 10m\n        labels:\n          severity: critical\n        annotations:\n          summary: \"磁盘预计 4 小时内满 ({{ $labels.instance }}:{{ $labels.mountpoint }})\"\n\n      # Load 过高\n      - alert: HighLoad\n        expr: node_load1 / count without(cpu,mode)(node_cpu_seconds_total{mode=\"idle\"}) > 2\n        for: 10m\n        labels:\n          severity: warning\n        annotations:\n          summary: \"系统 Load 过高 ({{ $labels.instance }})\"\n\n      # 重启检测\n      - alert: HostRebooted\n        expr: node_time_seconds - node_boot_time_seconds < 300\n        labels:\n          severity: info\n        annotations:\n          summary: \"{{ $labels.instance }} 最近重启过\"\n\n      # 证书过期（需要 blackbox_exporter）\n      - alert: SSLCertExpiring\n        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7\n        for: 1h\n        labels:\n          severity: warning\n        annotations:\n          summary: \"SSL 证书将在 7 天内过期\"\n```\n\n---\n\n### 5. Alertmanager\n\n```bash\n# 启动\ndocker run -d --name alertmanager -p 9093:9093 \\\n  -v $(pwd)/alertmanager.yml:/etc/alertmanager/alertmanager.yml \\\n  prom/alertmanager\n\n# 查看静默\namtool silence list                       # 列出静默\namtool silence add alertname=HighCPUUsage --duration=2h --comment=\"维护窗口\"\namtool silence expire <silence-id>        # 过期静默\n\n# 查看当前告警\ncurl http://localhost:9093/api/v2/alerts | python3 -m json.tool\n```\n\n**alertmanager.yml**\n\n```yaml\nglobal:\n  resolve_timeout: 5m\n  smtp_smarthost: 'smtp.example.com:587'\n  smtp_from: 'alertmanager@example.com'\n  smtp_auth_username: 'alertmanager@example.com'\n  smtp_auth_password: 'password'\n\n# 告警路由树\nroute:\n  group_by: ['alertname', 'severity']     # 分组字段\n  group_wait: 10s                          # 首次等待（收集同组告警）\n  group_interval: 5m                       # 同组后续告警间隔\n  repeat_interval: 4h                      # 重复发送间隔\n  receiver: 'default'\n  routes:\n    - match:\n        severity: critical\n      receiver: 'critical-pager'\n      continue: true                       # 继续匹配下级路由\n    - match_re:\n        job: '.*'\n      receiver: 'default'\n\n# 接收器\nreceivers:\n  - name: 'default'\n    email_configs:\n      - to: 'ops-team@example.com'\n        headers:\n          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'\n    webhook_configs:\n      - url: 'https://hooks.example.com/alert'\n        send_resolved: true\n\n  - name: 'critical-pager'\n    webhook_configs:\n      - url: 'https://pager.example.com/api/alert'\n        max_alerts: 1                      # 每次只发一条\n```\n\n**接收器类型**\n\n| 类型 | 用途 | 关键配置 |\n|------|------|---------|\n| `email_configs` | 邮件 | `to`, `headers` |\n| `webhook_configs` | HTTP 回调（钉钉/飞书/企微） | `url`, `send_resolved` |\n| `slack_configs` | Slack | `api_url`, `channel` |\n| `pagerduty_configs` | PagerDuty | `routing_key` |\n| `opsgenie_configs` | OpsGenie | `api_key` |\n| `wechat_configs` | 企业微信 | `corp_id`, `to_party` |\n\n---\n\n### 6. Grafana\n\n```bash\n# 启动\ndocker run -d --name grafana -p 3000:3000 \\\n  -v grafana_data:/var/lib/grafana \\\n  grafana/grafana\n\n# 默认账号 admin/admin，首次登录强制改密码\n\n# API 操作\n# 导出 Dashboard JSON\ncurl -s -u admin:password http://localhost:3000/api/dashboards/uid/<uid> | python3 -m json.tool\n\n# 导入 Dashboard\ncurl -X POST http://localhost:3000/api/dashboards/db \\\n  -u admin:password -H 'Content-Type: application/json' \\\n  -d '{\"dashboard\": {...}, \"overwrite\": true}'\n\n# 列出所有 Dashboard\ncurl -s -u admin:password http://localhost:3000/api/search | python3 -m json.tool\n\n# 常用环境变量\n# GF_SECURITY_ADMIN_PASSWORD=secret    # 初始密码\n# GF_SMTP_ENABLED=true                 # 邮件告警\n# GF_SERVER_ROOT_URL=https://grafana.example.com\n```\n\n**Grafana 常用操作**\n\n| 操作 | 路径/方法 |\n|------|----------|\n| 添加 Prometheus 数据源 | Configuration → Data Sources → Prometheus → URL: `http://prometheus:9090` |\n| 创建 Dashboard | Dashboards → New → Add panel → 输入 PromQL |\n| 变量查询 | Dashboard Settings → Variables → Query: `label_values(up, instance)` |\n| 导入社区面板 | Dashboards → Import → 输入 ID（如 Node Exporter: `1860`） |\n| 告警通道 | Alerting → Contact points → New（Email/Webhook） |\n| 通知模板 | Alerting → Notification templates |\n\n**Panel 常用 PromQL 模板**\n\n```\n# 单值面板（当前值）\nnode_memory_MemAvailable_bytes / 1024^3\n\n# 时间序列（趋势图）\nrate(node_network_receive_bytes_total{device=\"eth0\"}[5m])\n\n# 表格（多实例对比）\navg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100\n\n# 仪表盘（使用率百分比）\n100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\n\n# 热力图（延迟分布，需要 histogram）\nsum by(le)(rate(http_request_duration_seconds_bucket[5m]))\n```\n\n---\n\n### 7. Blackbox Exporter（外部探测）\n\n```bash\n# 启动\ndocker run -d --name blackbox -p 9115:9115 prom/blackbox-exporter\n\n# HTTP 探测\ncurl \"http://localhost:9115/probe?target=https://example.com&module=http_2xx\"\n\n# TCP 探测\ncurl \"http://localhost:9115/probe?target=example.com:443&module=tcp_connect\"\n\n# ICMP 探测（需要 NET_RAW 权限）\ncurl \"http://localhost:9115/probe?target=8.8.8.8&module=icmp\"\n```\n\n**Prometheus 抓取配置**\n\n```yaml\nscrape_configs:\n  - job_name: 'blackbox'\n    metrics_path: /probe\n    params:\n      module: [http_2xx]\n    static_configs:\n      - targets:\n          - https://example.com\n          - https://api.example.com/health\n          - https://admin.example.com\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      - target_label: __address__\n        replacement: blackbox:9115\n```\n\n**常用探测指标**\n\n| 指标 | 含义 |\n|------|------|\n| `probe_success` | 探测是否成功 (1/0) |\n| `probe_duration_seconds` | 探测耗时 |\n| `probe_http_status_code` | HTTP 状态码 |\n| `probe_ssl_earliest_cert_expiry` | SSL 证书最早过期时间 |\n| `probe_dns_lookup_time_seconds` | DNS 解析耗时 |\n| `probe_tcp_connect_time_seconds` | TCP 连接耗时 |\n\n---\n\n### 8. 常用监控场景速查\n\n**场景1：排查 CPU 飙高**\n\n```promql\n# 1. 确认是否真的高\n100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)\n\n# 2. 看是哪个 mode\nsum by(mode)(rate(node_cpu_seconds_total{instance=\"problem-host\"}[5m]))\n\n# 3. 对比历史（是否突增）\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m]) /\nrate(node_cpu_seconds_total{mode=\"idle\"}[5m] offset 1h)\n\n# 4. 上机器查进程 → 见 02-linux-troubleshooting.md\nssh problem-host\ntop -o %CPU\n```\n\n**场景2：排查内存泄漏**\n\n```promql\n# 1. 看趋势（最近6小时）\nnode_memory_MemAvailable_bytes{instance=\"problem-host\"}\n\n# 2. 对比同时段\nnode_memory_MemAvailable_bytes{instance=\"problem-host\"} /\nnode_memory_MemAvailable_bytes{instance=\"problem-host\"} offset 24h\n\n# 3. 看是否有 OOM Kill\nincrease(node_vmstat_oom_kill[1h]) > 0\n```\n\n**场景3：磁盘空间告警处理**\n\n```bash\n# 1. 确认用量\ndf -h | grep -E \"8[5-9]%|9[0-9]%|100%\"\n\n# 2. 找大文件\ndu -ah / | sort -rh | head -20\n\n# 3. 常见清理\ndocker system prune -a -f       # Docker\njournalctl --vacuum-size=500M   # systemd 日志\nfind /var/log -name \"*.gz\" -delete  # 旧日志\n```\n\n**场景4：服务可用性监控**\n\n```promql\n# 整体可用性（过去 24h）\navg_over_time(up{job=\"myapp\"}[24h]) * 100\n\n# 今天发生过几次 DOWN\nchanges(up{job=\"myapp\"}[24h]) > 0\n\n# 最近一次 DOWN 的时间\ntimestamp(up{job=\"myapp\"} == 0)\n```\n\n**场景5：SSL 证书监控**\n\n```promql\n# 剩余天数\n(probe_ssl_earliest_cert_expiry - time()) / 86400\n\n# 列出 30 天内过期的\n(probe_ssl_earliest_cert_expiry - time()) / 86400 < 30\n```\n\n---\n\n### 9. 排障命令\n\n```bash\n# Prometheus 排障\ncurl http://localhost:9090/api/v1/targets | python3 -m json.tool | grep -E \"health|lastError\"\npromtool check config prometheus.yml\ntail -f /var/log/prometheus.log\n\n# 检查 Prometheus 自身的健康\ncurl http://localhost:9090/-/healthy\ncurl http://localhost:9090/-/ready\n\n# Alertmanager 排障\namtool alert query --alertmanager.url=http://localhost:9093\ncurl http://localhost:9093/-/healthy\ncurl http://localhost:9093/api/v2/status\n\n# Grafana 排障\ndocker logs grafana --tail 50\ncurl http://localhost:3000/api/health\n# 重置 admin 密码\ndocker exec -it grafana grafana-cli admin reset-admin-password newpassword\n\n# 指标调试\n# 直接看原始指标\ncurl http://localhost:9100/metrics | grep node_cpu\n# PromQL 即时查询\ncurl \"http://localhost:9090/api/v1/query?query=up\"\n\n# 检查时间同步（指标时间戳对不上会导致数据异常）\ntimedatectl status\n```\n\n---\n\n## 数据库速查\n\n> 适用场景：MySQL/PostgreSQL/Redis 日常运维、备份恢复、性能排查、应急处理\n> 前置阅读：[01-linux-basics.md](01-linux-basics.md)\n\n---\n\n### 一、MySQL / MariaDB\n\n#### 1.1 连接与管理\n\n```bash\n# 连接\nmysql -u root -p                                     # 交互式\nmysql -u root -p -h 10.0.0.1 -P 3306 mydb           # 远程连接指定库\nmysql -u root -p -e \"SHOW DATABASES;\"                # 执行单条 SQL\nmysql -u root -p < backup.sql                        # 导入 SQL 文件\n\n# 服务管理\nsystemctl status mysql                               # MySQL\nsystemctl status mariadb                             # MariaDB\nsystemctl restart mysql\n\n# 查看版本和状态\nmysql -u root -p -e \"SELECT VERSION();\"\nmysqladmin -u root -p status                         # 运行时间/线程数/查询数\nmysqladmin -u root -p extended-status                # 详细状态\nmysqladmin -u root -p processlist                    # 当前连接列表\n\n# 配置文件位置\n/etc/my.cnf                    # 主配置\n/etc/mysql/my.cnf              # Debian/Ubuntu\n/etc/my.cnf.d/                 # 配置片段目录\n```\n\n#### 1.2 用户与权限\n\n```sql\n-- 创建用户\nCREATE USER 'app'@'localhost' IDENTIFIED BY 'password';\nCREATE USER 'app'@'10.0.%.%' IDENTIFIED BY 'password';     -- 允许某网段\nCREATE USER 'app'@'%' IDENTIFIED BY 'password';             -- 允许所有 IP\n\n-- 授权\nGRANT ALL ON mydb.* TO 'app'@'localhost';\nGRANT SELECT, INSERT, UPDATE ON mydb.* TO 'app'@'%';        -- 只读+写\nGRANT SELECT ON mydb.* TO 'readonly'@'%';                   -- 只读\nGRANT ALL ON *.* TO 'root'@'%' WITH GRANT OPTION;           -- 超级权限（⚠️）\nFLUSH PRIVILEGES;\n\n-- 查看权限\nSHOW GRANTS FOR 'app'@'localhost';\nSELECT user, host FROM mysql.user;\n\n-- 修改密码\nALTER USER 'app'@'localhost' IDENTIFIED BY 'newpassword';   -- MySQL 5.7+\nSET PASSWORD FOR 'app'@'localhost' = PASSWORD('newpass');   -- 旧版\n\n-- 删除用户\nDROP USER 'app'@'localhost';\n\n-- 锁定/解锁用户（MySQL 5.7+）\nALTER USER 'app'@'localhost' ACCOUNT LOCK;\nALTER USER 'app'@'localhost' ACCOUNT UNLOCK;\n```\n\n#### 1.3 备份与恢复\n\n```bash\n# 全库备份\nmysqldump -u root -p --all-databases > full_backup.sql\nmysqldump -u root -p --all-databases --single-transaction --routines --triggers > full_backup.sql\n\n# 单库备份\nmysqldump -u root -p mydb > mydb.sql\nmysqldump -u root -p mydb --no-data > mydb_schema.sql       # 只导出表结构\nmysqldump -u root -p mydb --no-create-info > mydb_data.sql  # 只导出数据\n\n# 单表备份\nmysqldump -u root -p mydb users > users.sql\n\n# 条件备份\nmysqldump -u root -p mydb users --where=\"created_at > '2024-01-01'\" > users_recent.sql\n\n# 恢复\nmysql -u root -p mydb < mydb.sql\nmysql -u root -p < full_backup.sql\n\n# 压缩备份/恢复\nmysqldump -u root -p mydb | gzip > mydb.sql.gz\ngunzip < mydb.sql.gz | mysql -u root -p mydb\n\n# 远程备份\nmysqldump -h 10.0.0.1 -u root -p mydb > remote_backup.sql\n\n# 物理备份（需要文件系统权限，比 mysqldump 快很多）\n# Percona XtraBackup（推荐）\nxtrabackup --backup --target-dir=/backup/mysql --user=root --password=xxx\nxtrabackup --prepare --target-dir=/backup/mysql               # 准备恢复\nxtrabackup --copy-back --target-dir=/backup/mysql             # 恢复\n\n# mysqlpump（MySQL 5.7+，并行备份，比 mysqldump 快）\nmysqlpump -u root -p --all-databases --default-parallelism=4 > backup.sql\n```\n\n#### 1.4 常用查询与维护\n\n```sql\n-- 查看数据库/表大小\nSELECT table_schema AS db, \n  ROUND(SUM(data_length + index_length) / 1024 / 1024, 2) AS size_mb\nFROM information_schema.tables GROUP BY table_schema;\n\n-- 查看某库最大的表\nSELECT table_name, \n  ROUND((data_length + index_length) / 1024 / 1024, 2) AS size_mb\nFROM information_schema.tables \nWHERE table_schema = 'mydb' ORDER BY size_mb DESC LIMIT 10;\n\n-- 查看当前连接\nSHOW PROCESSLIST;\nSHOW FULL PROCESSLIST;                                      -- 显示完整 SQL\nSELECT * FROM information_schema.processlist WHERE command != 'Sleep';\n\n-- 杀掉连接\nKILL 123;                                                   -- 杀单个连接\nSELECT CONCAT('KILL ', id, ';') FROM information_schema.processlist \nWHERE user = 'app' AND time > 300;                          -- 批量生成杀连接 SQL\n\n-- 查看锁等待\nSELECT * FROM information_schema.innodb_lock_waits;         -- MySQL 5.x\nSELECT * FROM performance_schema.data_lock_waits;           -- MySQL 8.0\n\n-- 查看慢查询\nSHOW VARIABLES LIKE 'slow_query%';\nSHOW VARIABLES LIKE 'long_query_time';\nSELECT * FROM mysql.slow_log ORDER BY start_time DESC LIMIT 10;\n\n-- 查看/设置变量\nSHOW VARIABLES LIKE 'max_connections';\nSET GLOBAL max_connections = 500;\n\n-- 优化表\nOPTIMIZE TABLE users;                                       -- 整理碎片\nANALYZE TABLE users;                                        -- 更新索引统计\nCHECK TABLE users;                                          -- 检查表错误\nREPAIR TABLE users;                                         -- 修复表\n\n-- 查看表状态\nSHOW TABLE STATUS LIKE 'users';\nSHOW INDEX FROM users;                                      -- 查看索引\n\n-- 查看正在执行的事务\nSELECT * FROM information_schema.innodb_trx;\n```\n\n#### 1.5 主从复制\n\n```sql\n-- 主库：创建复制用户\nCREATE USER 'repl'@'%' IDENTIFIED BY 'password';\nGRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';\n\n-- 主库：查看 binlog 位置\nSHOW MASTER STATUS;\n-- 记录 File 和 Position\n\n-- 从库：配置复制\nCHANGE MASTER TO\n  MASTER_HOST='10.0.0.1',\n  MASTER_USER='repl',\n  MASTER_PASSWORD='password',\n  MASTER_LOG_FILE='mysql-bin.000001',\n  MASTER_LOG_POS=1234;\n\nSTART SLAVE;\nSHOW SLAVE STATUS\\G\n\n-- 关键字段检查\n-- Slave_IO_Running: Yes   — IO 线程正常\n-- Slave_SQL_Running: Yes  — SQL 线程正常\n-- Seconds_Behind_Master: 0 — 同步延迟\n\n-- 跳过错误（谨慎使用）\nSTOP SLAVE;\nSET GLOBAL SQL_SLAVE_SKIP_COUNTER = 1;\nSTART SLAVE;\n\n-- 重置复制\nSTOP SLAVE;\nRESET SLAVE ALL;\n```\n\n#### 1.6 排障命令\n\n```bash\n# 查看错误日志\ntail -100 /var/log/mysql/error.log\ntail -100 /var/log/mariadb/mariadb.log\n\n# 连接数检查\nmysql -u root -p -e \"SHOW STATUS LIKE 'Threads_connected';\"\nmysql -u root -p -e \"SHOW VARIABLES LIKE 'max_connections';\"\n\n# 锁等待检查\nmysql -u root -p -e \"SELECT * FROM information_schema.innodb_lock_waits;\"\n\n# 死锁日志\nmysql -u root -p -e \"SHOW ENGINE INNODB STATUS\\G\" | grep -A 20 \"LATEST DETECTED DEADLOCK\"\n\n# 磁盘空间\ndf -h /var/lib/mysql\n\n# 快速修复：重启\nsystemctl restart mysql\n\n# 跳过权限表启动（忘记密码时）\nsystemctl stop mysql\nmysqld_safe --skip-grant-tables &\nmysql -u root\n# FLUSH PRIVILEGES; ALTER USER 'root'@'localhost' IDENTIFIED BY 'newpass';\nsystemctl restart mysql\n```\n\n---\n\n### 二、PostgreSQL\n\n#### 2.1 连接与管理\n\n```bash\n# 连接（默认使用当前系统用户）\npsql -U postgres -d mydb                            # 指定用户和数据库\npsql -h 10.0.0.1 -U postgres -d mydb                # 远程连接\npsql -U postgres -c \"SELECT version();\"              # 执行单条 SQL\npsql -U postgres -f script.sql                       # 执行 SQL 文件\n\n# 服务管理\nsystemctl status postgresql\nsystemctl restart postgresql\n\n# psql 内常用命令\n# \\l          — 列出所有数据库\n# \\c mydb     — 切换数据库\n# \\dt         — 列出当前库所有表\n# \\d users    — 查看表结构\n# \\du         — 列出所有角色/用户\n# \\x          — 切换扩展显示模式（宽表友好）\n# \\timing     — 显示 SQL 执行时间\n# \\q          — 退出\n\n# 配置文件位置\n/etc/postgresql/*/main/postgresql.conf    # 主配置\n/etc/postgresql/*/main/pg_hba.conf        # 访问控制\n```\n\n#### 2.2 用户与权限\n\n```sql\n-- 创建角色/用户\nCREATE ROLE app WITH LOGIN PASSWORD 'password';\nCREATE USER app WITH PASSWORD 'password';              -- 等价写法\n\n-- 授权\nGRANT ALL ON DATABASE mydb TO app;\nGRANT ALL ON ALL TABLES IN SCHEMA public TO app;\nGRANT SELECT ON ALL TABLES IN SCHEMA public TO readonly;\nGRANT SELECT, INSERT, UPDATE, DELETE ON users TO app;\n\n-- 修改默认权限（新建表自动授权）\nALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO readonly;\n\n-- 查看权限\n\\du                                                   -- psql 内\nSELECT * FROM pg_roles;\nSELECT grantee, table_schema, table_name, privilege_type \nFROM information_schema.table_privileges WHERE grantee = 'app';\n\n-- 修改密码\nALTER USER app WITH PASSWORD 'newpassword';\n\n-- 删除用户\nDROP USER app;\n```\n\n#### 2.3 备份与恢复\n\n```bash\n# 逻辑备份（pg_dump）\npg_dump -U postgres mydb > mydb.sql\npg_dump -U postgres -s mydb > mydb_schema.sql          # 只导出结构\npg_dump -U postgres -a mydb > mydb_data.sql            # 只导出数据\npg_dump -U postgres -t users mydb > users.sql          # 单表\npg_dump -U postgres -Fc mydb > mydb.dump               # 自定义格式（可并行恢复）\n\n# 逻辑恢复\npsql -U postgres mydb < mydb.sql\npg_restore -U postgres -d mydb mydb.dump               # 恢复自定义格式\npg_restore -U postgres -d mydb -j 4 mydb.dump          # 4 并行恢复\n\n# 全库备份（pg_dumpall，含角色和表空间）\npg_dumpall -U postgres > full_backup.sql\n\n# 物理备份（文件系统级别，需停库或使用 pg_basebackup）\npg_basebackup -U postgres -D /backup/pg -Ft -z -P      # tar.gz 格式，显示进度\n\n# 压缩备份\npg_dump -U postgres mydb | gzip > mydb.sql.gz\ngunzip < mydb.sql.gz | psql -U postgres mydb\n\n# 远程备份\npg_dump -h 10.0.0.1 -U postgres mydb > remote.sql\n\n# 备份到 S3（管道直传，不落盘）\npg_dump -U postgres mydb | aws s3 cp - s3://bucket/mydb.sql\n```\n\n#### 2.4 常用查询与维护\n\n```sql\n-- 查看数据库大小\nSELECT pg_database.datname, \n  pg_size_pretty(pg_database_size(pg_database.datname)) AS size\nFROM pg_database ORDER BY pg_database_size(pg_database.datname) DESC;\n\n-- 查看表大小（含索引）\nSELECT relname AS table_name,\n  pg_size_pretty(pg_total_relation_size(relid)) AS total_size,\n  pg_size_pretty(pg_relation_size(relid)) AS table_size,\n  pg_size_pretty(pg_total_relation_size(relid) - pg_relation_size(relid)) AS index_size\nFROM pg_catalog.pg_statio_user_tables \nORDER BY pg_total_relation_size(relid) DESC;\n\n-- 查看当前连接\nSELECT pid, usename, application_name, client_addr, state, query \nFROM pg_stat_activity WHERE state != 'idle';\n\n-- 杀掉连接\nSELECT pg_terminate_backend(1234);                      -- 杀单个\nSELECT pg_terminate_backend(pid) FROM pg_stat_activity \nWHERE usename = 'app' AND state = 'idle in transaction';-- 批量杀\n\n-- 取消正在运行的查询（不杀连接）\nSELECT pg_cancel_backend(1234);\n\n-- 查看锁等待\nSELECT blocked.pid AS blocked_pid, blocked.query AS blocked_query,\n       blocking.pid AS blocking_pid, blocking.query AS blocking_query\nFROM pg_stat_activity blocked\nJOIN pg_locks bl ON blocked.pid = bl.pid\nJOIN pg_locks bk ON bl.lock_type = bk.lock_type AND bl.database = bk.database\n  AND bl.relation = bk.relation AND bl.pid != bk.pid\nJOIN pg_stat_activity blocking ON bk.pid = blocking.pid\nWHERE NOT bl.granted;\n\n-- 慢查询（需先启用扩展）\nCREATE EXTENSION pg_stat_statements;\nSELECT query, calls, mean_time, total_time\nFROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;\n\n-- 查看/设置参数\nSHOW max_connections;\nALTER SYSTEM SET max_connections = 200;\nSELECT pg_reload_conf();                                -- 重载配置\n\n-- VACUUM（清理死元组，PG 特有，非常重要）\nVACUUM users;                                           -- 标记空间可重用\nVACUUM FULL users;                                      -- 紧缩表（锁表，生产慎用）\nVACUUM ANALYZE users;                                   -- 清理 + 更新统计\n\n-- 重建索引\nREINDEX INDEX idx_users_email;\nREINDEX TABLE users;\n\n-- 表分析\nANALYZE users;                                          -- 更新统计信息\n```\n\n#### 2.5 流复制\n\n```sql\n-- 主库：创建复制用户\nCREATE ROLE repl WITH LOGIN REPLICATION PASSWORD 'password';\n\n-- 主库配置 postgresql.conf\n-- wal_level = replica\n-- max_wal_senders = 5\n\n-- 主库配置 pg_hba.conf\n-- host replication repl 10.0.0.0/24 md5\n\n-- 从库：基础备份\npg_basebackup -h 10.0.0.1 -U repl -D /var/lib/postgresql/data -P -R\n\n-- -R 会自动创建 standby.signal 和配置 primary_conninfo\n\n-- 从库查看状态\nSELECT * FROM pg_stat_wal_receiver;                     -- 从库接收状态\nSELECT pg_is_in_recovery();                             -- 是否在恢复模式（true=从库）\n\n-- 主库查看状态\nSELECT * FROM pg_stat_replication;                      -- 复制状态\nSELECT client_addr, state, sync_state, \n  pg_wal_lsn_diff(pg_current_wal_lsn(), sent_lsn) AS sent_lag,\n  pg_wal_lsn_diff(pg_current_wal_lsn(), write_lsn) AS write_lag\nFROM pg_stat_replication;\n```\n\n#### 2.6 排障命令\n\n```bash\n# 错误日志\ntail -100 /var/log/postgresql/postgresql-*.log\n\n# 连接数检查\npsql -U postgres -c \"SELECT count(*) FROM pg_stat_activity;\"\npsql -U postgres -c \"SHOW max_connections;\"\n\n# 锁等待\npsql -U postgres -c \"SELECT * FROM pg_locks WHERE NOT granted;\"\n\n# 长事务（可能导致表膨胀）\npsql -U postgres -c \"SELECT pid, now()-xact_start AS duration, query \n  FROM pg_stat_activity WHERE state != 'idle' \n  AND xact_start < now() - interval '5 minutes' ORDER BY duration DESC;\"\n\n# 磁盘空间\ndf -h /var/lib/postgresql\n\n# 检查是否需要 VACUUM\npsql -U postgres -c \"SELECT relname, n_dead_tup, last_vacuum \n  FROM pg_stat_user_tables WHERE n_dead_tup > 10000 ORDER BY n_dead_tup DESC;\"\n\n# 重启\nsystemctl restart postgresql\n```\n\n---\n\n### 三、Redis\n\n#### 3.1 连接与信息\n\n```bash\n# 连接\nredis-cli                                           # 本地连接\nredis-cli -h 10.0.0.1 -p 6379                      # 远程连接\nredis-cli -a password                               # 带密码\nredis-cli -h 10.0.0.1 -p 6379 -a password PING      # 测试连通\n\n# 服务管理\nsystemctl status redis\nsystemctl restart redis\nredis-server /etc/redis/redis.conf                   # 直接启动\n\n# 信息查看\nredis-cli INFO                                       # 全部信息\nredis-cli INFO server                                # 服务器信息\nredis-cli INFO memory                                # 内存信息\nredis-cli INFO stats                                 # 统计信息\nredis-cli INFO clients                               # 客户端连接\nredis-cli INFO replication                           # 复制状态\nredis-cli INFO keyspace                              # 数据库键统计\n\n# 监控\nredis-cli MONITOR                                    # 实时监控所有命令（生产慎用）\nredis-cli --stat                                     # 持续统计\nredis-cli --latency                                  # 延迟分析\nredis-cli --bigkeys                                  # 找出大 key\nredis-cli --memkeys                                  # 找出大内存 key（Redis 7+）\n```\n\n#### 3.2 常用操作\n\n```bash\n# 基础操作\nredis-cli SET mykey \"hello\"                          # 设置\nredis-cli GET mykey                                  # 获取\nredis-cli DEL mykey                                  # 删除\nredis-cli EXISTS mykey
